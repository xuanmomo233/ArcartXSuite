# AXS 资源说明
# 用途: QuestGPS 模块默认菜单，用于查看任务分类、奖励预览和导航状态。
# 前置依赖: ArcartX；QuestGPS 模块启用后会自动注册或导出。
# 启用开关: config.yml -> modules.questgps.enabled + modules.questgps.password
# 关联文件: ArcartXQuestGPS.yml
# 重载命令: /axs questgps reload
# 最小使用路径: ui + controls
# 结构提示: 顶层 ui 节点定义窗口行为；packetHandler 负责接收任务快照；controls 定义分类列表、任务详情和导航按钮。

ui:
  isHud: false
  defaultOpen: false
  through: false
  background: true
  closeDied: true
  escClose: true
  show: true
  screenScale: true
  # packetHandler 负责接收服务端下发的数据包并刷新本地变量。
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.categories = packet['categories']
      var.pages = packet['pages']
      var.quests = packet['quests']
      var.tasks = packet['tasks']
      var.rewards = packet['rewards']
      var.categoryId = packet['categoryId']
      var.pageId = packet['pageId']
      var.categoryName = packet['categoryName']
      var.pageName = packet['pageName']
      var.availableCount = packet['availableCount']
      var.activeCount = packet['activeCount']
      var.completedCount = packet['completedCount']
      var.questCount = packet['questCount']
      var.selectedQuestId = packet['selectedQuestId']
      var.selectedQuestName = packet['selectedQuestName']
      var.selectedQuestState = packet['selectedQuestState']
      var.selectedQuestPath = packet['selectedQuestPath']
      var.selectedQuestDescriptionText = packet['selectedQuestDescriptionText']
      var.trackSummary = packet['trackSummary']
      var.canAccept = packet['canAccept']
      var.canAbandon = packet['canAbandon']
      var.canTrackQuest = packet['canTrackQuest']
      var.canTrackTask = packet['canTrackTask']
      var.canClearTrack = packet['canClearTrack']
      var.questTracked = packet['questTracked']
      var.navigationReady = packet['navigationReady']
      var.taskCount = packet['taskCount']
      var.rewardCount = packet['rewardCount']
      var.categoryKeys = var.categories.keys()
      var.categoryIndex = 0
      for(key in var.categoryKeys){
        item = val.category_list['分类项' + var.categoryIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.categoryIndex = var.categoryIndex + 1
      }
      while(var.categoryIndex < 16){
        item = val.category_list['分类项' + var.categoryIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.categoryIndex = var.categoryIndex + 1
      }
      var.questKeys = var.quests.keys()
      var.questIndex = 0
      for(key in var.questKeys){
        item = val.quest_list['任务项' + var.questIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.questIndex = var.questIndex + 1
      }
      while(var.questIndex < 48){
        item = val.quest_list['任务项' + var.questIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.questIndex = var.questIndex + 1
      }
      var.taskKeys = var.tasks.keys()
      var.taskIndex = 0
      for(key in var.taskKeys){
        item = val.task_list['目标项' + var.taskIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.taskIndex = var.taskIndex + 1
      }
      while(var.taskIndex < 24){
        item = val.task_list['目标项' + var.taskIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.taskIndex = var.taskIndex + 1
      }
      var.rewardKeys = var.rewards.keys()
      var.rewardIndex = 0
      for(key in var.rewardKeys){
        item = val.reward_list['奖励项' + var.rewardIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.rewardIndex = var.rewardIndex + 1
      }
      while(var.rewardIndex < 24){
        item = val.reward_list['奖励项' + var.rewardIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.rewardIndex = var.rewardIndex + 1
      }
    update: |-
      var.packetId = packet['packetId']
      var.categories = packet['categories']
      var.pages = packet['pages']
      var.quests = packet['quests']
      var.tasks = packet['tasks']
      var.rewards = packet['rewards']
      var.categoryId = packet['categoryId']
      var.pageId = packet['pageId']
      var.categoryName = packet['categoryName']
      var.pageName = packet['pageName']
      var.availableCount = packet['availableCount']
      var.activeCount = packet['activeCount']
      var.completedCount = packet['completedCount']
      var.questCount = packet['questCount']
      var.selectedQuestId = packet['selectedQuestId']
      var.selectedQuestName = packet['selectedQuestName']
      var.selectedQuestState = packet['selectedQuestState']
      var.selectedQuestPath = packet['selectedQuestPath']
      var.selectedQuestDescriptionText = packet['selectedQuestDescriptionText']
      var.trackSummary = packet['trackSummary']
      var.canAccept = packet['canAccept']
      var.canAbandon = packet['canAbandon']
      var.canTrackQuest = packet['canTrackQuest']
      var.canTrackTask = packet['canTrackTask']
      var.canClearTrack = packet['canClearTrack']
      var.questTracked = packet['questTracked']
      var.navigationReady = packet['navigationReady']
      var.taskCount = packet['taskCount']
      var.rewardCount = packet['rewardCount']
      var.categoryKeys = var.categories.keys()
      var.categoryIndex = 0
      for(key in var.categoryKeys){
        item = val.category_list['分类项' + var.categoryIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.categoryIndex = var.categoryIndex + 1
      }
      while(var.categoryIndex < 16){
        item = val.category_list['分类项' + var.categoryIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.categoryIndex = var.categoryIndex + 1
      }
      var.questKeys = var.quests.keys()
      var.questIndex = 0
      for(key in var.questKeys){
        item = val.quest_list['任务项' + var.questIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.questIndex = var.questIndex + 1
      }
      while(var.questIndex < 48){
        item = val.quest_list['任务项' + var.questIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.questIndex = var.questIndex + 1
      }
      var.taskKeys = var.tasks.keys()
      var.taskIndex = 0
      for(key in var.taskKeys){
        item = val.task_list['目标项' + var.taskIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.taskIndex = var.taskIndex + 1
      }
      while(var.taskIndex < 24){
        item = val.task_list['目标项' + var.taskIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.taskIndex = var.taskIndex + 1
      }
      var.rewardKeys = var.rewards.keys()
      var.rewardIndex = 0
      for(key in var.rewardKeys){
        item = val.reward_list['奖励项' + var.rewardIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.rewardIndex = var.rewardIndex + 1
      }
      while(var.rewardIndex < 24){
        item = val.reward_list['奖励项' + var.rewardIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.rewardIndex = var.rewardIndex + 1
      }
    close: |-
      var.categories = {}
      var.pages = {}
      var.quests = {}
      var.tasks = {}
      var.rewards = {}
      var.selectedQuestId = ''
  action:
    load: |-
      var.packetId = 'AXS_QUESTGPS'
      var.categories = {}
      var.pages = {}
      var.quests = {}
      var.tasks = {}
      var.rewards = {}
      var.categoryId = 'mainline'
      var.pageId = 'available'
      var.categoryName = '主线'
      var.pageName = '可接取'
      var.availableCount = 0
      var.activeCount = 0
      var.completedCount = 0
      var.questCount = 0
      var.selectedQuestId = ''
      var.selectedQuestName = '暂无任务'
      var.selectedQuestState = ''
      var.selectedQuestPath = ''
      var.selectedQuestDescriptionText = '当前分类下没有可展示的任务。'
      var.trackSummary = '当前未设置导航'
      var.canAccept = false
      var.canAbandon = false
      var.canTrackQuest = false
      var.canTrackTask = false
      var.canClearTrack = false
      var.questTracked = false
      var.navigationReady = false
      var.taskCount = 0
      var.rewardCount = 0

# controls 为主要可视控件区块，可在此调整布局、材质与文本绑定。

controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      panel:
        type: Canvas
        attribute:
          point: ~middle_center
          width: 1440
          height: 860
        children:
          shell:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: ~95,95,95,220
              shape: ~round_rect
              radius: 26
            effect:
              stroke:
                width: 3
                color: ~255,255,255,255
              shadow:
                xOffset: 2
                yOffset: 2
                blur: 5
                color: ~255,255,255,75
              ripple:
                duration: 1200
                color: ~255,255,255,110
                width: 0.05
          title:
            type: Text
            attribute:
              x: 34
              y: 28
              texts: "'&f&l任务总览  &r&7' + var.categoryName + ' · ' + var.pageName"
              fontSize: 64
          subtitle:
            type: Text
            attribute:
