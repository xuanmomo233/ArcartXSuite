# ============================================================
# 示例功能菜单 — 居中面板布局
# 本文件演示 ArcartXSuite Menu 模块的完整配置语法
# 一个 .yml 文件可包含多个菜单（用 --- 分隔），第一个为主菜单
# ============================================================

# ─── 基础属性 ───────────────────────────────────────────────

# 菜单唯一标识（必填）
# 用于：open: 动作引用、命令注册、内部索引
# 命名规范：小写英文 + 下划线，不可重复
id: example

# 菜单标题（必填）
# 显示在菜单顶部，支持 Minecraft 颜色/格式代码：
#   &0-&9, &a-&f = 颜色    &l = 粗体    &o = 斜体
#   &n = 下划线    &m = 删除线    &k = 混淆    &r = 重置
# 也支持 MiniMessage 格式：<green>, <bold>, <gradient:red:blue> 等
title: "&f&l服务器菜单"

# 布局模式（必填）
# 可选值：
#   panel  — 居中弹出面板（适合功能菜单、商店）
#   esc    — 左侧滑出面板（专用于替代 ESC 暂停界面）
#   full   — 全屏布局（适合大型导航）
layout: panel

# 每行按钮列数（必填）
# 控制按钮网格每行排列的按钮数量（配合 buttons-per-page 分页）
# 推荐 2-4（按钮宽度固定，列数过多会超出面板宽度）
columns: 4

# 每页最大按钮数量（必填）
# 超出此数量的按钮会自动分页（若未手动配置多页）
# 推荐值：columns × 期望行数（如 4列 × 4行 = 16）
buttons-per-page: 64

# ─── 自定义 UI 目标（可选）────────────────────────────────────
# 默认情况下，菜单根据 layout 自动选择 panel / esc UI 并使用 init/update handler。
# 如果需要指定自定义 UI 或自定义 handler，可配置以下字段：
#
# 单 UI 目标（简写格式）：
# ui-id: "my_custom_panel"
# packet-handler: "menu"
#
# 多 UI 目标（同一 payload 同时发给多个 UI，第一个用于 open/close）：
# ui-targets:
#   - ui-id: "my_custom_panel"
#     packet-handler: "menu"
#   - ui-id: "menu_hud"
#     packet-handler: "overlay"
#
# 注意：ui-targets 优先级高于 ui-id + packet-handler；两者不要同时写。
# 自定义 ui-id 对应的 UI 文件需要自行注册或放到 ArcartXSuite/ui/ 目录下。

# ─── 权限与条件 ─────────────────────────────────────────────

# 打开菜单所需权限节点（可选，留空 = 无限制）
# 格式为插件权限字符串，如 "arcartxsuite.menu.example"
# 玩家无此权限时无法通过任何方式打开此菜单
permission: none

# 打开菜单的前置条件列表（可选）
# 支持 PlaceholderAPI 变量表达式，所有条件必须同时满足
# 示例：
#   - "%player_level% >= 10"          — 等级 ≥ 10
#   - "%player_world% == world_hub"   — 在主城世界
#   - "%vault_eco_balance% >= 100"    — 余额 ≥ 100
# 也支持 Aria 脚本条件（由硬依赖的 ArcartX 内置提供）：会注入活的 player 对象（原生 Bukkit
# Player），脚本内以裸名 player 调用其方法。条件为单个表达式，Suite 会自动补 return。
# 注意：只支持在 player 上的【单层】方法调用（链式如 player.getWorld().getName() 不可用）；
# 需要世界名等请改用 %...% PAPI 占位符（求值前展开为字面值，字符串值记得加引号）。
#   - "aria: player.getLevel() >= 10"
#   - "aria: player.hasPermission('essentials.fly')"
#   - "aria: '%player_world%' == 'world'"
open-requirements: []
# ─── 生命周期动作 ───────────────────────────────────────────

# 打开菜单时执行的动作列表（可选）
# 在菜单显示给玩家之前执行，适合：欢迎消息、音效、统计记录
# 完整动作类型列表见下方按钮 actions 的说明
open-actions:
  - "message: &a欢迎打开示例菜单！"
  # 更多示例：
  # - "sound: ENTITY_EXPERIENCE_ORB_PICKUP|1.0|1.0"   — 播放音效（音效名 音量 音调）
  # - "command: log menu_open %player_name%"          — 执行后台命令
  # - "console: say %player_name% 打开了菜单"          — 以控制台身份执行命令

# 关闭菜单时执行的动作列表（可选）
# 在菜单关闭后执行，适合：保存状态、音效反馈
close-actions: []
  # 示例：
  # - "sound: UI_BUTTON_CLICK|0.5|1.2"
  # - "message: &7已关闭菜单"

# ─── 命令绑定 ───────────────────────────────────────────────

# 注册为游戏命令（可选）
# 玩家输入 /examplemenu 即可打开此菜单
# 可注册多个命令别名
commands:
  - "examplemenu"
  # - "emenu"
  # - "功能菜单"    — 也支持中文命令

# 命令正则匹配（可选）
# 使用正则表达式匹配更灵活的命令输入
# 下面匹配 /example 或 /examplemenu
command-regex:
  - "example(?:menu)?"

# ─── 物品绑定 ───────────────────────────────────────────────

# 将菜单绑定到背包中的特定物品（可选）
# 玩家对匹配的物品执行指定动作时打开菜单
item-binds:
  - material: COMPASS            # 物品材质（Minecraft 物品 ID，大写）
    name-contains: "功能菜单"     # 物品名称包含的文字（模糊匹配）
    action: RIGHT_CLICK          # 触发动作：RIGHT_CLICK / LEFT_CLICK / SHIFT_RIGHT_CLICK / SHIFT_LEFT_CLICK
  # 更多绑定示例：
  # - material: CLOCK
  #   name-contains: "时钟菜单"
  #   action: RIGHT_CLICK
  #   permission: "menu.clock"    — 可选：额外权限要求
  # - material: NETHER_STAR
  #   lore-contains: "右键打开"   — 按 lore 匹配（代替 name-contains）
  #   action: RIGHT_CLICK
# ─── 页面定义 ───────────────────────────────────────────────
# 一个菜单可包含多个页面，通过 "page:" 动作切换
# 每个页面有独立的 id、标题和按钮集合

pages:
  # ═══════════════════════════════════════════════════════════
  # 第一页：主功能列表
  # ═══════════════════════════════════════════════════════════
  - id: main
    title: "&f功能"
    buttons:

      # ─── 仓库系统（演示：权限 + 图标配置） ───
      warehouse:
        # 按钮显示文字
        text: "&f仓库系统"
        # 排列顺序（从 0 开始，数字越小越靠前/靠左上）
        order: 0
        # 按钮级权限（可选），无权限的玩家看不到此按钮
        permission: "arcartxsuite.warehouse.use"
        # 按钮图标配置（可选，仅 panel/full 布局有效）
        icon:
          material: CHEST                # 材质（Minecraft 物品 ID）
          name: "&f仓库"                 # 图标悬浮名称
          custom-model-data: 0           # 自定义模型数据（用于资源包自定义贴图，配合ItemsAdder或CraftEngine使用）
          # 更多 icon 可选字段：
          # amount: 1                    — 物品数量（显示为堆叠数）
          # lore:                        — 物品描述（列表）
          #   - "&7点击打开仓库"
          #   - "&7存取你的物品"
          # glow: true                   — 附魔光效
          # skull-texture: "base64..."   — 自定义头颅材质（material 为 PLAYER_HEAD 时）
          # color: "#FF5555"             — 皮革盔甲颜色（material 为 LEATHER_* 时）
          # --- 物品库图标（source + id 直接调用物品库的物品）---
          # 各物品库来源的独立可用示例见本菜单「物品库图标」页（sources 页）
          # source: "neigeitems"        — 物品来源 (neigeitems/mythicmobs/overture/mmoitems)
          # id: "herb_bundle"           — 物品来源 ID（配合 source 使用）
          # mmo-type: "MATERIAL"        — MMOItems 类型（source 为 mmoitems 时）
          # mmo-id: "HERB_ESSENCE"      — MMOItems ID（source 为 mmoitems 时）
          # --- 直接发送 json/NBT 给 slot 控件（完全自定义物品） ---
          # json: '{"id":"minecraft:diamond_sword","Count":1b}' — 直接提供物品 NBT JSON（会忽略上面的 material 等字段）
          # --- ArcartX 自定义贴图（在 material 物品上写入 NBT，无需资源包 CustomModelData） ---
          # 原理：ArcartX 读取物品的 icon / url NBT 来渲染自定义贴图（详见ArcartX wiki：自定义物品贴图）
          # texture: "item"              — 写入 icon NBT，渲染 resource/item_icon/ 下的贴图（手持 / AX-UI）；子目录用 "xxx/xxx"
          # 或（写法三选一）
          # texture-url: "menu/warehouse.png"  — 写入 url NBT，仅用于原版 GUI(箱子菜单)图标，支持文件路径 / 网络链接 / GIF
          # 或（写法三选一）
          # nbt:                         — 写入任意自定义字符串 NBT（键: 值）
          #   icon: "item"               — 等同于上述texture: "item"
          #   或（写法二选一即可）
          #   url: "https://example.com/icon.gif"  — 等同于上述texture-url
        # 动作列表（按顺序执行）
        actions:
          - "command: warehouse open"
          - "close"

      # ─── ArcartX 自定义贴图图标（演示：url NBT 渲染 GUI 图标） ───
      custom_texture_demo:
        text: "&b自定义贴图"
        order: 8
        icon:
          material: PAPER              # 基础物品（NBT 会写在它上面）
          name: "&b自定义贴图示例"
          lore:
            - "&7通过 ArcartX 的 url NBT"
            - "&7在原版 GUI 中渲染自定义图标"
          texture-url: "menu/demo_icon.png"   # 写入 url NBT → GUI 渲染该贴图（支持 GIF/网络链接）
        actions:
          - "close"

      # ─── 邮件系统（演示：基础图标） ───
      mail:
        text: "&f邮件系统"
        order: 1
        icon:
          material: PAPER
          name: "&f邮件"
        actions:
          - "command: mail open"
          - "close"

      # ─── 在线奖励（演示：条件判断 + 拒绝消息） ───
      rewards:
        text: "&f在线奖励"
        order: 2
        # 按钮显示条件（可选）
        # 条件满足时按钮正常显示，不满足时：
        #   - 若配置了 deny-message：按钮仍显示但点击后提示消息
        #   - 若未配置 deny-message：按钮完全隐藏
        condition:
          - "%player_level% >= 5"
          # 等价的 Aria 脚本条件（注入活 player 对象，Suite 自动补 return）:
          # - "aria: player.getLevel() >= 5"
        # 条件不满足时的提示消息
        deny-message: "&c需要达到 5 级才能领取在线奖励"
        # deny-actions: 条件不满足时执行的动作（可选）
        # deny-actions:
        #   - "sound: ENTITY_VILLAGER_NO|1.0|1.0"
        #   - "close"
        actions:
          - "command: onlinerewards open"
          - "close"

      # ─── 任务导航（演示：基础按钮） ───
      quest:
        text: "&f任务导航"
        order: 3
        actions:
          - "command: questgps open"
          - "close"

      # ─── 世界地图（演示：requirements 前置条件） ───
      map:
        text: "&f世界地图"
        order: 4
        # requirements 与 condition 的区别：
        #   requirements — 不满足时按钮完全不显示（硬性隐藏）
        #   condition    — 不满足时可显示 deny-message 或执行 deny-actions
        requirements:
          - "%player_level% >= 1"
        actions:
          - "command: map open"
          - "close"

      # ─── 传送菜单（演示：打开子菜单） ───
      teleport:
        text: "&f传送菜单"
        order: 5
        # "open: <菜单id>" — 打开同文件或其他文件中定义的菜单
        # 目标菜单可在同一 .yml 文件中（用 --- 分隔），也可在其他 .yml 文件中
        actions:
          - "open: teleport"

      # ─── 帮助（演示：不关闭菜单的命令） ───
      help:
        text: "&f帮助"
        order: 6
        # 未加 "close" 时，执行命令后菜单保持打开
        actions:
          - "command: help"

      # ─── 下一页（演示：页面切换） ───
      next_page:
        text: "&f更多功能 »"
        order: 7
        # "page: <页面id>" — 在同一菜单内切换页面
        actions:
          - "page: page2"

  # ═══════════════════════════════════════════════════════════
  # 第二页：更多功能
  # ═══════════════════════════════════════════════════════════
  - id: page2
    title: "&f更多"
    buttons:
      essentials:
        text: "&f基础工具"
        order: 0
        actions:
          - "command: axs essentials menu"
          - "close"
      spawn:
        text: "&f返回出生点"
        order: 1
        actions:
          - "command: axs essentials spawn"
          - "close"

      # ─── 脚本动作示例（aria / js）───
      # aria 与 js 都会注入活的 player 对象，脚本内以裸名 player 调用其 Bukkit 方法：
      #   aria：由硬依赖的 ArcartX 内置提供（始终可用）。动作脚本按原样执行、可有副作用
      #         （player.performCommand 派发指令、player.sendMessage 发消息）；作为条件时是
      #         单个表达式，Suite 自动补 return。只支持 player 上的【单层】方法调用
      #         （链式 player.getWorld().getName() 不可用，需要世界名用 %player_world%）。
      #         Aria 语法：// 注释、字符串用单引号、空值 none、elif、a..b、for(x in ...)。
      #   js  ：注入 player + Bukkit，但需服务器 classpath 上有 JS 引擎（GraalJS 等），
      #         Java 15+ 默认无 Nashorn，无引擎时该 js 动作/条件静默跳过。
      script_demo:
        text: "&f脚本动作示例"
        order: 2
        # 使用条件用 Aria 表达式判定（注入活 player，自动补 return），不满足则按钮灰色禁用
        use-conditions:
          - "aria: player.getLevel() >= 30 && player.hasPermission('menu.vip')"
        deny-message: "&c需要 30 级且拥有 menu.vip 权限"
        actions:
          # Aria 动作：直接调用活 player 的 Bukkit 方法，按运算结果派发指令（单行 if/else）
          - "aria: if (player.getLevel() >= 30) { player.performCommand('warp vip') } else { player.sendMessage('§c等级不足 30 级') }"
          # 等效 JS 写法（需 classpath 上有 JS 引擎）：
          # - "js: player.getLevel() >= 30 ? player.performCommand('warp vip') : player.sendMessage('§c等级不足 30')"
          - "close"
      # ─── 物品库图标示例入口 ───
      item_sources:
        text: "&f物品库图标示例 »"
        order: 2
        actions:
          - "page: sources"
      back:
        text: "&7« 返回"
        order: 3
        actions:
          - "page: main"

  # ═══════════════════════════════════════════════════════════
  # 第三页：物品库图标示例
  # 每个来源单独作为一个按钮，演示 source / id / mmo-type / mmo-id 的真实写法
  # 注意：下面的 id 都是占位示例，请替换成你服务器对应物品库里真实存在的 ID
  # ═══════════════════════════════════════════════════════════
  - id: sources
    title: "&f物品库图标"
    buttons:

      # ─── NeigeItems：单一 ID 定位 ───
      neige_demo:
        text: "&fNeigeItems 物品"
        order: 0
        icon:
          source: neigeitems         # 也可写 neige
          id: herb_bundle            # 替换为你 NeigeItems 里真实的物品 ID
          name: "&aNeigeItems 示例"
          lore:
            - "&7source: neigeitems"
            - "&7id: <物品ID>"
        actions:
          - "close"

      # ─── MythicMobs：单一 ID 定位 ───
      mythic_demo:
        text: "&fMythicMobs 物品"
        order: 1
        icon:
          source: mythicmobs         # 也可写 mythic
          id: MagicSword             # 替换为你 MythicMobs 里真实的物品 ID
          name: "&aMythicMobs 示例"
          lore:
            - "&7source: mythicmobs"
            - "&7id: <物品ID>"
        actions:
          - "close"

      # ─── Overture：单一 ID 定位（生成时携带玩家上下文） ───
      overture_demo:
        text: "&fOverture 物品"
        order: 2
        icon:
          source: overture
          id: sample_item            # 替换为你 Overture 里真实的物品 ID
          name: "&aOverture 示例"
          lore:
            - "&7source: overture"
            - "&7id: <物品ID>"
        actions:
          - "close"

      # ─── MMOItems：需要 类型(type) + ID 两段定位 ───
      mmoitems_demo:
        text: "&fMMOItems 物品"
        order: 3
        icon:
          source: mmoitems           # 也可写 mmo
          mmo-type: SWORD            # MMOItems 类型
          mmo-id: STEEL_SWORD        # MMOItems ID
          name: "&aMMOItems 示例"
          lore:
            - "&7source: mmoitems"
            - "&7mmo-type: SWORD"
            - "&7mmo-id: STEEL_SWORD"
        actions:
          - "close"

      back:
        text: "&7« 返回"
        order: 4
        actions:
          - "page: page2"
# ============================================================
# 动作类型完整参考
# ============================================================
# 按钮/生命周期中可用的动作（actions）类型：
#
#   "command: xxx"          — 以玩家身份执行命令
#   "console: xxx"           — 以控制台（服务器）身份执行命令
#   "close"                  — 关闭当前菜单
#   "open: <菜单id>"         — 打开另一个菜单
#   "page: <页面id>"         — 切换到同菜单内的另一页
#   "message: <消息>"        — 向玩家发送聊天消息（支持颜色代码）
#   "sound: <音效名>|<音量>|<音调>"  — 播放音效
#   "op: <命令>"               — 以玩家身份临时给予 OP 执行，用完自动收回
#   "signal: <名称>"            — 触发 EventPacket command-signal 信号
#   "signal: <名称>|键=值|键2=值2" — 触发信号并传递变量
#   "aria: <脚本>"             — 执行 Aria 脚本（注入活 player 对象，可调用其 Bukkit 方法）
#   "js: <脚本>"               — 执行 JavaScript（注入 player、Bukkit），需 classpath 上有 JS 引擎
#
# aria 与 js 都能以裸名 player 调用其方法，区别在运行时来源与限制：
#   aria：由 ArcartX 内置提供（硬依赖，始终可用）。注入活的原生 Bukkit Player，脚本内直接调用，
#         如 player.performCommand('spawn')、player.getLevel()、player.sendMessage('§a你好')。
#         动作脚本按原样执行（副作用即执行）；作为条件时为单个表达式，Suite 自动补 return。
#         【只支持 player 上的单层方法调用】——链式如 player.getWorld().getName() 不可用；
#         需要世界名等请改用 %...% PAPI 占位符（求值前展开为字面值，字符串加引号，
#         如 "aria: '%player_world%' == 'world'"）。Aria 语法：// 注释、单引号字符串、空值 none。
#   js  ：注入 player + Bukkit，可调用其方法/派发指令；但需 classpath 上有 JS 引擎（GraalJS 等），
#         Java 15+ 默认无 Nashorn，无引擎时 js 动作/条件静默跳过。
#
# 所有 command / console / message / op / signal 动作中均可使用 PlaceholderAPI 变量：
#   %player_name%    — 玩家名
#   %player_level%   — 玩家等级
#   %player_world%   — 当前世界名
#   %vault_eco_balance% — 经济余额
#   等等...
# ============================================================

# ────────────────────────────────────────────────────────────
# 二级菜单示例 — 传送点
# 同一文件中用 --- 分隔多个菜单定义
# ────────────────────────────────────────────────────────────
---
id: teleport
title: "&f&l传送"
layout: panel
columns: 2
buttons-per-page: 6
# 二级菜单通常不注册命令，仅通过 open: 动作从主菜单跳转
# 但也可以配置命令使其独立可用：
# commands:
#   - "tp-menu"
pages:
  - id: main
