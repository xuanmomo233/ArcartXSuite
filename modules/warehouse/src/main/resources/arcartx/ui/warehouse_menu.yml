# AXPM Warehouse Storage
# 纯色块风格虚拟仓库存取界面。

ui:
  isHud: false
  defaultOpen: false
  hide:
    - HUD
    - online
    - 聊天栏
    - 纯色块HUD
    - 纯色块HUD二改
  through: false
  background: false
  escClose: true
  closeDied: true
  show: true
  jei: false
  level: 8
  itemSize: 16
  screenScale: true
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.ownerType = packet['ownerType']
      var.ownerId = packet['ownerId']
      var.warehouseId = packet['warehouseId']
      var.warehouseName = packet['warehouseName']
      var.categoryId = packet['categoryId']
      var.search = packet['search']
      var.categories = packet['categories']
      var.categoryTexts = packet['categoryTexts']
      var.personalWarehouses = packet['personalWarehouses']
      var.personalWarehouseTexts = packet['personalWarehouseTexts']
      var.sharedWarehouses = packet['sharedWarehouses']
      var.sharedWarehouseStorageTexts = packet['sharedWarehouseStorageTexts']
      var.slots = packet['slots']
      var.selectedSlot = packet['selectedSlot']
      var.selectedItem = packet['selectedItem']
      var.backpack = packet['backpack']
      var.unlocked = packet['unlocked']
      var.hasPassword = packet['hasPassword']
      var.readOnly = packet['readOnly']
      var.sharedEditMode = packet['sharedEditMode']
      var.sharedCanEdit = packet['sharedCanEdit']
      var.lockOwner = packet['lockOwner']
      var.page = packet['page']
      var.pageTotal = packet['pageTotal']
      var.pageText = packet['pageText']
      var.capacityText = packet['capacityText']
      var.used = packet['used']
      var.capacity = packet['capacity']
      var.level = packet['level']
      var.canUpgrade = packet['canUpgrade']
      var.nextUpgradeText = packet['nextUpgradeText']
      var.renderBackpackAmounts()
      var.itemJsons = {}
      if(var.slots != null){
        for(key in var.slots.keys()){
          json = packet['slotItemJson' + key]
          if(json != null && json != ''){
            var.itemJsons[key] = json
          } else {
            var.itemJsons[key] = var.air
          }
        }
      }
      for(i in range(0, 54)){
        if(val.仓库网格.get(i.round) != null){
          icon = val.仓库网格.get(i.round)
          if(icon != null){
            icon.seticon()
          }
        }
      }
    update: |-
      var.packetId = packet['packetId']
      var.ownerType = packet['ownerType']
      var.ownerId = packet['ownerId']
      var.warehouseId = packet['warehouseId']
      var.warehouseName = packet['warehouseName']
      var.categoryId = packet['categoryId']
      var.search = packet['search']
      var.categories = packet['categories']
      var.categoryTexts = packet['categoryTexts']
      var.personalWarehouses = packet['personalWarehouses']
      var.personalWarehouseTexts = packet['personalWarehouseTexts']
      var.sharedWarehouses = packet['sharedWarehouses']
      var.sharedWarehouseStorageTexts = packet['sharedWarehouseStorageTexts']
      var.slots = packet['slots']
      var.selectedSlot = packet['selectedSlot']
      var.selectedItem = packet['selectedItem']
      var.backpack = packet['backpack']
      var.unlocked = packet['unlocked']
      var.hasPassword = packet['hasPassword']
      var.readOnly = packet['readOnly']
      var.sharedEditMode = packet['sharedEditMode']
      var.sharedCanEdit = packet['sharedCanEdit']
      var.lockOwner = packet['lockOwner']
      var.page = packet['page']
      var.pageTotal = packet['pageTotal']
      var.pageText = packet['pageText']
      var.capacityText = packet['capacityText']
      var.used = packet['used']
      var.capacity = packet['capacity']
      var.level = packet['level']
      var.canUpgrade = packet['canUpgrade']
      var.nextUpgradeText = packet['nextUpgradeText']
      var.renderBackpackAmounts()
      var.itemJsons = {}
      if(var.slots != null){
        for(key in var.slots.keys()){
          json = packet['slotItemJson' + key]
          if(json != null && json != ''){
            var.itemJsons[key] = json
          } else {
            var.itemJsons[key] = var.air
          }
        }
      }
      for(i in range(0, 54)){
        if(val.仓库网格.get(i.round) != null){
          icon = val.仓库网格.get(i.round)
          if(icon != null){
            icon.seticon()
          }
        }
      }
  action:
    load: |-
      var.packetId = 'AXPM_WAREHOUSE'
      var.ownerType = 'personal'
      var.ownerId = ''
      var.warehouseId = ''
      var.warehouseName = 'AXPM 仓库'
      var.categoryId = 'all'
      var.search = ''
      var.categories = {}
      var.categoryTexts = {}
      var.personalWarehouses = {}
      var.personalWarehouseTexts = {}
      var.sharedWarehouses = {}
      var.sharedWarehouseStorageTexts = {}
      var.slots = {}
      var.itemJsons = {}
      var.air = '{"id": "minecraft:air","Count":1b}'
      var.selectedSlot = -1
      var.selectedItem = null
      var.backpack = {}
      var.unlocked = false
      var.hasPassword = false
      var.readOnly = false
      var.sharedEditMode = false
      var.sharedCanEdit = false
      var.lockOwner = ''
      var.page = 1
      var.pageTotal = 1
      var.pageText = '1/1'
      var.capacityText = '0/0'
      var.used = 0
      var.capacity = 0
      var.level = 1
      var.canUpgrade = false
      var.nextUpgradeText = ''
      var.amount = 1
      var.passwordText = ''
      var.categoryScrollRatio = 0
      var.switchScrollRatio = 0
      var.selectedBackpackSlot = -1
      var.lastBackpackClickSlot = null
      var.lastBackpackClickTime = 0
      var.lastSlotClickSlot = null
      var.lastSlotClickTime = 0
      var.emptyItemJson = '{"id": "minecraft:air","Count":1b}'
      var.maxPersonalCount = 16
      var.maxSharedCount = 32
      var.maxCategoryCount = 32
      var.renderBackpackAmounts = -> {
        if(val.背包网格 != null){
          for(raw in range(9,44)){
            control = raw == 9 ? val.背包网格['背包槽'] : val.背包网格['背包槽' + (raw - 9)]
            entry = var.backpack[raw.round]
            if(control != null){
              amountText = ''
              if(entry != null && !entry['empty']){
                amountText = '&f' + entry['amount']
              }
              amountControl = control['数量']
              if(amountControl != null){
                amountControl.texts = amountText
              }
            }
          }
        }
      }
    open: |-
      Packet.send(var.packetId, 'refresh')

controls:
  根:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Canvas
        attribute:
          point: ~middle_center
          width: 1660
          height: 1030
        children:
          背景:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: "~95,95,95,220"
              shape: ~round_rect
              radius: 28
            effect:
              stroke:
                width: 3
                color: ~255,255,255,255
              shadow:
                xOffset: 2
                yOffset: 2
                blur: 5
                color: ~255,255,255,75
              ripple:
                duration: 1200
                color: ~255,255,255,110
                width: 0.05
          标题:
            type: Text
            attribute:
              x: 42
              y: 30
              texts: "'&f' + var.warehouseName"
              fontSize: 64
          状态:
            type: Text
            attribute:
              x: 42
              y: 90
              width: 720
              texts: "var.readOnly ? '&c只读模式 ' + var.lockOwner : (var.unlocked ? '&a二级密码已解锁' : '&c二级密码未解锁')"
              fontSize: 38
          共享只读:
            type: Texture
            attribute:
              x: 1090
              y: 42
              width: 80
              height: 50
              visible: var.ownerType == 'shared'
              normal: "var.sharedEditMode ? '255,255,255,150' : '120,190,255,230'"
              hover: ~Frosted:0;255,255,255,240
              shape: ~round_rect
              radius: 14
              texts: "~&0只读"
              center: true
              fontSize: 34
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'shared_mode', 'readonly')
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          共享存取:
            type: Texture
            attribute:
              x: 1182
              y: 42
              width: 80
              height: 50
              visible: var.ownerType == 'shared'
              normal: "var.sharedEditMode && !var.readOnly ? '120,190,255,230' : (var.sharedCanEdit ? '255,255,255,150' : '255,180,180,170')"
              hover: ~Frosted:0;255,255,255,240
              shape: ~round_rect
              radius: 14
              texts: "~&0存取"
              center: true
              fontSize: 34
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'shared_mode', 'edit')
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          展示按钮:
            type: Texture
            attribute:
              x: 1274
              y: 42
              width: 80
              height: 50
              normal: ~255,255,255,150
              hover: ~Frosted:0;255,255,255,240
              shape: ~round_rect
              radius: 14
              texts: "~&0展示"
              center: true
              fontSize: 34
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'showcase')
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          银行按钮:
            type: Texture
            attribute:
              x: 1366
              y: 42
              width: 80
              height: 50
              visible: var.ownerType != 'shared'
              normal: ~255,255,255,150
              hover: ~Frosted:0;255,255,255,240
              shape: ~round_rect
              radius: 14
              texts: "~&0银行"
              center: true
              fontSize: 34
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'bank')
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          管理按钮:
            type: Texture
            attribute:
              x: 1458
              y: 42
              width: 80
              height: 50
              normal: ~255,255,255,150
              hover: ~Frosted:0;255,255,255,240
              shape: ~round_rect
              radius: 14
              texts: "~&0管理"
              center: true
              fontSize: 34
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'manage')
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          刷新按钮:
            type: Texture
            attribute:
              x: 1550
              y: 42
              width: 80
              height: 50
              normal: ~255,255,255,150
              hover: ~Frosted:0;255,255,255,240
              shape: ~round_rect
              radius: 14
              texts: "~&0刷新"
              center: true
              fontSize: 34
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'refresh')
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255

          仓库切换卡片:
            type: Texture
            attribute:
              x: 292
              y: 112
              width: 1326
              height: 72
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            children:
              切换横向滑块:
                type: Texture
                val: 切换横向滑块
                attribute:
                  x: 18
                  y: 66
                  width: 50
                  height: 6
                  normal: ~120,120,120,200
                  maxDragX: 1240
              切换滚动:
                type: Scroll
                val: 切换滚动
                attribute:
                  x: 18
                  y: 12
                  width: 1290
                  height: 48
                  moveX: "self.parent['切换横向滑块'].getDragXRatio()"
                action:
                  wheel: |-
                    if(self.moveX >= 0 && self.wheelValue > 0){
                      self.parent['切换横向滑块'].setDragXRatio((self.moveX - self.wheelValue * 0.1).round(1))
                    }
                    if(self.moveX <= 1 && self.wheelValue < 0){
                      self.parent['切换横向滑块'].setDragXRatio((self.moveX - self.wheelValue * 0.1).round(1))
                    }
                children:
                  切换行:
                    type: HStack
                    attribute:
                      height: 48
                      spaceBetween: 10
                    children:
                      个人仓库列表:
                        type: HStack
                        val: 个人仓库列表
                        attribute:
                          height: 48
                          spaceBetween: 10
                        action:
                          create: |-
                            for(i in range(0, var.maxPersonalCount)){
                              key = i.round
                              pw = self['项'].copy('项' + key)
                              pw.entryKey = key
                            }
                        children:
                          项:
                            type: Texture
                            attribute:
                              entryKey: 0
                              entry: var.personalWarehouses[self.entryKey]
                              visible: self.entry != null
                              width: 170
                              height: 48
                              normal: "var.ownerType == 'personal' && self.entry != null && self.entry['id'] == var.warehouseId ? '120,190,255,230' : '255,255,255,145'"
                              hover: ~Frosted:0;255,255,255,240
                              shape: ~round_rect
                              radius: 14
                              texts: "var.personalWarehouseTexts[self.entryKey]"
                              center: true
                              fontSize: 34
                            action:
                              clickLeft: |-
                                Packet.send(var.packetId, 'warehouse', self.entry['id'])
                            effect:
                              stroke:
                                width: 2
                                color: ~0,0,0,255
                      共享仓库列表:
                        type: HStack
                        val: 共享仓库列表
                        attribute:
                          height: 48
                          spaceBetween: 10
                        action:
                          create: |-
                            for(i in range(0, var.maxSharedCount)){
                              key = i.round
                              sw = self['项'].copy('项' + key)
                              sw.entryKey = key
                            }
                        children:
                          项:
                            type: Texture
                            attribute:
                              entryKey: 0
                              entry: var.sharedWarehouses[self.entryKey]
                              visible: self.entry != null
                              width: 190
                              height: 48
                              normal: "var.ownerType == 'shared' && self.entry != null && self.entry['id'] == var.ownerId ? '120,190,255,230' : '255,255,255,145'"
                              hover: ~Frosted:0;255,255,255,240
                              shape: ~round_rect
                              radius: 14
                              texts: "var.sharedWarehouseStorageTexts[self.entryKey]"
                              center: true
                              fontSize: 32
                            action:
                              clickLeft: |-
                                Packet.send(var.packetId, 'shared', self.entry['id'])
                            effect:
                              stroke:
                                width: 2
                                color: ~0,0,0,255

          分类卡片:
            type: Texture
            attribute:
              x: 42
              y: 210
              width: 220
              height: 610
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            children:
              搜索框:
                type: TextBox
                attribute:
                  x: 32
                  y: 32
                  width: 168
                  height: 32
                  length: 32
                  emptyText: ~搜索
                  fontSize: 36
                  background: ~90,90,90,220
                  shape: ~round_rect
                  radius: 12
                action:
                  textChange: |-
                    var.search = self.getContent()
                  enter: |-
                    Packet.send(var.packetId, 'search', var.search)
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              搜索:
                type: Texture
                attribute:
                  x: 20
                  y: 78
                  width: 84
                  height: 42
                  normal: ~255,255,255,150
                  hover: ~Frosted:0;255,255,255,240
                  shape: ~round_rect
                  radius: 12
                  texts: "~&0搜索"
                  center: true
                  fontSize: 32
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'search', var.search)
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              重置:
                type: Texture
                attribute:
                  x: 116
                  y: 78
                  width: 84
                  height: 42
                  normal: ~255,255,255,150
                  hover: ~Frosted:0;255,255,255,240
                  shape: ~round_rect
                  radius: 12
                  texts: "~&0重置"
                  center: true
                  fontSize: 32
                action:
                  clickLeft: |-
                    var.search = ''
                    Packet.send(var.packetId, 'search', '')
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              分类纵向滑块:
                type: Texture
                val: 分类纵向滑块
                attribute:
                  x: 214
                  y: 142
                  width: 6
                  height: 50
                  normal: ~120,120,120,200
                  maxDragY: 390
              分类滚动:
                type: Scroll
                val: 分类滚动
                attribute:
                  x: 20
                  y: 142
                  width: 220
                  height: 440
                  moveY: "self.parent['分类纵向滑块'].getDragYRatio()"
                action:
                  wheel: |-
                    if(self.moveY >= 0 && self.wheelValue > 0){
                      self.parent['分类纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                    if(self.moveY <= 1 && self.wheelValue < 0){
                      self.parent['分类纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                children:
                  分类列表:
                    val: 分类列表
                    type: VStack
                    attribute:
                      width: 180
                      spaceBetween: 10
                    action:
                      create: |-
                        for(i in range(0, var.maxCategoryCount)){
                          key = i.round
                          cat = self['项'].copy('项' + key)
                          cat.entryKey = key
                        }
                    children:
                      项:
                        type: Texture
                        attribute:
                          entryKey: 0
                          entry: var.categories[self.entryKey]
                          visible: self.entry != null
                          width: 180
                          height: 44
                          normal: "self.entry != null && self.entry['id'] == var.categoryId ? '120,190,255,230' : '255,255,255,145'"
                          hover: ~Frosted:0;255,255,255,240
                          shape: ~round_rect
                          radius: 12
                          texts: "var.categoryTexts[self.entryKey]"
                          center: true
                          fontSize: 32
                        action:
                          clickLeft: |-
                            Packet.send(var.packetId, 'category', self.entry['id'])
                        effect:
                          stroke:
                            width: 2
                            color: ~0,0,0,255

          仓库卡片:
            type: Texture
            attribute:
              x: 292
              y: 210
              width: 792
              height: 610
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            children:
              仓库网格:
                type: HGrid
                val: 仓库网格
                attribute:
                  x: 16
                  y: 16
                  width: 760
                  height: 502
                  column: 9
                  spaceBetweenX: 14
                  spaceBetweenY: 14
                action:
                  create: |-
                    for(i in range(0, 54)){
                      key = i.round
                      slot = self['物品图标'].copy('物品图标' + key)
                      slot.entryKey = key
                    }
                children:
                  物品图标:
                    type: Slot
                    attribute:
                      entryKey: 0
                      entry: var.slots[self.entryKey]
                      visible: self.entry != null
                      slotType: ~Icon
                      itemScale: 0.76
                      width: 72
                      height: 72
                      normal: "self.entryKey == var.selectedSlot.round ? '120,190,255,255' : '95,95,95,255'"
                      hover: ~Frosted:0;255,255,255,255
                      shape: ~round_rect
                      radius: 16
                      seticon: "self.setItemIcon(var.itemJsons[self.entryKey])"
                    action:
                      clickLeft: |-
                        now = Time.currentTime()
                        if(var.lastSlotClickSlot == self.entryKey && now - var.lastSlotClickTime < 300){
                          Packet.send(var.packetId, 'withdraw_all', self.entryKey)
                          var.lastSlotClickSlot = null
                        }else{
                          Packet.send(var.packetId, 'select', self.entryKey)
                          var.lastSlotClickSlot = self.entryKey
                          var.lastSlotClickTime = now
                        }
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    children:
                      数量:
                        type: Text
                        attribute:
                          x: 8
                          y: 48
                          width: 56
                          texts: "self.parent.entry != null && !self.parent.entry['empty'] ? '&f' + self.parent.entry['amount'].round() : ''"
                          fontSize: 36
                          through: true
              上一页:
                type: Texture
                attribute:
                  x: 550
                  y: 540
                  width: 92
                  height: 48
                  normal: ~255,255,255,150
                  hover: ~Frosted:0;255,255,255,240
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0上页"
                  center: true
                  fontSize: 34
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'page', var.page - 1)
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              下一页:
                type: Texture
                attribute:
                  x: 665
                  y: 540
                  width: 92
                  height: 48
                  normal: ~255,255,255,150
                  hover: ~Frosted:0;255,255,255,240
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0下页"
                  center: true
                  fontSize: 34
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'page', var.page + 1)
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              容量状态:
                type: Text
                attribute:
                  x: 16
                  y: 550
                  width: 560
                  texts: "'&fLv.' + var.level + '  容量 ' + var.capacityText + '  页 ' + var.pageText"
                  fontSize: 48
          背包卡片:
            type: Texture
            attribute:
              x: 1120
              y: 210
              width: 498
              height: 610
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            children:
              背包标题:
                type: Text
                attribute:
                  x: 24
                  y: 20
                  texts: "~&f背包"
                  fontSize: 42
              全部存入:
                type: Texture
                attribute:
                  x: 330
                  y: 15
                  width: 138
                  height: 42
                  normal: ~255,255,255,150
                  hover: ~Frosted:0;255,255,255,240
                  shape: ~round_rect
                  radius: 12
                  texts: "~&0全部存入"
                  center: true
                  fontSize: 30
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'deposit_all_backpack')
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              背包网格:
                type: HGrid
                val: 背包网格
                attribute:
                  x: 24
                  y: 66
                  width: 450
                  height: 520
                  column: 6
                  spaceBetweenX: 14
                  spaceBetweenY: 12
                action:
                  create: |-
                    for(i in range(1,35)){
                      slot = self['背包槽'].copy('背包槽' + i)
                      slot.entryKey = (9 + i).round
                      slot.id = 9 + i
                    }
                children:
                  背包槽:
                    type: Slot
                    attribute:
                      id: 9
                      slotType: ~Backpack
                      itemScale: 0.72
                      through: false
                      lock: true
                      entryKey: 9
                      width: 62
                      height: 62
                      normal: "self.entryKey == var.selectedBackpackSlot ? '120,190,255,255' : 'Frosted:0;95,95,95,255'"
                      hover: "~Frosted:0;255,255,255,255"
                      shape: ~round_rect
                      radius: 14
                    action:
                      clickLeft: |-
                        now = Time.currentTime()
                        if(var.lastBackpackClickSlot == self.entryKey && now - var.lastBackpackClickTime < 300){
                          Packet.send(var.packetId, 'deposit_slot', self.entryKey, 0)
                          var.lastBackpackClickSlot = null
                        }else{
                          var.selectedBackpackSlot = self.entryKey
                          var.lastBackpackClickSlot = self.entryKey
                          var.lastBackpackClickTime = now
                        }
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255

