# AXPM Warehouse Storage
# 纯色块风格虚拟仓库存取界面。

ui:
  isHud: false
  defaultOpen: false
  hide:
    - HUD
    - online
    - 聊天栏
    - 纯色块HUD
    - 纯色块HUD二改
  through: false
  background: false
  escClose: true
  closeDied: true
  show: true
  jei: false
  level: 8
  itemSize: 16
  screenScale: true
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.ownerType = packet['ownerType']
      var.ownerId = packet['ownerId']
      var.warehouseId = packet['warehouseId']
      var.warehouseName = packet['warehouseName']
      var.categoryId = packet['categoryId']
      var.search = packet['search']
      var.categories = packet['categories']
      var.categoryTexts = packet['categoryTexts']
      var.personalWarehouses = packet['personalWarehouses']
      var.personalWarehouseTexts = packet['personalWarehouseTexts']
      var.sharedWarehouses = packet['sharedWarehouses']
      var.sharedWarehouseStorageTexts = packet['sharedWarehouseStorageTexts']
      var.slots = packet['slots']
      var.readWarehouseSlotFields(packet)
      var.selectedSlot = packet['selectedSlot']
      var.selectedItem = packet['selectedItem']
      var.backpack = packet['backpack']
      var.unlocked = packet['unlocked']
      var.hasPassword = packet['hasPassword']
      var.readOnly = packet['readOnly']
      var.sharedEditMode = packet['sharedEditMode']
      var.sharedCanEdit = packet['sharedCanEdit']
      var.lockOwner = packet['lockOwner']
      var.page = packet['page']
      var.pageTotal = packet['pageTotal']
      var.pageText = packet['pageText']
      var.capacityText = packet['capacityText']
      var.used = packet['used']
      var.capacity = packet['capacity']
      var.level = packet['level']
      var.canUpgrade = packet['canUpgrade']
      var.nextUpgradeText = packet['nextUpgradeText']
      var.renderWarehouseSlots()
      var.renderBackpackAmounts()
    update: |-
      var.packetId = packet['packetId']
      var.ownerType = packet['ownerType']
      var.ownerId = packet['ownerId']
      var.warehouseId = packet['warehouseId']
      var.warehouseName = packet['warehouseName']
      var.categoryId = packet['categoryId']
      var.search = packet['search']
      var.categories = packet['categories']
      var.categoryTexts = packet['categoryTexts']
      var.personalWarehouses = packet['personalWarehouses']
      var.personalWarehouseTexts = packet['personalWarehouseTexts']
      var.sharedWarehouses = packet['sharedWarehouses']
      var.sharedWarehouseStorageTexts = packet['sharedWarehouseStorageTexts']
      var.slots = packet['slots']
      var.readWarehouseSlotFields(packet)
      var.selectedSlot = packet['selectedSlot']
      var.selectedItem = packet['selectedItem']
      var.backpack = packet['backpack']
      var.unlocked = packet['unlocked']
      var.hasPassword = packet['hasPassword']
      var.readOnly = packet['readOnly']
      var.sharedEditMode = packet['sharedEditMode']
      var.sharedCanEdit = packet['sharedCanEdit']
      var.lockOwner = packet['lockOwner']
      var.page = packet['page']
      var.pageTotal = packet['pageTotal']
      var.pageText = packet['pageText']
      var.capacityText = packet['capacityText']
      var.used = packet['used']
      var.capacity = packet['capacity']
      var.level = packet['level']
      var.canUpgrade = packet['canUpgrade']
      var.nextUpgradeText = packet['nextUpgradeText']
      var.renderWarehouseSlots()
      var.renderBackpackAmounts()
  action:
    load: |-
      var.packetId = 'AXPM_WAREHOUSE'
      var.ownerType = 'personal'
      var.ownerId = ''
      var.warehouseId = ''
      var.warehouseName = 'AXPM 仓库'
      var.categoryId = 'all'
      var.search = ''
      var.categories = {}
      var.categoryTexts = {}
      var.personalWarehouses = {}
      var.personalWarehouseTexts = {}
      var.sharedWarehouses = {}
      var.sharedWarehouseStorageTexts = {}
      var.slots = {}
      for(i in range(0,53)){
        idx = i.round()
        var.slots[idx + ''] = {'slot': idx, 'empty': true, 'matched': true, 'amount': 0, 'itemJson': ''}
      }
      var.selectedSlot = -1
      var.selectedItem = null
      var.backpack = {}
      var.unlocked = false
      var.hasPassword = false
      var.readOnly = false
      var.sharedEditMode = false
      var.sharedCanEdit = false
      var.lockOwner = ''
      var.page = 1
      var.pageTotal = 1
      var.pageText = '1/1'
      var.capacityText = '0/0'
      var.used = 0
      var.capacity = 0
      var.level = 1
      var.canUpgrade = false
      var.nextUpgradeText = ''
      var.withdrawAmount = ''
      var.passwordText = ''
      var.categoryScrollRatio = 0
      var.switchScrollRatio = 0
      var.emptyItemJson = '{"id": "minecraft:air","Count":1b}'
      var.readWarehouseSlotFields = -> {
        source = args[0]
        for(i in range(0,53)){
          idx = i.round()
          si = idx + ''
          var.slots[si] = {'itemJson': source['slotJson' + si], 'amount': source['slotAmount' + si].round(), 'empty': source['slotEmpty' + si], 'matched': source['slotMatched' + si]}
        }
      }
      var.renderWarehouseSlots = -> {
        for(i in range(0,53)){
          idx = i.round()
          si = idx + ''
          slot = var.slots[si]
          normalColor = '55,55,55,185'
          if(idx == var.selectedSlot){
            normalColor = '120,190,255,255'
          }elif(slot['matched']){
            normalColor = '95,95,95,255'
          }
          renderJson = slot['itemJson']
          if(slot['empty'] || renderJson == null || renderJson == ''){
            renderJson = var.emptyItemJson
          }
          control = val.仓库网格['物品图标' + idx]
          if(control == null){
            next
          }
          control.visible = true
          control.normal = normalColor
          control.setItemIcon(renderJson)
          amountControl = control['数量']
          if(amountControl != null){
            amountControl.texts = !slot['empty'] ? '&f' + slot['amount'] : ''
          }
        }
      }
      var.renderBackpackAmounts = -> {
        if(val.背包网格 != null){
          for(raw in range(9,44)){
            control = raw == 9 ? val.背包网格['背包槽'] : val.背包网格['背包槽' + (raw - 9)]
            entry = var.backpack[raw + '']
            if(control != null){
              amountText = ''
              if(entry != null && !entry['empty']){
                amountText = '&f' + entry['amount']
              }
              amountControl = control['数量']
              if(amountControl != null){
                amountControl.texts = amountText
              }
            }
          }
        }
      }
    open: |-
      Packet.send(var.packetId, 'refresh')

controls:
  根:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Canvas
        attribute:
          point: ~middle_center
          width: 1660
          height: 1030
        children:
          背景:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: "~95,95,95,220"
              shape: ~round_rect
              radius: 28
            effect:
              stroke:
                width: 3
                color: ~255,255,255,255
              shadow:
                xOffset: 2
                yOffset: 2
                blur: 5
                color: ~255,255,255,75
              ripple:
                duration: 1200
                color: ~255,255,255,110
                width: 0.05
          标题:
            type: Text
            attribute:
              x: 42
              y: 30
              texts: "'&f' + var.warehouseName"
              fontSize: 64
          状态:
            type: Text
            attribute:
              x: 42
              y: 90
              width: 720
              texts: "var.readOnly ? '&c只读模式 ' + var.lockOwner : (var.unlocked ? '&a二级密码已解锁' : '&c二级密码未解锁')"
              fontSize: 38
          共享只读:
            type: Texture
            attribute:
              x: 1120
              y: 42
              width: 110
              height: 50
              visible: var.ownerType == 'shared'
              normal: "var.sharedEditMode ? '255,255,255,150' : '120,190,255,230'"
              hover: ~Frosted:0;255,255,255,240
              shape: ~round_rect
              radius: 14
              texts: "~&0只读"
              center: true
              fontSize: 34
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'shared_mode', 'readonly')
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          共享存取:
            type: Texture
            attribute:
              x: 1242
              y: 42
              width: 110
              height: 50
              visible: var.ownerType == 'shared'
              normal: "var.sharedEditMode && !var.readOnly ? '120,190,255,230' : (var.sharedCanEdit ? '255,255,255,150' : '255,180,180,170')"
