config-version: 1
# ArcartXSuite Regions - 区域保护模块
# 重载: /axs regions reload

debug: false

# 选区工具
selection:
  # 选区工具物品 (MATERIAL 名)
  wand-item: WOODEN_AXE
  # 最大选区体积 (方块数)
  max-volume: 500000
  # 每个玩家最大区域数 (0=无限)
  max-regions-per-player: 20

# 区域默认设置
defaults:
  # 新建区域默认优先级
  priority: 0
  # 全局区域名 (无任何区域覆盖时的保底规则)
  global-region-id: "__global__"

# 进入/离开提示
notifications:
  # 进出区域是否显示 ActionBar 提示
  show-actionbar: true
  # 进出消息显示方式: actionbar / chat / title
  display-mode: actionbar

# ─── 世界规则 (按世界级别的限制，不依赖区域选区) ───
world-rules:
  # 禁止飞行的世界列表
  no-fly-worlds:
    - "world_pvp"
  # 进入禁飞世界时的处理: cancel(取消飞行)
  no-fly-action: cancel
  # 禁飞提示消息
  no-fly-message: "&c此世界禁止飞行。"
  # 禁止活塞推动的世界列表
  no-piston-worlds: []
  # 禁止交互的物品/方块类型 (按世界配置)
  # 格式: 世界名: [MATERIAL列表]
  disabled-interactions:
    # world_spawn:
    #   - ENDER_CHEST
    #   - ANVIL

# 存储
storage:
  # sqlite / mysql
  dialect: sqlite
  sqlite-file: "regions.db"
  # MySQL 配置
  host: "127.0.0.1"
  port: 3306
  database: "arcartxsuite"
  username: "root"
  password: ""
  table-prefix: "axs_rg_"
  pool-size: 3
