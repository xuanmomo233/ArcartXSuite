# AXS 资源说明
# 用途: Regions 玩家区域查看菜单，支持当前区域/我的区域/区域详情。
# 前置依赖: ArcartX；Regions 模块启用后自动注册。
# 打开方式: /axs regions menu
# 数据交互: packetHandler 接收 init 推送；客户端通过 Packet.send('AXS_REGIONS_MENU', ...) 发送操作指令。

ui:
  background: true
  escClose: true
  closeDied: true
  show: true
  through: false
  screenScale: true
  packetHandler:
    init: |-
      var.page = packet['page']
      var.packetId = packet['packetId']
      var.currentRegion = packet['currentRegion']
      var.currentWorld = packet['currentWorld']
      var.currentPriority = packet['currentPriority']
      var.currentOwners = packet['currentOwners']
      var.currentMembers = packet['currentMembers']
      var.currentFlags = packet['currentFlags']
      var.myRegions = packet['myRegions']
      var.myRegionCount = packet['myRegionCount']
      var.regionId = packet['regionId']
      var.regionWorld = packet['regionWorld']
      var.regionPriority = packet['regionPriority']
      var.regionMin = packet['regionMin']
      var.regionMax = packet['regionMax']
      var.regionVolume = packet['regionVolume']
      var.regionParent = packet['regionParent']
      var.flags = packet['flags']
      var.owners = packet['owners']
      var.members = packet['members']

controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Texture
        attribute:
          point: ~middle_center
          width: 860
          height: 580
          normal: ~25,25,30,240
          shape: ~round_rect
          radius: 14
        effect:
          stroke:
            width: 2
            color: ~80,200,140,180
          shadow:
            xOffset: 0
            yOffset: 4
            blur: 12
            color: ~0,0,0,100
        children:
          # ═══ 标题栏 ═══
          标题栏:
            type: Texture
            attribute:
              x: 0
              y: 0
              width: 860
              height: 56
              normal: ~30,40,35,255
              shape: ~round_rect
              radius: 14
            children:
              标题文字:
                type: Text
                attribute:
                  x: 24
                  y: 8
                  fontSize: 38
                  texts: "~&a🌍 区域信息"

          # ═══ 左侧导航 ═══
          导航栏:
            type: Texture
            attribute:
              x: 0
              y: 56
              width: 150
              height: 524
              normal: ~30,30,38,255
            children:
              导航当前区域入口:
                type: Texture
                attribute:
                  x: 10
                  y: 16
                  width: 130
                  height: 40
                  normal: "var.page == 'current' ? '40,160,100,200' : '45,45,55,180'"
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send(var.packetId, 'navigate', 'current')
                children:
                  导航当前区域文字:
                    type: Text
                    attribute:
                      x: 65
                      y: 8
                      through: true
                      center: true
                      fontSize: 28
                      texts: "~&f当前"

              导航我的区域入口:
                type: Texture
                attribute:
                  x: 10
                  y: 66
                  width: 130
                  height: 40
                  normal: "var.page == 'my' || var.page == 'detail' ? '40,160,100,200' : '45,45,55,180'"
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send(var.packetId, 'navigate', 'my')
                children:
                  导航我的区域文字:
                    type: Text
                    attribute:
                      x: 65
                      y: 8
                      through: true
                      center: true
                      fontSize: 28
                      texts: "~&f我的"

          # ═══ 内容区 ═══
          内容区:
            type: Texture
            attribute:
              x: 150
              y: 56
              width: 710
              height: 524
              normal: ~20,20,25,100
            children:
              # ─── 当前区域 ───
              当前区域布局:
                type: Canvas
                attribute:
                  x: 20
                  y: 16
                  width: 670
                  height: 490
                  visible: |-
                    var.page == 'current'
                children:
                  当前区域标题:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 36
                      texts: "~&a当前所在区域"
                  当前区域名称文字:
                    type: Text
                    attribute:
                      x: 0
                      y: 50
                      fontSize: 28
                      texts: "~&7区域: {var.currentRegion != none ? '&f' + var.currentRegion : '&8无 (荒野)'}"
                  当前区域世界文字:
                    type: Text
                    attribute:
                      x: 0
                      y: 86
                      fontSize: 28
                      texts: "~&7世界: &f{var.currentWorld}"
                  当前区域优先级文字:
                    type: Text
                    attribute:
                      x: 0
                      y: 122
                      fontSize: 28
                      texts: "~&7优先级: &f{var.currentPriority}"
                  当前区域成员文字:
                    type: Text
                    attribute:
                      x: 0
                      y: 158
                      fontSize: 28
                      texts: "~&7所有者: &b{var.currentOwners}  &7成员: &b{var.currentMembers}"
                  当前标志文字:
                    type: Text
                    attribute:
                      x: 0
                      y: 210
                      fontSize: 30
                      texts: "~&e标志:"
                  当前标志滑块:
                    type: Texture
                    val: 当前标志滑块
                    attribute:
                      x: 664
                      y: 246
                      width: 6
                      height: 50
                      normal: ~120,120,120,200
                      maxDragY: 190
                  当前标志滚动栏:
                    type: Scroll
                    attribute:
                      x: 0
                      y: 246
                      width: 670
                      height: 240
                      moveY: "self.parent['当前标志滑块'].getDragYRatio()"
                    action:
                      wheel: |-
                        if(self.moveY >= 0 && self.wheelValue > 0){
                          self.parent['当前标志滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                        if(self.moveY <= 1 && self.wheelValue < 0){
                          self.parent['当前标志滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                    children:
                      cur_flags_list:
                        val: cur_flag_data
                        type: VStack
                        attribute:
                          x: 0
                          y: 0
                          width: 670
                          spaceBetween: 4
                        children:
                          标志行:
                            type: Texture
                            attribute:
                              entry: var.currentFlags[self.key]
                              visible: self.entry != none
                              width: 650
                              height: 36
                              normal: ~38,38,48,160
                              shape: ~round_rect
                              radius: 4
                            children:
                              标志名称文字:
                                type: Text
                                attribute:
                                  x: 12
                                  y: 6
                                  through: true
                                  fontSize: 24
                                  texts: "~&b{self.parent.entry['name']}"
                              标志描述文字:
                                type: Text
                                attribute:
                                  x: 200
                                  y: 7
                                  through: true
                                  fontSize: 22
                                  texts: "~&7{self.parent.entry['desc']}"
                              标志状态文字:
                                type: Text
                                attribute:
                                  x: 560
                                  y: 7
                                  through: true
                                  fontSize: 22
                                  texts: "~{self.parent.entry['state'] == 'allow' ? '&a允许' : '&c拒绝'}"

              # ─── 我的区域列表 ───
              我的区域布局:
                type: Canvas
                attribute:
                  x: 20
                  y: 16
                  width: 670
                  height: 490
                  visible: |-
                    var.page == 'my'
                children:
                  我的区域标题:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 36
                      texts: "~&a我的区域 &7({var.myRegionCount})"
                  我的区域滑块:
                    type: Texture
                    val: 我的区域滑块
                    attribute:
                      x: 664
                      y: 50
                      width: 6
                      height: 50
                      normal: ~120,120,120,200
                      maxDragY: 380
                  我的区域滚动栏:
                    type: Scroll
                    attribute:
                      x: 0
                      y: 50
                      width: 670
                      height: 430
                      moveY: "self.parent['我的区域滑块'].getDragYRatio()"
                    action:
                      wheel: |-
                        if(self.moveY >= 0 && self.wheelValue > 0){
                          self.parent['我的区域滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                        if(self.moveY <= 1 && self.wheelValue < 0){
                          self.parent['我的区域滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                    children:
                      my_list:
                        val: my_region_data
                        type: VStack
                        attribute:
                          x: 0
                          y: 0
                          width: 670
                          spaceBetween: 6
                        children:
                          我的区域行:
                            type: Texture
                            attribute:
                              entry: var.myRegions[self.key]
                              visible: self.entry != none
                              width: 650
                              height: 50
                              normal: ~40,40,50,180
                              shape: ~round_rect
                              radius: 6
                            action:
                              click: |-
                                Packet.send(var.packetId, 'select_region', self.entry['id'])
                            children:
                              我的区域编号文字:
                                type: Text
                                attribute:
                                  x: 16
                                  y: 12
                                  through: true
                                  fontSize: 28
                                  texts: "~&f{self.parent.entry['id']}"
                              我的区域世界文字:
                                type: Text
                                attribute:
                                  x: 300
                                  y: 14
                                  through: true
                                  fontSize: 24
                                  texts: "~&7{self.parent.entry['world']}"
                              我的区域身份文字:
                                type: Text
                                attribute:
                                  x: 520
                                  y: 14
                                  through: true
                                  fontSize: 24
                                  texts: "~{self.parent.entry['isOwner'] == 'true' ? '&6所有者' : '&b成员'}"

              # ─── 区域详情 ───
              区域详情布局:
                type: Canvas
                attribute:
                  x: 20
                  y: 16
                  width: 670
                  height: 490
                  visible: |-
                    var.page == 'detail'
                children:
                  详情标题:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 36
                      texts: "~&a区域: &f{var.regionId}"
                  详情世界文字:
                    type: Text
                    attribute:
                      x: 0
                      y: 48
                      fontSize: 28
                      texts: "~&7世界: &f{var.regionWorld}  &7优先级: &f{var.regionPriority}"
                  详情边界文字:
                    type: Text
                    attribute:
                      x: 0
                      y: 82
                      fontSize: 28
                      texts: "~&7范围: &f{var.regionMin} ~ {var.regionMax}"
                  详情体积文字:
                    type: Text
                    attribute:
                      x: 0
                      y: 116
                      fontSize: 28
                      texts: "~&7体积: &f{var.regionVolume} 方块  &7父区域: &f{var.regionParent != none ? var.regionParent : '无'}"
                  所有者文字:
                    type: Text
                    attribute:
                      x: 0
                      y: 162
                      fontSize: 28
                      texts: "~&6所有者:"
                  所有者滑块:
                    type: Texture
                    val: 所有者滑块
                    attribute:
                      x: 294
                      y: 194
                      width: 6
                      height: 20
                      normal: ~120,120,120,200
                      maxDragY: 80
                  所有者滚动栏:
                    type: Scroll
                    attribute:
                      x: 0
                      y: 194
                      width: 300
                      height: 100
                      moveY: "self.parent['所有者滑块'].getDragYRatio()"
                    action:
                      wheel: |-
                        if(self.moveY >= 0 && self.wheelValue > 0){
                          self.parent['所有者滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                        if(self.moveY <= 1 && self.wheelValue < 0){
                          self.parent['所有者滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                    children:
                      owners_list:
                        val: owner_data
                        type: VStack
                        attribute:
                          x: 0
                          y: 0
                          width: 300
                          spaceBetween: 4
                        children:
                          所有者项目:
                            type: Text
                            attribute:
                              entry: var.owners[self.key]
                              visible: self.entry != none
                              x: 8
                              y: 2
                              fontSize: 24
                              texts: "~&f{self.entry}"
                  成员文字:
                    type: Text
                    attribute:
                      x: 340
                      y: 162
                      fontSize: 28
                      texts: "~&b成员:"
                  成员滑块:
                    type: Texture
                    val: 成员滑块
                    attribute:
                      x: 634
                      y: 194
                      width: 6
                      height: 20
                      normal: ~120,120,120,200
                      maxDragY: 80
                  成员滚动栏:
                    type: Scroll
                    attribute:
                      x: 340
                      y: 194
                      width: 300
                      height: 100
                      moveY: "self.parent['成员滑块'].getDragYRatio()"
                    action:
                      wheel: |-
                        if(self.moveY >= 0 && self.wheelValue > 0){
                          self.parent['成员滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                        if(self.moveY <= 1 && self.wheelValue < 0){
                          self.parent['成员滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                    children:
                      members_list:
                        val: member_data
                        type: VStack
                        attribute:
                          x: 0
                          y: 0
                          width: 300
                          spaceBetween: 4
                        children:
                          成员项目:
                            type: Text
                            attribute:
                              entry: var.members[self.key]
                              visible: self.entry != none
                              x: 8
                              y: 2
                              fontSize: 24
                              texts: "~&f{self.entry}"
                  详情标志文字:
                    type: Text
                    attribute:
                      x: 0
                      y: 310
                      fontSize: 28
                      texts: "~&e标志:"
                  详情标志滑块:
                    type: Texture
                    val: 详情标志滑块
                    attribute:
                      x: 664
                      y: 342
                      width: 6
                      height: 30
                      normal: ~120,120,120,200
                      maxDragY: 110
                  详情标志滚动栏:
                    type: Scroll
                    attribute:
                      x: 0
                      y: 342
                      width: 670
                      height: 140
                      moveY: "self.parent['详情标志滑块'].getDragYRatio()"
                    action:
                      wheel: |-
                        if(self.moveY >= 0 && self.wheelValue > 0){
                          self.parent['详情标志滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                        if(self.moveY <= 1 && self.wheelValue < 0){
                          self.parent['详情标志滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                    children:
                      detail_flags_list:
                        val: detail_flag_data
                        type: VStack
                        attribute:
                          x: 0
                          y: 0
                          width: 670
                          spaceBetween: 4
                        children:
                          详情标志行:
                            type: Texture
                            attribute:
                              entry: var.flags[self.key]
                              visible: self.entry != none
                              width: 650
                              height: 32
                              normal: ~38,38,48,160
                              shape: ~round_rect
                              radius: 4
                            children:
                              详情标志名称文字:
                                type: Text
                                attribute:
                                  x: 12
                                  y: 5
                                  through: true
                                  fontSize: 22
                                  texts: "~&b{self.parent.entry['name']}"
                              详情标志描述文字:
                                type: Text
                                attribute:
                                  x: 200
                                  y: 6
                                  through: true
                                  fontSize: 20
                                  texts: "~&7{self.parent.entry['desc']}"
                              详情标志状态文字:
                                type: Text
                                attribute:
                                  x: 560
                                  y: 6
                                  through: true
                                  fontSize: 20
                                  texts: "~{self.parent.entry['state'] == 'allow' ? '&a允许' : '&c拒绝'}"
                  返回按钮:
                    type: Texture
                    attribute:
                      x: 560
                      y: 0
                      width: 100
                      height: 36
                      normal: ~60,60,70,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'navigate', 'my')
                    children:
                      返回按钮文字:
                        type: Text
                        attribute:
                          x: 50
                          y: 5
                          through: true
                          center: true
                          fontSize: 26
                          texts: "~&f← 返回"
