config-version: 1
# AXS Map
# 作用: 提供全屏地图 GUI、小地图 HUD、世界配置、锚点、路径点、自定义图标和 AXMap 临时导航目标。
# 依赖: ArcartX；Vault、PlayerPoints、MythicMobs、NeigeItems 按功能选用。
# 重载: /axs map reload
# PAPI 输出: 无独立 PlaceholderAPI 输出。
# 可解析的 PAPI: 无；地图数据来自配置、玩家位置、世界坐标、锚点和运行时临时路径点。
# 关联资源: ui/map_menu.yml、ui/map_hud.yml

debug: false

client:
  # packet-id 为客户端 Packet.send / 服务端 packetHandler 的通信标识。
  packet-id: "AXS_MAP"
  # menu-ui-id 全屏地图 UI；hud-ui-id 小地图 HUD。
  menu-ui-id: "AXS:map_menu"
  hud-ui-id: "AXS:map_hud"
  # 是否在启用/重载时自动注册 UI；overwrite-ui-files 为 true 时覆盖已导出的 UI 文件。
  register-ui-on-enable: true
  overwrite-ui-files: false

keybinds:
  # KeyBind 分类名和默认键位；default-key 使用客户端按键名。
  category: "AXS Map"
  open-menu:
    enabled: true
    display-name: "打开地图"
    default-key: "M"
  toggle-hud:
    enabled: true
    display-name: "切换小地图"
    default-key: "H"

join:
  show-hud-on-join: true
  show-hud-delay-ticks: 20

storage:
  # 存储模式: sqlite 本地文件；mysql 远程 MySQL。
  mode: "sqlite"
  sqlite:
    file: "map.db"
  mysql:
    host: "127.0.0.1"
    port: 3306
    database: "arcartxsuite"
    username: "root"
    password: ""
  pool-size: 4

navigation:
  enabled: true
  waypoint-style-id: "default"
  anchor-id-prefix: "AXS-map-anchor-"
  waypoint-id-prefix: "AXS-map-track-"

worlds:
  world:
    enabled: true
    display-name: "主世界"
    texture: "Map/world.png"
    image-width: 2048
    image-height: 2048
    pixel-offset-x: 0
    pixel-offset-z: 0
    default-zoom: 1.6
    hud-zoom: 0.18
    hud-size: 180
  world_nether:
    enabled: true
    display-name: "下界"
    texture: "Map/world_nether.png"
    image-width: 1024
    image-height: 1024
    pixel-offset-x: 0
    pixel-offset-z: 0
    default-zoom: 1.4
    hud-zoom: 0.16
    hud-size: 180

default-unlocks:
  - permission: "ArcartXSuite.map.use"
    anchors:
      - "spawn"

# 锚点定义目录，路径相对模块数据目录。
# 目录下每个 *.yml 文件可包含多个锚点，根键即为锚点 ID。
# 同一个文件中可放多个锚点，不需要每个锚点单独一个文件。
anchors-directory: "anchors"

waypoints:
  enabled: true
  default-style-id: "default"
  id-prefix: "AXS-map-wp-"
  auto-name-prefix: "标记点"
  default-max-count: 5
  limits:
    - permission: "ArcartXSuite.map.admin"
      max-count: 20
