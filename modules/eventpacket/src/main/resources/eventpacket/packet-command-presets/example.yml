# AXS 资源说明
# 用途: EventPacket 客户端回包预设示例；客户端 UI 通过 presetId 触发服务端命令。
# 前置依赖: ArcartX；EventPacket 模块启用后生效。
# 启用开关: config.yml -> modules.eventpacket.enabled + modules.eventpacket.password
# 关联文件: ArcartXEventPacket.yml 的 packet-command 段
# 重载命令: /axs eventpacket reload
# 最小使用路径: 预设键名 + type + commands

# 顶层键就是 presetId。
example_op:
  # 可选: op / console / player
  type: op
  # permission 是触发门槛（player.hasPermission 检测）；留空表示任何玩家（含改包客户端发此包）都能触发该预设。
  # type: op 触发后命令以 OP 身份执行，留空风险自负；命令黑名单仍拦截 op/deop/stop/luckperms 等致命命令，建议为 op 预设配置 permission。
  permission: "eventpacket.preset.example"
  # 冷却时间，支持数字(秒)或单位后缀: 5s / 1m / 1h / 1d
  cooldown: 0
  # 是否允许客户端透传额外参数
  allow-args: false
  # 当 allow-args 为 true 时，对每个参数进行正则校验
  args-pattern: "[\\w.:-]{1,64}"
  commands:
    - say 你好，我是 <player>
    - say 这里是 OP 身份执行

example_console:
  type: console
  permission: ""
  cooldown: 0
  allow-args: false
  args-pattern: "[\\w.:-]{1,64}"
  commands:
    - say 控制台正在响应 <player>

# 带参数透传的示例
# 客户端调用: Packet.send('ArcartXEventPacket', 'give_item', 'DIAMOND_SWORD', '1')
example_with_args:
  type: op
  permission: "eventpacket.preset.give"
  cooldown: 5s
  allow-args: true
  args-pattern: "[A-Z_0-9]{1,64}"
  commands:
    - give <player> <arg1> <arg2>

