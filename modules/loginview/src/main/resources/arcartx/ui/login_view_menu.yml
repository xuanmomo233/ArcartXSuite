# AXS 资源说明
# 用途: LoginView 模块纯色块主菜单风格登录、注册与密码修改界面。
# 前置依赖: ArcartX；LoginView 模块启用后会自动注册或导出。
# 启用开关: config.yml -> modules.loginview.enabled + modules.loginview.password
# 关联文件: ArcartXLoginView.yml、ui/login_view.yml
# 重载命令: /axs loginview reload
# 最小使用路径: ui + controls
# 结构提示: 顶层 ui 节点定义菜单行为；packetHandler 处理登录/注册/改密数据包；controls 分左侧功能栏与右侧场景装饰。
# 服务端 sync 字段:
#   packetId, type, title, mode, registered, playerName, serverName,
#   online, maxPlayers, address, time, message
# 客户端回包:
#   login, register, change_password

ui:
  isHud: false
  defaultOpen: false
  hide:
    - HUD
    - online
    - 聊天栏
    - 纯色块HUD
    - 纯色块HUD二改
  through: false
  background: true
  escClose: false
  closeDied: true
  show: true
  jei: false
  level: 20
  screenScale: true
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.type = packet['type']
      var.title = packet['title']
      var.mode = packet['mode']
      var.registered = packet['registered']
      var.playerName = packet['playerName']
      var.serverName = packet['serverName']
      var.online = packet['online']
      var.maxPlayers = packet['maxPlayers']
      var.address = packet['address']
      //var.time = packet['time']
      var.premiumBypass = packet['premiumBypass']
      var.qqBound = packet['qqBound']
      var.bindPrompt = packet['bindPrompt']
      var.result = packet['message']
      var.password = ''
      var.confirmPassword = ''
      var.oldPassword = ''
      var.newPassword = ''
      var.changeConfirmPassword = ''
      var.agreed = false
      var.showRules = false
    result: |-
      var.result = packet['message']
      var.lastSuccess = packet['success']
      if (var.lastSuccess && var.type == 'change') {
        var.type = 'login'
        var.title = '登录服务器'
        var.oldPassword = ''
        var.newPassword = ''
        var.changeConfirmPassword = ''
      }
    close: |-
      var.result = packet['message']
  action:
    load: |-
      var.packetId = 'AXS_loginview'
      var.type = 'login'
      var.title = '登录服务器'
      var.mode = 'standalone'
      var.registered = true
      var.premiumBypass = false
      var.qqBound = false
      var.bindPrompt = ''
      var.playerName = ''
      var.serverName = ''
      var.online = 0
      var.maxPlayers = 0
      var.address = ''
      var.time = ''
      var.result = ''
      var.password = ''
      var.confirmPassword = ''
      var.oldPassword = ''
      var.newPassword = ''
      var.changeConfirmPassword = ''
      var.agreed = false
      var.showRules = false

