# AXS 资源说明
# 用途: Map 模块默认全屏地图 GUI。
# 前置依赖: ArcartX；Map 模块启用后会自动注册或导出。
# 启用开关: config.yml -> modules.map.enabled + modules.map.password
# 关联文件: ArcartXMap.yml、ui/map_hud.yml
# 重载命令: /axs map reload

ui:
  isHud: false
  background: true
  closeDied: true
  escClose: true
  through: false
  screenScale: true
  show: true
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.selectedWorldId = packet['selectedWorldId']
      var.selectedWorldName = packet['selectedWorldName']
      var.worldRows = packet['worldRows']
      var.anchorRows = packet['anchorRows']
      var.waypointRows = packet['waypointRows']
      var.externalTargetRows = packet['externalTargetRows']
      var.waypointLimit = packet['waypointLimit']
      var.waypointCount = packet['waypointCount']
      var.canCreateWaypoint = packet['canCreateWaypoint']
      var.clearTrackVisible = packet['clearTrackVisible']
      var.trackingText = packet['trackingText']
      var.detailSelectedType = packet['detailSelectedType']
      var.detailSelectedId = packet['detailSelectedId']
      var.detailTitle = packet['detailTitle']
      var.detailDescription = packet['detailDescription']
      var.detailUnlocked = packet['detailUnlocked']
      var.detailUnlockCostText = packet['detailUnlockCostText']
      var.detailTeleportCostText = packet['detailTeleportCostText']
      var.detailExternalTarget = packet['detailExternalTarget']
      var.detailCanUnlock = packet['detailCanUnlock']
      var.detailCanTeleport = packet['detailCanTeleport']
      var.detailCanTrackAnchor = packet['detailCanTrackAnchor']
      var.detailCanTrackWaypoint = packet['detailCanTrackWaypoint']
      var.detailCanTrackExternal = packet['detailCanTrackExternal']
      var.detailCanDeleteWaypoint = packet['detailCanDeleteWaypoint']
      var.detailCanCreateWaypoint = packet['detailCanCreateWaypoint']
      var.detailClearTrackVisible = packet['detailClearTrackVisible']
      var.detailTrackingText = packet['detailTrackingText']
      var.maxWorldCount = packet['maxWorldCount']
      var.maxAnchorCount = packet['maxAnchorCount']
      var.maxWaypointCount = packet['maxWaypointCount']
      var.maxExternalCount = packet['maxExternalCount']
      while(val.world_entry.childrenCount() > 1){
        val.world_entry.get(1).remove()
      }
      for(i in range(0, var.maxWorldCount)){
        key = i.round()
        e = val.world_entry['地图项目'].copy('地图项目' + key)
        e.entryKey = key
      }
      while(val.anchor_row.childrenCount() > 1){
        val.anchor_row.get(1).remove()
      }
      for(i in range(0, var.maxAnchorCount)){
        key = i.round()
        e = val.anchor_row['地图项目'].copy('地图项目' + key)
        e.entryKey = key
      }
      while(val.waypoint_row.childrenCount() > 1){
        val.waypoint_row.get(1).remove()
      }
      for(i in range(0, var.maxWaypointCount)){
        key = i.round()
        e = val.waypoint_row['地图项目'].copy('地图项目' + key)
        e.entryKey = key
      }
      while(val.external_row.childrenCount() > 1){
        val.external_row.get(1).remove()
      }
      for(i in range(0, var.maxExternalCount)){
        key = i.round()
        e = val.external_row['地图项目'].copy('地图项目' + key)
        e.entryKey = key
      }
    update: |-
      var.packetId = packet['packetId']
      var.selectedWorldId = packet['selectedWorldId']
      var.selectedWorldName = packet['selectedWorldName']
      var.worldRows = packet['worldRows']
      var.anchorRows = packet['anchorRows']
      var.waypointRows = packet['waypointRows']
      var.externalTargetRows = packet['externalTargetRows']
      var.waypointLimit = packet['waypointLimit']
      var.waypointCount = packet['waypointCount']
      var.canCreateWaypoint = packet['canCreateWaypoint']
      var.clearTrackVisible = packet['clearTrackVisible']
      var.trackingText = packet['trackingText']
      var.detailSelectedType = packet['detailSelectedType']
      var.detailSelectedId = packet['detailSelectedId']
      var.detailTitle = packet['detailTitle']
      var.detailDescription = packet['detailDescription']
      var.detailUnlocked = packet['detailUnlocked']
      var.detailUnlockCostText = packet['detailUnlockCostText']
      var.detailTeleportCostText = packet['detailTeleportCostText']
      var.detailExternalTarget = packet['detailExternalTarget']
      var.detailCanUnlock = packet['detailCanUnlock']
      var.detailCanTeleport = packet['detailCanTeleport']
      var.detailCanTrackAnchor = packet['detailCanTrackAnchor']
      var.detailCanTrackWaypoint = packet['detailCanTrackWaypoint']
      var.detailCanTrackExternal = packet['detailCanTrackExternal']
      var.detailCanDeleteWaypoint = packet['detailCanDeleteWaypoint']
      var.detailCanCreateWaypoint = packet['detailCanCreateWaypoint']
      var.detailClearTrackVisible = packet['detailClearTrackVisible']
      var.detailTrackingText = packet['detailTrackingText']
      var.maxWorldCount = packet['maxWorldCount']
      var.maxAnchorCount = packet['maxAnchorCount']
      var.maxWaypointCount = packet['maxWaypointCount']
      var.maxExternalCount = packet['maxExternalCount']
      while(val.world_entry.childrenCount() > 1){
        val.world_entry.get(1).remove()
      }
      for(i in range(0, var.maxWorldCount)){
        key = i.round()
        e = val.world_entry['地图项目'].copy('地图项目' + key)
        e.entryKey = key
      }
      while(val.anchor_row.childrenCount() > 1){
        val.anchor_row.get(1).remove()
      }
      for(i in range(0, var.maxAnchorCount)){
        key = i.round()
        e = val.anchor_row['地图项目'].copy('地图项目' + key)
        e.entryKey = key
      }
      while(val.waypoint_row.childrenCount() > 1){
        val.waypoint_row.get(1).remove()
      }
      for(i in range(0, var.maxWaypointCount)){
        key = i.round()
        e = val.waypoint_row['地图项目'].copy('地图项目' + key)
        e.entryKey = key
      }
      while(val.external_row.childrenCount() > 1){
        val.external_row.get(1).remove()
      }
      for(i in range(0, var.maxExternalCount)){
        key = i.round()
        e = val.external_row['地图项目'].copy('地图项目' + key)
        e.entryKey = key
      }
  action:
    open: |-
      var.packetId = 'AXS_MAP'
      var.selectedWorldId = none
      var.selectedWorldName = '未选择'
      var.worldRows = {}
      var.anchorRows = {}
      var.waypointRows = {}
      var.externalTargetRows = {}
      var.waypointLimit = 0
      var.waypointCount = 0
      var.canCreateWaypoint = false
      var.clearTrackVisible = false
      var.trackingText = '当前未导航'
      var.detailSelectedType = 'none'
      var.detailSelectedId = none
      var.detailTitle = '未选中目标'
      var.detailDescription = '请选择一个锚点或路径点。'
      var.detailUnlocked = true
      var.detailUnlockCostText = none
      var.detailTeleportCostText = none
      var.detailExternalTarget = false
      var.detailCanUnlock = false
      var.detailCanTeleport = false
      var.detailCanTrackAnchor = false
      var.detailCanTrackWaypoint = false
      var.detailCanTrackExternal = false
      var.detailCanDeleteWaypoint = false
      var.detailCanCreateWaypoint = false
      var.detailClearTrackVisible = false
      var.detailTrackingText = '当前未导航'
      var.maxWorldCount = 0
      var.maxAnchorCount = 0
      var.maxWaypointCount = 0
      var.maxExternalCount = 0

controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Canvas
        attribute:
          point: ~middle_center
          width: 1520
          height: 900
        children:
          地图主背景:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: ~85,85,90,220
              shape: ~round_rect
              radius: 28
          边框:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: ~255,255,255,18
              shape: ~round_rect
              radius: 28
          地图菜单标题:
            type: Text
            attribute:
              point: ~top_left
              x: 36
              y: 24
              texts: "'&0地图总览 &8/ &7' + var.selectedWorldName"
              fontSize: 30
              shadow: false
          追踪文字:
            type: Text
            attribute:
              point: ~top_left
              x: 36
              y: 62
              texts: "'&7' + var.trackingText"
              fontSize: 16
              shadow: false
          世界列表面板:
            type: Texture
            attribute:
              point: ~top_left
              x: 24
              y: 110
              width: 360
              height: 150
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 18
          世界列表标题:
            type: Text
            attribute:
              point: ~top_left
              x: 42
              y: 128
              texts: "'&0世界列表'"
              fontSize: 20
              shadow: false
          世界滑块:
            type: Texture
            val: 世界滑块
            attribute:
              point: ~top_left
              x: 42
              y: 248
              width: 30
              height: 6
              normal: ~120,120,120,200
              maxDragX: 294
          世界滚动栏:
            type: Scroll
            attribute:
              point: ~top_left
              x: 42
              y: 162
              width: 324
              height: 82
              moveX: "self.parent['世界滑块'].getDragXRatio()"
            action:
              wheel: |-
                if(self.moveX >= 0 && self.wheelValue > 0){
                  self.parent['世界滑块'].setDragXRatio((self.moveX - self.wheelValue * 0.1).round(1))
                }
                if(self.moveX <= 1 && self.wheelValue < 0){
                  self.parent['世界滑块'].setDragXRatio((self.moveX - self.wheelValue * 0.1).round(1))
                }
            children:
              world_list:
                val: world_entry
                type: HStack
                attribute:
                  height: 68
                  spaceBetween: 12
                children:
                  地图项目:
                    type: Texture
                    attribute:
                      entryKey: 0
                      entry: var.worldRows[self.entryKey]
                      visible: self.entry != none
                      width: 148
                      height: 68
                      normal: "self.entry != none && self.entry['selected'] ? '135,195,240,255' : '200,200,210,255'"
                      shape: ~round_rect
                      radius: 16
                    action:
                      clickLeft: |-
                        Packet.send(var.packetId, 'open_world', self.entry['id'])
                    children:
                      世界名称文字:
                        type: Text
                        attribute:
                          point: ~middle_center
                          texts: "self.parent.entry != none ? self.parent.entry['displayName'] : none"
                          fontSize: 18
                          shadow: false
                          through: true
          地图面板:
            type: Texture
            attribute:
              point: ~top_left
              x: 24
              y: 280
              width: 900
              height: 596
              normal: ~85,85,90,220
              shape: ~round_rect
              radius: 22
          地图标题:
            type: Text
            attribute:
              point: ~top_left
              x: 44
              y: 300
              texts: "'&0全屏地图区'"
              fontSize: 22
              shadow: false
          地图提示:
            type: Text
            attribute:
              point: ~top_left
              x: 44
              y: 334
              texts: "'&7由 packet snapshot 驱动世界切换、选中态与按钮状态。'"
              fontSize: 15
              shadow: false
          锚点面板:
            type: Texture
            attribute:
              point: ~top_left
              x: 948
              y: 110
              width: 548
              height: 250
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 18
          锚点标题:
            type: Text
            attribute:
              point: ~top_left
              x: 972
              y: 126
              texts: "'&0锚点列表'"
              fontSize: 20
              shadow: false
          锚点滑块:
            type: Texture
            val: 锚点滑块
            attribute:
              point: ~top_left
              x: 1466
              y: 156
              width: 6
              height: 40
              normal: ~120,120,120,200
              maxDragY: 146
          锚点滚动栏:
            type: Scroll
            attribute:
              point: ~top_left
              x: 972
              y: 156
              width: 500
              height: 186
              moveY: "self.parent['锚点滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['锚点滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['锚点滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              anchor_stack:
                val: anchor_row
                type: VStack
                attribute:
                  width: 500
                  spaceBetween: 10
                children:
                  地图项目:
                    type: Texture
                    attribute:
                      entryKey: 0
                      entry: var.anchorRows[self.entryKey]
                      visible: self.entry != none
                      width: 500
                      height: 70
                      normal: "self.entry != none && self.entry['selected'] ? '135,195,240,255' : '200,200,210,255'"
                      shape: ~round_rect
                      radius: 14
                    action:
                      clickLeft: |-
                        Packet.send(var.packetId, 'select_anchor', self.entry['id'])
                    children:
                      锚点名称文字:
                        type: Text
                        attribute:
                          point: ~top_left
                          x: 18
                          y: 12
                          texts: "self.parent.entry != none ? self.parent.entry['displayName'] : none"
                          fontSize: 18
                          shadow: false
                          through: true
                      状态文字:
                        type: Text
                        attribute:
                          point: ~top_left
                          x: 18
                          y: 40
                          texts: "self.parent.entry != none ? (self.parent.entry['unlocked'] ? '&a已解锁' : '&c未解锁') : none"
                          fontSize: 14
                          shadow: false
                          through: true
          路径点面板:
            type: Texture
            attribute:
              point: ~top_left
              x: 948
              y: 374
              width: 548
              height: 142
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 18
          路径点标题:
            type: Text
            attribute:
              point: ~top_left
              x: 972
              y: 390
              texts: "'&0路径点 &8(' + var.waypointCount + '/' + var.waypointLimit + '&8)'"
              fontSize: 20
              shadow: false
          路径点滑块:
            type: Texture
            val: 路径点滑块
            attribute:
              point: ~top_left
              x: 1466
              y: 420
              width: 6
              height: 20
              normal: ~120,120,120,200
              maxDragY: 60
          路径点滚动栏:
            type: Scroll
            attribute:
              point: ~top_left
              x: 972
              y: 420
              width: 500
              height: 80
              moveY: "self.parent['路径点滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['路径点滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['路径点滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              waypoint_stack:
                val: waypoint_row
                type: VStack
                attribute:
                  width: 500
                  spaceBetween: 8
                children:
                  地图项目:
                    type: Texture
                    attribute:
                      entryKey: 0
                      entry: var.waypointRows[self.entryKey]
                      visible: self.entry != none
                      width: 500
                      height: 48
                      normal: "self.entry != none && self.entry['selected'] ? '135,195,240,255' : '200,200,210,255'"
                      shape: ~round_rect
                      radius: 14
                    action:
                      clickLeft: |-
                        Packet.send(var.packetId, 'select_waypoint', self.entry['id'])
                    children:
                      路径点名称文字:
                        type: Text
                        attribute:
                          point: ~middle_left
                          x: 18
                          texts: "self.parent.entry != none ? self.parent.entry['name'] : none"
                          fontSize: 16
                          shadow: false
                          through: true
          外部面板:
            type: Texture
            attribute:
              point: ~top_left
              x: 948
              y: 530
              width: 548
              height: 130
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 18
          外部标题:
            type: Text
            attribute:
              point: ~top_left
              x: 972
              y: 546
              texts: "'&0任务目标'"
              fontSize: 20
              shadow: false
          外部滑块:
            type: Texture
            val: 外部滑块
            attribute:
              point: ~top_left
              x: 1466
              y: 576
              width: 6
              height: 18
              normal: ~120,120,120,200
              maxDragY: 50
          外部滚动栏:
            type: Scroll
            attribute:
              point: ~top_left
              x: 972
              y: 576
              width: 500
              height: 68
              moveY: "self.parent['外部滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['外部滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['外部滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              external_stack:
                val: external_row
                type: VStack
                attribute:
                  width: 500
                  spaceBetween: 8
                children:
                  地图项目:
                    type: Texture
                    attribute:
                      entryKey: 0
                      entry: var.externalTargetRows[self.entryKey]
                      visible: self.entry != none
                      width: 500
                      height: 48
                      normal: "self.entry != none && self.entry['selected'] ? '135,195,240,255' : '200,200,210,255'"
                      shape: ~round_rect
                      radius: 14
                    action:
                      clickLeft: |-
                        Packet.send(var.packetId, 'select_external', self.entry['id'])
                    children:
                      外部名称文字:
                        type: Text
                        attribute:
                          point: ~middle_left
                          x: 18
                          texts: "self.parent.entry != none ? self.parent.entry['name'] : none"
                          fontSize: 16
                          shadow: false
                          through: true
          详情面板:
            type: Texture
            attribute:
              point: ~top_left
              x: 948
              y: 674
              width: 548
              height: 202
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 18
          详情标题:
            type: Text
            attribute:
              point: ~top_left
              x: 972
              y: 692
              texts: "var.detailTitle"
              fontSize: 22
              shadow: false
          详情描述:
            type: Text
            attribute:
              point: ~top_left
              x: 972
              y: 724
              texts: "var.detailDescription"
              fontSize: 14
              shadow: false
          解锁费用文字:
            type: Text
            attribute:
              point: ~top_left
              x: 972
              y: 750
              texts: "'&7解锁: &0' + var.detailUnlockCostText"
              fontSize: 13
              shadow: false
              visible: "var.detailSelectedType == 'anchor'"
          传送费用文字:
            type: Text
            attribute:
              point: ~top_left
              x: 972
              y: 768
              texts: "'&7传送: &0' + var.detailTeleportCostText"
              fontSize: 13
              shadow: false
              visible: "var.detailSelectedType == 'anchor'"
          解锁按钮:
            type: Texture
            attribute:
              point: ~top_left
              x: 972
              y: 800
              width: 104
              height: 34
              normal: "var.detailCanUnlock ? '225,225,230,255' : '110,110,115,255'"
              shape: ~round_rect
              radius: 12
            action:
              clickLeft: |-
                if (var.detailCanUnlock) {
                         Packet.send(var.packetId, 'unlock_anchor', var.detailSelectedId, packet['action_token'])
                }
            children:
              解锁按钮文字:
                type: Text
                attribute:
                  point: ~middle_center
                  texts: "'&0解锁'"
                  fontSize: 16
                  shadow: false
                  through: true
          传送按钮:
            type: Texture
            attribute:
              point: ~top_left
              x: 1088
              y: 800
              width: 104
              height: 34
              normal: "var.detailCanTeleport ? '225,225,230,255' : '110,110,115,255'"
              shape: ~round_rect
              radius: 12
            action:
              clickLeft: |-
                if (var.detailCanTeleport) {
                  Packet.send(var.packetId, 'teleport_anchor', var.detailSelectedId, packet['action_token'])
                }
            children:
              传送按钮文字:
                type: Text
                attribute:
                  point: ~middle_center
                  texts: "'&0传送'"
                  fontSize: 16
                  shadow: false
                  through: true
          追踪按钮:
            type: Texture
            attribute:
              point: ~top_left
              x: 1204
              y: 800
              width: 104
              height: 34
              normal: "(var.detailCanTrackAnchor || var.detailCanTrackWaypoint || var.detailCanTrackExternal) ? '225,225,230,255' : '110,110,115,255'"
              shape: ~round_rect
              radius: 12
            action:
              clickLeft: |-
                if (var.detailSelectedType == 'anchor' && var.detailCanTrackAnchor) {
                  Packet.send(var.packetId, 'track_anchor', var.detailSelectedId)
                }
                if (var.detailSelectedType == 'waypoint' && var.detailCanTrackWaypoint) {
                  Packet.send(var.packetId, 'track_waypoint', var.detailSelectedId)
                }
                if (var.detailSelectedType == 'external' && var.detailCanTrackExternal) {
                  Packet.send(var.packetId, 'track_external', var.detailSelectedId)
                }
            children:
              追踪按钮文字:
                type: Text
                attribute:
                  point: ~middle_center
                  texts: "'&0导航'"
                  fontSize: 16
                  shadow: false
                  through: true
          删除按钮:
            type: Texture
            attribute:
              point: ~top_left
              x: 1320
              y: 800
              width: 72
              height: 34
              normal: "var.detailCanDeleteWaypoint ? '225,225,230,255' : '110,110,115,255'"
              shape: ~round_rect
              radius: 12
            action:
              clickLeft: |-
                if (var.detailCanDeleteWaypoint) {
                  Packet.send(var.packetId, 'delete_waypoint', var.detailSelectedId, packet['action_token'])
                }
            children:
              删除按钮文字:
                type: Text
                attribute:
                  point: ~middle_center
                  texts: "'&0删除'"
                  fontSize: 16
                  shadow: false
                  through: true
          创建按钮:
            type: Texture
            attribute:
              point: ~top_left
              x: 1404
              y: 800
              width: 72
              height: 34
              normal: "var.canCreateWaypoint ? '225,225,230,255' : '110,110,115,255'"
              shape: ~round_rect
              radius: 12
            action:
              clickLeft: |-
                if (var.canCreateWaypoint) {
                  Packet.send(var.packetId, 'create_waypoint', packet['action_token'])
                }
            children:
              创建按钮文字:
                type: Text
                attribute:
                  point: ~middle_center
                  texts: "'&0新建'"
                  fontSize: 16
                  shadow: false
                  through: true
          清除按钮:
            type: Texture
            attribute:
              point: ~top_left
              x: 1404
              y: 24
              width: 72
              height: 34
              normal: "var.clearTrackVisible ? '225,225,230,255' : '110,110,115,255'"
              shape: ~round_rect
              radius: 12
            action:
              clickLeft: |-
                if (var.clearTrackVisible) {
                  Packet.send(var.packetId, 'clear_track')
                }
