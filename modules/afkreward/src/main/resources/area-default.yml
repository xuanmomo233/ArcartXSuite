# 是否启用
enabled: true

# 所属世界
world: bskyblock_world

# 多边形坐标点（射线法判断）
pos:
  - "-11,138"
  - "17,114"
  - "40,114"
  - "48,128"
  - "51,138"
  - "42,167"
  - "20,172"
  - "10,171"
