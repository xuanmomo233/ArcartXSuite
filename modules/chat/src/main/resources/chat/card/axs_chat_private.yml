# ArcartXSuite Chat — 私聊通知卡片模板
# 收到或发送私聊消息时显示此卡片
卡片根布局:
  type: Card
  attribute:
    width: "self.data['cardWidth'] + 0"
    height: "self.data['cardHeight'] + 0"
  children:
    卡片背景:
      type: Texture
      attribute:
        width: "self.parent.data['cardWidth'] + 0"
        height: "self.parent.data['cardHeight'] + 0"
        normal: ~25,25,35,200
      action:
        click: |-
          Chat.setMessage('/msg ' + self.parent.data['senderName'] + ' ')
    图标文字:
      type: Text
      attribute:
        fontSize: 260
        x: 15
        y: "self.parent.data['cardHeight']/2 - 10"
        texts: "'§d✎'"
        through: true
    标题文字:
      type: Text
      attribute:
        fontSize: 64
        x: 160
        y: 15
        texts: "self.parent.data['direction'] == 'sender' ? '§d私聊 → §f' + self.parent.data['targetName'] : '§d私聊 ← §f' + self.parent.data['senderDisplayName']"
        through: true
    消息文字:
      type: Text
      attribute:
        fontSize: 64
        x: 160
        y: 60
        through: true
        texts:
          - "'§7' + self.parent.data['msg0']"
          - "self.parent.data['msg1'] != none ? '§7' + self.parent.data['msg1'] : none"
          - "self.parent.data['msg2'] != none ? '§7' + self.parent.data['msg2'] : none"
          - "self.parent.data['msg3'] != none ? '§7' + self.parent.data['msg3'] : none"
          - "self.parent.data['msg4'] != none ? '§7' + self.parent.data['msg4'] : none"
          - "self.parent.data['msg5'] != none ? '§7' + self.parent.data['msg5'] : none"
          - "self.parent.data['msg6'] != none ? '§7' + self.parent.data['msg6'] : none"
          - "self.parent.data['msg7'] != none ? '§7' + self.parent.data['msg7'] : none"
          - "self.parent.data['msg8'] != none ? '§7' + self.parent.data['msg8'] : none"
          - "self.parent.data['msg9'] != none ? '§7' + self.parent.data['msg9'] : none"
