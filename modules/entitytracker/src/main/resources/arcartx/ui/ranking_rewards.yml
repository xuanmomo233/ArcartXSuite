# AXS 资源说明
# 用途: EntityTracker 排行榜奖励管理主界面，展示奖励配置列表、手动发放和调度状态。
# 前置依赖: ArcartX；EntityTracker 模块排行榜奖励功能启用后自动注册。
# 打开方式: /axs entitytracker rewards manage
# 重载命令: /axs entitytracker reload
# 数据交互: packetHandler 接收 config-list / scheduler-status / result 三种服务端推送；
#             客户端通过 Packet.send('AXS_ENTITY_TRACKER_REWARD', ...) 发送操作指令。

ui:
  background: true
  escClose: true
  closeDied: true
  show: true
  through: false
  screenScale: true
  packetHandler:
    config-list: |-
      var.rewardType = packet['rewardType']
      var.configs = packet['configs']
      var.total = packet['total']
      var.view = 'list'
      var.resultMsg = none
    scheduler-status: |-
      var.weeklyEnabled = packet['weeklyEnabled']
      var.monthlyEnabled = packet['monthlyEnabled']
      var.nextWeekly = packet['nextWeekly']
      var.nextMonthly = packet['nextMonthly']
      var.weeklyRunning = packet['weeklyRunning']
      var.monthlyRunning = packet['monthlyRunning']
      var.view = 'status'
    result: |-
      var.resultMsg = packet['message']

controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      根面板:
        type: Texture
        attribute:
          point: ~middle_center
          width: 1200
          height: 720
          normal: ~30,30,35,235
          shape: ~round_rect
          radius: 16
        effect:
          stroke:
            width: 2
            color: ~80,200,160,180
          shadow:
            xOffset: 0
            yOffset: 4
            blur: 12
            color: ~0,0,0,120
        children:
          # 标题栏
          标题栏:
            type: Texture
            attribute:
              x: 0
              y: 0
              width: 1200
              height: 72
              normal: ~40,40,50,255
              shape: ~round_rect
              radius: 16
            children:
              标题文字:
                type: Text
                attribute:
                  x: 28
                  y: 14
                  fontSize: 42
                  texts: "~&6排行榜奖励管理"
              周奖励按钮:
                type: Texture
                attribute:
                  x: 520
                  y: 12
                  width: 120
                  height: 48
                  normal: ~50,180,80,200
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send('AXS_ENTITY_TRACKER_REWARD', 'list-configs', 'weekly')
                children:
                  周奖励文字:
                    type: Text
                    attribute:
                      point: ~middle_center
                      fontSize: 28
                      texts: "~&f周奖励"
              月奖励按钮:
                type: Texture
                attribute:
                  x: 654
                  y: 12
                  width: 120
                  height: 48
                  normal: ~200,160,50,200
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send('AXS_ENTITY_TRACKER_REWARD', 'list-configs', 'monthly')
                children:
                  月奖励文字:
                    type: Text
                    attribute:
                      point: ~middle_center
                      fontSize: 28
                      texts: "~&f月奖励"
              调度状态按钮:
                type: Texture
                attribute:
                  x: 788
                  y: 12
                  width: 140
                  height: 48
                  normal: ~60,130,200,200
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send('AXS_ENTITY_TRACKER_REWARD', 'scheduler-status')
                children:
                  调度状态文字:
                    type: Text
                    attribute:
                      point: ~middle_center
                      fontSize: 28
                      texts: "~&f调度状态"
              发放历史按钮:
                type: Texture
                attribute:
                  x: 942
                  y: 12
                  width: 120
                  height: 48
                  normal: ~130,100,200,200
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send('AXS_ENTITY_TRACKER_REWARD', 'open-history')
                children:
                  发放历史文字:
                    type: Text
                    attribute:
                      point: ~middle_center
                      fontSize: 28
                      texts: "~&f发放历史"
              手动发放按钮:
                type: Texture
                attribute:
                  x: 1076
                  y: 12
                  width: 110
                  height: 48
                  normal: ~200,80,50,200
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send('AXS_ENTITY_TRACKER_REWARD', 'manual-distribute', var.rewardType)
                children:
                  手动发放文字:
                    type: Text
                    attribute:
                      point: ~middle_center
                      fontSize: 28
                      texts: "~&f手动发放"

          # 结果提示
          结果提示:
            type: Text
            attribute:
              x: 28
              y: 684
              fontSize: 26
              texts: "~&e{var.resultMsg}"

          # 配置列表区域
          列表滑块:
            type: Texture
            val: 列表滑块
            attribute:
              x: 1174
              y: 84
              width: 6
              height: 50
              normal: ~120,120,120,200
              maxDragY: 538
          列表滚动区:
            type: Scroll
            attribute:
              x: 20
              y: 84
              width: 1160
              height: 588
              visible: |-
                var.view == 'list' || var.view == none
              moveY: "self.parent['列表滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['列表滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['列表滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              列表表头:
                type: Texture
                attribute:
                  x: 0
                  y: 0
                  width: 1160
                  height: 44
                  normal: ~50,50,60,200
                  shape: ~round_rect
                  radius: 6
                children:
                  类型列:
                    type: Text
                    attribute:
                      x: 16
                      y: 8
                      fontSize: 28
                      texts: "~&b排行类型"
                  范围列:
                    type: Text
                    attribute:
                      x: 240
                      y: 8
                      fontSize: 28
                      texts: "~&b名次范围"
                  名称列:
                    type: Text
                    attribute:
                      x: 420
                      y: 8
                      fontSize: 28
                      texts: "~&b奖励名称"
                  奖励列:
                    type: Text
                    attribute:
                      x: 680
                      y: 8
                      fontSize: 28
                      texts: "~&b奖励内容"
                  状态列:
                    type: Text
                    attribute:
                      x: 960
                      y: 8
                      fontSize: 28
                      texts: "~&b状态"
                  操作列:
                    type: Text
                    attribute:
                      x: 1080
                      y: 8
                      fontSize: 28
                      texts: "~&b操作"
              列表内容:
                type: VGrid
                attribute:
                  x: 0
                  y: 50
                  width: 1160
                  eachHeight: 52
                  dataList: var.configs
                children:
                  行背景:
                    type: Texture
                    attribute:
                      width: 1160
                      height: 48
                      normal: ~45,45,55,180
                      shape: ~round_rect
                      radius: 6
                    children:
                      类型单元格:
                        type: Text
                        attribute:
                          x: 16
                          y: 10
                          fontSize: 26
                          texts: "~&f{each.rankingTypeDisplay}"
                      范围单元格:
                        type: Text
                        attribute:
                          x: 240
                          y: 10
                          fontSize: 26
                          texts: "~&7第{each.rankStart}-{each.rankEnd}名"
                      名称单元格:
                        type: Text
                        attribute:
                          x: 420
                          y: 10
                          fontSize: 26
                          texts: "~&e{each.rewardName}"
                      奖励单元格:
                        type: Text
                        attribute:
                          x: 680
                          y: 10
                          fontSize: 24
                          texts: "~&a{each.rewardPreview}"
                      状态单元格:
                        type: Text
                        attribute:
                          x: 960
                          y: 10
                          fontSize: 26
                          texts: "~{each.statusIcon}"
                      切换按钮:
                        type: Texture
                        attribute:
                          x: 1060
                          y: 6
                          width: 80
                          height: 36
                          normal: ~60,130,200,180
                          shape: ~round_rect
                          radius: 6
                        action:
                          click: |-
                            Packet.send('AXS_ENTITY_TRACKER_REWARD', 'toggle', each.id)
                        children:
                          切换文字:
                            type: Text
                            attribute:
                              point: ~middle_center
                              fontSize: 24
                              texts: "~&f切换"

          # 调度状态区域
          状态区:
            type: Texture
            attribute:
              x: 20
              y: 84
              width: 1160
              height: 588
              visible: |-
                var.view == 'status'
              normal: ~40,40,50,180
              shape: ~round_rect
              radius: 12
            children:
              状态标题:
                type: Text
                attribute:
                  x: 40
                  y: 20
                  fontSize: 36
                  texts: "~&6调度器状态"
              周奖励状态:
                type: Text
                attribute:
                  x: 40
                  y: 80
                  fontSize: 30
                  texts: "~&a周奖励任务: {var.weeklyRunning ? '&a运行中' : '&c已停止'}"
              周奖励下次:
                type: Text
                attribute:
                  x: 40
                  y: 130
                  fontSize: 28
                  texts: "~&7下次周奖励: &f{var.nextWeekly}"
              月奖励状态:
                type: Text
                attribute:
                  x: 40
                  y: 200
                  fontSize: 30
                  texts: "~&e月奖励任务: {var.monthlyRunning ? '&a运行中' : '&c已停止'}"
              月奖励下次:
                type: Text
                attribute:
                  x: 40
                  y: 250
                  fontSize: 28
                  texts: "~&7下次月奖励: &f{var.nextMonthly}"
              返回列表按钮:
                type: Texture
                attribute:
                  x: 40
                  y: 340
                  width: 140
                  height: 48
                  normal: ~60,130,200,200
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send('AXS_ENTITY_TRACKER_REWARD', 'list-configs', var.rewardType)
                children:
                  返回文字:
                    type: Text
                    attribute:
                      point: ~middle_center
                      fontSize: 28
                      texts: "~&f← 返回列表"
