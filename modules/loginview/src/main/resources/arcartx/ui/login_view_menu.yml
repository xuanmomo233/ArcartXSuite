              关闭按钮:
                type: Texture
                attribute:
                  x: 310
                  y: 250
                  width: 120
                  height: 38
                  normal: ~160,50,50,220
                  hover: ~200,60,60,255
                  shape: ~round_rect
                  radius: 10
                  texts: ~&f关闭
                  center: true
                  fontSize: 36
                action:
                  clickLeft: var.showRules = false
                effect:
                  stroke:
                    width: 2
                    color: ~165,190,220,255
