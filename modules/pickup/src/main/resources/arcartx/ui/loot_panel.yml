ui:
  isHud: true
  defaultOpen: false
  through: false
  show: true
  packetHandler:
    update: |-
      var.count = packet['count']
      var.selectedIndex = packet['selectedIndex']
      var.item0Visible = packet['item0Visible']
      var.item0Name = packet['item0Name']
      var.item0Amount = packet['item0Amount']
      var.item0Material = packet['item0Material']
      var.item0ItemJson = packet['item0ItemJson']
      var.item1Visible = packet['item1Visible']
      var.item1Name = packet['item1Name']
      var.item1Amount = packet['item1Amount']
      var.item1Material = packet['item1Material']
      var.item1ItemJson = packet['item1ItemJson']
      var.item2Visible = packet['item2Visible']
      var.item2Name = packet['item2Name']
      var.item2Amount = packet['item2Amount']
      var.item2Material = packet['item2Material']
      var.item2ItemJson = packet['item2ItemJson']
      var.item3Visible = packet['item3Visible']
      var.item3Name = packet['item3Name']
      var.item3Amount = packet['item3Amount']
      var.item3Material = packet['item3Material']
      var.item3ItemJson = packet['item3ItemJson']
      var.item4Visible = packet['item4Visible']
      var.item4Name = packet['item4Name']
      var.item4Amount = packet['item4Amount']
      var.item4Material = packet['item4Material']
      var.item4ItemJson = packet['item4ItemJson']
      var.item5Visible = packet['item5Visible']
      var.item5Name = packet['item5Name']
      var.item5Amount = packet['item5Amount']
      var.item5Material = packet['item5Material']
      var.item5ItemJson = packet['item5ItemJson']
      var.item6Visible = packet['item6Visible']
      var.item6Name = packet['item6Name']
      var.item6Amount = packet['item6Amount']
      var.item6Material = packet['item6Material']
      var.item6ItemJson = packet['item6ItemJson']
      var.item7Visible = packet['item7Visible']
      var.item7Name = packet['item7Name']
      var.item7Amount = packet['item7Amount']
      var.item7Material = packet['item7Material']
      var.item7ItemJson = packet['item7ItemJson']
      var.dirty = true
    select: |-
      var.selectedIndex = packet['selectedIndex']
  action:
    load: |-
      var.count = 0
      var.selectedIndex = 0
      var.dirty = false
      var.item0Visible = false
      var.item1Visible = false
      var.item2Visible = false
      var.item3Visible = false
      var.item4Visible = false
      var.item5Visible = false
      var.item6Visible = false
      var.item7Visible = false
      var.item0Name = ''
      var.item1Name = ''
      var.item2Name = ''
      var.item3Name = ''
      var.item4Name = ''
      var.item5Name = ''
      var.item6Name = ''
      var.item7Name = ''
      var.item0Amount = 0
      var.item1Amount = 0
      var.item2Amount = 0
      var.item3Amount = 0
      var.item4Amount = 0
      var.item5Amount = 0
      var.item6Amount = 0
      var.item7Amount = 0
      var.item0ItemJson = ''
      var.item1ItemJson = ''
      var.item2ItemJson = ''
      var.item3ItemJson = ''
      var.item4ItemJson = ''
      var.item5ItemJson = ''
      var.item6ItemJson = ''
      var.item7ItemJson = ''
    tick: |-
      if(var.dirty){
        if(var.item0ItemJson != ''){
          val.loot_slot_0.setItemIcon(var.item0ItemJson)
        }
        if(var.item1ItemJson != ''){
          val.loot_slot_1.setItemIcon(var.item1ItemJson)
        }
        if(var.item2ItemJson != ''){
          val.loot_slot_2.setItemIcon(var.item2ItemJson)
        }
        if(var.item3ItemJson != ''){
          val.loot_slot_3.setItemIcon(var.item3ItemJson)
        }
        if(var.item4ItemJson != ''){
          val.loot_slot_4.setItemIcon(var.item4ItemJson)
        }
        if(var.item5ItemJson != ''){
          val.loot_slot_5.setItemIcon(var.item5ItemJson)
        }
        if(var.item6ItemJson != ''){
          val.loot_slot_6.setItemIcon(var.item6ItemJson)
        }
        if(var.item7ItemJson != ''){
          val.loot_slot_7.setItemIcon(var.item7ItemJson)
        }
        var.dirty = false
      }
    keyPress: |-
      if(Keyboard.isKeyDown(Keyboard.getKeyBindingKeyName("AXS_INTERACT")) && var.count > 0){
        Screen.open('AXS:loot_interact')
        Packet.send('pickup', 'open_menu')
      }
    wheel: |-
      if(var.count > 0){
        if(self.wheelValue > 0){
          var.selectedIndex = var.selectedIndex - 1
          if(var.selectedIndex < 0){
            var.selectedIndex = var.count - 1
          }
          Packet.send('pickup', 'scroll_up')
        }
        if(self.wheelValue < 0){
          var.selectedIndex = var.selectedIndex + 1
          if(var.selectedIndex >= var.count){
            var.selectedIndex = 0
          }
          Packet.send('pickup', 'scroll_down')
        }
      }

controls:
  adaptive:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    action:
      click: |-
        if(client.pickup){
          Packet.send('pickup', 'pick')
        }
    children:
      loot_panel:
        type: Canvas
        attribute:
          point: ~middle_center
          x: 160
          y: 0
          width: 280
          height: 420
          visible: var.count > 0
          through: true
        children:
          key_hint:
            type: Text
            attribute:
              point: ~top_left
              x: 14
              y: 10
              fontSize: 22
              #这里是提示文本，随便怎么写
              texts: "~"
              through: true
          loot_list:
            type: VStack
            attribute:
              point: ~top_left
              x: 10
              y: 38
              width: 260
              spaceBetween: 4
              through: true
            children:
              entry_0:
                type: Canvas
                attribute:
                  width: 260
                  height: 42
                  visible: var.item0Visible
                  through: true
                children:
                  bg_0:
                    type: Texture
                    attribute:
                      point: ~stretch_all
                      normal: "var.selectedIndex == 0 ? '60,140,220,160' : '40,40,50,120'"
                      shape: ~round_rect
                      radius: 8
                    action:
                      clickLeft: |-
                        Packet.send('pickup', 'pick_0')
                  icon_0:
                    val: loot_slot_0
                    type: Slot
                    attribute:
                      point: ~middle_left
                      x: 6
                      y: 0
                      width: 32
                      height: 32
                      slotType: ~Icon
                      normal: ~0,0,0,0
                      hover: ~0,0,0,0
                      itemScale: 0.8
                      through: true
                  name_0:
                    type: Text
                    attribute:
                      point: ~middle_left
                      x: 44
                      y: 0
                      fontSize: 28
                      texts: "var.item0Amount > 1 ? var.item0Name + ' &7x' + var.item0Amount.round() : var.item0Name"
                      through: true
              entry_1:
