config-version: 1
# ArcartXSuite LoginView
# 密码同步不保存明文：AuthMe 迁移只复制数据库 hash，独立模式登录成功后可重写为 AXS 自己的 PBKDF2 hash。

# PlaceholderAPI:
# - %axsloginview_account_type% -> microsoft / littleskin / offline
# - %axsloginview_account_type_display% -> 微软正版 / LittleSkin / 离线
# - %axsloginview_is_microsoft% / %axsloginview_is_littleskin% / %axsloginview_is_offline%

# 是否输出 LoginView 模块调试日志。
debug: false

auth:
  # 认证模式：
  #   authme:    使用 AuthMe API 做注册、登录、改密，LoginView 仅提供 AXUI 登录界面。
  #   standalone: 使用 AXS 独立账户库，可通过 /axs loginview migrate-authme 导入 AuthMe hash。
  mode: standalone
  # 正版 / LittleSkin 玩家绕过登录后的欢迎消息。
  # 账号类型判定由 AXS 主体 AccountTypeService 统一管理。
  bypass-welcome:
    message: '&a身份已验证，欢迎回来。'

# QQ 绑定集成（需 qqbot 模块同时加载）
qq-binding:
  enabled: true
  # 微软正版账号是否需要绑定 QQ 才能进入游戏
  microsoft-require-bind: false
  # LittleSkin 账号是否需要绑定 QQ 才能进入游戏
  littleskin-require-bind: true
  # 未绑定 QQ 的正版/LittleSkin 玩家在登录面板看到的提示
  bind-prompt: 
    - '&e你尚未绑定 QQ'
    - '&7请在 QQ 群发送: #绑定 {name}'
    - '&7获取验证码后在下方输入'

# ─── UI 配置 ────────────────────────────────────────
ui:
  # 登录 UI 的 ArcartX ID。
  ui-id: AXS:LoginView
  # 客户端回包 ID，用于接收输入框内容。
  packet-id: AXS_loginview
  # 默认使用紧凑登录 UI；可改为 login_view_menu.yml 使用纯色块主菜单风格 UI。
  ui-file: login_view.yml
  # 是否在插件启用时自动注册 / 重载登录 UI。
  register-ui-on-enable: true
  # 是否强制覆盖 plugins/ArcartXSuite/ui/ 下的登录 UI 文件。
  overwrite-ui-files: false
  # 玩家进服后延迟多少 ticks 弹出登录界面（20 ticks = 1 秒）。
  open-delay-ticks: 20
  # 登录成功后是否自动关闭登录 UI。
  close-on-login: true

# ─── 服务条款 ────────────────────────────────────────
terms-of-service:
  # 是否强制玩家在登录前查阅服务器服规。
  enabled: true

# ─── 登录后传送 ────────────────────────────────────────
# 登录成功后是否将玩家传送到指定出生点（主城）。
spawn-on-login:
  enabled: false
  world: world
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

# ─── 安全策略 ────────────────────────────────────────
security:
  # 密码最小长度。
  min-password-length: 6
  # 密码最大长度。
  max-password-length: 64
  # 允许的最大密码尝试次数，超过后按 kick-on-max-attempts 处理。
  max-attempts: 5
  # 密码错误次数达到上限后是否踢出玩家。
  kick-on-max-attempts: true
  # 未登录/未注册时是否禁止移动。
  lock-movement: true
  # 未登录/未注册时是否禁止聊天。
  lock-chat: true
  # 未登录/未注册时是否禁止执行命令。
  lock-commands: true
  # 未登录/未注册时仍允许执行的命令前缀列表（逗号分隔）。
  allow-commands-prefix: login,register,l,reg,AXS
  # 从 AuthMe 导入的 hash 验证成功后，是否重写为 AXS_PBKDF2_SHA256，从而完全脱离 AuthMe。
  rehash-migrated-password-on-login: true
  # 认证 session 有效期（分钟），有效期内玩家掉线重连或服务器重启后无需重新登录。
  # 设为 0 则禁用 session 持久化（每次进服都必须重新登录）。
  session-ttl-minutes: 30
  # 是否要求 session 绑定 IP（更严格但可能影响 NAT 切换 / 移动网络用户）。
  session-strict-ip: false

# ─── 数据存储 ────────────────────────────────────────
storage:
  # 存储模式：sqlite 或 mysql。
  mode: sqlite
  sqlite:
    # SQLite 文件名（相对模块数据目录）。
    file: loginview.db
  mysql:
    # 以下仅在 mode: mysql 时生效。
    host: 127.0.0.1
    port: 3306
    database: minecraft
    username: root
    password: ''
  # 表名前缀。
  table-prefix: AXS_loginview_

# ─── AuthMe 迁移 ────────────────────────────────────────
# 仅当 auth.mode = standalone 且需要从 AuthMe 导入历史数据时使用。
authme-migration:
  source:
    # JDBC 连接地址：
    #   SQLite 示例: jdbc:sqlite:plugins/AuthMe/AuthMe.db
    #   MySQL 示例: jdbc:mysql://127.0.0.1:3306/authme?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    jdbc-url: jdbc:sqlite:plugins/AuthMe/AuthMe.db
    username: ''
    password: ''
    # AuthMe 数据表名。
    table: authme
  columns:
    # AuthMe 列名到 AXS 字段的映射。
    name: username
    real-name: realname
    password: password
    salt: salt
    last-ip: ip
    last-login: lastlogin
    registration-date: regdate
    registration-ip: regip
    email: email
  # 支持的算法：AUTHME_BCRYPT、AUTHME_BCRYPT2Y、AUTHME_SHA256。
  # 不支持的算法不会自动破解，请先在 AuthMe 侧转换或让玩家重置密码。
  imported-hash-algorithm: AUTHME_BCRYPT
  # 单次批量导入的玩家数量。
  batch-size: 200

# ─── 提示消息 ────────────────────────────────────────
# 支持 & 颜色码与常见 PAPI 占位符。
messages:
  title-login: 登录服务器
  title-register: 注册账号
  login-success: '&a登录成功。'
  register-success: '&a注册完成，已自动登录。'
  change-success: '&a密码已修改。'
  password-mismatch: '&c两次输入的密码不一致。'
  password-too-short: '&c密码太短。'
  password-too-long: '&c密码太长。'
  wrong-password: '&c密码错误。'
  already-registered: '&c你已经注册过账号。'
  not-registered: '&e你还没有注册，请先设置密码。'
  authme-unavailable: '&c当前配置为 AuthMe 兼容模式，但 AuthMe 不可用。'
  locked: '&e请先完成登录。'
  kicked: '&c密码错误次数过多。'
