<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <!-- Main gradient: purple → blue → cyan -->
    <linearGradient id="main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6750a4"/>
      <stop offset="45%" stop-color="#5b6efb"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Outer glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft shadow under text -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#5b6efb" flood-opacity="0.5"/>
    </filter>
    <!-- Highlight gradient for accent line -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6750a4" stop-opacity="0"/>
      <stop offset="30%" stop-color="#5b6efb"/>
      <stop offset="70%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background glow circle -->
  <circle cx="128" cy="120" r="90" fill="#5b6efb" opacity="0.08" filter="url(#glow)"/>
  <!-- AS main text -->
  <text x="128" y="155" text-anchor="middle" font-family="Inter,'SF Pro Display','Segoe UI',system-ui,sans-serif" font-size="130" font-weight="900" letter-spacing="-8" fill="url(#main)" filter="url(#shadow)">AS</text>
  <!-- Thin accent line below -->
  <line x1="48" y1="175" x2="208" y2="175" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Small dot accents -->
  <circle cx="48" cy="175" r="3" fill="#6750a4" opacity="0.6"/>
  <circle cx="208" cy="175" r="3" fill="#22d3ee" opacity="0.6"/>
</svg>
