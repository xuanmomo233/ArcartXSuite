# ============================================================
#  Regions 区域保护模块消息文件
# ------------------------------------------------------------
#  支持 & 颜色码（如 &c 红色）和 {0} {1} 占位符。
#  修改后执行 /axs reload regions 即可生效。
# ============================================================

prefix: "&3◆ &6ArcartXSuite &7| &r"

# ── 通用 ──────────────────────────────────────────────
common:
  service-down: "&cRegions 服务未启动。"
  reload-hint: "&e请使用 /{0} reload regions"
  unknown: "&e未知命令，使用 /{0} regions help 查看帮助"
  only-player: "&c该命令仅限玩家使用。"
  no-permission: "&c你没有权限执行这个命令。"

# ── help ──────────────────────────────────────────────
help:
  title: "&6区域管理命令"
  status: "&7{0} status&f - 查看模块状态"
  define: "&7{0} define <名称>&f - 用选区创建区域"
  remove: "&7{0} remove <名称>&f - 删除区域"
  redefine: "&7{0} redefine <名称>&f - 用新选区重定义区域范围"
  list: "&7{0} list [世界]&f - 列出区域"
  info: "&7{0} info <名称>&f - 查看区域信息"
  flag: "&7{0} flag <区域> <标志> <allow|deny>&f - 设置标志"
  removeflag: "&7{0} removeflag <区域> <标志>&f - 移除标志"
  flags: "&7{0} flags <区域>&f - 查看区域所有标志"
  addowner: "&7{0} addowner/addmember <区域> <玩家>&f - 添加成员"
  removeowner: "&7{0} removeowner/removemember <区域> <玩家>&f - 移除成员"
  priority: "&7{0} priority <区域> <数字>&f - 设置优先级"
  parent: "&7{0} parent <区域> <父区域|none>&f - 设置父区域"
  tp: "&7{0} tp <区域>&f - 传送到区域中心"

# ── status ────────────────────────────────────────────
status:
  title: "&6Regions 模块状态"
  loaded: "&7已加载区域: &f{0}"
  flags: "&7标志类型数: &f{0}"

# ── admin ─────────────────────────────────────────────
admin:
  define:
    usage: "&e用法: /axs regions define <名称>"
  remove:
    usage: "&e用法: /axs regions remove <名称>"
  redefine:
    usage: "&e用法: /axs regions redefine <名称>"
  list:
    empty: "&c没有找到区域。"
    title: "&6区域列表 ({0}): {1} 个"
  info:
    usage: "&e用法: /axs regions info <名称>"
    title: "&6=== 区域: {0} ==="
    world: "&7世界: &f{0}"
    bounds: "&7范围: &f{0} → {1}"
    volume: "&7体积: &f{0}"
    priority: "&7优先级: &f{0}"
    parent: "&7父区域: &f{0}"
    owners: "&7所有者: &f{0}"
    members: "&7成员: &f{0}"
    flags: "&7标志数: &f{0}"
  flag:
    usage: "&e用法: /axs regions flag <区域> <标志> <allow|deny> [数据]"
  removeflag:
    usage: "&e用法: /axs regions removeflag <区域> <标志>"
  flags:
    empty: "&e区域 {0} 没有设置任何标志。"
    title: "&6区域 {0} 的标志:"
  addowner:
    usage: "&e用法: /axs regions addowner/addmember <区域> <玩家>"
  removeowner:
    usage: "&e用法: /axs regions removeowner/removemember <区域> <玩家>"
  priority:
    usage: "&e用法: /axs regions priority <区域> <数字>"
    success: "&a区域 {0} 优先级已设为 {1}。"
    invalid: "&c无效数字: {0}"
  parent:
    usage: "&e用法: /axs regions parent <区域> <父区域|none>"
    success: "&a区域 {0} 父区域已设为 {1}。"
  tp:
    usage: "&e用法: /axs regions tp <区域>"
    world-offline: "&c目标世界不存在或未加载: {0}"
    success: "&a已传送到区域 {0} 中心。"

# ── player ────────────────────────────────────────────
player:
  ui:
    offline: "&cUI 功能不可用（ArcartX 未加载）"
