# ArcartXSuite Chat — 系统提示卡片模板
# 禁言提示、敏感词拦截等系统通知时显示此卡片
# data['type'] 可能的值: mute, filter
卡片根布局:
  type: Card
  attribute:
    width: "self.data['cardWidth'] + 0"
    height: "self.data['cardHeight'] + 0"
  children:
    卡片背景:
      type: Texture
      attribute:
        width: "self.parent.data['cardWidth'] + 0"
        height: "self.parent.data['cardHeight'] + 0"
        normal: ~25,25,35,200
    图标文字:
      type: Text
      attribute:
        fontSize: 200
        x: 25
        y: 3
        texts: "'§c⚠'"
        through: true
    标题文字:
      type: Text
      attribute:
        fontSize: 64
        x: 160
        y: 15
        texts: "self.parent.data['type'] == 'mute' ? '§c§l你已被禁言' : '§c§l消息被拦截'"
        through: true
    详情文字:
      type: Text
      attribute:
        fontSize: 64
        x: 160
        y: 60
        texts: "self.parent.data['type'] == 'mute' ? '§7剩余时间: §f' + (self.parent.data['remaining'] != none ? self.parent.data['remaining'] : '永久') : '§7' + (self.parent.data['message'] != none ? self.parent.data['message'] : '内容违规')"
        through: true
