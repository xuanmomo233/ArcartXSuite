# Tab 定义: arena
# 竞技场 / 枪战 PVP 风格示例 definition：对应内置 ui-id: tab-arena
# （plugins/ArcartXSuite/ui/tab-arena.yml，模块启用时自动复制）。
# 特性：
#   - 红 / 蓝双队左右分栏布局（按 team 字段分队，UI 端拆桶）
#   - 常驻显示（计分板永远在屏上）+ 按住 TAB 切换"详细模式"（额外显示血量）
#   - 玩家头像（PlayerSkin）+ 名字颜色随 PVP / vanish 状态变化
#   - 战斗状态图标（PVP 中 = ⚔，正常 = ·）
# 启用前请确认：
#   - settings.style.pvp-highlight.enabled: true
#   - 玩家已分配到 scoreboard team "red" / "blue"（或替换下面的 team PAPI 来源）
# 默认 enabled: false，避免与 online-tab / demo 同时推送时玩家看到多个 HUD。

enabled: false
ui-targets:
  - ui-id: "tab-arena"
    packet-handler: "tab"
client-refresh-packet-id: "TAB"
client-refresh-action: "update"
max-entries: -1
# 先按队伍聚集，再按名字
sort-keys:
  - { mode: papi, key: "%player_scoreboardteam%" }
  - { mode: name }
pack:
  # 队伍来源：原版 scoreboard team。可替换为自己 PVP 插件 PAPI，例如：
  #   "%bedwars_team%" / "%matrixduels_team%" / "%cs_team%"
  # UI 端按 == "red" / "blue" 判定，其他值（含空串）不渲染。
  team: "%player_scoreboardteam%"
  uuid: "{player_uuid}"
  name: "%axstab_pvp_color%%axstab_vanish_color%%player_name%"
  # 战斗中标志：%axstab_pvp% 返回 "1" / "0"
  status: "%axstab_pvp%"
  # 血量：%player_max_health% 在部分版本可能不存在，可替换为常量 20
  health: "%player_health%/%player_max_health%"
