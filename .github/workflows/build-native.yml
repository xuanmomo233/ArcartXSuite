name: Build Native Library

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'native/**'
      - 'libs/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    paths:
      - 'native/**'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev zlib1g-dev default-jdk-headless

      - name: Build native library
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-linux
          path: src/main/resources/native/libaxs-native.so

  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
      CMAKE_PREFIX_PATH: C:\vcpkg\installed\x64-windows-static
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install vcpkg & dependencies
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg.exe integrate install
          C:\vcpkg\vcpkg.exe install openssl
        shell: cmd

      - name: Build native library
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static
          cmake --build build --config Release
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-windows
          path: src/main/resources/native/Release/axs-native.dll
          if-no-files-found: error

  build-gradle:
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Linux native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-linux
          path: src/main/resources/native/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.2'

      - name: Build Gradle project
        run: gradle build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: axs-jar
          path: '*/build/libs/*.jar'

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-gradle]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mkdir -p release
          find artifacts/native-linux -name "libaxs-native.so" -exec cp {} release/ \;
          find artifacts/native-windows -name "axs-native.dll" -exec cp {} release/ \;
          find artifacts/axs-jar -name "*.jar" -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            自动构建产物：
            - `libaxs-native.so` — Linux 原生库
            - `axs-native.dll` — Windows 原生库
            - `ArcartXSuite-*.jar` — 完整服务端插件
          files: release/*
          draft: false
          prerelease: true
