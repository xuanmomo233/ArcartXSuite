#
# ArcartXSuite CombatEffect - 连击特效 HUD
# 本 UI 作为 HUD 常驻显示，同时支持两种 combo 数据来源：
#   1. packetHandler "combo" / "combo_milestone" — 服务端包触发（达到阈值时）
#   2. server.combo_count 服务器变量 — 实时同步（需开启 sync-variable）
#
# 推荐方式: 开启 sync-variable 后直接用 {server.combo_count} 显示实时数字，
# packetHandler 仅用于里程碑动画（如 5 连击闪光、10 连击特效）。
#
ui:
  isHud: true
  defaultOpen: true
  packetHandler:
    combo: |-
      var.combo_count = Cast.toInt(packet['combo_count'])
      var.combo_show = true
      var.combo_time = Time.currentTime()
      async {
        while (true) {
          Thread.sleep(500)
          if (Time.currentTime() - var.combo_time > 3000) {
            var.combo_show = false
            var.combo_count = 0
            break
          }
        }
      }
    combo_milestone: |-
      var.combo_count = Cast.toInt(packet['combo_count'])
      var.combo_show = true
      var.combo_time = Time.currentTime()
      val.milestone_fx.visible = true
      async {
        Thread.sleep(2000)
        val.milestone_fx.visible = false
      }
      async {
        while (true) {
          Thread.sleep(500)
          if (Time.currentTime() - var.combo_time > 3000) {
            var.combo_show = false
            var.combo_count = 0
            break
          }
        }
      }

controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      width: 1920
      height: 1080
      point: ~stretch_all
    children:

      连击展示区:
        type: Canvas
        attribute:
          width: 300
          height: 120
          x: 1560
          y: 350
          point: ~top_left
        children:

          连击背景:
            type: Texture
            attribute:
              normal: ~0,0,0,120
              shape: ~round_rect
              radius: ~8
              width: 300
              height: 120
              point: ~top_left
              visible: "server.combo_count > 0 || var.combo_show"

          连击数字:
            type: Text
            attribute:
              texts: "~&f{server.combo_count}"
              shadow: false
              fontSize: 72
              center: true
              x: 150
              y: 8
              point: ~top_left
              visible: "server.combo_count > 0 || var.combo_show"

          连击标签:
            type: Text
            attribute:
              texts: "'&eCOMBO'"
              shadow: false
              fontSize: 28
              center: true
              x: 150
              y: 80
              point: ~top_left
              visible: "server.combo_count > 0 || var.combo_show"

          里程碑特效:
            type: Texture
            val: milestone_fx
            attribute:
              normal: ~combat_effect/combo_milestone.png
              middleScale: 1
              width: 300
              height: 120
              point: ~top_left
              visible: false
