ui:
  isHud: true
  hide:
  - player_list
  escClose: false
  defaultOpen: true
  action:
    load: |-
      var.RichTAB显示 = false
    keyPress: |-
      if(self.currentKeyPress() == "TAB"){
        Packet.send("TAB","update")
        var.RichTAB单列数量 = Math.ceil(server.server_online / val.player_grid.row)
        var.RichTAB第一列人数 = Math.min(server.server_online, 15)
        var.RichTAB显示 = true
      }
    keyRelease: |-
      if(self.currentKeyReleased() == "TAB"){
        var.RichTAB显示 = false
      }
  packetHandler:
    tab: |-
      var.entries = packet['entries']
      var.RichTAB单列数量 = Math.ceil(server.server_online / val.player_grid.row)
      var.RichTAB第一列人数 = Math.min(server.server_online, 15)
controls:
  adaptive:
    type: adaptive
    attribute:
      point: ~top_center
      width: 1920
      height: 1080
    children:
      RichTAB背景:
        type: texture
        attribute:
          point: ~top_center
          width: 50 + 322 * var.RichTAB单列数量
          height: 70 + 32 * var.RichTAB第一列人数
          y: 40
          normal: ~Frosted:30;0,0,0,255
          visible: var.RichTAB显示
          shape: ~round_rect
          radius: 20
        effect:
          stroke:
            width: 3
            color: ~0,0,0,255
        children:
          标题:
            type: text
            attribute:
              y: 23
              x: 26
              fontSize: 33
              texts: "'&a&l在线玩家（完整版）：'"
              lineSpace: 8
          player_grid:
            type: VGrid
            attribute:
              spaceBetweenY: 2
              spaceBetweenX: 2
              row: 15
              y: 60
              x: 26
            children:
              player_row:
                type: Canvas
                attribute:
                  entry: var.entries[self.key]
                  width: 320
                  height: 30
                  visible: self.entry != null
                children:
                  head:
                    type: texture
                    attribute:
                      width: 28
                      height: 28
                      x: 0
                      y: 0
                      shape: ~round_rect
                      radius: 4
                      normal: "self.parent.entry != null ? 'PlayerSkin:' + self.parent.entry['uuid'] : '~120,120,120,255'"
                  name_text:
                    type: text
                    attribute:
                      x: 36
                      y: 0
                      fontSize: 28
                      texts: "self.parent.entry != null ? self.parent.entry['name'] : '~null'"
                      lineSpace: 4
                  ping_text:
                    type: text
                    attribute:
                      x: 250
                      y: 0
                      fontSize: 28
                      texts: "self.parent.entry != null ? self.parent.entry['ping'] : '~null'"
                      lineSpace: 4
          rich_tab_observer:
            type: Observer
            attribute:
              target: val.player_grid['player_row']
              subscribe: var.entries
              maxSize: 120
