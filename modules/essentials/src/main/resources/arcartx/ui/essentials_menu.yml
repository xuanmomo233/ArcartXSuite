# AXS 资源说明
# 用途: Essentials 玩家功能菜单，支持首页/家/传送点/TPA/设置五个子页面。
# 前置依赖: ArcartX；Essentials 模块启用后自动注册。
# 打开方式: /axs essentials menu
# 数据交互: packetHandler 接收 init 推送；客户端通过 Packet.send('AXS_ESS_MENU', ...) 发送操作指令。

ui:
  background: true
  escClose: true
  closeDied: true
  show: true
  through: false
  screenScale: true
  packetHandler:
    init: |-
      var.page = packet['page']
      var.packetId = packet['packetId']
      var.playerName = packet['playerName']
      var.isFlying = packet['isFlying']
      var.isGod = packet['isGod']
      var.isAfk = packet['isAfk']
      var.flySpeed = packet['flySpeed']
      var.walkSpeed = packet['walkSpeed']
      var.location = packet['location']
      var.homes = packet['homes']
      var.homeCount = packet['homeCount']
      var.warps = packet['warps']
      var.warpCount = packet['warpCount']
      var.onlinePlayers = packet['onlinePlayers']
      var.replantEnabled = packet['replantEnabled']
      var.autotoolEnabled = packet['autotoolEnabled']

controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Texture
        attribute:
          point: ~middle_center
          width: 900
          height: 600
          normal: ~25,25,30,240
          shape: ~round_rect
          radius: 14
        effect:
          stroke:
            width: 2
            color: ~80,180,255,180
        children:
          # ═══ 标题栏 ═══
          标题栏:
            type: Texture
            attribute:
              x: 0
              y: 0
              width: 900
              height: 60
              normal: ~35,35,45,255
              shape: ~round_rect
              radius: 14
            children:
              标题文字:
                type: Text
                attribute:
                  x: 24
                  y: 14
                  fontSize: 64
                  texts: "~&b⚙ 玩家工具"
              标题玩家:
                type: Text
                attribute:
                  x: 700
                  y: 14
                  fontSize: 64
                  texts: "~&7{var.playerName}"

          # ═══ 左侧导航栏 ═══
          导航栏:
            type: Texture
            attribute:
              x: 0
              y: 60
              width: 160
              height: 540
              normal: ~30,30,38,255
            children:
              导航首页入口:
                type: Texture
                attribute:
                  x: 10
                  y: 16
                  width: 140
                  height: 40
                  normal: "var.page == 'home' ? '60,140,220,200' : '45,45,55,180'"
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send(var.packetId, 'navigate', 'home')
                children:
                  导航首页文字:
                    type: Text
                    attribute:
                      x: 70
                      y: 8
                      through: true
                      center: true
                      fontSize: 49
                      texts: "~&f首页"

              导航家列表入口:
                type: Texture
                attribute:
                  x: 10
                  y: 66
                  width: 140
                  height: 40
                  normal: "var.page == 'homes' ? '60,140,220,200' : '45,45,55,180'"
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send(var.packetId, 'navigate', 'homes')
                children:
                  导航家列表文字:
                    type: Text
                    attribute:
                      x: 70
                      y: 8
                      through: true
                      center: true
                      fontSize: 49
                      texts: "~&f家"

              导航传送点入口:
                type: Texture
                attribute:
                  x: 10
                  y: 116
                  width: 140
                  height: 40
                  normal: "var.page == 'warps' ? '60,140,220,200' : '45,45,55,180'"
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send(var.packetId, 'navigate', 'warps')
                children:
                  导航传送点文字:
                    type: Text
                    attribute:
                      x: 70
                      y: 8
                      through: true
                      center: true
                      fontSize: 49
                      texts: "~&f传送点"

              导航传送请求入口:
                type: Texture
                attribute:
                  x: 10
                  y: 166
                  width: 140
                  height: 40
                  normal: "var.page == 'tpa' ? '60,140,220,200' : '45,45,55,180'"
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send(var.packetId, 'navigate', 'tpa')
                children:
                  导航传送请求文字:
                    type: Text
                    attribute:
                      x: 70
                      y: 8
                      through: true
                      center: true
                      fontSize: 49
                      texts: "~&f传送"

              导航设置入口:
                type: Texture
                attribute:
                  x: 10
                  y: 216
                  width: 140
                  height: 40
                  normal: "var.page == 'settings' ? '60,140,220,200' : '45,45,55,180'"
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send(var.packetId, 'navigate', 'settings')
                children:
                  导航设置文字:
                    type: Text
                    attribute:
                      x: 70
                      y: 8
                      through: true
                      center: true
                      fontSize: 49
                      texts: "~&f设置"

          # ═══ 右侧内容区 ═══
          内容区:
            type: Texture
            attribute:
              x: 160
              y: 60
              width: 740
              height: 540
              normal: ~20,20,25,100

            children:
              # ─── 首页视图 ───
              首页概览布局:
                type: Canvas
                attribute:
                  x: 20
                  y: 20
                  width: 700
                  height: 500
                  visible: |-
                    var.page == 'home'
                children:
                  首页标题:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 64
                      texts: "~&6玩家状态"
                  状态飞行:
                    type: Text
                    attribute:
                      x: 0
                      y: 50
                      fontSize: 49
                      texts: "~&7飞行: {var.isFlying == 'true' ? '&a开启' : '&c关闭'}"
                  状态无敌:
                    type: Text
                    attribute:
                      x: 0
                      y: 86
                      fontSize: 49
                      texts: "~&7无敌: {var.isGod == 'true' ? '&a开启' : '&c关闭'}"
                  状态闲置:
                    type: Text
                    attribute:
                      x: 0
                      y: 122
                      fontSize: 49
                      texts: "~&7AFK: {var.isAfk == 'true' ? '&e是' : '&a否'}"
                  状态速度:
                    type: Text
                    attribute:
                      x: 0
                      y: 158
                      fontSize: 49
                      texts: "~&7飞行速度: &f{var.flySpeed}  &7行走速度: &f{var.walkSpeed}"
                  状态位置:
                    type: Text
                    attribute:
                      x: 0
                      y: 194
                      fontSize: 49
                      texts: "~&7位置: &f{var.location}"
                  状态家数量:
                    type: Text
                    attribute:
                      x: 0
                      y: 246
                      fontSize: 49
                      texts: "~&7家数量: &b{var.homeCount}  &7传送点: &b{var.warpCount}"

              # ─── 家列表视图 ───
              家列表布局:
                type: Canvas
                attribute:
                  x: 20
                  y: 20
                  width: 700
                  height: 500
                  visible: |-
                    var.page == 'homes'
                children:
                  家列表标题:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 64
                      texts: "~&6我的家"
                  设置家按钮:
                    type: Texture
                    attribute:
                      x: 560
                      y: 0
                      width: 120
                      height: 38
                      normal: ~50,180,80,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'set_home', 'home')
                    children:
                      设置家按钮文字:
                        type: Text
                        attribute:
                          x: 60
                          y: 6
                          through: true
                          center: true
                          fontSize: 49
                          texts: "~&f设置家"
                  家滑块:
                    type: Texture
                    val: 家滑块
                    attribute:
                      x: 694
                      y: 50
                      width: 6
                      height: 50
                      normal: ~120,120,120,200
                      maxDragY: 390
                  家滚动栏:
                    type: Scroll
                    attribute:
                      x: 0
                      y: 50
                      width: 700
                      height: 440
                      moveY: "self.parent['家滑块'].getDragYRatio()"
                    action:
                      wheel: |-
                        if(self.moveY >= 0 && self.wheelValue > 0){
                          self.parent['家滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                        if(self.moveY <= 1 && self.wheelValue < 0){
                          self.parent['家滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                    children:
                      homes_list:
                        val: home_data
                        type: VStack
                        attribute:
                          x: 0
                          y: 0
                          width: 700
                          spaceBetween: 6
                        children:
                          家项目:
                            type: Texture
                            attribute:
                              entry: var.homes[self.key]
                              visible: self.entry != none
                              width: 680
                              height: 50
                              normal: ~40,40,50,180
                              shape: ~round_rect
                              radius: 6
                            children:
                              家项目名称:
                                type: Text
                                attribute:
                                  x: 16
                                  y: 12
                                  through: true
                                  fontSize: 49
                                  texts: "~&b{self.parent.entry['name']}"
                              家项目坐标:
                                type: Text
                                attribute:
                                  x: 200
                                  y: 14
                                  through: true
                                  fontSize: 24
                                  texts: "~&7{self.parent.entry['world']} {self.parent.entry['coords']}"
                              传送家按钮:
                                type: Texture
                                attribute:
                                  x: 520
                                  y: 8
                                  width: 70
                                  height: 34
                                  normal: ~60,140,220,200
                                  shape: ~round_rect
                                  radius: 6
                                action:
                                  click: |-
                                    Packet.send(var.packetId, 'teleport_home', self.parent.entry['name'])
                                children:
                                  传送家按钮文字:
                                    type: Text
                                    attribute:
                                      x: 35
                                      y: 5
                                      through: true
                                      center: true
                                      fontSize: 22
                                      texts: "~&f传送"
                              删除家按钮:
                                type: Texture
                                attribute:
                                  x: 600
                                  y: 8
                                  width: 70
                                  height: 34
                                  normal: ~200,60,60,200
                                  shape: ~round_rect
                                  radius: 6
                                action:
                                  click: |-
                                    Packet.send(var.packetId, 'delete_home', self.parent.entry['name'])
                                children:
                                  删除家按钮文字:
                                    type: Text
                                    attribute:
                                      x: 35
                                      y: 5
                                      through: true
                                      center: true
                                      fontSize: 22
                                      texts: "~&f删除"

              # ─── 传送点视图 ───
              传送点布局:
                type: Canvas
                attribute:
                  x: 20
                  y: 20
                  width: 700
                  height: 500
                  visible: |-
                    var.page == 'warps'
                children:
                  传送点标题:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 64
                      texts: "~&6传送点列表"
                  传送点滑块:
                    type: Texture
                    val: 传送点滑块
                    attribute:
                      x: 694
                      y: 50
                      width: 6
                      height: 50
                      normal: ~120,120,120,200
                      maxDragY: 390
                  传送点滚动栏:
                    type: Scroll
                    attribute:
                      x: 0
                      y: 50
                      width: 700
                      height: 440
                      moveY: "self.parent['传送点滑块'].getDragYRatio()"
                    action:
                      wheel: |-
                        if(self.moveY >= 0 && self.wheelValue > 0){
                          self.parent['传送点滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                        if(self.moveY <= 1 && self.wheelValue < 0){
                          self.parent['传送点滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                    children:
                      warps_list:
                        val: warp_data
                        type: VStack
                        attribute:
                          x: 0
                          y: 0
                          width: 700
                          spaceBetween: 6
                        children:
                          传送点项目:
                            type: Texture
                            attribute:
                              entry: var.warps[self.key]
                              visible: self.entry != none
                              width: 680
                              height: 50
                              normal: ~40,40,50,180
                              shape: ~round_rect
                              radius: 6
                            children:
                              传送点项目名称:
                                type: Text
                                attribute:
                                  x: 16
                                  y: 12
                                  through: true
                                  fontSize: 49
                                  texts: "~&e{self.parent.entry}"
                              传送点传送按钮:
                                type: Texture
                                attribute:
                                  x: 580
                                  y: 8
                                  width: 80
                                  height: 34
                                  normal: ~60,140,220,200
                                  shape: ~round_rect
                                  radius: 6
                                action:
                                  click: |-
                                    Packet.send(var.packetId, 'teleport_warp', self.parent.entry)
                                children:
                                  传送点传送按钮文字:
                                    type: Text
                                    attribute:
                                      x: 40
                                      y: 5
                                      through: true
                                      center: true
                                      fontSize: 22
                                      texts: "~&f传送"

              # ─── TPA 视图 ───
              传送请求布局:
                type: Canvas
                attribute:
                  x: 20
                  y: 20
                  width: 700
                  height: 500
                  visible: |-
                    var.page == 'tpa'
                children:
                  传送请求标题:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 64
                      texts: "~&6传送请求"
                  传送请求提示:
                    type: Text
                    attribute:
                      x: 0
                      y: 46
                      fontSize: 36
                      texts: "~&7点击玩家名发送传送请求"
                  接受传送请求按钮:
                    type: Texture
                    attribute:
                      x: 500
                      y: 0
                      width: 90
                      height: 38
                      normal: ~50,180,80,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'accept_tpa')
                    children:
                      接受按钮文字:
                        type: Text
                        attribute:
                          x: 45
                          y: 6
                          through: true
                          center: true
                          fontSize: 49
                          texts: "~&f接受"
                  拒绝传送请求按钮:
                    type: Texture
                    attribute:
                      x: 600
                      y: 0
                      width: 90
                      height: 38
                      normal: ~200,60,60,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'deny_tpa')
                    children:
                      拒绝按钮文字:
                        type: Text
                        attribute:
                          x: 45
                          y: 6
                          through: true
                          center: true
                          fontSize: 49
                          texts: "~&f拒绝"
                  玩家滑块:
                    type: Texture
                    val: 玩家滑块
                    attribute:
                      x: 694
                      y: 80
                      width: 6
                      height: 50
                      normal: ~120,120,120,200
                      maxDragY: 350
                  传送请求滚动栏:
                    type: Scroll
                    attribute:
                      x: 0
                      y: 80
                      width: 700
                      height: 400
                      moveY: "self.parent['玩家滑块'].getDragYRatio()"
                    action:
                      wheel: |-
                        if(self.moveY >= 0 && self.wheelValue > 0){
                          self.parent['玩家滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                        if(self.moveY <= 1 && self.wheelValue < 0){
                          self.parent['玩家滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                    children:
                      tpa_list:
                        val: tpa_data
                        type: VStack
                        attribute:
                          x: 0
                          y: 0
                          width: 700
                          spaceBetween: 6
                        children:
                          传送请求玩家项目:
                            type: Texture
                            attribute:
                              entry: var.onlinePlayers[self.key]
                              visible: self.entry != none
                              width: 680
                              height: 44
                              normal: ~40,40,50,180
                              shape: ~round_rect
                              radius: 6
                            action:
                              click: |-
                                Packet.send(var.packetId, 'send_tpa', self.entry)
                            children:
                              传送请求玩家名称:
                                type: Text
                                attribute:
                                  x: 16
                                  y: 10
                                  through: true
                                  fontSize: 49
                                  texts: "~&f{self.parent.entry}"

              # ─── 设置视图 ───
              设置布局:
                type: Canvas
                attribute:
                  x: 20
                  y: 20
                  width: 700
                  height: 500
                  visible: |-
                    var.page == 'settings'
                children:
                  设置标题:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 64
                      texts: "~&6个人设置"
                  # 飞行开关
                  切换飞行按钮:
                    type: Texture
                    attribute:
                      x: 0
                      y: 56
                      width: 320
                      height: 50
                      normal: "var.isFlying == 'true' ? '40,120,60,200' : '60,60,70,200'"
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'toggle_fly')
                    children:
                      飞行文字:
                        type: Text
                        attribute:
                          x: 160
                          y: 12
                          through: true
                          center: true
                          fontSize: 49
                          texts: "~飞行: {var.isFlying == 'true' ? '&a开启' : '&c关闭'}"
                  # 自动补种
                  切换补种按钮:
                    type: Texture
                    attribute:
                      x: 0
                      y: 118
                      width: 320
                      height: 50
                      normal: "var.replantEnabled == 'true' ? '40,120,60,200' : '60,60,70,200'"
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'toggle_replant')
                    children:
                      补种文字:
                        type: Text
                        attribute:
                          x: 160
                          y: 12
                          through: true
                          center: true
                          fontSize: 49
                          texts: "~自动补种: {var.replantEnabled == 'true' ? '&a开启' : '&c关闭'}"
                  # 自动工具
                  切换自动工具按钮:
                    type: Texture
                    attribute:
                      x: 0
                      y: 180
                      width: 320
                      height: 50
                      normal: "var.autotoolEnabled == 'true' ? '40,120,60,200' : '60,60,70,200'"
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'toggle_autotool')
                    children:
                      自动工具文字:
                        type: Text
                        attribute:
                          x: 160
                          y: 12
                          through: true
                          center: true
                          fontSize: 49
                          texts: "~自动工具: {var.autotoolEnabled == 'true' ? '&a开启' : '&c关闭'}"
                  # 背包整理
                  排序按钮:
                    type: Texture
                    attribute:
                      x: 0
                      y: 246
                      width: 320
                      height: 50
                      normal: ~60,100,180,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'sort')
                    children:
                      排序文字:
                        type: Text
                        attribute:
                          x: 160
                          y: 12
                          through: true
                          center: true
                          fontSize: 49
                          texts: "~&f背包整理"
