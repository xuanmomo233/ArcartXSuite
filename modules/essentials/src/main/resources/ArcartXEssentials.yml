  replant-disabled: '&c自动补种已关闭。'
  autotool-enabled: '&a自动切换工具已开启。'
  autotool-disabled: '&c自动切换工具已关闭。'


# ─── 一键砍树 (TreeCapitator) ───
tree-capitator:
  enabled: true
  # 需要的权限节点 (留空 = 无需权限)
  permission: "axs.essentials.treecap"
  # 最大连锁方块数
  max-blocks: 128
  # 需要手持斧头
  require-axe: true
  # 需要潜行触发
  require-sneak: false
  # 是否消耗工具耐久
  consume-durability: true
  # 支持的原木类型 (留空 = 所有原木)
  log-types: []
  # 是否同时破坏树叶
  break-leaves: true
  # 树叶搜索范围 (在原木周围多少格内)
  leaf-radius: 4

# ─── 背包操作 (InvActions: 补种/整理/工具切换) ───
inv-actions:
  # 自动补种作物
  auto-replant:
    enabled: true
    permission: "axs.essentials.replant"
    # 支持的作物类型
    crops:
      - WHEAT
      - CARROTS
      - POTATOES
      - BEETROOTS
      - NETHER_WART
  # 背包整理
  inventory-sort:
    enabled: true
    permission: "axs.essentials.sort"
    # 排序方式: type(按类型) / name(按名称) / amount(按数量)
    sort-mode: type
  # 自动工具切换
  auto-tool:
    enabled: true
    permission: "axs.essentials.autotool"
    # 破坏方块时自动切换到最佳工具
    switch-on-break: true
