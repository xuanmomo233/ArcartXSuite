# ArcartXEntityTracker Boss Tracker HUD
# AXS 资源说明
# 用途: EntityTracker 模块默认 HUD 模板，负责展示 Boss 血条、目标信息与伤害排行。
# 前置依赖: ArcartX、MythicMobs / MythicBukkit；EntityTracker 模块启用后会自动导出到 plugins/ArcartXSuite/ui。
# 启用开关: config.yml -> modules.entitytracker.enabled + modules.entitytracker.password
# 关联文件: ArcartXEntityTracker.yml
# 重载命令: /axs entitytracker reload
# 最小使用路径: ui + controls
# 结构提示: packetHandler 负责接收 Boss 快照；controls 定义每个槽位的血条与排行展示。

ui:
  isHud: true
  through: false
  background: false
  closeDied: true
  show: true
  level: 2
  screenScale: true
  defaultOpen: false
  hide:
    - boss_event_progress
  # packetHandler 负责接收服务端下发的数据包并刷新本地变量。
  packetHandler:
    init: |-
      var.isVisible = true
      // init 会在 HUD 首次打开时执行一次。
      // 服务端会把当前玩家附近所有可见 Boss 的快照整体下发，
      // 所以下面这段脚本的职责只有一件事：把 packet 内容复制到本地变量。
      // 后续所有控件都只读取 var.*，不直接读取 packet，便于后续二改时统一维护。
      // bossCount: 当前实际渲染在 HUD 上的血条数量。
      // totalBossCount: 当前玩家附近满足显示条件的 Boss 总数，可能大于 bossCount。
      // maxVisibleBars: 当前这份 HUD 总共预留了多少个槽位。
      var.bossCount = packet['bossCount']
      var.totalBossCount = packet['totalBossCount']
      var.maxVisibleBars = packet['maxVisibleBars']
      // 第1条 Boss 血条槽位。
      // Visible 控制整张卡片是否显示；其余字段则提供给标题、血条和数值介绍使用。
      var.slot1Visible = packet['slot1_visible']
      var.slot1Title = packet['slot1_title']
      var.slot1Subtitle = packet['slot1_subtitle']
      var.slot1Health = packet['slot1_health']
      var.slot1MaxHealth = packet['slot1_maxHealth']
      var.slot1HealthText = packet['slot1_healthText']
      var.slot1MaxHealthText = packet['slot1_maxHealthText']
      var.slot1DistanceText = packet['slot1_distanceText']
      var.slot1Progress = packet['slot1_progress']
      var.slot1MobId = packet['slot1_mobId']
      var.slot1DisplayName = packet['slot1_displayName']
      var.slot1EntityUuid = packet['slot1_entityUuid']
      var.slot1HasTarget = packet['slot1_hasTarget']
      var.slot1TargetDisplayName = packet['slot1_targetDisplayName']
      var.slot1TargetUuid = packet['slot1_targetUuid']
      var.slot1TargetType = packet['slot1_targetType']
      var.slot1SpawnOrder = packet['slot1_spawnOrder']
      var.slot1ViewerRankText = packet['slot1_viewerRankText']
      var.slot1ViewerDamageText = packet['slot1_viewerDamageText']
      var.slot1Used = var.isVisible && var.slot1Visible
