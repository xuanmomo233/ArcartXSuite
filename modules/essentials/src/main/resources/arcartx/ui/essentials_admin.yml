                        }
                    children:
                      warps_list:
                        val: warp_data
                        type: VStack
                        attribute:
                          x: 0
                          y: 0
                          width: 800
                          spaceBetween: 6
                        children:
                          warp_row:
                            type: Texture
                            attribute:
                              entry: var.warps[self.key]
                              visible: self.entry != none
                              width: 780
                              height: 48
                              normal: ~40,40,50,180
                              shape: ~round_rect
                              radius: 6
                            children:
                              warp_name:
                                type: Text
                                attribute:
                                  x: 16
                                  y: 12
                                  through: true
                                  fontSize: 36
                                  texts: "~&e{self.parent.entry}"
                              btn_del_warp:
                                type: Texture
                                attribute:
                                  x: 700
                                  y: 8
                                  width: 70
                                  height: 32
                                  normal: ~200,60,60,200
                                  shape: ~round_rect
                                  radius: 6
                                action:
                                  click: |-
                                    Packet.send(var.packetId, 'del_warp', self.parent.entry)
                                children:
                                  btn_del_warp_t:
                                    type: Text
                                    attribute:
                                      x: 35
                                      y: 4
                                      through: true
                                      center: true
                                      fontSize: 36
                                      texts: "~&f删除"
