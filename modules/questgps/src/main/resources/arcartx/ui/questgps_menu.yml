          任务滑块:
            type: Texture
            val: 任务滑块
            attribute:
              x: 460
              y: 248
              width: 6
              height: 50
              normal: ~120,120,120,200
              maxDragY: 514
          quest_scroll:
            type: Scroll
            attribute:
              x: 42
              y: 248
              width: 424
              height: 564
              moveY: "self.parent['任务滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['任务滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['任务滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
