# =============================================================================
# QuestGPS 奇遇 overlay 示例
# -----------------------------------------------------------------------------
# 配置字段说明见 mainline.yml
# 本示例对应分类 Tab「奇遇」：Chemdah 里应写 meta.type: encounter
# 默认 enabled: false
# =============================================================================

example_encounter_quest:
  enabled: false
  sort-order: 200
  allow-abandon: true
  # category 仅 category.source=overlay 时必填
  # category: encounter
  required-mainline: []
  hooks:
    triggered:
      - "questgps_encounter_triggered"
    accepted:
      - "questgps_encounter_accepted"
    completed:
      - "questgps_encounter_completed"
    track-changed:
      - "questgps_encounter_track_changed"
  navigation:
    enabled: true
    point:
      world: "world"
      x: -80
      y: 65
      z: 120
      title: "神秘遗迹"
      style-id: "default"
      map-label: "奇遇目标"
  tasks:
    "0":
      sort-order: 10
      navigation:
        world: "world"
        x: -78
        y: 65
        z: 118
        title: "探索遗迹入口"
        style-id: "default"
        map-label: "奇遇目标"
