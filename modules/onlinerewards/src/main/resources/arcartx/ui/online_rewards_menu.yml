# AXS 资源说明
# 用途: OnlineRewards 模块默认菜单，三栏现代风格布局（参考 title_menu 风格）。
# 前置依赖: ArcartX；OnlineRewards 模块启用后会自动注册或导出。
# 关联文件: ArcartXOnlineRewards.yml
# 重载命令: /axs onlinereward reload
ui:
  isHud: false
  background: false
  closeDied: true
  escClose: true
  through: false
  screenScale: true
  show: true
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.dailyTimeText = packet['dailyTimeText']
      var.weeklyTimeText = packet['weeklyTimeText']
      var.monthlyTimeText = packet['monthlyTimeText']
      var.totalTimeText = packet['totalTimeText']
      var.offlineSavingsText = packet['offlineSavingsText']
      var.progress = packet['progress']
      var.progressPercent = packet['progressPercent']
      var.progressPercentText = packet['progressPercentText']
      var.progressTitle = packet['progressTitle']
      var.completed = packet['completed']
      var.rewardStage = packet['rewardStage']
      var.rewardCount = packet['rewardCount']
      var.rewardStageText = packet['rewardStageText']
      var.signedToday = packet['signedToday']
      var.signInStatusText = packet['signInStatusText']
      var.signInStreak = packet['signInStreak']
      var.signInTotal = packet['signInTotal']
      var.makeupCardCount = packet['makeupCardCount']
      var.calendarMonthText = packet['calendarMonthText']
      var.calendarCount = packet['calendarCount']
      var.calendarMonthOffset = packet['calendarMonthOffset']
      var.selectedDateText = packet['selectedDateText']
      var.selectedCanMakeup = packet['selectedCanMakeup']
      var.selectedAction = packet['selectedAction']
      var.selectedActionText = packet['selectedActionText']
      var.selectedActionEnabled = packet['selectedActionEnabled']
      var.rewardRows = packet['rewardRows']
      var.periodicRewardRows = packet['periodicRewardRows']
      var.signInRewardRows = packet['signInRewardRows']
      var.calendarRows = packet['calendarRows']
      var.selectedRewardRows = packet['selectedRewardRows']
      var.serverSignInGoalEnabled = packet['serverSignInGoalEnabled']
      var.serverSignInGoalCurrent = packet['serverSignInGoalCurrent']
      var.serverSignInGoalNext = packet['serverSignInGoalNext']
      var.maxRewardCount = packet['maxRewardCount']
      var.maxPeriodicCount = packet['maxPeriodicCount']
      var.maxSigninRewardCount = packet['maxSigninRewardCount']
      var.maxSelectedRewardCount = packet['maxSelectedRewardCount']
      var.calendarSignedCount = 0
      if(var.calendarRows != null){
        for(k in var.calendarRows.keys()){
          row = var.calendarRows[k]
          if(row != null && row['status'] == 'signed'){
            var.calendarSignedCount = var.calendarSignedCount + 1
          }
        }
      }
      var.calendarRate = var.calendarCount > 0 ? (var.calendarSignedCount / var.calendarCount * 100).round(0) : 0
    update: |-
      var.packetId = packet['packetId']
      var.dailyTimeText = packet['dailyTimeText']
      var.weeklyTimeText = packet['weeklyTimeText']
      var.monthlyTimeText = packet['monthlyTimeText']
      var.totalTimeText = packet['totalTimeText']
      var.offlineSavingsText = packet['offlineSavingsText']
      var.progress = packet['progress']
      var.progressPercent = packet['progressPercent']
      var.progressPercentText = packet['progressPercentText']
      var.progressTitle = packet['progressTitle']
      var.completed = packet['completed']
      var.rewardStage = packet['rewardStage']
      var.rewardCount = packet['rewardCount']
      var.rewardStageText = packet['rewardStageText']
      var.signedToday = packet['signedToday']
      var.signInStatusText = packet['signInStatusText']
      var.signInStreak = packet['signInStreak']
      var.signInTotal = packet['signInTotal']
      var.makeupCardCount = packet['makeupCardCount']
      var.calendarMonthText = packet['calendarMonthText']
      var.calendarCount = packet['calendarCount']
      var.calendarMonthOffset = packet['calendarMonthOffset']
      var.selectedDateText = packet['selectedDateText']
      var.selectedCanMakeup = packet['selectedCanMakeup']
      var.selectedAction = packet['selectedAction']
      var.selectedActionText = packet['selectedActionText']
      var.selectedActionEnabled = packet['selectedActionEnabled']
      var.rewardRows = packet['rewardRows']
      var.periodicRewardRows = packet['periodicRewardRows']
      var.signInRewardRows = packet['signInRewardRows']
      var.calendarRows = packet['calendarRows']
      var.selectedRewardRows = packet['selectedRewardRows']
      var.serverSignInGoalEnabled = packet['serverSignInGoalEnabled']
      var.serverSignInGoalCurrent = packet['serverSignInGoalCurrent']
      var.serverSignInGoalNext = packet['serverSignInGoalNext']
      var.maxRewardCount = packet['maxRewardCount']
      var.maxPeriodicCount = packet['maxPeriodicCount']
      var.maxSigninRewardCount = packet['maxSigninRewardCount']
      var.maxSelectedRewardCount = packet['maxSelectedRewardCount']
      var.calendarSignedCount = 0
      if(var.calendarRows != null){
        for(k in var.calendarRows.keys()){
          row = var.calendarRows[k]
          if(row != null && row['status'] == 'signed'){
            var.calendarSignedCount = var.calendarSignedCount + 1
          }
        }
      }
      var.calendarRate = var.calendarCount > 0 ? (var.calendarSignedCount / var.calendarCount * 100).round(0) : 0
  action:
    load: |-
      var.maxRewardCount = 0
      var.maxPeriodicCount = 0
      var.maxSigninRewardCount = 0
      var.maxSelectedRewardCount = 0
      var.calendarCount = 31
    open: |-
      var.packetId = 'AXS_ONLINE_REWARDS'
      var.dailyTimeText = '0分钟'
      var.weeklyTimeText = '0分钟'
      var.monthlyTimeText = '0分钟'
      var.totalTimeText = '0分钟'
      var.offlineSavingsText = '0分钟'
      var.progress = 0
      var.progressPercent = 0
      var.progressPercentText = '0'
      var.progressTitle = '等待同步'
      var.completed = false
      var.rewardStage = 0
      var.rewardCount = 0
      var.rewardStageText = '0/0'
      var.signedToday = false
      var.signInStatusText = '今日未签到'
      var.signInStreak = 0
      var.signInTotal = 0
      var.makeupCardCount = 0
      var.calendarMonthText = ''
      var.calendarMonthOffset = 0
      var.selectedDateText = ''
      var.selectedCanMakeup = false
      var.selectedAction = 'none'
      var.selectedActionText = '等待同步'
      var.selectedActionEnabled = false
      var.rewardRows = {}
      var.periodicRewardRows = {}
      var.signInRewardRows = {}
      var.calendarRows = {}
      var.selectedRewardRows = {}
      var.serverSignInGoalEnabled = false
      var.serverSignInGoalCurrent = 0
      var.serverSignInGoalNext = 0
      var.calendarSignedCount = 0
      var.calendarRate = 0
controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Texture
        attribute:
          point: ~middle_center
          width: 1680
          height: 980
          normal: ~95,95,95,220
          shape: ~round_rect
          radius: 28
        effect:
          stroke:
            width: 2
            color: ~80,180,255,180
          shadow:
            xOffset: 2
            yOffset: 2
            blur: 5
            color: ~255,255,255,75
          ripple:
            duration: 1200
            color: ~255,255,255,110
            width: 0.05
        children:
          标题:
            type: Text
            attribute:
              x: 40
              y: 30
              texts: '~&f&l在线奖励中心'
              fontSize: 81
          刷新按钮:
            type: Texture
            attribute:
              x: 1480
              y: 30
              width: 120
              height: 40
              normal: ~255,255,255,150
              shape: ~round_rect
              radius: 12
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            children:
              刷新文本:
                type: Text
                attribute:
                  x: 60
                  y: 10
                  through: true
                  center: true
                  fontSize: 36
                  texts: "~&0刷新"
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'refresh')

          # ========== 左栏：签到日历 ==========
          左栏背景:
            type: Texture
            attribute:
              x: 40
              y: 110
              width: 460
              height: 830
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          左栏标题:
            type: Text
            attribute:
              x: 56
              y: 128
              texts: "~&0&l每日签到"
              fontSize: 49
          左栏签到统计:
            type: Text
            attribute:
              x: 56
              y: 178
              texts: "'&0连续: &0' + var.signInStreak.round(0) + '   &0累计: &0' + var.signInTotal.round(0) + '   &0补签卡: &0' + var.makeupCardCount.round(0)"
              fontSize: 36
          签到按钮:
            type: Texture
            attribute:
              x: 56
              y: 220
              width: 180
              height: 40
              normal: "var.selectedActionEnabled ? '100,200,130,230' : '145,145,145,255'"
              shape: ~round_rect
              radius: 12
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            children:
              签到按钮文本:
                type: Text
                attribute:
                  x: 90
                  y: 10
                  through: true
                  center: true
                  fontSize: 36
                  texts: "'&0' + var.selectedActionText"
            action:
              clickLeft: |-
                if(var.selectedAction == 'signin'){
                  Packet.send(var.packetId, 'signin')
                }elif(var.selectedAction == 'makeup'){
                  Packet.send(var.packetId, 'makeup', var.selectedDateText)
                }

          日历标题:
            type: Text
            attribute:
              x: 56
              y: 276
              texts: "'&0签到日历 &0| &0' + var.calendarMonthText"
              fontSize: 36
          上月按钮:
            type: Texture
            attribute:
              x: 312
              y: 278
              width: 44
              height: 30
              normal: ~145,145,145,255
              shape: ~round_rect
              radius: 8
              center: true
              fontSize: 36
              texts: "~&0<"
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'calendar_prev')
          本月按钮:
            type: Texture
            attribute:
              x: 364
              y: 278
              width: 60
              height: 30
              normal: ~145,145,145,255
              shape: ~round_rect
              radius: 8
              center: true
              fontSize: 28
              texts: "~&0本月"
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'calendar_today')
          下月按钮:
            type: Texture
            attribute:
              x: 434
              y: 278
              width: 44
              height: 30
              normal: ~145,145,145,255
              shape: ~round_rect
              radius: 8
              center: true
              fontSize: 36
              texts: "~&0>"
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'calendar_next')

          日历网格:
            type: HGrid
            attribute:
              x: 56
              y: 320
              width: 420
              height: 280
              column: 7
              spaceBetweenX: 6
              spaceBetweenY: 6
            action:
              create: |-
                for(i in range(0, var.calendarCount)){
                  key = i.round
                  di = self['日历模板'].copy('日历项_' + key)
                  di.entryKey = key
                }
            children:
              日历模板:
                type: Texture
                attribute:
                  entryKey: 0
                  entry: var.calendarRows[self.entryKey]
                  width: 52
                  height: 38
                  normal: "self.entry == null ? '255,255,255,0' : (self.entry['status'] == 'signed' ? '100,200,130,230' : (self.entry['status'] == 'expired' ? '210,120,120,230' : '145,145,145,255'))"
                  shape: ~round_rect
                  radius: 8
                  texts: "self.entry == null ? '' : ('&0' + self.entry['label'])"
                  center: true
                  fontSize: 36
                  visible: self.entry != null
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'preview_day', self.entry['date'])
                children:
                  日历选中:
                    type: Texture
                    attribute:
                      through: true
                      width: 52
                      height: 38
                      normal: "self.parent.entry == null ? '255,255,255,0' : (self.parent.entry['status'] == 'signed' ? '100,200,130,230' : (self.parent.entry['status'] == 'expired' ? '210,120,120,230' : '145,145,145,255'))"
                      shape: ~round_rect
                      radius: 8
                      texts: "self.parent.entry == null ? '' : ('&0' + self.parent.entry['label'])"
                      center: true
                      fontSize: 36
                      visible: "self.parent.entry != null && self.parent.entry['date'] == var.selectedDateText"
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                  日历今:
                    type: Text
                    attribute:
                      through: true
                      x: 38
                      y: 22
                      visible: "self.parent.entry != null && self.parent.entry['today']"
                      texts: "~&6今"
                      fontSize: 22

          统计标题:
            type: Text
            attribute:
              x: 56
              y: 616
              texts: "~&0&l本月签到统计"
              fontSize: 49
          已签到统计:
            type: Text
            attribute:
              x: 56
              y: 670
              texts: "'&0已签到: &0' + var.calendarSignedCount + ' &0/ &0' + var.calendarCount.round(0) + ' &0天'"
              fontSize: 36
          签到进度:
            type: Text
            attribute:
              x: 56
              y: 708
              texts: "'&0签到进度: &0' + var.calendarRate + '%'"
              fontSize: 36

          # ========== 中栏：在线进度 ==========
          中栏背景:
            type: Texture
            attribute:
              x: 520
              y: 110
              width: 560
              height: 830
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          中栏标题:
            type: Text
            attribute:
              x: 540
              y: 128
              texts: "~&0&l在线时长统计"
              fontSize: 49
          今日在线:
            type: Text
            attribute:
              x: 540
              y: 178
              texts: "'&0今日在线  &0' + var.dailyTimeText"
              fontSize: 36
          本周在线:
            type: Text
            attribute:
              x: 540
              y: 216
              texts: "'&0本周在线  &0' + var.weeklyTimeText"
              fontSize: 36
          本月在线:
            type: Text
            attribute:
              x: 540
              y: 254
              texts: "'&0本月在线  &0' + var.monthlyTimeText"
              fontSize: 36
          总计在线:
            type: Text
            attribute:
              x: 540
              y: 292
              texts: "'&0总计在线  &0' + var.totalTimeText"
              fontSize: 36
          离线储蓄:
            type: Text
            attribute:
              x: 540
              y: 330
              visible: "var.offlineSavingsText != '0分钟'"
              texts: "'&0离线储蓄  &0' + var.offlineSavingsText"
              fontSize: 36

          中栏分隔线1:
            type: Texture
            attribute:
              x: 540
              y: 380
              width: 520
              height: 2
              normal: ~0,0,0,100
              shape: ~round_rect
              radius: 1

          阶段标题:
            type: Text
            attribute:
              x: 540
              y: 460
              texts: "~&0&l阶段进度"
              fontSize: 49
          阶段名称:
            type: Text
            attribute:
              x: 540
              y: 510
              texts: "'&0' + var.progressTitle + ' &0| &0' + var.progressPercentText + '%'"
              fontSize: 36
          阶段比例:
            type: Text
            attribute:
              x: 1030
              y: 510
              texts: "'&0' + var.rewardStageText"
              fontSize: 36
          阶段轨道:
            type: Texture
            attribute:
              x: 540
              y: 554
              width: 520
              height: 16
              normal: ~145,145,145,255
              shape: ~round_rect
              radius: 2
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          阶段填充:
            type: progress
            attribute:
              x: 540
              y: 554
              width: 520
              height: 16
              texture: ~80,180,255,255
              progress: var.progress
              shape: ~round_rect
              radius: 2
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255

          中栏分隔线2:
            type: Texture
            attribute:
              x: 540
              y: 600
              width: 520
              height: 2
              normal: ~0,0,0,100
              shape: ~round_rect
              radius: 1
              visible: var.serverSignInGoalEnabled

          目标标题:
            type: Text
            attribute:
              x: 540
              y: 620
              texts: "~&0&l全服签到目标"
              fontSize: 49
              visible: var.serverSignInGoalEnabled
          目标文本:
            type: Text
            attribute:
              x: 540
              y: 668
              texts: "'&0今日已签到 &0' + var.serverSignInGoalCurrent.round(0) + ' &0人  下一目标 &0' + var.serverSignInGoalNext.round(0) + ' &0人'"
              fontSize: 36
              visible: var.serverSignInGoalEnabled
          目标轨道:
            type: Texture
            attribute:
              x: 540
              y: 712
              width: 520
              height: 16
              normal: ~145,145,145,255
              shape: ~round_rect
              radius: 2
              visible: "var.serverSignInGoalEnabled && var.serverSignInGoalNext > 0"
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          目标填充:
            type: progress
            attribute:
              x: 540
              y: 712
              width: 520
              height: 16
              texture: ~100,200,130,255
              progress: "var.serverSignInGoalNext > 0 ? (var.serverSignInGoalCurrent / var.serverSignInGoalNext).min(1) : 0"
              shape: ~round_rect
              radius: 2
              visible: "var.serverSignInGoalEnabled && var.serverSignInGoalNext > 0"
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255

          完成提示:
            type: Text
            attribute:
              x: 540
              y: 760
              visible: var.completed
              texts: "~&0&l今日在线阶段奖励已全部完成！"
              fontSize: 36

          # ========== 右栏：奖励列表 ==========
          右栏背景:
            type: Texture
            attribute:
              x: 1100
              y: 110
              width: 540
              height: 830
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255

          阶段奖励标题:
            type: Text
            attribute:
              x: 1120
              y: 128
              texts: "~&0&l在线阶段奖励"
              fontSize: 49
          阶段滑块:
            type: Texture
            val: 阶段滑块
            attribute:
              x: 1620
              y: 176
              width: 4
              height: 40
              normal: ~120,120,120,200
              maxDragY: 210
          阶段滚动区域:
            type: Scroll
            attribute:
              x: 1120
              y: 176
              width: 510
              height: 250
              moveY: "self.parent['阶段滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['阶段滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['阶段滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              阶段堆叠:
                val: 阶段堆叠
                type: VStack
                attribute:
                  width: 510
                  spaceBetween: 8
                action:
                  create: |-
                    for(i in range(0, var.maxRewardCount)){
                      key = i.round
                      ri = self['阶段奖励项'].copy('阶段奖励项_' + key)
                      ri.entryKey = key
                    }
                children:
                  阶段奖励项:
                    type: Texture
                    attribute:
                      entryKey: 0
                      entry: var.rewardRows[self.entryKey]
                      width: 500
                      height: 64
                      normal: "self.entry != null && self.entry['current'] ? '120,190,255,230' : (self.entry != null && self.entry['claimed'] ? '100,200,130,230' : '145,145,145,255')"
                      shape: ~round_rect
                      radius: 14
                      visible: self.entry != null
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    children:
                      奖励项名称:
                        type: Text
                        attribute:
                          x: 14
                          y: 6
                          texts: "self.parent.entry != null ? '&0' + self.parent.entry['name'] : ''"
                          fontSize: 36
                      奖励项信息:
                        type: Text
                        attribute:
                          x: 14
                          y: 34
                          texts: "self.parent.entry != null ? '&0' + self.parent.entry['thresholdText'] + '   &0' + self.parent.entry['rewardText'] : ''"
                          fontSize: 28
                      奖励项状态:
                        type: Text
                        attribute:
                          x: 380
                          y: 18
                          texts: "self.parent.entry != null ? (self.parent.entry['claimed'] ? '&a已领取' : (self.parent.entry['current'] ? '&e进行中' : '&7未达成')) : ''"
                          fontSize: 36

          周期奖励标题:
            type: Text
            attribute:
              x: 1120
              y: 438
              texts: "~&0&l周/月周期奖励"
              fontSize: 49
          周期奖励空提示:
            type: Text
            attribute:
              x: 1120
              y: 486
              visible: "var.periodicRewardRows.size == 0 || var.periodicRewardRows.size == null"
              texts: "~&0暂无周期奖励"
              fontSize: 36
          周期滑块:
            type: Texture
            val: 周期滑块
            attribute:
              x: 1620
              y: 486
              width: 4
              height: 40
              normal: ~120,120,120,200
              maxDragY: 140
          周期滚动区域:
            type: Scroll
            attribute:
              x: 1120
              y: 486
              width: 510
              height: 180
              moveY: "self.parent['周期滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['周期滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['周期滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              周期堆叠:
                val: 周期堆叠
                type: VStack
                attribute:
                  width: 510
                  spaceBetween: 6
                action:
                  create: |-
                    for(i in range(0, var.maxPeriodicCount)){
                      key = i.round
