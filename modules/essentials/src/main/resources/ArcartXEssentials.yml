  home-teleported: '&a已传送到家 &f{name}&a。'
  warp-set: '&a传送点 &f{name} &a已设置。'
  warp-deleted: '&c传送点 &f{name} &c已删除。'
  warp-not-found: '&c传送点 &f{name} &c不存在。'
  warp-teleported: '&a已传送到 &f{name}&a。'
  spawn-set: '&a出生点已设置。'
  spawn-teleported: '&a已传送到出生点。'
  tpa-sent: '&a传送请求已发送给 &f{player}&a。'
