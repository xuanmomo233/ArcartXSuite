ui:
  id: AXS:afk_reward_hud
  isHud: true
  defaultOpen: true
  level: 20
  through: true
  show: true
  packetHandler:
    init: |-
      var.area = packet['area']
      var.time = packet['time']
      var.next = packet['next']
      var.players = packet['players']
      var.session_rewards = packet['session_rewards']
      var.session_time = packet['session_time']
      var.visible = packet['visible']
    update: |-
      var.area = packet['area']
      var.time = packet['time']
      var.next = packet['next']
      var.players = packet['players']
      var.session_rewards = packet['session_rewards']
      var.session_time = packet['session_time']
      var.visible = packet['visible']

controls:
  背景:
    type: Texture
    attribute:
      x: 10
      y: 10
      width: 200
      height: 150
      normal: ~30,30,40,200
      shape: ~round_rect
      radius: 8
      visible: var.visible
    effect:
      stroke:
        width: 2
        color: ~80,180,255,180
    children:
      标题:
        type: Text
        attribute:
          x: 100
          y: 10
          center: true
          fontSize: 36
          texts: "~&b挂机区域: &f{var.area}"
          visible: var.visible
      时间:
        type: Text
        attribute:
          x: 10
          y: 40
          fontSize: 22
          texts: "~&7当前挂机: &f{var.time}"
          visible: var.visible
      下次奖励:
        type: Text
        attribute:
          x: 10
          y: 62
          fontSize: 22
          texts: "~&7下次奖励: &f{var.next}秒"
          visible: var.visible
      人数:
        type: Text
        attribute:
          x: 10
          y: 84
          fontSize: 22
          texts: "~&7区域人数: &f{var.players}"
          visible: var.visible
      本次收益:
        type: Text
        attribute:
          x: 10
          y: 106
          fontSize: 22
          texts: "~&7本次收益: &f{var.session_rewards} 次"
          visible: var.visible
      本次时长:
        type: Text
        attribute:
          x: 10
          y: 128
          fontSize: 22
          texts: "~&7累计挂机: &f{var.session_time}"
          visible: var.visible
