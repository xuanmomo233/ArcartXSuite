ui:
  isHud: true
  defaultOpen: false
  through: false
  show: true
  packetHandler:
    update: |-
      var.items = packet['items']
      var.count = packet['count']
      var.selectedIndex = packet['selectedIndex']
    select: |-
      var.selectedIndex = packet['selectedIndex']
  action:
    load: |-
      var.items = {}
      var.count = 0
      var.selectedIndex = 0
    keyPress: |-
      if(Keyboard.isKeyDown(Keyboard.getKeyBindingKeyName("AXS_INTERACT")) && var.count > 0){
        Screen.open('AXS:loot_interact')
        Packet.send('pickup', 'open_menu')
      }
    wheel: |-
      if(var.count > 0){
        if(self.wheelValue > 0){
          var.selectedIndex = var.selectedIndex - 1
          if(var.selectedIndex < 0){
            var.selectedIndex = var.count - 1
          }
          Packet.send('pickup', 'scroll_up')
        }
        if(self.wheelValue < 0){
          var.selectedIndex = var.selectedIndex + 1
          if(var.selectedIndex >= var.count){
            var.selectedIndex = 0
          }
          Packet.send('pickup', 'scroll_down')
        }
      }

controls:
  adaptive:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    action:
      click: |-
        if(client.pickup){
          Packet.send('pickup', 'pick')
        }
    children:
      loot_panel:
        type: Canvas
        attribute:
          point: ~middle_center
          x: 160
          y: 0
          width: 280
          height: 420
          visible: var.count > 0
          through: true
        children:
          key_hint:
            type: Text
            attribute:
              point: ~top_left
              x: 14
              y: 10
              fontSize: 22
              texts: "~"
              through: true
          loot_list:
            type: VStack
            attribute:
              point: ~top_left
              x: 10
              y: 38
              width: 260
              spaceBetween: 4
              through: true
            children:
              entry:
                type: Canvas
                attribute:
                  entry: var.items[self.key]
                  visible: self.entry != null
                  width: 260
                  height: 42
                  through: true
                children:
                  bg:
                    type: Texture
                    attribute:
                      point: ~stretch_all
                      normal: "var.selectedIndex == self.key.round() ? '60,140,220,160' : '40,40,50,120'"
                      shape: ~round_rect
                      radius: 8
                    action:
                      clickLeft: |-
                        Packet.send('pickup', 'pick', self.key)
                  icon:
                    type: Slot
                    attribute:
                      point: ~middle_left
                      x: 6
                      y: 0
                      width: 32
                      height: 32
                      slotType: ~Icon
                      normal: ~0,0,0,0
                      hover: ~0,0,0,0
                      itemScale: 0.8
                      through: true
                      seticon: "self.setItemIcon(self.parent.entry['itemJson'])"
                    action:
                      create: |-
                        self.seticon()
                  name:
                    type: Text
                    attribute:
                      point: ~middle_left
                      x: 44
                      y: 0
                      fontSize: 28
                      texts: "self.parent.entry['amount'] > 1 ? self.parent.entry['name'] + ' &7x' + self.parent.entry['amount'].round() : self.parent.entry['name']"
                      through: true
          loot_observer:
            type: Observer
            attribute:
              target: val.loot_list['entry']
              subscribe: var.items
              maxSize: 8
