                                - ~&f3. 禁止在公共频道发布广告、色情、暴力或政治敏感内容。
                                - ~&f4. 请尊重其他玩家和管理员，禁止辱骂、人身攻击或恶意挑衅。
                                - ~&f5. 禁止使用红石/高频装置等造成服务器卡顿的行为。
                                - ~&f6. 禁止利用游戏漏洞或 BUG 获取不正当利益。
                                - ~&f7. 账号安全由玩家本人负责，请勿共享账号密码。
                              fontSize: 36
              同意按钮:
                type: Texture
                attribute:
                  x: 170
                  y: 250
                  width: 120
                  height: 38
                  normal: ~80,180,122,238
                  hover: ~108,210,156,255
