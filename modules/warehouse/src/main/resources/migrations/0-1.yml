# Warehouse 配置迁移示例（版本 0 → 1）
# 注意：仅包含与当前 schema 一致的示例操作；错误 rename 已移除，避免触发后破坏用户配置。
from-version: 0
to-version: 1
description: "示例迁移：补充缺失默认值"

operations:
  - type: set-if-missing
    path: "pickup.notify-on-auto-store"
    value: true

  - type: value-map
    path: "storage.mode"
    mapping:
      "file": "sqlite"
      "remote": "mysql"
