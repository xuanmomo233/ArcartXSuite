# AXS 资源说明
# 用途: Essentials 管理员后台面板，支持玩家管理/封禁/传送点/世界控制。
# 前置依赖: ArcartX；Essentials 模块启用后自动注册。
# 打开方式: /axs essentials admin
# 数据交互: packetHandler 接收 init 推送；客户端通过 Packet.send('AXS_ESS_ADMIN', ...) 发送管理指令。

ui:
  background: true
  escClose: true
  closeDied: true
  show: true
  through: false
  screenScale: true
  packetHandler:
    init: |-
      var.page = packet['page']
      var.packetId = packet['packetId']
      var.players = packet['players']
      var.playerCount = packet['playerCount']
      var.warps = packet['warps']
      var.bans = packet['bans']
      var.banCount = packet['banCount']
      var.worldName = packet['worldName']
      var.worldTime = packet['worldTime']
      var.worldWeather = packet['worldWeather']

controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Texture
        attribute:
          point: ~middle_center
          width: 1000
          height: 660
          normal: ~25,25,30,240
          shape: ~round_rect
          radius: 14
        effect:
          stroke:
            width: 2
            color: ~220,120,60,180
        children:
          # ═══ 标题栏 ═══
          标题栏:
            type: Texture
            attribute:
              x: 0
              y: 0
              width: 1000
              height: 60
              normal: ~40,35,30,255
              shape: ~round_rect
              radius: 14
            children:
              标题文字:
                type: Text
                attribute:
                  x: 24
                  y: 14
                  fontSize: 64
                  texts: "~&6⚡ 管理面板"
              online_count:
                type: Text
                attribute:
                  x: 820
                  y: 14
                  fontSize: 64
                  texts: "~&7在线: &f{var.playerCount}"

          # ═══ 左侧导航 ═══
          导航栏:
            type: Texture
            attribute:
              x: 0
              y: 60
              width: 160
              height: 600
              normal: ~30,30,38,255
            children:
              nav_players:
                type: Texture
                attribute:
                  x: 10
                  y: 16
                  width: 140
                  height: 40
                  normal: "var.page == 'players' ? '180,100,40,200' : '45,45,55,180'"
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send(var.packetId, 'navigate', 'players')
                children:
                  nav_players_text:
                    type: Text
                    attribute:
                      x: 70
                      y: 8
                      through: true
                      center: true
                      fontSize: 49
                      texts: "~&f玩家"

              nav_bans:
                type: Texture
                attribute:
                  x: 10
                  y: 66
                  width: 140
                  height: 40
                  normal: "var.page == 'bans' ? '180,100,40,200' : '45,45,55,180'"
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send(var.packetId, 'navigate', 'bans')
                children:
                  nav_bans_text:
                    type: Text
                    attribute:
                      x: 70
                      y: 8
                      through: true
                      center: true
                      fontSize: 49
                      texts: "~&f封禁"

              nav_warps:
                type: Texture
                attribute:
                  x: 10
                  y: 116
                  width: 140
                  height: 40
                  normal: "var.page == 'warps' ? '180,100,40,200' : '45,45,55,180'"
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send(var.packetId, 'navigate', 'warps')
                children:
                  nav_warps_text:
                    type: Text
                    attribute:
                      x: 70
                      y: 8
                      through: true
                      center: true
                      fontSize: 49
                      texts: "~&f传送点"

              nav_world:
                type: Texture
                attribute:
                  x: 10
                  y: 166
                  width: 140
                  height: 40
                  normal: "var.page == 'world' ? '180,100,40,200' : '45,45,55,180'"
                  shape: ~round_rect
                  radius: 8
                action:
                  click: |-
                    Packet.send(var.packetId, 'navigate', 'world')
                children:
                  nav_world_text:
                    type: Text
                    attribute:
                      x: 70
                      y: 8
                      through: true
                      center: true
                      fontSize: 49
                      texts: "~&f世界"

          # ═══ 内容区 ═══
          内容区:
            type: Texture
            attribute:
              x: 160
              y: 60
              width: 840
              height: 600
              normal: ~20,20,25,100
            children:
              # ─── 玩家列表视图 ───
              page_players:
                type: Canvas
                attribute:
                  x: 20
                  y: 16
                  width: 800
                  height: 570
                  visible: |-
                    var.page == 'players'
                children:
                  players_title:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 36
                      texts: "~&6在线玩家"
                  在线玩家滑块:
                    type: Texture
                    val: 在线玩家滑块
                    attribute:
                      x: 794
                      y: 46
                      width: 6
                      height: 50
                      normal: ~120,120,120,200
                      maxDragY: 460
                  players_scroll:
                    type: Scroll
                    attribute:
                      x: 0
                      y: 46
                      width: 800
                      height: 510
                      moveY: "self.parent['在线玩家滑块'].getDragYRatio()"
                    action:
                      wheel: |-
                        if(self.moveY >= 0 && self.wheelValue > 0){
                          self.parent['在线玩家滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                        if(self.moveY <= 1 && self.wheelValue < 0){
                          self.parent['在线玩家滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                    children:
                      players_list:
                        val: player_data
                        type: VStack
                        attribute:
                          x: 0
                          y: 0
                          width: 800
                          spaceBetween: 6
                        children:
                          player_row:
                            type: Texture
                            attribute:
                              entry: var.players[self.key]
                              visible: self.entry != none
                              width: 780
                              height: 54
                              normal: ~40,40,50,180
                              shape: ~round_rect
                              radius: 6
                            children:
                              player_name:
                                type: Text
                                attribute:
                                  x: 16
                                  y: 14
                                  through: true
                                  fontSize: 36
                                  texts: "~&f{self.parent.entry['name']}"
                              player_health:
                                type: Text
                                attribute:
                                  x: 150
                                  y: 10
                                  through: true
                                  fontSize: 30
                                  texts: "~&c❤ {self.parent.entry['health']}"
                              player_status:
                                type: Text
                                attribute:
                                  x: 150
                                  y: 32
                                  through: true
                                  fontSize: 30
                                  texts: "self.parent.entry['isFlying'] == true ? (self.parent.entry['isGod'] == true ? '&b✈飞行 &a✦无敌' : '&b✈飞行') : (self.parent.entry['isGod'] == true ? '&a✦无敌' : none)"
                              player_world:
                                type: Text
                                attribute:
                                  x: 260
                                  y: 16
                                  through: true
                                  fontSize: 36
                                  texts: "~&7{self.parent.entry['world']}"
                              btn_heal:
                                type: Texture
                                attribute:
                                  x: 440
                                  y: 10
                                  width: 60
                                  height: 34
                                  normal: ~50,160,80,200
                                  shape: ~round_rect
                                  radius: 6
                                action:
                                  click: |-
                                    Packet.send(var.packetId, 'heal', self.parent.entry['name'])
                                children:
                                  btn_heal_t:
                                    type: Text
                                    attribute:
                                      x: 30
                                      y: 5
                                      through: true
                                      center: true
                                      fontSize: 42
                                      texts: "~&f治疗"
                              btn_feed:
                                type: Texture
                                attribute:
                                  x: 508
                                  y: 10
                                  width: 60
                                  height: 34
                                  normal: ~160,140,40,200
                                  shape: ~round_rect
                                  radius: 6
                                action:
                                  click: |-
                                    Packet.send(var.packetId, 'feed', self.parent.entry['name'])
                                children:
                                  btn_feed_t:
                                    type: Text
                                    attribute:
                                      x: 30
                                      y: 5
                                      through: true
                                      center: true
                                      fontSize: 42
                                      texts: "~&f喂食"
                              btn_fly:
                                type: Texture
                                attribute:
                                  x: 576
                                  y: 10
                                  width: 60
                                  height: 34
                                  normal: "self.parent.entry['isFlying'] == true ? '60,180,240,220' : '60,120,200,200'"
                                  shape: ~round_rect
                                  radius: 6
                                action:
                                  click: |-
                                    Packet.send(var.packetId, 'fly', self.parent.entry['name'])
                                children:
                                  btn_fly_t:
                                    type: Text
                                    attribute:
                                      x: 30
                                      y: 5
                                      through: true
                                      center: true
                                      fontSize: 42
                                      texts: "~&f飞行"
                              btn_kick:
                                type: Texture
                                attribute:
                                  x: 644
                                  y: 10
                                  width: 60
                                  height: 34
                                  normal: ~200,80,40,200
                                  shape: ~round_rect
                                  radius: 6
                                action:
                                  click: |-
                                    Packet.send(var.packetId, 'kick', self.parent.entry['name'])
                                children:
                                  btn_kick_t:
                                    type: Text
                                    attribute:
                                      x: 30
                                      y: 5
                                      through: true
                                      center: true
                                      fontSize: 42
                                      texts: "~&f踢出"
                              btn_ban:
                                type: Texture
                                attribute:
                                  x: 712
                                  y: 10
                                  width: 60
                                  height: 34
                                  normal: ~180,40,40,200
                                  shape: ~round_rect
                                  radius: 6
                                action:
                                  click: |-
                                    Packet.send(var.packetId, 'ban', self.parent.entry['name'])
                                children:
                                  btn_ban_t:
                                    type: Text
                                    attribute:
                                      x: 30
                                      y: 5
                                      through: true
                                      center: true
                                      fontSize: 42
                                      texts: "~&f封禁"

              # ─── 封禁列表视图 ───
              page_bans:
                type: Canvas
                attribute:
                  x: 20
                  y: 16
                  width: 800
                  height: 570
                  visible: |-
                    var.page == 'bans'
                children:
                  bans_title:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 36
                      texts: "~&6封禁列表"
                  bans_count:
                    type: Text
                    attribute:
                      x: 640
                      y: 6
                      fontSize: 28
                      texts: "~&7共 &f{var.banCount} &7条记录"
                  bans_empty:
                    type: Text
                    attribute:
                      x: 0
                      y: 80
                      fontSize: 28
                      visible: |-
                        var.banCount == '0'
                      texts: "~&8暂无封禁记录"
                  封禁滑块:
                    type: Texture
                    val: 封禁滑块
                    attribute:
                      x: 794
                      y: 50
                      width: 6
                      height: 50
                      normal: ~120,120,120,200
                      maxDragY: 460
                  bans_scroll:
                    type: Scroll
                    attribute:
                      x: 0
                      y: 50
                      width: 800
                      height: 510
                      moveY: "self.parent['封禁滑块'].getDragYRatio()"
                    action:
                      wheel: |-
                        if(self.moveY >= 0 && self.wheelValue > 0){
                          self.parent['封禁滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                        if(self.moveY <= 1 && self.wheelValue < 0){
                          self.parent['封禁滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                        }
                    children:
                      bans_list:
                        val: ban_data
                        type: VStack
                        attribute:
                          x: 0
                          y: 0
                          width: 800
                          spaceBetween: 6
                        children:
                          ban_row:
                            type: Texture
                            attribute:
                              entry: var.bans[self.key]
                              visible: self.entry != none
                              width: 780
                              height: 60
                              normal: ~40,40,50,180
                              shape: ~round_rect
                              radius: 6
                            children:
                              ban_name:
                                type: Text
                                attribute:
                                  x: 16
                                  y: 8
                                  through: true
                                  fontSize: 28
                                  texts: "~&f{self.parent.entry['name']}"
                              ban_reason:
                                type: Text
                                attribute:
                                  x: 16
                                  y: 34
                                  through: true
                                  fontSize: 22
                                  texts: "~&7原因: &e{self.parent.entry['reason'] != none ? self.parent.entry['reason'] : '未填写'}  &7操作者: &b{self.parent.entry['operator']}"
                              ban_permanent:
                                type: Text
                                attribute:
                                  x: 600
                                  y: 8
                                  through: true
                                  fontSize: 22
                                  texts: "self.parent.entry['permanent'] == 'true' ? '&c永久' : '&e临时'"
                              btn_unban:
                                type: Texture
                                attribute:
                                  x: 690
                                  y: 14
                                  width: 80
                                  height: 32
                                  normal: ~50,160,80,200
                                  shape: ~round_rect
                                  radius: 6
                                action:
                                  click: |-
                                    Packet.send(var.packetId, 'unban', self.parent.entry['uuid'])
                                children:
                                  btn_unban_t:
                                    type: Text
                                    attribute:
                                      x: 40
                                      y: 4
                                      through: true
                                      center: true
                                      fontSize: 22
                                      texts: "~&f解封"

              # ─── 世界控制视图 ───
              page_world:
                type: Canvas
                attribute:
                  x: 20
                  y: 16
                  width: 800
                  height: 570
                  visible: |-
                    var.page == 'world'
                children:
                  world_title:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 36
                      texts: "~&6世界管理"
                  world_info:
                    type: Text
                    attribute:
                      x: 0
                      y: 50
                      fontSize: 36
                      texts: "~&7世界: &f{var.worldName}  &7时间: &f{var.worldTime}  &7天气: &f{var.worldWeather}"
                  # 时间控制
                  time_label:
                    type: Text
                    attribute:
                      x: 0
                      y: 100
                      fontSize: 36
                      texts: "~&b时间设置:"
                  btn_day:
                    type: Texture
                    attribute:
                      x: 0
                      y: 136
                      width: 100
                      height: 42
                      normal: ~60,140,180,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'set_time', 'day')
                    children:
                      btn_day_t:
                        type: Text
                        attribute:
                          x: 50
                          y: 8
                          through: true
                          center: true
                          fontSize: 36
                          texts: "~&f白天"
                  btn_night:
                    type: Texture
                    attribute:
                      x: 110
                      y: 136
                      width: 100
                      height: 42
                      normal: ~40,50,100,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'set_time', 'night')
                    children:
                      btn_night_t:
                        type: Text
                        attribute:
                          x: 50
                          y: 8
                          through: true
                          center: true
                          fontSize: 36
                          texts: "~&f夜晚"
                  btn_noon:
                    type: Texture
                    attribute:
                      x: 220
                      y: 136
                      width: 100
                      height: 42
                      normal: ~180,160,60,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'set_time', 'noon')
                    children:
                      btn_noon_t:
                        type: Text
                        attribute:
                          x: 50
                          y: 8
                          through: true
                          center: true
                          fontSize: 36
                          texts: "~&f正午"
                  # 天气控制
                  weather_label:
                    type: Text
                    attribute:
                      x: 0
                      y: 200
                      fontSize: 36
                      texts: "~&b天气设置:"
                  清除按钮:
                    type: Texture
                    attribute:
                      x: 0
                      y: 236
                      width: 100
                      height: 42
                      normal: ~60,180,220,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'set_weather', 'clear')
                    children:
                      清除按钮文字:
                        type: Text
                        attribute:
                          x: 50
                          y: 8
                          through: true
                          center: true
                          fontSize: 36
                          texts: "~&f晴天"
                  btn_rain:
                    type: Texture
                    attribute:
                      x: 110
                      y: 236
                      width: 100
                      height: 42
                      normal: ~80,100,140,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'set_weather', 'rain')
                    children:
                      btn_rain_t:
                        type: Text
                        attribute:
                          x: 50
                          y: 8
                          through: true
                          center: true
                          fontSize: 36
                          texts: "~&f雨天"
                  btn_thunder:
                    type: Texture
                    attribute:
                      x: 220
                      y: 236
                      width: 100
                      height: 42
                      normal: ~60,50,80,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'set_weather', 'thunder')
                    children:
                      btn_thunder_t:
                        type: Text
                        attribute:
                          x: 50
                          y: 8
                          through: true
                          center: true
                          fontSize: 36
                          texts: "~&f雷暴"
                  # 出生点
                  btn_set_spawn:
                    type: Texture
                    attribute:
                      x: 0
                      y: 310
                      width: 160
                      height: 42
                      normal: ~120,60,180,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'set_spawn')
                    children:
                      btn_spawn_t:
                        type: Text
                        attribute:
                          x: 80
                          y: 8
                          through: true
                          center: true
                          fontSize: 36
                          texts: "~&f设置出生点"

              # ─── 传送点管理视图 ───
              page_warps:
                type: Canvas
                attribute:
                  x: 20
                  y: 16
                  width: 800
                  height: 570
                  visible: |-
                    var.page == 'warps'
                children:
                  warps_title:
                    type: Text
                    attribute:
                      x: 0
                      y: 0
                      fontSize: 36
                      texts: "~&6传送点管理"
                  btn_add_warp:
                    type: Texture
                    attribute:
                      x: 640
                      y: 0
                      width: 140
                      height: 38
                      normal: ~50,180,80,200
                      shape: ~round_rect
                      radius: 8
                    action:
                      click: |-
                        Packet.send(var.packetId, 'set_warp', 'new_warp')
                    children:
                      btn_add_warp_t:
                        type: Text
                        attribute:
                          x: 70
                          y: 6
                          through: true
                          center: true
                          fontSize: 36
                          texts: "~&f+ 新建传送点"
                  传送点滑块:
                    type: Texture
                    val: 传送点滑块
                    attribute:
                      x: 794
                      y: 50
                      width: 6
                      height: 50
                      normal: ~120,120,120,200
                      maxDragY: 460
                  warps_scroll:
                    type: Scroll
                    attribute:
                      x: 0
                      y: 50
                      width: 800
