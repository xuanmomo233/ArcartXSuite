# ── 全球市场 · 拍卖行上架 ─────────────────────────────────────
# 背包选择、上架参数填写及确认提交。

ui:
  isHud: false
  defaultOpen: false
  hide: []
  through: false
  background: false
  escClose: true
  closeDied: true
  show: true
  jei: false
  level: 8
  itemSize: 16
  screenScale: true

  action:
    load: |-
      var.packetId = 'AXS_MARKET'
      var.emptyItemJson = '{"id":"minecraft:air","Count":1b}'
      var.selectedSlot = none
      var.selectedPrice = none
      var.selectedMessage = none
      var.selectedDuration = 86400
      var.selectedCurrency = none
      var.priceMin = 1
      var.priceMax = 1000000000
      var.messageMaxLength = 50
    open: |-
      Packet.send(var.packetId, 'auction_sell_open')

  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.backpackItems = packet['backpackItems']
      var.itemJsons = {}
      var.currencies = packet['currencies']
      var.maxCurrencyCount = packet['maxCurrencyCount']
      var.selectedCurrency = packet['defaultCurrency']
      var.priceMin = packet['priceMin']
      var.priceMax = packet['priceMax']
      var.messageMaxLength = packet['messageMaxLength']

      while(val.货币列表.childrenCount() > 1){
        val.货币列表.get(1).remove()
      }
      for(i in range(0, var.maxCurrencyCount)){
        key = i.round()
        e = val.货币列表['货币项'].copy('货币项' + key)
        e.entryKey = key
      }

      for(key in var.backpackItems.keys()){
        json = packet['itemJson' + key]
        if(json != none){
          var.itemJsons[key] = json
        } else {
          var.itemJsons[key] = var.emptyItemJson
        }
      }

      while(val.背包网格.childrenCount() > 1){
        val.背包网格.get(1).remove()
      }
      for(i in range(1, 35)){
        key = i.round()
        e = val.背包网格['背包槽'].copy('背包槽' + key)
        e.entryKey = key
        e.id = key + 9
        e.seticon()
      }

      preview = val.信息面板['预览槽']
      if(preview != none){
        preview.seticon()
      }

    update: |-
      var.backpackItems = packet['backpackItems']
      var.itemJsons = {}
      var.currencies = packet['currencies']
      var.maxCurrencyCount = packet['maxCurrencyCount']
      var.selectedCurrency = packet['defaultCurrency']
      var.priceMin = packet['priceMin']
      var.priceMax = packet['priceMax']
      var.messageMaxLength = packet['messageMaxLength']

      while(val.货币列表.childrenCount() > 1){
        val.货币列表.get(1).remove()
      }
      for(i in range(0, var.maxCurrencyCount)){
        key = i.round()
        e = val.货币列表['货币项'].copy('货币项' + key)
        e.entryKey = key
      }

      for(key in var.backpackItems.keys()){
        json = packet['itemJson' + key]
        if(json != none){
          var.itemJsons[key] = json
        } else {
          var.itemJsons[key] = var.emptyItemJson
        }
      }

      while(val.背包网格.childrenCount() > 1){
        val.背包网格.get(1).remove()
      }
      for(i in range(1, 35)){
        key = i.round()
        e = val.背包网格['背包槽'].copy('背包槽' + key)
        e.entryKey = key
        e.id = key + 9
        e.seticon()
      }

      preview = val.信息面板['预览槽']
      if(preview != none){
        preview.seticon()
      }

controls:
  自适应总布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Canvas
        attribute:
          point: ~middle_center
          x: 0
          y: 0
          width: 1500
          height: 900
          normal: ~32,32,42,238
          shape: ~round_rect
          radius: 24
        effect:
          stroke:
            width: 2
            color: ~80,180,255,90
        children:
          主面板背景:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: ~32,32,42,238
              shape: ~round_rect
              radius: 24

          标题:
            type: Text
            attribute:
              x: 40
              y: 24
              texts: "~&f物品上架"
              fontSize: 42
              through: true

          关闭按钮:
            type: Texture
            attribute:
              x: 1400
              y: 18
              width: 56
              height: 56
              normal: ~62,62,74,205
              hover: ~Frosted:0;255,100,100,230
              shape: ~round_rect
              radius: 14
              texts: "~&cX"
              center: true
              fontSize: 32
            action:
              clickLeft: |-
                Screen.close()
            effect:
              stroke:
                width: 2
                color: ~255,120,120,120

          背包面板:
            type: Canvas
            attribute:
              x: 40
              y: 92
              width: 820
              height: 760
              normal: ~45,47,56,205
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~80,180,255,120
            children:
              背包面板背景:
                type: Texture
                attribute:
                  point: ~stretch_all
                  normal: ~45,47,56,205
                  shape: ~round_rect
                  radius: 24

              背包标题:
                type: Text
                attribute:
                  x: 24
                  y: 18
                  texts: "~&f选择背包物品"
                  fontSize: 36
                  through: true

              背包说明:
                type: Text
                attribute:
                  x: 24
                  y: 58
                  texts: "~&7点击物品选择或取消选择"
                  fontSize: 22
                  through: true

              背包网格:
                type: HGrid
                val: 背包网格
                attribute:
                  x: 22
                  y: 112
                  width: 776
                  height: 600
                  column: 9
                  spaceBetweenX: 8
                  spaceBetweenY: 8
                children:
                  背包槽:
                    type: Slot
                    attribute:
                      id: 9
                      entryKey: 1
                      slotType: ~Backpack
                      itemScale: 0.68
                      width: 72
                      height: 72
                      lock: true
                      through: false
                      normal: "self.entryKey == var.selectedSlot ? '120,190,255,255' : 'Frosted:0;95,95,95,255'"
                      hover: "~Frosted:0;255,255,255,255"
                      shape: ~round_rect
                      radius: 14
                      seticon: "self.setItemIcon(var.itemJsons[self.entryKey])"
                    action:
                      clickLeft: |-
                        entry = var.backpackItems[self.entryKey]
                        if(entry != none && entry['hasItem']){
                          if(var.selectedSlot == self.entryKey){
                            var.selectedSlot = none
                          } else {
                            var.selectedSlot = self.entryKey
                          }
                          preview = val.信息面板['预览槽']
                          if(preview != none){
                            preview.seticon()
                          }
                        }
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255

              空背包提示:
                type: Text
                attribute:
                  point: ~middle_center
                  x: 0
                  y: 0
                  center: true
                  fontSize: 32
                  visible: "var.backpackItems == none || var.backpackItems.keys().length == 0"
                  texts: "~&8暂无可上架物品"
                  through: true

          信息面板:
            type: Canvas
            val: 信息面板
            attribute:
              x: 880
              y: 92
              width: 560
              height: 760
              normal: ~45,47,56,205
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~80,180,255,120
            children:
              信息面板背景:
                type: Texture
                attribute:
                  point: ~stretch_all
                  normal: ~45,47,56,205
                  shape: ~round_rect
                  radius: 24

              信息标题:
                type: Text
                attribute:
                  x: 24
                  y: 18
                  texts: "~&f上架信息"
                  fontSize: 36
                  through: true

              预览槽:
                type: Slot
                attribute:
                  slotType: ~Icon
                  itemScale: 0.8
                  x: 24
                  y: 70
                  width: 82
                  height: 82
                  normal: ~62,62,74,205
                  shape: ~round_rect
                  radius: 12
                  through: true
                  seticon: "var.selectedSlot != none ? self.setItemIcon(var.itemJsons[var.selectedSlot]) : self.setItemIcon(var.emptyItemJson)"
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255

              预览物品名:
                type: Text
                attribute:
                  x: 124
                  y: 82
                  width: 400
                  texts: "var.selectedSlot != none && var.backpackItems[var.selectedSlot] != none ? '&f' + var.backpackItems[var.selectedSlot]['name'] : '&7未选择物品'"
                  fontSize: 30
                  through: true

              价格标签:
                type: Text
                attribute:
                  x: 24
                  y: 182
                  texts: "~&f起拍价格"
                  fontSize: 30
                  through: true

              价格输入框:
                type: TextBox
                attribute:
                  x: 24
                  y: 222
                  width: 250
                  height: 44
                  length: 12
                  emptyText: ~输入价格...
                  fontSize: 28
                  background: ~62,62,74,205
                  shape: ~round_rect
                  radius: 10
                action:
                  textChange: |-
                    var.selectedPrice = self.getContent()
                effect:
                  stroke:
                    width: 1
                    color: ~80,180,255,80

              价格范围提示:
                type: Text
                attribute:
                  x: 294
                  y: 232
                  texts: "var.priceMin + ' - ' + var.priceMax"
                  fontSize: 22
                  through: true

              留言标签:
                type: Text
                attribute:
                  x: 24
                  y: 292
                  texts: "~&f物品留言"
                  fontSize: 30
                  through: true

              留言输入框:
                type: TextBox
                attribute:
                  x: 24
                  y: 332
                  width: 510
                  height: 44
                  length: 50
                  emptyText: ~输入留言...
                  fontSize: 28
                  background: ~62,62,74,205
                  shape: ~round_rect
                  radius: 10
                action:
                  textChange: |-
                    var.selectedMessage = self.getContent()
                effect:
                  stroke:
                    width: 1
                    color: ~80,180,255,80

              留言长度提示:
                type: Text
                attribute:
                  x: 24
                  y: 382
                  texts: "'&7最多 ' + var.messageMaxLength + ' 字符'"
                  fontSize: 20
                  through: true

              货币标签:
                type: Text
                attribute:
                  x: 24
                  y: 432
                  texts: "~&f结算货币"
                  fontSize: 30
                  through: true

              货币列表:
                type: VStack
                val: 货币列表
                attribute:
                  x: 24
                  y: 472
                  width: 250
                  height: 82
                  spaceBetween: 6
                children:
                  货币项:
                    type: Texture
                    attribute:
                      entryKey: 0
                      entry: var.currencies[self.entryKey]
                      visible: "self.entry != none"
                      width: 240
                      height: 38
                      normal: "self.entry != none && self.entry['id'] == var.selectedCurrency ? '80,180,255,230' : '65,65,75,200'"
                      hover: ~Frosted:0;255,255,255,180
                      shape: ~round_rect
                      radius: 10
                      texts: "self.entry != none ? self.entry['name'] : ''"
                      center: true
                      fontSize: 24
                    action:
                      clickLeft: |-
                        if(self.entry != none){
                          var.selectedCurrency = self.entry['id']
                        }
                    effect:
                      stroke:
                        width: 1
                        color: ~80,180,255,100

              时长标签:
                type: Text
                attribute:
                  x: 300
                  y: 432
                  texts: "~&f上架时长"
                  fontSize: 30
                  through: true

              时长1天:
                type: Texture
                attribute:
                  x: 300
                  y: 472
                  width: 70
                  height: 38
                  normal: "var.selectedDuration == 86400 ? '80,180,255,230' : '65,65,75,200'"
                  hover: ~Frosted:0;255,255,255,180
                  shape: ~round_rect
                  radius: 10
                  texts: "~&f1天"
                  center: true
                  fontSize: 24
                action:
                  clickLeft: |-
                    var.selectedDuration = 86400
                effect:
                  stroke:
                    width: 1
                    color: ~80,180,255,120

              时长3天:
                type: Texture
                attribute:
                  x: 378
                  y: 472
                  width: 70
                  height: 38
                  normal: "var.selectedDuration == 259200 ? '80,180,255,230' : '65,65,75,200'"
                  hover: ~Frosted:0;255,255,255,180
                  shape: ~round_rect
                  radius: 10
                  texts: "~&f3天"
                  center: true
                  fontSize: 24
                action:
                  clickLeft: |-
                    var.selectedDuration = 259200
                effect:
                  stroke:
                    width: 1
                    color: ~80,180,255,120

              时长7天:
                type: Texture
                attribute:
                  x: 456
                  y: 472
                  width: 70
                  height: 38
                  normal: "var.selectedDuration == 604800 ? '80,180,255,230' : '65,65,75,200'"
                  hover: ~Frosted:0;255,255,255,180
                  shape: ~round_rect
                  radius: 10
                  texts: "~&f7天"
                  center: true
                  fontSize: 24
                action:
                  clickLeft: |-
                    var.selectedDuration = 604800
                effect:
                  stroke:
                    width: 1
                    color: ~80,180,255,120

              返回按钮:
                type: Texture
                attribute:
                  x: 24
                  y: 650
                  width: 150
                  height: 56
                  normal: ~62,62,74,205
                  hover: ~Frosted:0;255,255,255,180
                  shape: ~round_rect
                  radius: 14
                  texts: "~&f返回"
                  center: true
                  fontSize: 30
                action:
                  clickLeft: |-
                    Screen.open("AXS:market_auction")
                effect:
                  stroke:
                    width: 2
                    color: ~80,180,255,120

              确认上架按钮:
                type: Texture
                attribute:
                  x: 194
                  y: 650
                  width: 330
                  height: 56
                  normal: ~60,180,100,200
                  hover: ~Frosted:0;80,220,120,230
                  shape: ~round_rect
                  radius: 14
                  texts: "~&f确认上架"
                  center: true
                  fontSize: 30
                action:
                  clickLeft: |-
                    if(var.selectedSlot == none){
                      return
                    }
                    if(var.selectedPrice == none || var.selectedPrice == ''){
                      return
                    }
                    Packet.send(var.packetId, 'auction_list_create', var.selectedSlot, var.selectedPrice, var.selectedMessage, var.selectedDuration, var.selectedCurrency)
                effect:
                  stroke:
                    width: 2
                    color: ~80,255,140,120
