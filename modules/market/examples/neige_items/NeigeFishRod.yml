# NeigeItems 物品配置示例
# 文件需复制到 plugins/NeigeItems/Items/ 目录下（文件名任意，.yml 后缀即可）
# 物品 ID 为根键 NeigeFishRod，需与 example_shop.yml 中 item-id 一致

NeigeFishRod:
  # 基础材质
  material: FISHING_ROD
  # 显示名称
  name: '&e神奇钓鱼竿'
  # 物品 Lore
  lore:
    - '&7一根被施了魔法的钓鱼竿，据说能钓到珍稀鱼类。'
    - ''
    - '&e✦ &7稀有度: &b罕见'
    - '&e✦ &7类别: &f工具'
    - '&e✦ &7等级要求: &f10'
    - ''
    - '&8&m------------&7 属性 &8&m------------'
    - '&7▸ 海之眷顾 &bIII'
    - '&7▸ 饵钓 &bIII'
    - '&7▸ 耐久 &bIII'
  # NBT 数据（附魔通过 NBT 定义）
  nbt:
    Enchantments:
      - id: "minecraft:luck_of_the_sea"
        lvl: (Short) 3
      - id: "minecraft:lure"
        lvl: (Short) 3
      - id: "minecraft:unbreaking"
        lvl: (Short) 3
    # 隐藏附魔闪烁效果（可选）
    HideFlags: (Int) 1
  # 自定义模型数据（可选，需配合资源包）
  # customModelData: 10001
