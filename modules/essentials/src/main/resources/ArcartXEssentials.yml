  tpa-here-received: '&f{player} &a请求你传送到 TA 的位置。\n&7输入 &f/tpaccept &7接受，&f/tpdeny &7拒绝。'
  tpa-accepted: '&a传送请求已接受。'
  tpa-denied: '&c传送请求已拒绝。'
  tpa-expired: '&c传送请求已过期。'
  tpa-no-pending: '&c没有待处理的传送请求。'
  teleport-cancelled: '&c传送已取消（你移动了）。'
  teleport-warmup: '&7传送中... &f{seconds} &7秒后到达，请勿移动。'
  back-teleported: '&a已传送回上次位置。'
  back-none: '&c没有可返回的位置。'
  repair-success: '&a物品已修复。'
  repair-nothing: '&c手中没有可修复的物品。'
  hat-success: '&a物品已戴在头上。'
  hat-nothing: '&c手中没有物品。'
  nick-set: '&a昵称已设置为 &f{nick}&a。'
