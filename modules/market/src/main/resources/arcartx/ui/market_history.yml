# AXS Market — 交易历史界面
# 打开方式: /market history
# 数据交互: packetHandler init/update；客户端 Packet.send(var.packetId, action, ...)

ui:
  isHud: false
  defaultOpen: false
  hide:
    - HUD
  through: false
  background: false
  escClose: true
  closeDied: true
  show: true
  jei: false
  level: 8
  itemSize: 16
  screenScale: true
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.page = packet['page']
      var.totalPages = packet['totalPages']
      var.records = packet['records']
      var.itemJsons = {}
      for(key in var.records.keys()){
        json = packet['historyItemJson' + key]
      var.maxRecordCount = packet['maxRecordCount']
        if(json != none && json != none){
          var.itemJsons[key] = json
        } else {
          var.itemJsons[key] = var.emptyItemJson
        }
      }
      for(i in range(0, var.maxRecordCount)){
        key = i.round()
        row = val.记录列表['记录行' + key]
        if(row != none){
          icon = row['物品图标']
          if(icon != none){
            icon.seticon()
          }
        }
      }
    update: |-
      var.packetId = packet['packetId']
      var.page = packet['page']
      var.totalPages = packet['totalPages']
      var.records = packet['records']
      var.itemJsons = {}
      for(key in var.records.keys()){
        json = packet['historyItemJson' + key]
      var.maxRecordCount = packet['maxRecordCount']
        if(json != none && json != none){
          var.itemJsons[key] = json
        } else {
          var.itemJsons[key] = var.emptyItemJson
        }
      }
      for(i in range(0, var.maxRecordCount)){
        key = i.round()
        row = val.记录列表['记录行' + key]
        if(row != none){
          icon = row['物品图标']
          if(icon != none){
            icon.seticon()
          }
        }
      }
  action:
    open: |-
      var.packetId = 'AXS_MARKET'
      var.page = 0
      var.totalPages = 1
      var.records = {}
      var.itemJsons = {}
      var.scrollRatio = 0
      var.emptyItemJson = '{"id":"minecraft:air","Count":1b}'
      var.maxRecordCount = 0
      Packet.send(var.packetId, 'history_list', '0')

controls:
  根:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Canvas
        attribute:
          point: ~middle_center
          width: 1300
          height: 860
        children:
          背景:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: ~35,35,45,235
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~180,160,255,180
              shadow:
                xOffset: 2
                yOffset: 2
                blur: 6
                color: ~0,0,0,120

          标题:
            type: Text
            attribute:
              x: 42
              y: 24
              texts: '&d&l交易历史'
              fontSize: 56
          副标题:
            type: Text
            attribute:
              x: 42
              y: 78
              texts: "~&7第 {var.page + 1}/{var.totalPages} 页"
              fontSize: 32

          关闭按钮:
            type: Texture
            attribute:
              x: 1210
              y: 24
              width: 56
              height: 56
              normal: ~180,60,60,200
              hover: ~Frosted:0;220,80,80,230
              shape: ~round_rect
              radius: 14
            action:
              clickLeft: |-
                Screen.close()
            effect:
              stroke:
                width: 2
                color: ~255,120,120,120
            children:
              文字:
                type: Text
                attribute:
                  x: 28
                  y: 14
                  through: true
                  center: true
                  fontSize: 36
                  texts: '&fX'

          # ── 记录列表区 ──────────────────────────────
          列表卡片:
            type: Texture
            attribute:
              x: 32
              y: 110
              width: 1236
              height: 670
              normal: ~50,50,60,180
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~180,160,255,100
            children:
              列表纵向滑块:
                type: Texture
                val: 列表纵向滑块
                attribute:
                  x: 1220
                  y: 10
                  width: 6
                  height: 50
                  normal: ~120,120,120,200
                  maxDragY: 600
              列表滚动:
                type: Scroll
                val: 列表滚动
                attribute:
                  x: 10
                  y: 10
                  width: 1210
                  height: 650
                  moveY: "self.parent['列表纵向滑块'].getDragYRatio()"
                action:
                  wheel: |-
                    if(self.moveY >= 0 && self.wheelValue > 0){
                      self.parent['列表纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                    if(self.moveY <= 1 && self.wheelValue < 0){
                      self.parent['列表纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                children:
                  记录列表:
                    val: 记录列表
                    type: VStack
                    attribute:
                      width: 1196
                      spaceBetween: 6
                    action:
                      create: |-
                        for(i in range(0, var.maxRecordCount)){
                          key = i.round()
                          row = self['记录行'].copy('记录行' + key)
                          row.entryKey = key
                          icon = row['物品图标']
                          if(icon != none){
                            icon.entryKey = key
                          }
                        }
                    children:
                      记录行:
                        type: Texture
                        attribute:
                          entryKey: 0
                          entry: var.records[self.entryKey]
                          visible: self.entry != none
                          width: 1196
                          height: 68
                          normal: ~60,60,70,200
                          shape: ~round_rect
                          radius: 14
                        effect:
                          stroke:
                            width: 1
                            color: ~180,160,255,60
                        children:
                          物品图标:
                            type: Slot
                            attribute:
                              entryKey: 0
                              slotType: ~Icon
                              itemScale: 0.64
                              x: 8
                              y: 4
                              width: 60
                              height: 60
                              normal: ~45,45,55,200
                              shape: ~round_rect
                              radius: 10
                              through: true
                              seticon: "self.setItemIcon(var.itemJsons[self.entryKey])"
                          类型:
                            type: Text
                            attribute:
                              x: 80
                              y: 8
                              width: 120
                              texts: "self.parent.entry != none ? self.parent.entry['typeColor'] + self.parent.entry['typeText'] : none"
                              fontSize: 36
                              through: true
                          物品名:
                            type: Text
                            attribute:
                              x: 200
                              y: 8
                              width: 280
                              texts: "self.parent.entry != none ? '&f' + self.parent.entry['itemName'] : none"
                              fontSize: 36
                              through: true
                          对方:
                            type: Text
                            attribute:
                              x: 200
                              y: 40
                              width: 200
                              texts: "self.parent.entry != none ? '&7' + self.parent.entry['counterpart'] : none"
                              fontSize: 22
                              through: true
                          金额:
                            type: Text
                            attribute:
                              x: 540
                              y: 14
                              width: 260
                              texts: "self.parent.entry != none ? '&e' + self.parent.entry['amount'] : none"
                              fontSize: 32
                              through: true
                          时间:
                            type: Text
                            attribute:
                              x: 860
                              y: 14
                              width: 300
                              texts: "self.parent.entry != none ? '&7' + self.parent.entry['time'] : none"
                              fontSize: 28
                              through: true

          # ── 底部分页栏 ──────────────────────────────
          上一页:
            type: Texture
            attribute:
              x: 32
              y: 794
              width: 120
              height: 48
              normal: ~65,65,75,220
              hover: ~Frosted:0;255,255,255,180
              shape: ~round_rect
              radius: 14
            action:
              clickLeft: |-
                if(var.page > 0){
                  Packet.send(var.packetId, 'history_list', (var.page - 1) + '')
                }
            effect:
              stroke:
                width: 2
                color: ~180,160,255,120
            children:
              文字:
                type: Text
                attribute:
                  x: 60
                  y: 12
                  through: true
                  center: true
                  fontSize: 36
                  texts: '&f< 上一页'

          页码:
            type: Text
            attribute:
              x: 650
              y: 806
              center: true
              texts: "~&7第 &f{var.page + 1} &7/ &f{var.totalPages} &7页"
              fontSize: 32

          下一页:
            type: Texture
            attribute:
              x: 1148
              y: 794
              width: 120
              height: 48
              normal: ~65,65,75,220
              hover: ~Frosted:0;255,255,255,180
              shape: ~round_rect
              radius: 14
            action:
              clickLeft: |-
                if(var.page < var.totalPages - 1){
                  Packet.send(var.packetId, 'history_list', (var.page + 1) + '')
                }
            effect:
              stroke:
                width: 2
                color: ~180,160,255,120
            children:
              文字:
                type: Text
                attribute:
                  x: 60
                  y: 12
                  through: true
                  center: true
                  fontSize: 36
                  texts: '&f下一页 >'
