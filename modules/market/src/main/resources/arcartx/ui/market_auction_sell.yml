# ── 全球市场 · 拍卖行上架 ─────────────────────────────────────
# 背包选择、上架参数填写及确认提交。

ui:
  isHud: false
  defaultOpen: false
  hide: []
  through: false
  background: false
  escClose: true
  closeDied: true
  show: true
  jei: false
  level: 8
  itemSize: 16
  screenScale: true

  action:
    load: |-
      var.packetId = 'AXS_MARKET'
      var.emptyItemJson = '{"id":"minecraft:air","Count":1b}'
      var.selectedSlot = none
      var.selectedPrice = none
      var.selectedMessage = none
      var.selectedDuration = 86400
      var.selectedCurrency = none
      var.priceMin = 1
      var.priceMax = 1000000000
      var.messageMaxLength = 50
      var.backpackItems = {}
      var.itemJsons = {}
      var.currencies = {}
      var.maxCurrencyCount = 0
    open: |-
      Packet.send(var.packetId, 'auction_sell_open')

  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.backpackItems = packet['backpackItems']
      var.itemJsons = {}
      var.currencies = packet['currencies']
      var.maxCurrencyCount = packet['maxCurrencyCount']
      var.selectedCurrency = packet['defaultCurrency']
      var.priceMin = packet['priceMin']
      var.priceMax = packet['priceMax']
      var.messageMaxLength = packet['messageMaxLength']

      while(val.货币列表.childrenCount() > 1){
        val.货币列表.get(1).remove()
      }
      for(i in range(0, var.maxCurrencyCount)){
        key = i.round()
        e = val.货币列表['货币项'].copy('货币项' + key)
        e.entryKey = key
      }

      if(var.backpackItems != none){
        for(key in var.backpackItems.keys()){
          json = packet['itemJson' + key]
          if(json != none){
            var.itemJsons[key] = json
          } else {
            var.itemJsons[key] = var.emptyItemJson
          }
        }
      }

      for(i in range(1, 35)){
        slot = val.背包网格.get(i.round())
        if(slot != none){
          slot.seticon()
        }
      }

      preview = val.信息面板['预览槽']
      if(preview != none){
        preview.seticon()
      }

    update: |-
      var.backpackItems = packet['backpackItems']
      var.itemJsons = {}
      var.currencies = packet['currencies']
      var.maxCurrencyCount = packet['maxCurrencyCount']
      var.selectedCurrency = packet['defaultCurrency']
      var.priceMin = packet['priceMin']
      var.priceMax = packet['priceMax']
      var.messageMaxLength = packet['messageMaxLength']

      while(val.货币列表.childrenCount() > 1){
        val.货币列表.get(1).remove()
      }
      for(i in range(0, var.maxCurrencyCount)){
        key = i.round()
        e = val.货币列表['货币项'].copy('货币项' + key)
        e.entryKey = key
      }

      if(var.backpackItems != none){
        for(key in var.backpackItems.keys()){
          json = packet['itemJson' + key]
          if(json != none){
            var.itemJsons[key] = json
          } else {
            var.itemJsons[key] = var.emptyItemJson
          }
        }
      }

      for(i in range(0, 35)){
        slot = val.背包网格.get(i.round())
        if(slot != none){
          slot.seticon()
        }
      }

      preview = val.信息面板['预览槽']
      if(preview != none){
        preview.seticon()
      }

controls:
  自适应总布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Canvas
        attribute:
          point: ~middle_center
          x: 0
          y: 0
          width: 1440
          height: 880
        children:
          主面板背景:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: ~32,32,42,238
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~80,180,255,90

          标题:
            type: Text
            attribute:
              x: 42
              y: 28
              texts: "~&f物品上架"
              fontSize: 48
              through: true

          关闭按钮:
            type: Texture
            attribute:
              x: 1360
              y: 24
              width: 56
              height: 56
              normal: ~180,60,60,200
              hover: ~Frosted:0;220,80,80,230
              shape: ~round_rect
              radius: 14
            action:
              clickLeft: |-
                Screen.close()
            effect:
              stroke:
                width: 2
                color: ~255,120,120,120
            children:
              文字:
                type: Text
                attribute:
                  x: 28
                  y: 14
                  through: true
                  center: true
                  fontSize: 36
                  texts: "~&fX"

          背包面板:
            type: Canvas
            attribute:
              x: 40
              y: 100
              width: 800
              height: 740
            children:
              背包面板背景:
                type: Texture
                attribute:
                  point: ~stretch_all
                  normal: ~45,47,56,205
                  shape: ~round_rect
                  radius: 24
                effect:
                  stroke:
                    width: 2
                    color: ~80,180,255,120

              背包标题:
                type: Text
                attribute:
                  x: 24
                  y: 20
                  texts: "~&f选择背包物品"
                  fontSize: 36
                  through: true

              背包说明:
                type: Text
                attribute:
                  x: 24
                  y: 64
                  texts: "~&7点击物品选择，再次点击取消"
                  fontSize: 22
                  through: true

              背包网格:
                type: HGrid
                val: 背包网格
                attribute:
                  x: 20
                  y: 120
                  width: 760
                  height: 350
                  column: 9
                  spaceBetweenX: 10
                  spaceBetweenY: 10
                children:
                  背包槽:
                    type: Slot
                    attribute:
                      id: 0
                      entryKey: 0
                      entry: var.backpackItems[self.entryKey]
                      slotType: ~Icon
                      itemScale: 0.74
                      width: 72
                      height: 72
                      through: false
                      normal: "self.entryKey == var.selectedSlot ? '120,190,255,255' : 'Frosted:0;95,95,95,255'"
                      hover: "~Frosted:0;255,255,255,255"
                      shape: ~round_rect
                      radius: 16
                      seticon: "self.setItemIcon(var.itemJsons[self.entryKey])"
                    action:
                      clickLeft: |-
                        entry = var.backpackItems[self.entryKey]
                        if(entry != none && entry['hasItem']){
                          if(var.selectedSlot == self.entryKey){
                            var.selectedSlot = none
                          } else {
                            var.selectedSlot = self.entryKey
                          }
                          preview = val.信息面板['预览槽']
                          if(preview != none){
                            preview.seticon()
                          }
                        }
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    children:
                      数量:
                        type: Text
                        attribute:
                          x: 8
                          y: 48
                          width: 60
                          texts: "self.parent.entry != none && self.parent.entry['hasItem'] && self.parent.entry['amount'] > 1 ? '&f' + self.parent.entry['amount'] : none"
                          fontSize: 26
                          through: true

              空背包提示:
                type: Text
                attribute:
                  point: ~middle_center
                  x: 0
                  y: 190
                  center: true
                  fontSize: 28
                  visible: "var.backpackItems == none || var.backpackItems.keys().length == 0"
                  texts: "~&8暂无可上架物品"
                  through: true

              操作提示:
                type: Text
                attribute:
                  x: 24
                  y: 690
                  texts: "~&7选中物品后在右侧填写价格并确认上架"
                  fontSize: 22
                  through: true

          信息面板:
            type: Canvas
            val: 信息面板
            attribute:
              x: 860
              y: 100
              width: 560
              height: 740
            children:
              信息面板背景:
                type: Texture
                attribute:
                  point: ~stretch_all
                  normal: ~45,47,56,205
                  shape: ~round_rect
                  radius: 24
                effect:
                  stroke:
                    width: 2
                    color: ~80,180,255,120

              信息标题:
                type: Text
                attribute:
                  x: 24
                  y: 20
                  texts: "~&f上架信息"
                  fontSize: 36
                  through: true

              标题分隔线:
                type: Texture
                attribute:
                  x: 24
                  y: 68
                  width: 512
                  height: 2
                  normal: ~80,180,255,70
                  through: true

              预览槽:
                type: Slot
                attribute:
                  slotType: ~Icon
                  itemScale: 0.8
                  x: 24
                  y: 84
                  width: 82
                  height: 82
                  normal: ~62,62,74,205
                  shape: ~round_rect
                  radius: 12
                  through: true
                  seticon: "var.selectedSlot != none ? self.setItemIcon(var.itemJsons[var.selectedSlot]) : self.setItemIcon(var.emptyItemJson)"
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255

              预览物品名:
                type: Text
                attribute:
                  x: 124
                  y: 92
                  width: 410
                  texts: "var.selectedSlot != none && var.backpackItems[var.selectedSlot] != none ? '&f' + var.backpackItems[var.selectedSlot]['name'] : '&7未选择物品'"
                  fontSize: 30
                  through: true

              预览物品数量:
                type: Text
                attribute:
                  x: 124
                  y: 134
                  width: 410
                  texts: "var.selectedSlot != none && var.backpackItems[var.selectedSlot] != none ? '&7数量: &f' + var.backpackItems[var.selectedSlot]['amount'] : '&7数量: -'"
                  fontSize: 24
                  through: true

              预览分隔线:
                type: Texture
                attribute:
                  x: 24
                  y: 186
                  width: 512
                  height: 2
                  normal: ~80,180,255,50
                  through: true

              价格标签:
                type: Text
                attribute:
                  x: 24
                  y: 202
                  texts: "~&f起拍价格"
                  fontSize: 30
                  through: true

              价格输入框:
                type: TextBox
                attribute:
                  x: 24
                  y: 244
                  width: 300
                  height: 48
                  length: 12
                  emptyText: ~输入起拍价格...
                  fontSize: 28
                  background: ~62,62,74,205
                  shape: ~round_rect
                  radius: 10
                action:
                  textChange: |-
                    var.selectedPrice = self.getContent()
                effect:
                  stroke:
                    width: 1
                    color: ~80,180,255,80

              价格范围提示:
                type: Text
                attribute:
                  x: 340
                  y: 254
                  width: 200
                  texts: "'&7' + var.priceMin.round() + ' ~ ' + var.priceMax.round()"
                  fontSize: 20
                  through: true

              价格状态:
                type: Text
                attribute:
                  x: 340
                  y: 282
                  width: 200
                  texts: "var.selectedPrice == none || var.selectedPrice == '' ? '&c请输入价格' : '&a价格已填写'"
                  fontSize: 20
                  through: true

              价格分隔线:
                type: Texture
                attribute:
                  x: 24
                  y: 320
                  width: 512
                  height: 2
                  normal: ~80,180,255,50
                  through: true

              留言标签:
                type: Text
                attribute:
                  x: 24
                  y: 336
                  texts: "~&f物品留言"
                  fontSize: 30
                  through: true

              留言输入框:
                type: TextBox
                attribute:
                  x: 24
                  y: 378
                  width: 512
                  height: 48
                  length: 50
                  emptyText: ~输入留言(可选)...
                  fontSize: 28
                  background: ~62,62,74,205
                  shape: ~round_rect
                  radius: 10
                action:
                  textChange: |-
                    var.selectedMessage = self.getContent()
                effect:
                  stroke:
                    width: 1
                    color: ~80,180,255,80

              留言长度提示:
                type: Text
                attribute:
                  x: 24
                  y: 434
                  texts: "'&7最多 ' + var.messageMaxLength.round() + ' 字符'"
                  fontSize: 20
                  through: true

              留言状态:
                type: Text
                attribute:
                  x: 300
                  y: 434
                  width: 236
                  texts: "var.selectedMessage == none || var.selectedMessage == '' ? '&7可选留言' : '&a留言已填写'"
                  fontSize: 20
                  through: true

              留言分隔线:
                type: Texture
                attribute:
                  x: 24
                  y: 470
                  width: 512
                  height: 2
                  normal: ~80,180,255,50
                  through: true

              货币标签:
                type: Text
                attribute:
                  x: 24
                  y: 486
                  texts: "~&f结算货币"
                  fontSize: 30
                  through: true

              货币列表:
                type: VStack
                val: 货币列表
                attribute:
                  x: 24
                  y: 528
                  width: 250
                  height: 150
                  spaceBetween: 6
                children:
                  货币项:
                    type: Texture
                    attribute:
                      entryKey: 0
                      entry: var.currencies[self.entryKey]
                      visible: "self.entry != none"
                      width: 240
                      height: 38
                      normal: "self.entry != none && self.entry['id'] == var.selectedCurrency ? '80,180,255,230' : '65,65,75,200'"
                      hover: ~Frosted:0;255,255,255,180
                      shape: ~round_rect
                      radius: 10
                      texts: "self.entry != none ? self.entry['name'] : ''"
                      center: true
                      fontSize: 24
                    action:
                      clickLeft: |-
                        if(self.entry != none){
                          var.selectedCurrency = self.entry['id']
                        }
                    effect:
                      stroke:
                        width: 1
                        color: ~80,180,255,100

              时长标签:
                type: Text
                attribute:
                  x: 300
                  y: 486
                  texts: "~&f上架时长"
                  fontSize: 30
                  through: true

              时长1天:
                type: Texture
                attribute:
                  x: 300
                  y: 528
                  width: 74
                  height: 40
                  normal: "var.selectedDuration == 86400 ? '80,180,255,230' : '65,65,75,200'"
                  hover: ~Frosted:0;255,255,255,180
                  shape: ~round_rect
                  radius: 10
                  texts: "~&f1天"
                  center: true
                  fontSize: 24
                action:
                  clickLeft: |-
                    var.selectedDuration = 86400
                effect:
                  stroke:
                    width: 1
                    color: ~80,180,255,120

              时长3天:
                type: Texture
                attribute:
                  x: 382
                  y: 528
                  width: 74
                  height: 40
                  normal: "var.selectedDuration == 259200 ? '80,180,255,230' : '65,65,75,200'"
                  hover: ~Frosted:0;255,255,255,180
                  shape: ~round_rect
                  radius: 10
                  texts: "~&f3天"
                  center: true
                  fontSize: 24
                action:
                  clickLeft: |-
                    var.selectedDuration = 259200
                effect:
                  stroke:
                    width: 1
                    color: ~80,180,255,120

              时长7天:
                type: Texture
                attribute:
                  x: 464
                  y: 528
                  width: 74
                  height: 40
                  normal: "var.selectedDuration == 604800 ? '80,180,255,230' : '65,65,75,200'"
                  hover: ~Frosted:0;255,255,255,180
                  shape: ~round_rect
                  radius: 10
                  texts: "~&f7天"
                  center: true
                  fontSize: 24
                action:
                  clickLeft: |-
                    var.selectedDuration = 604800
                effect:
                  stroke:
                    width: 1
                    color: ~80,180,255,120

              时长说明:
                type: Text
                attribute:
                  x: 300
                  y: 580
                  width: 236
                  texts: "~&7选择拍卖持续时间"
                  fontSize: 20
                  through: true

              底部分隔线:
                type: Texture
                attribute:
                  x: 24
                  y: 656
                  width: 512
                  height: 2
                  normal: ~80,180,255,70
                  through: true

              返回按钮:
                type: Texture
                attribute:
                  x: 24
                  y: 672
                  width: 150
                  height: 56
                  normal: ~62,62,74,205
                  hover: ~Frosted:0;255,255,255,180
                  shape: ~round_rect
                  radius: 14
                  texts: "~&f返回"
                  center: true
                  fontSize: 30
                action:
                  clickLeft: |-
                    Screen.open("AXS:market_auction")
                effect:
                  stroke:
                    width: 2
                    color: ~80,180,255,120

              确认上架按钮:
                type: Texture
                attribute:
                  x: 194
                  y: 672
                  width: 342
                  height: 56
                  normal: "var.selectedSlot != none && var.selectedPrice != none && var.selectedPrice != '' ? '60,180,100,200' : '75,75,85,150'"
                  hover: "var.selectedSlot != none && var.selectedPrice != none && var.selectedPrice != '' ? 'Frosted:0;80,220,120,230' : 'Frosted:0;105,105,115,180'"
                  shape: ~round_rect
                  radius: 14
                  texts: "~&f确认上架"
                  center: true
                  fontSize: 30
                action:
                  clickLeft: |-
                    if(var.selectedSlot == none){
                      return
                    }
                    if(var.selectedPrice == none || var.selectedPrice == ''){
                      return
                    }
                    Packet.send(var.packetId, 'auction_list_create', var.selectedSlot, var.selectedPrice, var.selectedMessage, var.selectedDuration, var.selectedCurrency)
                effect:
                  stroke:
                    width: 2
                    color: ~80,255,140,120
