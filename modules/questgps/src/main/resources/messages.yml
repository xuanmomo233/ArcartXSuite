# ============================================================
#  QuestGPS 模块消息文件
# ------------------------------------------------------------
#  支持 & 颜色码（如 &c 红色）和 {0} {1} 占位符。
#  修改后执行 /axs reload questgps 即可生效。
# ============================================================

prefix: "&3◆ &6ArcartXSuite &7| &r"

# ── 通用 ──────────────────────────────────────────────
common:
  service-down: "&cQuestGPS 模块当前未启用。"
  reload-hint: "&e请使用 /{0} reload questgps"
  unknown: "&e未知命令，使用 /{0} questgps help"
  only-player: "&c该命令只能由玩家执行。"
  no-permission: "&c你没有权限执行这个命令。"

# ── help ──────────────────────────────────────────────
help:
  title: "&6QuestGPS 管理命令"
  status: "&7{0} status&f - 查看模块状态"
  open: "&7{0} open <玩家>&f - 为玩家打开导航菜单"

# ── status ────────────────────────────────────────────
status:
  title: "&6QuestGPS 状态"
  configured-quests: "&7配置任务数: &f{0}"
  tracking-players: "&7追踪中: &f{0}"
  nav-ready: "&7导航就绪: &f{0}"

# ── open ──────────────────────────────────────────────
open:
  usage: "&e用法: /axs questgps open <玩家>"
  not-online: "&c玩家不在线: {0}"
  success: "&a已为 {0} 打开导航菜单。"

# ── player-command ─────────────────────────────────────
player:
  usage: "&e用法: /{0} open|cleartrack"
