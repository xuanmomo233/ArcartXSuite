config-version: 1
# ============================================================
#  ArcartXSuite - Essentials 模块配置
#  免费模块：玩家管理 / 传送系统 / 世界管理 / 安全管理
# ============================================================

debug: false

# ─── 玩家管理 ───
player:
  # 默认飞行速度倍率 (1-10)
  default-fly-speed: 1
  # 默认行走速度倍率 (1-10)
  default-walk-speed: 1
  # AFK 自动检测（秒），0 = 禁用
  afk-timeout: 300
  # AFK 后自动踢出（秒），0 = 不踢出
  afk-kick-timeout: 0
  # vanish 隐身时退出消息是否隐藏
  vanish-hide-quit-message: true
  # vanish 隐身时进入消息是否隐藏
  vanish-hide-join-message: true

# ─── 传送系统 ───
teleport:
  # TPA 请求超时（秒）
  tpa-timeout: 60
  # 传送前等待（秒），0 = 立即传送
  teleport-delay: 3
  # 传送等待期间移动是否取消传送
  cancel-on-move: true
  # 最大 Home 数量（默认值，可通过权限覆盖）
  max-homes: 3
  # /back 记录最大深度
  back-stack-size: 5
  # 传送安全检查（避免传送到方块内）
  safe-teleport: true

# ─── 世界管理 ───
world:
  # 允许 /time 和 /weather 的世界列表，空列表 = 所有世界
  allowed-worlds: []

# ─── 安全管理 ───
moderation:
  # 封禁消息
  ban-message: '&c你已被服务器封禁。\n&7原因: {reason}\n&7到期: {expiry}'
  # 踢出消息
  kick-message: '&c你已被踢出服务器。\n&7原因: {reason}'
  # 禁言消息（发给被禁言的玩家）
  mute-message: '&c你已被禁言，无法发送消息。\n&7到期: {expiry}'
  # 最大警告次数，达到后自动封禁（0 = 不自动封禁）
  max-warnings-before-ban: 5
  # 警告过期时间（天），0 = 永不过期
  warning-expire-days: 30

# ─── Sit/Lay ───
interaction:
  # 右键点击楼梯自动坐下
  sit-on-stairs: true
  # 右键点击台阶自动坐下
  sit-on-slabs: false

# ─── 存储 ───
storage:
  # sqlite 或 mysql
  dialect: sqlite
  # SQLite 文件名
  sqlite-file: essentials.db
  # MySQL 配置（dialect 为 mysql 时使用）
  mysql:
    host: localhost
    port: 3306
    database: arcartxsuite
    username: root
    password: ''
    table-prefix: axs_ess_

# ─── 消息 ───
