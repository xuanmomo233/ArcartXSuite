# ArcartXSuite Chat — 物品预览卡片模板
# 玩家在聊天中使用 [item] 时，通过此卡片展示物品
# 悬浮卡片中的物品槽位即可触发 ArcartX Tooltip
卡片根布局:
  type: Card
  attribute:
    width: "self.data['cardWidth'] - 100"
    height: "self.data['cardHeight'] + 0"
  children:
    卡片背景:
      type: Texture
      attribute:
        width: "self.parent.data['cardWidth'] + 0"
        height: "self.parent.data['cardHeight'] + 0"
        normal: ~25,25,35,200
    物品槽位:
      type: Slot
      attribute:
        width: 80
        height: 80
        x: 10
        y: 10
        slotType: ~Icon
        itemScale: 0.8
      action:
        create: |-
          self.setItemIcon(self.parent.data['itemJson'])
    提示覆盖层:
      type: Slot
      attribute:
        width: "self.parent.data['cardWidth'] + 0"
        height: "self.parent.data['cardHeight'] + 0"
        slotType: ~Icon
        alpha: 0.001
      action:
        create: |-
          self.setItemIcon(self.parent.data['itemJson'])
    发送者文字:
      type: Text
      attribute:
        fontSize: 64
        x: 100
        y: 15
        texts: "self.parent.data['senderDisplayName'] + ' §7展示了一件物品'"
        through: true
    物品名称:
      type: Text
      attribute:
        fontSize: 64
        x: 100
        y: 60
        texts: "'§b' + self.parent.data['itemName']"
        through: true
