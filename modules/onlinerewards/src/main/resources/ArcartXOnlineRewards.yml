config-version: 2
# AXS OnlineRewards
# 作用: 统计今日/本周/本月/总在线时长，发放在线阶段奖励；提供签到、连续/累计/每月/节日奖励、补签卡、排行榜和日历 UI；
#       新增周/月累计在线时长奖励、离线时长储蓄、全服签到目标/集体奖励、签到历史回顾。
# 依赖: ArcartX；PlaceholderAPI、Mail 可选。
# 重载: /axs onlinereward reload
# PAPI 输出:
#   %axsonlinerewards_daily_minutes% 今日在线原始分钟数。
#   %axsonlinerewards_weekly_minutes% 本周在线原始分钟数。
#   %axsonlinerewards_monthly_minutes% 本月在线原始分钟数。
#   %axsonlinerewards_total_minutes% 总在线原始分钟数。
#   %axsonlinerewards_daily_time% 今日在线格式化时长。
#   %axsonlinerewards_weekly_time% 本周在线格式化时长。
#   %axsonlinerewards_monthly_time% 本月在线格式化时长。
#   %axsonlinerewards_total_time% 总在线格式化时长。
#   %axsonlinerewards_signin_signed_today% 今日是否已签到。
#   %axsonlinerewards_signin_streak% 当前连续签到天数。
#   %axsonlinerewards_signin_total% 累计签到天数。
#   %axsonlinerewards_signin_history_yyyy-MM_count% 指定月份签到天数。
#   %axsonlinerewards_offline_savings_minutes% 离线储蓄分钟数。
#   %axsonlinerewards_offline_savings_time% 离线储蓄格式化时长。
#   %axsonlinerewards_server_signin_count% 今日已签到人数。
#   %axsonlinerewards_server_signin_next_goal% 下一个全服签到目标所需人数（0 表示无目标）。
#   %axsonlinerewards_top_daily_<rank>_name% 日榜 Top1-10 玩家名。
#   %axsonlinerewards_top_daily_<rank>_minutes% 日榜 Top1-10 分钟数。
#   %axsonlinerewards_top_daily_<rank>_time% 日榜 Top1-10 格式化时长。
#   %axsonlinerewards_top_weekly_<rank>_name% 周榜 Top1-10 玩家名。
#   %axsonlinerewards_top_weekly_<rank>_minutes% 周榜 Top1-10 分钟数。
#   %axsonlinerewards_top_weekly_<rank>_time% 周榜 Top1-10 格式化时长。
#   %axsonlinerewards_top_monthly_<rank>_name% 月榜 Top1-10 玩家名。
#   %axsonlinerewards_top_monthly_<rank>_minutes% 月榜 Top1-10 分钟数。
#   %axsonlinerewards_top_monthly_<rank>_time% 月榜 Top1-10 格式化时长。
#   %axsonlinerewards_top_total_<rank>_name% 总榜 Top1-10 玩家名。
#   %axsonlinerewards_top_total_<rank>_minutes% 总榜 Top1-10 分钟数。
#   %axsonlinerewards_top_total_<rank>_time% 总榜 Top1-10 格式化时长。
# 可消费的 PAPI: 无直接 PAPI 条件；倍率和额外签到奖励通过权限节点匹配。
# 关联资源: ui/online_rewards_menu.yml；可联动 Mail 的 mail/presets/*.yml。

settings:
  # 是否输出详细调试日志
  debug: false

  # 玩家客户端初始化完成后，延迟多少 tick 再推送在线奖励进度变量
  client-sync-delay-ticks: 50

messages:
  # 今日在线阶段全部完成后的客户端标题文案
  done: "§c所有阶段已领取"

variables:
  # 推送给 ArcartX 客户端的进度变量名，值为 0.0 ~ 1.0
  progress: "arcartx_online_time"

  # 推送给 ArcartX 客户端的标题变量名，值为当前阶段名称或完成文案
  title: "arcartx_online_time_title"

ui:
  # OnlineRewards 菜单 UI ID；/onlinerewards open 或 /onlinerewards 会打开该界面。
  # 支持字符串（单 UI）或列表（多 UI 同时发包）：
  # menu-ui-id: "AXS:online_rewards_menu"
  # 多 UI 示例（同一个 payload 同时发给多个 UI）：
  # menu-ui-id:
  #   - "AXS:online_rewards_menu"
  #   - "AXS:online_rewards_menu_alt"
  menu-ui-id: AXS:online_rewards_menu

  # 客户端按钮回包 ID；需与 online_rewards_menu.yml 中 Packet.send 的第一个参数一致。
  packet-id: AXS_ONLINE_REWARDS

  # 模块启用时是否自动注册默认 UI。
  register-ui-on-enable: true

  # 是否用内置 online_rewards_menu.yml 覆盖已导出的 plugins/ArcartXSuite/ui/online_rewards_menu.yml。
  overwrite-ui-files: false

time-bonus:
  # 玩家拥有对应权限时，在线计时按 multiplier 倍数累计；匹配多个权限时取 priority 最高的一组。
  permission-groups:
    - permission: "ArcartXSuite.onlinerewards.time.1_5"
      multiplier: 1.5
      priority: 10
    - permission: "ArcartXSuite.onlinerewards.time.2"
      multiplier: 2.0
      priority: 20

storage:
  # 存储模式: sqlite 本地文件；mysql 远程 MySQL。
  mode: "sqlite"

  sqlite:
    # SQLite 文件会创建在插件数据目录下
    file: "online-rewards.db"

  mysql:
    host: "127.0.0.1"
    port: 3306
    database: "arcartxsuite"
    username: "root"
    password: ""

  # 连接池大小，在线人数较多时可适当提高
  pool-size: 2

# 跨服同步：签到/补签/管理员操作后通知其他子服刷新；连接参数见宿主 config.yml cross-server 节
# 前提: storage.mode 必须设为 mysql (共享数据库)，否则跨服通知无意义。
cross-server:
  enabled: false

# 签到配置文件路径，相对模块数据目录。
sign-in-file: "sign-in.yml"

# 在线阶段奖励文件路径，相对模块数据目录。
rewards-file: "rewards.yml"

# 每周累计在线时长奖励。每周期自动重置，repeat: true 表示每周期都可重复领取一次。
weekly-rewards:
  - id: "weekly_2h"
    minutes: 120
    name: "本周活跃 2 小时"
    rewardText: ""
    commands: []
    mail-presets: []
    repeat: false
  - id: "weekly_5h"
    minutes: 300
    name: "本周活跃 5 小时"
    rewardText: ""
    commands: []
    mail-presets: []
    repeat: false

# 每月累计在线时长奖励。
monthly-rewards:
  - id: "monthly_10h"
    minutes: 600
    name: "本月活跃 10 小时"
    rewardText: ""
    commands: []
    mail-presets: []
    repeat: false
  - id: "monthly_30h"
    minutes: 1800
    name: "本月活跃 30 小时"
    rewardText: ""
    commands: []
    mail-presets: []
    repeat: false

# 离线时长储蓄：下线时按 storage-rate 比例存储当日已在线时长，次日登录时作为初始在线时长加成。
# 每日上限 max-minutes 分钟；expire-days 保留用于未来扩展（当前跨天自动清零）。
offline-savings:
  enabled: true
  max-minutes: 120
  storage-rate: 1.0
  expire-days: 1

# 全服签到目标/集体奖励。每当玩家签到时统计今日签到人数，达到目标后给所有在线玩家发奖励。
server-sign-in-goal:
  enabled: true
  broadcast: true
  targets:
    - id: "goal_10"
      required: 10
      name: "今日 10 人签到"
      rewardText: ""
      commands: []
      mail-presets: []
      chat-cards: []
      subtitle-groups: []
      title-ids: []
      broadcast: "§e[全服签到] §f今日 10 人签到 §7已达成！"
    - id: "goal_50"
      required: 50
      name: "今日 50 人签到"
      rewardText: ""
      commands: []
      mail-presets: []
      chat-cards: []
      subtitle-groups: []
      title-ids: []
      broadcast: "§e[全服签到] §f今日 50 人签到 §7已达成！"
