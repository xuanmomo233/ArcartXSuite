# AfkReward 配置迁移: 2 -> 3
# areas 节从主配置移除，改为独立区域配置文件 (data/afkreward/areas/area-*.yml)

from-version: 2
to-version: 3
description: "移除主配置内联 areas，改用 areas-directory 指向区域文件目录"

operations:
  - type: remove
    path: areas
  - type: set-if-missing
    path: areas-directory
    value: "afkreward/areas"
