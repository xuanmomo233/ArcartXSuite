# AXS pickup_hud; version=5; maxVisible=4; ttlMs=3000
ui:
  isHud: true
  defaultOpen: false
  through: false
  background: false
  closeDied: false
  show: true
  level: 10
  packetHandler:
    pick: |-
      var.now = Time.currentTime()
      e3 = var.entries['3']
      e2 = var.entries['2']
      e1 = var.entries['1']
      var.entries['4'] = e3 != null ? {'displayName': e3['displayName'], 'amount': e3['amount'], 'material': e3['material'], 'itemJson': e3['itemJson'], 'createdAt': e3['createdAt'], 'visible': e3['visible']} : null
      var.entries['3'] = e2 != null ? {'displayName': e2['displayName'], 'amount': e2['amount'], 'material': e2['material'], 'itemJson': e2['itemJson'], 'createdAt': e2['createdAt'], 'visible': e2['visible']} : null
      var.entries['2'] = e1 != null ? {'displayName': e1['displayName'], 'amount': e1['amount'], 'material': e1['material'], 'itemJson': e1['itemJson'], 'createdAt': e1['createdAt'], 'visible': e1['visible']} : null
      var.entries['1'] = {'displayName': packet['displayName'], 'amount': packet['amount'], 'material': packet['material'], 'itemJson': packet['itemJson'], 'createdAt': var.now, 'visible': true}
  action:
    load: |-
      var.entries = {}
      var.entryTtlMs = 3000
      var.now = 0
    tick: |-
      var.now = Time.currentTime()
      for(i in range(1,5)){
        key = i + ''
        entry = var.entries[key]
        if(entry != null && entry['visible'] && (var.now - entry['createdAt']) >= var.entryTtlMs){
          entry['visible'] = false
          var.entries[key] = entry
        }
      }

controls:
  adaptive:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      pickup_stack:
        type: VStack
        attribute:
          point: ~bottom_right
          x: -210
          y: -120
          spaceBetween: 8
        children:
          pickup_entry:
            type: Canvas
            attribute:
              entry: var.entries[self.key]
              visible: self.entry != null && self.entry['visible']
              width: 240
              height: 60
            children:
              background:
                type: Texture
                attribute:
                  point: ~stretch_all
                  normal: ~Frosted:30;95,95,95,220
                  shape: ~round_rect
                  radius: 16
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              slot:
                type: Slot
                attribute:
                  point: ~middle_left
                  x: 10
                  y: 0
                  width: 40
                  height: 40
                  slotType: ~Icon
                  normal: ~0,0,0,0
                  hover: ~0,0,0,0
                  itemScale: 0.85
                  seticon: "self.setItemIcon(self.parent.entry['itemJson'])"
                action:
                  create: |-
                    self.seticon()
              text:
                type: Text
                attribute:
                  point: ~middle_left
                  x: 60
                  y: 0
                  texts: "self.parent.entry['displayName'] + ' &fx' + self.parent.entry['amount'].round()"
                  fontSize: 36
      pickup_observer:
        type: Observer
        attribute:
          target: val.pickup_stack['pickup_entry']
          subscribe: var.entries
          maxSize: 4
