# ArcartXEntityTracker Boss Tracker HUD
# AXS 资源说明
# 用途: EntityTracker 模块默认 HUD 模板，负责展示 Boss 血条、目标信息与伤害排行。
# 前置依赖: ArcartX、MythicMobs / MythicBukkit；EntityTracker 模块启用后会自动导出到 plugins/ArcartXSuite/ui。
# 启用开关: config.yml -> modules.entitytracker.enabled + modules.entitytracker.password
# 关联文件: ArcartXEntityTracker.yml
# 重载命令: /axs entitytracker reload
# 最小使用路径: ui + controls
# 结构提示: packetHandler 接收 Boss 快照；controls 只保留一个血条卡片模板，运行时按 Boss 数量 copy 生成卡片。

ui:
  isHud: true
  through: false
  background: false
  closeDied: true
  show: true
  level: 2
  screenScale: true
  defaultOpen: false
  hide:
    - boss_event_progress
  # packetHandler 负责接收服务端下发的数据包并刷新本地血条卡片。
  # 服务端仍然按 slot1_ / slot2_ ... 的扁平字段下发每条 Boss 的数据，
  # 这里不再为固定 5 个槽位硬编码控件，而是参考 tab.yml 的做法：
  # 只保留一个「血条卡片模板」，每次收到数据包就按 bossCount 复制出对应数量的卡片。
  packetHandler:
    # init 会在 HUD 首次打开时执行一次。
    init: |-
      var.isVisible = true
      var.bossCount = packet.get('bossCount')
      var.totalBossCount = packet.get('totalBossCount')
      var.maxVisibleBars = packet.get('maxVisibleBars')
      // 轮次自增，配合唯一命名，规避 ax 控件复制/删除的缓存 BUG。
      var.刷新轮次 = var.刷新轮次 + 1
      // 先清掉上一轮复制出来的卡片，保留索引 0 的模板本体。
      while(val.血条容器.childrenCount() > 1){
        val.血条容器.get(1).remove()
      }
      // 按 Boss 数量逐条复制卡片，并把该槽位的数据写入卡片子控件。
      i = 1
      while(i <= var.bossCount){
        卡片 = val.卡片模板.copy('boss卡片_' + var.刷新轮次 + '_' + i)
        进度 = packet.get('slot' + i + '_progress')
        卡片['Boss标题文字'].texts = packet.get('slot' + i + '_title')
        卡片['数值说明文字'].texts = '&8' + packet.get('slot' + i + '_distanceText') + '  R' + packet.get('slot' + i + '_viewerRankText') + '  ' + packet.get('slot' + i + '_viewerDamageText')
        卡片['血条文字'].texts = '&f' + packet.get('slot' + i + '_healthText') + '/' + packet.get('slot' + i + '_maxHealthText')
        卡片['血条层a'].width = 480 * 进度
        卡片['血条层a'].visible = 进度 > 0
        卡片['血条层b'].width = 480 * 进度
        卡片['血条层b'].visible = 进度 > 0.2
        卡片['血条层c'].width = 480 * 进度
        卡片['血条层c'].visible = 进度 > 0.4
        卡片['血条层d'].width = 480 * 进度
        卡片['血条层d'].visible = 进度 > 0.6
        卡片['血条层e'].width = 480 * 进度
        卡片['血条层e'].visible = 进度 > 0.8
        卡片.visible = true
        i++
      }
    # update 在刷新周期内持续触发，逻辑与 init 完全一致：整体重建卡片，保证数据最新。
    update: |-
      var.isVisible = true
      var.bossCount = packet.get('bossCount')
      var.totalBossCount = packet.get('totalBossCount')
      var.maxVisibleBars = packet.get('maxVisibleBars')
      var.刷新轮次 = var.刷新轮次 + 1
      while(val.血条容器.childrenCount() > 1){
        val.血条容器.get(1).remove()
      }
      i = 1
      while(i <= var.bossCount){
        卡片 = val.卡片模板.copy('boss卡片_' + var.刷新轮次 + '_' + i)
        进度 = packet.get('slot' + i + '_progress')
        卡片['Boss标题文字'].texts = packet.get('slot' + i + '_title')
        卡片['数值说明文字'].texts = '&8' + packet.get('slot' + i + '_distanceText') + '  R' + packet.get('slot' + i + '_viewerRankText') + '  ' + packet.get('slot' + i + '_viewerDamageText')
        卡片['血条文字'].texts = '&f' + packet.get('slot' + i + '_healthText') + '/' + packet.get('slot' + i + '_maxHealthText')
        卡片['血条层a'].width = 480 * 进度
        卡片['血条层a'].visible = 进度 > 0
        卡片['血条层b'].width = 480 * 进度
        卡片['血条层b'].visible = 进度 > 0.2
        卡片['血条层c'].width = 480 * 进度
        卡片['血条层c'].visible = 进度 > 0.4
        卡片['血条层d'].width = 480 * 进度
        卡片['血条层d'].visible = 进度 > 0.6
        卡片['血条层e'].width = 480 * 进度
        卡片['血条层e'].visible = 进度 > 0.8
        卡片.visible = true
        i++
      }
    # close 在 HUD 被服务端主动关闭时执行：清零计数并移除所有复制出来的卡片。
    close: |-
      var.isVisible = false
      var.bossCount = 0
      var.totalBossCount = 0
      while(val.血条容器.childrenCount() > 1){
        val.血条容器.get(1).remove()
      }
  action:
    load: |-
      var.isVisible = false
      var.bossCount = 0
      var.totalBossCount = 0
      var.maxVisibleBars = 0
      var.刷新轮次 = 0
# controls 为主要可视控件区块，可在此调整布局、材质与文本绑定。
controls:
  自适应全局布局:
    type: adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    action:
      # create 会在 HUD 控件第一次创建时执行，准备好本地变量默认值，
      # 避免 HUD 刚打开但服务端数据包还没到时出现脏数据。
      create: |-
        var.isVisible = false
        var.bossCount = 0
        var.totalBossCount = 0
        var.maxVisibleBars = 0
        var.刷新轮次 = 0
    children:
      首领追踪标题文字:
        type: text
        attribute:
          point: ~top_center
          x: 0
          y: 32
          texts: "'&f首领追踪 &8' + var.bossCount.round() + '/' + var.totalBossCount.round()"
          fontSize: 36
          visible: var.isVisible
      血条排列布局:
        type: Vstack
        val: 血条容器
        attribute:
          point: ~top_center
          x: -240
          y: 58
          spaceBetween: 8
          visible: var.isVisible
        children:
          # 血条卡片模板：唯一的一份硬编码卡片，运行时被复制。
          # 自身 visible=false，永不直接显示；复制体在 packetHandler 中被置为可见并填充数据。
          Boss血条卡片模板:
            type: canvas
            val: 卡片模板
            attribute:
              width: 480
              height: 58
              visible: false
            children:
              Boss标题文字:
                type: text
                attribute:
                  point: ~top_left
                  x: 0
                  y: 0
                  texts: "''"
                  fontSize: 36
              数值说明文字:
                type: text
                attribute:
                  point: ~top_right
                  x: 0
                  y: 4
                  texts: "''"
                  fontSize: 24
              血条底框:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: 480
                  height: 22
                  normal: ~30,30,30,220
                  shape: ~round_rect
                  radius: 11
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              血条层a:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: 0
                  height: 22
                  normal: ~140,60,60,255
                  shape: ~round_rect
                  radius: 11
                  visible: false
              血条层b:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: 0
                  height: 22
                  normal: ~180,50,50,255
                  shape: ~round_rect
                  radius: 11
                  visible: false
              血条层c:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: 0
                  height: 22
                  normal: ~200,40,40,255
                  shape: ~round_rect
                  radius: 11
                  visible: false
              血条层d:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: 0
                  height: 22
                  normal: ~220,35,35,255
                  shape: ~round_rect
                  radius: 11
                  visible: false
              血条层e:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: 0
                  height: 22
                  normal: ~240,30,30,255
                  shape: ~round_rect
                  radius: 11
                  visible: false
              血条文字:
                type: text
                attribute:
                  point: ~top_center
                  x: 0
                  y: 27
                  texts: "''"
                  fontSize: 36
