# AXS 资源说明
# 用途: Conversation 模块默认对话 Menu，负责显示 NPC 正文与玩家回复。
# 前置依赖: ArcartX、Chemdah、Adyeshach；Conversation 模块启用后会自动注册或导出。
# 启用开关: config.yml -> modules.conversation.enabled + modules.conversation.password
# 关联文件: ArcartXConversation.yml、ui/conversation_selector_hud.yml
# 重载命令: /axs conversation reload
# 最小使用路径: ui + controls
# 结构提示: 顶层 ui 节点定义菜单行为；packetHandler 处理对话数据包；controls 定义说话人、正文和回复列表。
# 服务端 sync 字段:
#   token, packetId, speakerName, messageLines, hintText, canReply,
#   selectedReplyId, selectedReplyIndex, replyCount, replyScrollRatio, replyRows
# replyRows 单行字段:
#   id, text, replyType, selected, index
# 客户端回包:
#   select_reply
# 回包格式:
#   action, token, targetId

ui:
  isHud: false
  defaultOpen: false
  through: false
  escClose: true
  background: false
  closeDied: true
  show: true
  screenScale: true
  packetHandler:
    sync: |-
      var.token = packet['token']
      var.packetId = packet['packetId']
      var.speakerName = packet['speakerName']
      var.messageLines = packet['messageLines']
      var.hintText = packet['hintText']
      var.canReply = packet['canReply']
      var.selectedReplyId = packet['selectedReplyId']
      var.selectedReplyIndex = packet['selectedReplyIndex']
      var.replyCount = packet['replyCount']
      var.replyScrollRatio = packet['replyScrollRatio']
      var.replyRows = packet['replyRows']
      if(var.canReply == false){
        async{
          Thread.sleep(1500)
          if(var.canReply == false){
            Screen.close()
          }
        }
      }
    close: |-
      var.token = ''
      var.packetId = packet['packetId'] == null ? '' : packet['packetId']
      var.speakerName = ''
      var.messageLines = []
      var.hintText = ''
      var.canReply = false
      var.selectedReplyId = ''
      var.selectedReplyIndex = -1
      var.replyCount = 0
      var.replyScrollRatio = 0
      var.replyRows = {}
      Screen.close()
  action:
    load: |-
      var.token = ''
      var.packetId = ''
      var.speakerName = ''
      var.messageLines = []
      var.hintText = ''
      var.canReply = false
      var.selectedReplyId = ''
      var.selectedReplyIndex = -1
      var.replyCount = 0
      var.replyScrollRatio = 0
      var.replyRows = {}
    close: |-
      var.replyRows = {}
    keyPress: |-
      var.k = self.currentKeyPress
      if(var.k == "1" && var.replyRows['r0000'] != null){
        Chat.say("/session reply " + var.replyRows['r0000']['id'])
      }elif(var.k == "2" && var.replyRows['r0001'] != null){
        Chat.say("/session reply " + var.replyRows['r0001']['id'])
      }elif(var.k == "3" && var.replyRows['r0002'] != null){
        Chat.say("/session reply " + var.replyRows['r0002']['id'])
      }elif(var.k == "4" && var.replyRows['r0003'] != null){
        Chat.say("/session reply " + var.replyRows['r0003']['id'])
      }elif(var.k == "5" && var.replyRows['r0004'] != null){
        Chat.say("/session reply " + var.replyRows['r0004']['id'])
      }elif(var.k == "6" && var.replyRows['r0005'] != null){
        Chat.say("/session reply " + var.replyRows['r0005']['id'])
      }elif(var.k == "7" && var.replyRows['r0006'] != null){
        Chat.say("/session reply " + var.replyRows['r0006']['id'])
      }elif(var.k == "8" && var.replyRows['r0007'] != null){
        Chat.say("/session reply " + var.replyRows['r0007']['id'])
      }elif(var.k == "9" && var.replyRows['r0008'] != null){
        Chat.say("/session reply " + var.replyRows['r0008']['id'])
      }
controls:
  adaptive:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      dialog_root:
        type: Canvas
        attribute:
          point: ~bottom_center
          x: 0
          y: -44
          width: 1420
          height: 372
        children:
          panel:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: ~100,100,100,255
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          header_name:
            type: Text
            attribute:
              point: ~top_left
              x: 28
              y: 22
              texts: "'&0' + var.speakerName"
              fontSize: 64
          header_index:
            type: Text
            attribute:
              point: ~top_right
              x: -148
              y: 10
              texts: 
                - "~&0鼠标首次点击选中，再次点击进行回复"
                - "~&0点击键盘上方数字键1-9直接回复选项1-9"
              fontSize: 36
              lineSpace: 8
          close_button:
            type: Texture
            attribute:
              point: ~top_right
              x: -28
              y: 15
              width: 84
              height: 34
              normal: ~150,150,150,255
              hover: ~200,200,200,255
              shape: ~round_rect
              radius: 12
              texts: "~&0关闭"
              center: true
              fontSize: 36
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            action:
              clickLeft: |-
                Screen.close()
          message_panel:
            type: Texture
            attribute:
              point: ~top_left
              x: 24
              y: 58
              width: 900
              height: 288
              normal: ~120,120,120,200
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          message_text:
            type: Text
            attribute:
              point: ~top_left
              x: 46
              y: 78
              width: 858
              texts: "var.messageLines"
              fontSize: 49
          reply_panel:
            type: Texture
            attribute:
              point: ~top_right
              x: -24
              y: 58
              width: 446
              height: 288
              normal: ~120,120,120,200
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          reply_empty:
            type: Text
            attribute:
              point: ~middle_center
              x: 474
              y: 40
              visible: var.replyCount <= 0
              texts: "~&7当前没有可选回复"
              fontSize: 81
          reply_scroll:
            type: Scroll
            attribute:
              point: ~top_right
              x: -44
              y: 78
              width: 398
              height: 248
              moveY: var.replyScrollRatio
            action:
              wheel: |-
                var.step = 0.16
                if(self.wheelValue > 0){
                  var.replyScrollRatio = Math.max(0, var.replyScrollRatio - var.step)
                }elif(self.wheelValue < 0){
                  var.replyScrollRatio = Math.min(1, var.replyScrollRatio + var.step)
                }
            children:
              reply_stack:
                val: reply_list
                type: VStack
                attribute:
                  width: 394
                  spaceBetween: 8
                children:
                  reply_000:
                    type: Texture
                    attribute:
                      visible: "var.replyRows['r0000'] != null"
                      entry: "var.replyRows['r0000'] != null ? var.replyRows['r0000'] : null"
                      replyId: "var.replyRows['r0000'] != null ? var.replyRows['r0000']['id'] : ''"
                      width: 394
                      height: 42
                      normal: ~150,150,150,200
                      shape: ~round_rect
                      radius: 10
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    action:
                      clickLeft: |-
                        if(self.entry != null){
                          if(self.entry['selected']){
                            Chat.say("/session reply {self.replyId}")
                          }else{
                            Packet.send(var.packetId, 'select_reply', var.token, self.entry['id'])
                          }
                        }
                    children:
                      selected_overlay:
                        type: Texture
                        attribute:
                          visible: "self.parent.entry != null ? self.parent.entry['selected'] : false"
                          width: 394
                          height: 42
                          normal: ~200,200,200,200
                          shape: ~round_rect
                          radius: 10
                          through: true
                        effect:
                          stroke:
                            width: 2
                            color: ~0,0,0,255
                      reply_text:
                        type: Text
                        attribute:
                          point: ~middle_left
                          x: 10
                          y: 10
                          texts: "self.parent.entry != null ? self.parent.entry['text'] : ''"
                          fontSize: 49
                          through: true
                      reply_index:
                        type: Text
                        attribute:
                          x: 300
                          y: 12
                          realtext: "self.parent.entry != null ? '&8选项：' + (self.parent.entry['index']+1).round() : ''"
                          texts: "self.realtext"
