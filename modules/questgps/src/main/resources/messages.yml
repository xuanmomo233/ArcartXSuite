  status: "&7{0} status&f - 查看模块状态"
  open: "&7{0} open <玩家>&f - 为玩家打开导航菜单"

# ── status ────────────────────────────────────────────
status:
  title: "&6QuestGPS 状态"
  configured-quests: "&7配置任务数: &f{0}"
  tracking-players: "&7追踪中: &f{0}"
  nav-ready: "&7导航就绪: &f{0}"

# ── open ──────────────────────────────────────────────
open:
  usage: "&e用法: /axs questgps open <玩家>"
  not-online: "&c玩家不在线: {0}"
  success: "&a已为 {0} 打开导航菜单。"

# ── player-command ─────────────────────────────────────
player:
  usage: "&e用法: /{0} open|cleartrack"
