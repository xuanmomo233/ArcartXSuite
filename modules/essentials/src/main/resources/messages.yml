# ── status ────────────────────────────────────────────
status:
  title: "&6Essentials 模块状态"
  service: "&7服务: &f{0}"
  running: "运行中"
  stopped: "未启动"
  storage: "&7存储: &f{0}"
  afk-timeout: "&7AFK 超时: &f{0}s"
  teleport-delay: "&7传送延迟: &f{0}s"
  max-homes: "&7最大 Home: &f{0}"

# ── reload ────────────────────────────────────────────
reload:
  success: "&aEssentials 模块已重载。"
  failed: "&c重载失败: {0}"

# ── admin ─────────────────────────────────────────────
admin:
