controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      根面板:
        type: Texture
        attribute:
          point: ~middle_center
          width: 1520
          height: 900
          normal: ~95,95,95,220
          shape: ~round_rect
          radius: 28
        effect:
          stroke:
            width: 2
            color: ~80,180,255,180
          shadow:
            xOffset: 2
            yOffset: 2
            blur: 5
            color: ~255,255,255,75
          ripple:
            duration: 1200
            color: ~255,255,255,110
            width: 0.05
        children:
          标题:
            type: Text
            attribute:
              x: 40
              y: 30
              fontSize: 81
              texts: '&f&l称号总览'
          统计摘要:
            type: Text
            attribute:
              x: 40
              y: 82
              fontSize: 36
              texts: "'&0已拥有: &0' + var.ownedCount.round() + '   &0已隐藏: &0' + var.hiddenCount.round() + '   &0已装备: &0' + var.equippedCount.round()"
          展示称号预览:
            type: Text
            attribute:
              x: 40
              y: 108
              fontSize: 36
              texts: "'&0总展示称号: &0' + (var.displayTitleName == '' ? '无' : var.displayTitleName)"

          # ========== 左侧栏 ==========
          左侧面板:
            type: Texture
            attribute:
              x: 40
              y: 140
              width: 420
              height: 720
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          全部模式:
            type: Texture
            attribute:
              x: 56
              y: 156
              width: 120
              height: 40
              normal: "var.filterMode == 'all' ? '120,190,255,230' : '100,100,100,200'"
              shape: ~round_rect
              radius: 12
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            action:
              clickLeft: |-
                var.filterMode = 'all'
            children:
              全部模式文字:
                type: Text
                attribute:
                  x: 60
                  y: 10
                  through: true
                  center: true
                  fontSize: 36
                  texts: '&0全部'
          已拥有模式:
            type: Texture
            attribute:
              x: 188
              y: 156
              width: 120
              height: 40
              normal: "var.filterMode == 'owned' ? '100,200,130,230' : '100,100,100,200'"
              shape: ~round_rect
              radius: 12
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            action:
              clickLeft: |-
                var.filterMode = 'owned'
            children:
              已拥有模式文字:
                type: Text
                attribute:
                  x: 60
                  y: 10
                  through: true
                  center: true
                  fontSize: 36
                  texts: '&0已拥有'
          已隐藏模式:
            type: Texture
            attribute:
              x: 320
              y: 156
              width: 120
              height: 40
              normal: "var.filterMode == 'hidden' ? '200,150,80,230' : '100,100,100,200'"
              shape: ~round_rect
              radius: 12
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            action:
              clickLeft: |-
                var.filterMode = 'hidden'
            children:
              已隐藏模式文字:
                type: Text
                attribute:
                  x: 60
                  y: 10
                  through: true
                  center: true
                  fontSize: 36
                  texts: '&0已隐藏'
          分组标签:
            type: Text
            attribute:
              x: 56
              y: 206
              fontSize: 36
              texts: '&0分组筛选'
          分组滑块:
            type: Texture
            val: 分组滑块
            attribute:
              x: 56
              y: 270
              width: 60
              height: 6
              normal: ~120,120,120,200
              maxDragX: 280
          分组滚动区:
            type: Scroll
            attribute:
              x: 56
              y: 238
              width: 388
              height: 36
              moveX: "self.parent['分组滑块'].getDragXRatio()"
            action:
              wheel: |-
                if(self.moveX >= 0 && self.wheelValue > 0){
                  self.parent['分组滑块'].setDragXRatio((self.moveX - self.wheelValue * 0.1).round(1))
                }
                if(self.moveX <= 1 && self.wheelValue < 0){
                  self.parent['分组滑块'].setDragXRatio((self.moveX - self.wheelValue * 0.1).round(1))
                }
            children:
              分组列表:
                val: group_list
                type: HStack
                attribute:
                  height: 36
                  spaceBetween: 10
                action:
                  create: |-
                    for(i in range(0, 64)){
                      item = self['分组模板'].copy('分组项' + i.round)
                      item.entryKey = ''
                    }
                children:
                  分组模板:
                    type: Texture
                    attribute:
                      entryKey: ''
                      entry: var.groups[self.entryKey]
                      width: 100
                      height: 36
                      normal: "var.filterGroup == self.entryKey ? '120,190,255,230' : '145,145,145,255'"
                      shape: ~round_rect
                      radius: 12
                      visible: self.entryKey != '' && self.entry != null
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    action:
                      clickLeft: |-
                        var.filterGroup = self.entryKey
                    children:
                      分组模板文字:
                        type: Text
                        attribute:
                          x: 50
                          y: 8
                          through: true
                          center: true
                          fontSize: 36
                          texts: "self.parent.entry != null ? self.parent.entry['name'] : ''"
          品质标签:
            type: Text
            attribute:
              x: 56
              y: 286
              fontSize: 36
              texts: '&0品质筛选'
          品质滑块:
            type: Texture
            val: 品质滑块
            attribute:
              x: 56
              y: 350
              width: 60
              height: 6
              normal: ~120,120,120,200
              maxDragX: 280
          品质滚动区:
            type: Scroll
            attribute:
              x: 56
              y: 318
              width: 388
              height: 36
              moveX: "self.parent['品质滑块'].getDragXRatio()"
            action:
              wheel: |-
                if(self.moveX >= 0 && self.wheelValue > 0){
                  self.parent['品质滑块'].setDragXRatio((self.moveX - self.wheelValue * 0.1).round(1))
                }
                if(self.moveX <= 1 && self.wheelValue < 0){
                  self.parent['品质滑块'].setDragXRatio((self.moveX - self.wheelValue * 0.1).round(1))
                }
            children:
              品质列表:
                val: quality_list
                type: HStack
                attribute:
                  height: 36
                  spaceBetween: 10
                action:
                  create: |-
                    for(i in range(0, 64)){
                      item = self['品质模板'].copy('品质项' + i.round)
                      item.entryKey = ''
                    }
                children:
                  品质模板:
                    type: Texture
                    attribute:
                      entryKey: ''
                      entry: var.qualities[self.entryKey]
                      width: 100
                      height: 36
                      normal: "var.filterQuality == self.entryKey ? '200,150,80,230' : '145,145,145,255'"
                      shape: ~round_rect
                      radius: 12
                      visible: self.entryKey != '' && self.entry != null
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    action:
                      clickLeft: |-
                        var.filterQuality = self.entryKey
                    children:
                      品质模板文字:
                        type: Text
                        attribute:
                          x: 50
                          y: 8
                          through: true
                          center: true
                          fontSize: 36
                          texts: "self.parent.entry != null ? self.parent.entry['name'] : ''"
          称号列表标签:
            type: Text
            attribute:
              x: 56
              y: 366
              fontSize: 36
              texts: '&0称号列表'
          称号滑块:
            type: Texture
            val: 称号滑块
            attribute:
              x: 442
              y: 410
              width: 6
              height: 50
              normal: ~120,120,120,200
              maxDragY: 390
          称号滚动区:
            type: Scroll
            attribute:
              x: 56
              y: 400
              width: 388
              height: 440
              moveY: "self.parent['称号滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['称号滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['称号滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              称号列表:
                val: title_list
                type: VStack
                attribute:
                  width: 372
                  spaceBetween: 8
                action:
                  create: |-
                    for(i in range(0, 200)){
                      item = self['称号模板'].copy('称号项' + i.round)
                      item.entryKey = ''
                    }
                children:
                  称号模板:
                    type: Texture
                    attribute:
                      entryKey: ''
                      entry: var.titles[self.entryKey]
                      width: 372
                      height: 64
                      normal: "self.entry != null && self.entry['selected'] ? '120,190,255,230' : '145,145,145,255'"
                      shape: ~round_rect
                      radius: 14
                      visible: "self.entryKey != '' && self.entry != null && (var.filterMode == 'all' || (var.filterMode == 'owned' && self.entry['owned']) || (var.filterMode == 'hidden' && self.entry['hidden'])) && (var.filterGroup == 'all' || var.filterGroup == self.entry['group_id']) && (var.filterQuality == 'all' || var.filterQuality == self.entry['quality_id'])"
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    action:
                      clickLeft: |-
                        Packet.send('AXS_TITLE_MENU', 'select', self.entryKey)
                    children:
                      称号名称:
                        type: Text
                        attribute:
                          x: 12
                          y: 8
                          width: 324
                          fontSize: 48
                          texts: "self.parent.entry['display_name']"
                          through: true
                      称号状态:
                        type: Text
                        attribute:
                          x: 12
                          y: 36
                          width: 324
                          fontSize: 36
                          texts: "self.parent.entry['quality_name'] + ' &0/ &f' + self.parent.entry['group_name'] + ' &0/ &f' + self.parent.entry['remaining_text']"
                          through: true
                      装备标记:
                        type: Text
                        attribute:
                          x: 336
                          y: 14
                          width: 28
                          fontSize: 48
                          texts: '&a✔'
                          visible: self.parent.entry != null && self.parent.entry['equipped']
                          through: true

          # ========== 中间栏 ==========
          中间面板:
            type: Texture
            attribute:
              x: 480
              y: 140
              width: 540
              height: 720
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          详情标题:
            type: Text
            attribute:
              x: 504
              y: 160
              fontSize: 49
              texts: "var.selectedName == '' ? '&0未选择称号' : var.selectedName"
          详情副标题:
            type: Text
            attribute:
              x: 504
              y: 196
              fontSize: 36
              texts: "var.selectedKindText == '' ? '' : '&0' + var.selectedKindText + '    &0分组: &0' + var.selectedGroupName + '    &0品质: &0' + var.selectedQualityName"
          分割线:
            type: Texture
            attribute:
              x: 480
              y: 225
              width: 540
              height: 2
              normal: ~0,0,0,100
          详情滑块:
            type: Texture
            val: 详情滑块
            attribute:
              x: 1000
              y: 240
              width: 6
              height: 50
              normal: ~120,120,120,200
              maxDragY: 550
          详情滚动区:
            type: Scroll
            attribute:
              x: 504
              y: 240
              width: 492
              height: 600
              moveY: "self.parent['详情滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['详情滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
