# AXS pickup_hud; version=5; maxVisible=4; ttlMs=3000
ui:
  isHud: true
  defaultOpen: false
  through: false
  background: false
  closeDied: false
  show: true
  level: 10
  packetHandler:
    pick: |-
      var.now = Time.currentTime()
      var.entry4Visible = var.entry3Visible
      var.entry4CreatedAt = var.entry3CreatedAt
      var.entry4DisplayName = var.entry3DisplayName
      var.entry4Amount = var.entry3Amount
      var.entry4Material = var.entry3Material
      var.entry4ItemJson = var.entry3ItemJson
      var.entry4IconDirty = true
      var.entry3Visible = var.entry2Visible
      var.entry3CreatedAt = var.entry2CreatedAt
      var.entry3DisplayName = var.entry2DisplayName
      var.entry3Amount = var.entry2Amount
      var.entry3Material = var.entry2Material
      var.entry3ItemJson = var.entry2ItemJson
      var.entry3IconDirty = true
      var.entry2Visible = var.entry1Visible
      var.entry2CreatedAt = var.entry1CreatedAt
      var.entry2DisplayName = var.entry1DisplayName
      var.entry2Amount = var.entry1Amount
      var.entry2Material = var.entry1Material
      var.entry2ItemJson = var.entry1ItemJson
      var.entry2IconDirty = true
      var.entry1Visible = true
      var.entry1CreatedAt = var.now
      var.entry1DisplayName = packet['displayName']
      var.entry1Amount = packet['amount']
      var.entry1Material = packet['material']
      var.entry1ItemJson = packet['itemJson']
      var.entry1IconDirty = true
  action:
    load: |-
      var.entryTtlMs = 3000
      var.now = 0
      var.entry1Visible = false
      var.entry1CreatedAt = 0
      var.entry1DisplayName = ''
      var.entry1Amount = 0
      var.entry1Material = ''
      var.entry1ItemJson = ''
      var.entry1IconDirty = false
      var.entry2Visible = false
      var.entry2CreatedAt = 0
      var.entry2DisplayName = ''
      var.entry2Amount = 0
      var.entry2Material = ''
      var.entry2ItemJson = ''
      var.entry2IconDirty = false
      var.entry3Visible = false
      var.entry3CreatedAt = 0
      var.entry3DisplayName = ''
      var.entry3Amount = 0
      var.entry3Material = ''
      var.entry3ItemJson = ''
      var.entry3IconDirty = false
      var.entry4Visible = false
      var.entry4CreatedAt = 0
      var.entry4DisplayName = ''
      var.entry4Amount = 0
      var.entry4Material = ''
      var.entry4ItemJson = ''
      var.entry4IconDirty = false
    tick: |-
      var.now = Time.currentTime()
      if(var.entry1Visible && (var.now - var.entry1CreatedAt) >= var.entryTtlMs){
        var.entry1Visible = false
      }
      if(var.entry2Visible && (var.now - var.entry2CreatedAt) >= var.entryTtlMs){
        var.entry2Visible = false
      }
      if(var.entry3Visible && (var.now - var.entry3CreatedAt) >= var.entryTtlMs){
        var.entry3Visible = false
      }
      if(var.entry4Visible && (var.now - var.entry4CreatedAt) >= var.entryTtlMs){
        var.entry4Visible = false
      }
      if(var.entry1IconDirty){
        if(var.entry1ItemJson != ''){
          val.pickup_slot_1.setItemIcon(var.entry1ItemJson)
          var.entry1DisplayName = val.pickup_slot_1.getName()
        }
        var.entry1IconDirty = false
      }
      if(var.entry2IconDirty){
        if(var.entry2ItemJson != ''){
          val.pickup_slot_2.setItemIcon(var.entry2ItemJson)
          var.entry2DisplayName = val.pickup_slot_2.getName()
        }
        var.entry2IconDirty = false
      }
      if(var.entry3IconDirty){
        if(var.entry3ItemJson != ''){
          val.pickup_slot_3.setItemIcon(var.entry3ItemJson)
          var.entry3DisplayName = val.pickup_slot_3.getName()
        }
        var.entry3IconDirty = false
      }
      if(var.entry4IconDirty){
        if(var.entry4ItemJson != ''){
          val.pickup_slot_4.setItemIcon(var.entry4ItemJson)
          var.entry4DisplayName = val.pickup_slot_4.getName()
        }
        var.entry4IconDirty = false
      }

controls:
  adaptive:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      pickup_stack:
        type: VStack
        attribute:
          point: ~bottom_right
          x: -210
          y: -120
          spaceBetween: 8
        children:
          pickup_entry_1:
            type: Canvas
            attribute:
              width: 240
              height: 60
              visible: var.entry1Visible
            children:
              background1:
                type: Texture
                attribute:
                  point: ~stretch_all
                  normal: ~Frosted:30;95,95,95,220
                  shape: ~round_rect
                  radius: 16
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              slot1:
                val: pickup_slot_1
                type: Slot
                attribute:
                  point: ~middle_left
                  x: 10
                  y: 0
                  width: 40
                  height: 40
                  slotType: ~Icon
                  normal: ~0,0,0,0
                  hover: ~0,0,0,0
                  itemScale: 0.85
                  visible: var.entry1ItemJson != ''
              text1:
                type: Text
                attribute:
                  point: ~middle_left
                  x: 60
                  y: 0
                  texts: "var.entry1DisplayName + ' &fx' + var.entry1Amount.round()"
                  fontSize: 36

