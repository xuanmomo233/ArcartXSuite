# AXS BattlePass 主界面
# 打开方式: /axs battlepass open 或 Packet 触发
# 数据交互: packetHandler init/update

ui:
  isHud: false
  background: true
  escClose: true
  closeDied: true
  through: false
  screenScale: true
  show: true
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.seasonName = packet['seasonName']
      var.currentLevel = packet['currentLevel']
      var.maxLevel = packet['maxLevel']
      var.currentXp = packet['currentXp']
      var.xpPerLevel = packet['xpPerLevel']
      var.xpNeeded = packet['xpNeeded']
      var.premiumUnlocked = packet['premiumUnlocked']
      var.deluxeUnlocked = packet['deluxeUnlocked']
      var.tier = packet['tier']
      var.tierDisplay = packet['tierDisplay']
      var.progressRatio = packet['progressRatio']
    update: |-
      var.packetId = packet['packetId']
      var.seasonName = packet['seasonName']
      var.currentLevel = packet['currentLevel']
      var.maxLevel = packet['maxLevel']
      var.currentXp = packet['currentXp']
      var.xpPerLevel = packet['xpPerLevel']
      var.xpNeeded = packet['xpNeeded']
      var.premiumUnlocked = packet['premiumUnlocked']
      var.deluxeUnlocked = packet['deluxeUnlocked']
      var.tier = packet['tier']
      var.tierDisplay = packet['tierDisplay']
      var.progressRatio = packet['progressRatio']
    rewards: |-
      var.packetId = packet['packetId']
      var.rewards = packet['rewards']
      var.rewardCount = packet['rewardCount']
      var.currentLevel = packet['currentLevel']
      var.showRewards = true
      while(val.奖励列表.childrenCount() > 1){
        val.奖励列表.get(1).remove()
      }
      for(i in range(0, var.rewardCount)){
        key = i.round()
        e = val.奖励列表['奖励项'].copy('奖励项' + key)
        e.entryKey = key
      }
  action:
    load: |-
      var.packetId = 'AXS_BATTLEPASS'
      var.seasonName = '等待同步'
      var.currentLevel = 0
      var.maxLevel = 0
      var.currentXp = 0
      var.xpPerLevel = 1000
      var.xpNeeded = 1000
      var.premiumUnlocked = false
      var.deluxeUnlocked = false
      var.tier = 'FREE'
      var.tierDisplay = '&7免费'
      var.progressRatio = 0
      var.rewards = {}
      var.rewardCount = 0
      var.showRewards = false

controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Canvas
        attribute:
          point: ~middle_center
          width: 600
          height: 420
        children:
          背景:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: ~35,35,45,235
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~80,180,255,180
              shadow:
                xOffset: 2
                yOffset: 2
                blur: 6
                color: ~0,0,0,120

          标题:
            type: Text
            attribute:
              x: 36
              y: 28
              texts: "~&e战令系统"
              fontSize: 56

          赛季名:
            type: Text
            attribute:
              x: 36
              y: 78
              texts: "'&7赛季: &f' + var.seasonName"
              fontSize: 32

          关闭按钮:
            type: Texture
            attribute:
              x: 510
              y: 24
              width: 56
              height: 56
              normal: ~180,60,60,200
              hover: ~Frosted:0;220,80,80,230
              shape: ~round_rect
              radius: 14
            action:
              clickLeft: |-
                Screen.close()
            effect:
              stroke:
                width: 2
                color: ~255,120,120,120
            children:
              文字:
                type: Text
                attribute:
                  x: 28
                  y: 14
                  through: true
                  center: true
                  fontSize: 36
                  texts: "~&fX"

          高级版标签背景:
            type: Texture
            attribute:
              x: 360
              y: 78
              width: 200
              height: 36
              normal: "var.deluxeUnlocked ? '180,100,220,220' : var.premiumUnlocked ? '210,160,60,220' : '120,120,130,180'"
              shape: ~round_rect
              radius: 10
            children:
              高级版标签文字:
                type: Text
                attribute:
                  width: 200
                  height: 36
                  point: ~middle_center
                  texts: "var.tierDisplay"
                  center: true
                  fontSize: 28

          等级信息卡片:
            type: Texture
            attribute:
              x: 36
              y: 130
              width: 528
              height: 80
              normal: ~50,50,60,180
              shape: ~round_rect
              radius: 18
            effect:
              stroke:
                width: 2
                color: ~80,180,255,100
            children:
              等级文本:
                type: Text
                attribute:
                  x: 20
                  y: 12
                  texts: "'&fLv.' + var.currentLevel + ' / ' + var.maxLevel"
                  fontSize: 36
              经验文本:
                type: Text
                attribute:
                  x: 20
                  y: 46
                  texts: "'&7经验: &f' + var.currentXp + ' / ' + var.xpPerLevel + '   (&8还需 ' + var.xpNeeded + '&8)'"
                  fontSize: 28

          进度条背景:
            type: Texture
            attribute:
              x: 36
              y: 226
              width: 528
              height: 24
              normal: ~60,64,72,185
              shape: ~round_rect
              radius: 12

          进度条填充:
            type: Texture
            attribute:
              x: 36
              y: 226
              width: "var.progressRatio * 528"
              height: 24
              normal: ~75,175,120,255
              shape: ~round_rect
              radius: 12

          按钮区:
            type: Canvas
            attribute:
              x: 36
              y: 280
              width: 528
              height: 80
            children:
              任务按钮:
                type: Texture
                attribute:
                  x: 0
                  y: 0
                  width: 250
                  height: 56
                  normal: ~60,120,200,220
                  hover: ~Frosted:0;80,160,240,240
                  shape: ~round_rect
                  radius: 14
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'open_tasks')
                effect:
                  stroke:
                    width: 2
                    color: ~80,180,255,120
                children:
                  任务按钮文字:
                    type: Text
                    attribute:
                      x: 125
                      y: 14
                      through: true
                      center: true
                      fontSize: 36
                      texts: "~&f任务列表"

              奖励按钮:
                type: Texture
                attribute:
                  x: 278
                  y: 0
                  width: 250
                  height: 56
                  normal: ~200,100,60,220
                  hover: ~Frosted:0;240,130,80,240
                  shape: ~round_rect
                  radius: 14
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'open_rewards')
                effect:
                  stroke:
                    width: 2
                    color: ~255,160,100,120
                children:
                  奖励按钮文字:
                    type: Text
                    attribute:
                      x: 125
                      y: 14
                      through: true
                      center: true
                      fontSize: 36
                      texts: "~&f领取奖励"

          奖励面板:
            type: Canvas
            attribute:
              point: ~stretch_all
              visible: var.showRewards
            children:
              奖励背景:
                type: Texture
                attribute:
                  point: ~stretch_all
                  normal: ~30,30,40,245
                  shape: ~round_rect
                  radius: 24
                effect:
                  stroke:
                    width: 2
                    color: ~255,180,80,180
              奖励标题:
                type: Text
                attribute:
                  x: 36
                  y: 24
                  texts: "~&6奖励领取"
                  fontSize: 48
              奖励当前等级:
                type: Text
                attribute:
                  x: 240
                  y: 36
                  texts: "'&7当前等级: &f' + var.currentLevel"
                  fontSize: 28
              奖励返回按钮:
                type: Texture
                attribute:
                  x: 510
                  y: 20
                  width: 56
                  height: 56
                  normal: ~120,120,130,200
                  hover: ~Frosted:0;150,150,160,230
                  shape: ~round_rect
                  radius: 14
                action:
                  clickLeft: |-
                    var.showRewards = false
                children:
                  文字:
                    type: Text
                    attribute:
                      x: 28
                      y: 14
                      through: true
                      center: true
                      fontSize: 32
                      texts: "~&f返回"
              奖励滑块:
                type: Texture
                val: 奖励滑块
                attribute:
                  x: 570
                  y: 88
                  width: 6
                  height: 40
                  normal: ~120,120,120,200
                  maxDragY: 280
              奖励滚动区:
                type: Scroll
                attribute:
                  x: 24
                  y: 88
                  width: 540
                  height: 312
                  moveY: "self.parent['奖励滑块'].getDragYRatio()"
                action:
                  wheel: |-
                    if(self.moveY >= 0 && self.wheelValue > 0){
                      self.parent['奖励滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                    if(self.moveY <= 1 && self.wheelValue < 0){
                      self.parent['奖励滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                children:
                  奖励列表:
                    val: 奖励列表
                    type: VStack
                    attribute:
                      width: 540
                      spaceBetween: 6
                    children:
                      奖励项:
                        type: Texture
                        attribute:
                          entryKey: 0
                          entry: var.rewards[self.entryKey]
                          visible: self.entry != none
                          width: 540
                          height: 56
                          normal: "self.entry != none && self.entry['claimed'] ? '60,90,70,200' : self.entry != none && self.entry['claimable'] ? '70,90,120,220' : '55,55,65,200'"
                          shape: ~round_rect
                          radius: 12
                        effect:
                          stroke:
                            width: 1
                            color: ~255,180,80,60
                        children:
                          奖励等级:
                            type: Text
                            attribute:
                              x: 16
                              y: 14
                              texts: "self.parent.entry != none ? '&fLv.' + self.parent.entry['level'] : none"
                              fontSize: 32
                              through: true
                          奖励档位:
                            type: Text
                            attribute:
                              x: 120
                              y: 16
                              texts: "self.parent.entry != none ? self.parent.entry['tierDisplay'] : none"
                              fontSize: 28
                              through: true
                          奖励状态:
                            type: Text
                            attribute:
                              x: 220
                              y: 16
                              texts: "self.parent.entry != none ? (self.parent.entry['claimed'] ? '&a已领取' : self.parent.entry['locked'] ? '&c未解锁' : self.parent.entry['levelReached'] ? '&e可领取' : '&7等级不足') : none"
                              fontSize: 28
                              through: true
                          领取按钮:
                            type: Texture
                            attribute:
                              x: 420
                              y: 8
                              width: 104
                              height: 40
                              visible: "self.parent.entry != none && self.parent.entry['claimable']"
                              normal: ~75,175,120,240
                              hover: ~Frosted:0;95,200,140,255
                              shape: ~round_rect
                              radius: 10
                            action:
                              clickLeft: |-
                                Packet.send(var.packetId, 'claim', self.parent.entry['level'])
                            children:
                              领取文字:
                                type: Text
                                attribute:
                                  x: 52
                                  y: 8
                                  through: true
                                  center: true
                                  fontSize: 28
                                  texts: "~&f领取"
