ui:
  background: false
  escClose: true
  closeDied: true
  show: true
  through: false
  screenScale: true
  action:
    load: |-
      var.titles = {}
      var.groups = {}
      var.qualities = {}
      var.sets = {}
      var.equippedByGroup = {}
      var.filterModes = {}
      var.selectedId = ''
      var.selectedCanEquip = false
      var.selectedIsEquipped = false
      var.selectedName = ''
      var.selectedKind = ''
      var.selectedKindText = ''
      var.selectedChatPrefix = ''
      var.selectedChatSuffix = ''
      var.selectedTabPrefix = ''
      var.selectedTabSuffix = ''
      var.selectedGroupId = ''
      var.selectedGroupName = ''
      var.selectedQualityName = ''
      var.selectedDescription = ''
      var.selectedSource = ''
      var.selectedOwned = false
      var.selectedHidden = false
      var.selectedRemainingText = ''
      var.selectedDisplayAttributesText = ''
      var.selectedCollectionAttributesText = ''
      var.displayAttributesText = ''
      var.collectionAttributesText = ''
      var.totalAttributesText = ''
      var.setBonusAttributesText = ''
      var.displayTitleName = ''
      var.displayTitleId = ''
      var.selectedIsDisplayTitle = false
      var.ownedCount = 0
      var.hiddenCount = 0
      var.equippedCount = 0
      var.activeSetCount = 0
      var.filterMode = 'all'
      var.filterGroup = 'all'
      var.filterQuality = 'all'
      var.titleListScrollRatio = 0
      var.groupScrollRatio = 0
      var.qualityScrollRatio = 0
      var.detailScrollRatio = 0
      var.rightScrollRatio = 0
  packetHandler:
    init: |-
      var.titles = packet['titles']
      var.groups = packet['groups']
      var.qualities = packet['qualities']
      var.sets = packet['sets']
      var.equippedByGroup = packet['equipped_by_group']
      var.filterModes = packet['filter_modes']
      var.selectedId = packet['selected_id']
      var.selectedCanEquip = packet['selected_can_equip']
      var.selectedIsEquipped = packet['selected_is_equipped']
      var.selectedName = packet['selected_display_name']
      var.selectedKind = packet['selected_kind']
      var.selectedKindText = var.selectedKind == 'text' ? '文本称号' : (var.selectedKind == 'icon' ? '贴图称号' : '')
      var.selectedChatPrefix = packet['selected_chat_prefix']
      var.selectedChatSuffix = packet['selected_chat_suffix']
      var.selectedTabPrefix = packet['selected_tab_prefix']
      var.selectedTabSuffix = packet['selected_tab_suffix']
      var.selectedGroupId = packet['selected_group_id']
      var.selectedGroupName = packet['selected_group_name']
      var.selectedQualityName = packet['selected_quality_name']
      var.selectedDescription = packet['selected_description']
      var.selectedSource = packet['selected_source']
      var.selectedOwned = packet['selected_owned']
      var.selectedHidden = packet['selected_hidden']
      var.selectedRemainingText = packet['selected_remaining_text']
      var.selectedDisplayAttributesText = packet['selected_display_attributes_text']
      var.selectedCollectionAttributesText = packet['selected_collection_attributes_text']
      var.displayAttributesText = packet['display_attributes_text']
      var.collectionAttributesText = packet['collection_attributes_text']
      var.totalAttributesText = packet['total_attributes_text']
      var.setBonusAttributesText = packet['set_bonus_attributes_text']
      var.displayTitleName = packet['display_title_name']
      var.displayTitleId = packet['display_title_id']
      var.selectedIsDisplayTitle = packet['selected_is_display_title']
      var.ownedCount = packet['owned_count']
      var.hiddenCount = packet['hidden_count']
      var.equippedCount = packet['equipped_count']
      var.activeSetCount = 0
      if(var.sets != null){
        for(key in var.sets.keys()){
          if(var.sets[key]['active']){
            var.activeSetCount = var.activeSetCount + 1
          }
        }
      }
      var.titleListScrollRatio = 0
      var.groupScrollRatio = 0
      var.qualityScrollRatio = 0
      var.detailScrollRatio = 0
      var.rightScrollRatio = 0
      var.titleKeys = var.titles.keys()
      var.titleIndex = 0
      for(key in var.titleKeys){
        item = val.title_list['称号项' + var.titleIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.titleIndex = var.titleIndex + 1
      }
      while(var.titleIndex < 200){
        item = val.title_list['称号项' + var.titleIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.titleIndex = var.titleIndex + 1
      }
      var.groupKeys = var.groups.keys()
      var.groupIndex = 0
      for(key in var.groupKeys){
        item = val.group_list['分组项' + var.groupIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.groupIndex = var.groupIndex + 1
      }
      while(var.groupIndex < 64){
        item = val.group_list['分组项' + var.groupIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.groupIndex = var.groupIndex + 1
      }
      var.qualityKeys = var.qualities.keys()
      var.qualityIndex = 0
      for(key in var.qualityKeys){
        item = val.quality_list['品质项' + var.qualityIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.qualityIndex = var.qualityIndex + 1
      }
      while(var.qualityIndex < 64){
        item = val.quality_list['品质项' + var.qualityIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.qualityIndex = var.qualityIndex + 1
      }
      var.equippedKeys = var.equippedByGroup.keys()
      var.equippedIndex = 0
      for(key in var.equippedKeys){
        item = val.equipped_list['已装备项' + var.equippedIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.equippedIndex = var.equippedIndex + 1
      }
      while(var.equippedIndex < 64){
        item = val.equipped_list['已装备项' + var.equippedIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.equippedIndex = var.equippedIndex + 1
      }
      var.setKeys = var.sets.keys()
      var.setIndex = 0
      for(key in var.setKeys){
        item = val.set_list['套装项' + var.setIndex.round()]
        if(item != null){
          item.entryKey = key
        }
        var.setIndex = var.setIndex + 1
      }
      while(var.setIndex < 64){
        item = val.set_list['套装项' + var.setIndex.round()]
        if(item != null){
          item.entryKey = ''
        }
        var.setIndex = var.setIndex + 1
      }
    update: |-
      var.titles = packet['titles']
      var.groups = packet['groups']
      var.qualities = packet['qualities']
      var.sets = packet['sets']
      var.equippedByGroup = packet['equipped_by_group']
      var.filterModes = packet['filter_modes']
      var.selectedId = packet['selected_id']
      var.selectedCanEquip = packet['selected_can_equip']
      var.selectedIsEquipped = packet['selected_is_equipped']
