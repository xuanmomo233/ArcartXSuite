name: Build Native Library

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'native/**'
      - 'libs/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    paths:
      - 'native/**'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev zlib1g-dev default-jdk-headless

      - name: Build native library
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-linux
          path: src/main/resources/native/libaxs-native.so

  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
      CMAKE_PREFIX_PATH: C:\vcpkg\installed\x64-windows-static
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install vcpkg & dependencies
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg.exe integrate install
          C:\vcpkg\vcpkg.exe install openssl zlib
        shell: cmd

      - name: Build native library
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static
          cmake --build build --config Release
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-windows
          path: src/main/resources/native/axs-native.dll

  build-gradle:
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Linux native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-linux
          path: src/main/resources/native/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.2'

      - name: Build Gradle project
        run: gradle build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: axs-jar
          path: '*/build/libs/*.jar'
