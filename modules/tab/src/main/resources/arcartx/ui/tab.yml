ui:
  isHud: true
  hide:
  - player_list
  escClose: false
  defaultOpen: true
  action:
    load: |-
      var.TAB显示 = false
    keyPress: |-
      if(self.currentKeyPress() == "TAB"){
        Packet.send("TAB","update")
        var.单列数量 = Math.ceil(server.server_online / val.player_grid.row)
        var.第一列人数 = Math.min(server.server_online, 15)
        var.TAB显示 = true
      }
    keyRelease: |-
      if(self.currentKeyReleased() == "TAB"){
        var.TAB显示 = false
      }
  packetHandler:
    tab: |-
      var.entries = packet['entries']
      var.单列数量 = Math.ceil(server.server_online / val.player_grid.row)
      var.第一列人数 = Math.min(server.server_online, 15)
controls:
  adaptive:
    type: adaptive
    attribute:
      point: ~top_center
      width: 1920
      height: 1080
    children:
      TAB背景:
        type: texture
        attribute:
          point: ~top_center
          width: 50 + 252 * var.单列数量
          height: 70 + 27 * var.第一列人数 + self['信息排列布局'].childrenCount() * 27 / self.about_y
          y: 40
          normal: ~Frosted:30;0,0,0,255
          visible: var.TAB显示
          shape: ~round_rect
          radius: 20
          about_y: "var.单列数量 < 4 || var.单列数量 > 5 ? var.单列数量 : 3"
        effect:
          stroke:
            width: 3
            color: ~0,0,0,255
        children:
          在线玩家:
            type: text
            attribute:
              y: 23
              x: 26
              fontSize: 33
              texts: "'&a&l在线玩家：'"
              lineSpace: 8
          信息排列布局:
            type: HGrid
            attribute:
              y: 70 + 27 * var.第一列人数 - 10
              x: 26
              spaceBetweenY: 2
              spaceBetweenX: 2
              column: var.单列数量
            children:
              PING:
                type: Canvas
                attribute:
                  width: 200
                  height: 25
                children:
                  文本:
                    type: text
                    attribute:
                      fontSize: 33
                      texts: "~&f&l玩家延迟：{server.player_ping}"
                      lineSpace: 8
              TPS:
                type: Canvas
                attribute:
                  width: 200
                  height: 25
                children:
                  文本:
                    type: text
                    attribute:
                      fontSize: 33
                      texts: "~&f&l服务器TPS：{server.server_tps_1}"
                      lineSpace: 8
          player_grid:
            type: VGrid
            val: player_grid
            attribute:
              spaceBetweenY: 2
              spaceBetweenX: 2
              row: 15
              y: 44
              x: 26
            children:
              player_row:
                type: texture
                attribute:
                  entry: var.entries[self.key]
                  point: ~top_center
                  width: 250
                  height: 25
                  shape: ~round_rect
                  radius: 10
                  normal: ~95,95,95,255
                  visible: self.entry != null
                children:
                  player_text:
                    type: text
                    attribute:
                      fontSize: 33
                      texts: "self.parent.entry"
                      lineSpace: 8
          tab_observer:
            type: Observer
            attribute:
              target: val.player_grid['player_row']
              subscribe: var.entries
              maxSize: 120
