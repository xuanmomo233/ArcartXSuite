config-version: 1
# AXS Warehouse AXUI
# 作用: AXUI 驱动个人仓库、共享仓库、NBT 分类、银行、多利率定期存款和二级密码。
# 重载: /axs warehouse reload
# 玩家入口: /warehouse 或 /wh 打开 UI，业务操作全部在 AXUI 内完成。
# PAPI: %axswarehouse_total_items%、%axswarehouse_bank_balance_money% 等。

settings:
  debug: false
  flush-interval-ticks: 100
  # 共享仓库转让确认等待时长（小时），<=0 表示永不过期。
  transfer-confirm-expire-hours: 24

# 跨服共享仓库编辑锁；MySQL 共享库 + 多子服时建议开启。连接参数见宿主 config.yml cross-server 节。
cross-server:
  enabled: false

ui:
  id: "AXS:warehouse_storage"
  manage-id: "AXS:warehouse_manage"
  bank-id: "AXS:warehouse_bank"
  packet-id: "AXS_WAREHOUSE"
  register-ui-on-enable: true
  overwrite-ui-files: false
  # 仓库网格每页显示的槽位数量（控件按此数量动态创建）。
  page-size: 54

storage:
  mode: "sqlite"
  sqlite:
    file: "warehouse.db"
  mysql:
    host: "127.0.0.1"
    port: 3306
    database: "arcartxsuite"
    username: "root"
    password: ""
  pool-size: 4

security:
  min-length: 4
  max-length: 32
  unlock-session-ms: 600000
  allow-admin-password-reveal: false
  admin-reveal-secret: ""

pickup:
  auto-store-on-pickup: true
  auto-store-mythic-loot: false
  notify-on-auto-store: true

search:
  page-size: 18
  default-sort: "time"

warehouses:
  personal:
    display-name: "&6个人仓库"
    default-owned: true
    default-level: 1
    levels:
      "1":
        capacity: 1000
        upgrade:
          currency: "points"
          amount: 500
      "2":
        capacity: 2500
        upgrade:
          currency: "points"
          amount: 1200
      "3":
        capacity: 6000

categories:
  equipment:
    display-name: "装备"
    priority: 10
    nbt:
      path: "pdc:arcartx:item_category"
      values: ["equipment", "weapon", "armor"]
  material:
    display-name: "材料"
    priority: 20
    nbt:
      path: "pdc:arcartx:item_category"
      values: ["material"]
  consumable:
    display-name: "消耗品"
    priority: 30
    nbt:
      path: "pdc:arcartx:item_category"
      values: ["consumable", "food", "potion"]
  other:
    display-name: "其它"
    priority: 9999
    default: true

bank:
  # 银行展示的全局货币 ID 子集；定义必须存在于宿主 config.yml 的 currencies 中。
  # 未在全局池定义的 ID 会在加载时告警并跳过。
  currencies:
    - money
    - points
  deposit-products:
    money_stable_1d:
      enabled: true
      display-name: "稳健 1 日"
      description: "低门槛短期定存。"
      currency: "money"
      duration-seconds: 86400
      min-amount: 100
      max-amount: 0
      permission: ""
      interest-tiers:
        tier_1:
          min: 100
          max: 9999
          rate: 0.01
        tier_2:
          min: 10000
          max: 99999
          rate: 0.015
        tier_3:
          min: 100000
          max: 0
          rate: 0.02
    money_vip_7d:
      enabled: true
      display-name: "贵宾 7 日"
      description: "权限专属较高收益定存。"
      currency: "money"
      duration-seconds: 604800
      min-amount: 1000
      max-amount: 0
      permission: "ArcartXSuite.warehouse.bank.vip"
      interest-tiers:
        tier_1:
          min: 1000
          max: 49999
          rate: 0.04
        tier_2:
          min: 50000
          max: 0
          rate: 0.06
    points_3d:
      enabled: true
      display-name: "点券 3 日"
      description: "点券定期产品。"
      currency: "points"
      duration-seconds: 259200
      min-amount: 50
      max-amount: 0
      permission: ""
      interest-tiers:
        tier_1:
          min: 50
          max: 999
          rate: 0.02
        tier_2:
          min: 1000
          max: 0
          rate: 0.03

shared:
  enabled: true
  create-cost:
    currency: "points"
    amount: 1000
  default-level: 1
  levels:
    "1":
      capacity: 2000
      upgrade:
        currency: "points"
        amount: 800
    "2":
      capacity: 5000
      upgrade:
        currency: "points"
        amount: 1800
    "3":
      capacity: 10000
  role-names:
    owner: "所有者"
    member: "成员"
    viewer: "观众"
  permission-tiers:
    default:
      permission: ""
      priority: 0
      max-owned: 1
      max-members: 6
    vip:
      permission: "ArcartXSuite.warehouse.shared.vip"
      priority: 10
      max-owned: 3
      max-members: 12

sort-profiles:
  time:
    fields:
      - "updated:desc"
      - "name:asc"
  name:
    fields:
      - "name:asc"
  amount:
    fields:
      - "amount:desc"
      - "updated:desc"

# ─── 展示柜（Showcase）配置 ────────────────────────────────────────
# 允许玩家将仓库中的物品展示到聊天卡片，供其他玩家查看。
showcase:
  # 是否启用展示柜功能。
  enabled: true
  # 每次发送展示卡片后的冷却时间（秒），最短 5 秒。
  cooldown-seconds: 60
  # 单次展示卡片中最多显示的物品数量，最少 1 个。
  max-items: 9
  # 展示卡片使用的 ArcartX 卡片 ID（EventPacket/Chat 卡片），留空则使用模块内置默认卡片。
  card-id: ""
  # 使用展示柜功能所需的权限节点。
  permission: "arcartxsuite.warehouse.showcase"

# ─── 黑名单 ────────────────────────────────────────
# 匹配任意一条规则的物品将无法存入仓库。
blacklist:
  # 按原版 Material ID 拦截，例如 ["BEDROCK", "COMMAND_BLOCK"]。
  material-ids: []
  # 按 MythicMobs 物品 ID 拦截。
  mythic-item-ids: []
  # 按 NeigeItems 物品 ID 拦截。
  neige-item-ids: []
  # 按 Overture 物品 ID 拦截。
  overture-item-ids: []
  # 按物品种类（kind）拦截，具体可用值取决于物品定义。
  kinds: []
  # 物品显示名包含任意关键词即拦截。
  name-contains:
    - "绑定不可存"
  # 物品 Lore 包含任意关键词即拦截。
  lore-contains:
    - "不可存入仓库"
  # 物品显示名匹配任意正则即拦截。
  name-regex: []
  # 物品 Lore 匹配任意正则即拦截。
  lore-regex: []
  # 只要物品 PDC 或原始 NMS NBT 复合标签中存在任意一个 key 即禁止存入，原始 NBT 会递归检查嵌套 compound/list，只判断 key 存在不比较 value；反射读取失败时安全降级为无原始 NBT 匹配。
  nbt-keys: []

# ─── 额外槽位背包（Extra Backpack）────────────────────────────────────────
# 可选功能，默认关闭。启用后由本模块接管玩家原版背包的 27 个存储格（快捷栏 9 格不受影响）。
# 背包由多个分类页组成（装备/材料/杂物…），每个分类页独立设置容量、上限与付费扩容价格；
# 物品分类由 warehouse 模块自行按 NBT/lore 判断，无需服主在 ArcartX 中配置槽位。
