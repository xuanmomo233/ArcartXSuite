# ============================================================
#  QuestGPS 模块消息文件
# ------------------------------------------------------------
#  支持 & 颜色码（如 &c 红色）和 {0} {1} 占位符。
#  修改后执行 /axs reload questgps 即可生效。
# ============================================================

prefix: "&3◆ &6ArcartXSuite &7| &r"

# ── 通用 ──────────────────────────────────────────────
common:
  service-down: "&cQuestGPS 模块当前未启用。"
  reload-hint: "&e请使用 /{0} reload questgps"
  unknown: "&e未知命令，使用 /{0} questgps help"
