config-version: 4
# ArcartXSuite AfkReward - 区域挂机奖励模块
# 重载: /axs afkreward reload

debug: false

# 奖励周期（分钟/次）
reward:
  round: 15
  # 每日最大奖励次数限制
  max:
    enable: true
    limit: 32
    # 无视限制权限: axs.afkreward.not.reward.limit
  # 区域最大同时挂机人数
  player:
    enable: true
    limit: 30
    # 无视限制权限: axs.afkreward.not.player.limit
  overflow-to-mail:
    enable: false

# 奖励类型配置
# 玩家需要有 axs.afkreward.start.<类型名> 权限才能进入该区域挂机
types:
  泡澡池:
    describe: "泡澡的人越多，获取的铜币和经验越多"
    # 发奖时同时发送的邮件预设（对应 Mail 模块预设模板）
    # 背包无空位时使用的邮件预设，留空则仍执行命令
    full-inventory-mail: ""
    mail-presets:
      - "afk_reward_mail"
    # 权限等级从高到低检测，取玩家拥有的最高等级
    vip3:
      - "addbalance %player_name% 铜币 %axsafk_players%*35+%player_level%/4+250"
      - "cmi give %player_name% cobblestone 54"
      - "cmi exp %player_name% add %axsafk_players%*%player_level%/4+%player_level%"
    vip2:
      - "addbalance %player_name% 铜币 %axsafk_players%*30+%player_level%/6+200"
      - "cmi give %player_name% cobblestone 54"
      - "cmi exp %player_name% add %axsafk_players%*%player_level%/6+%player_level%/2"
    vip1:
      - "addbalance %player_name% 铜币 %axsafk_players%*25+%player_level%/8+150"
      - "cmi exp %player_name% add %axsafk_players%*%player_level%/8+%player_level%/4"
    common:
      - "addbalance %player_name% 铜币 %axsafk_players%*20+%player_level%/10+100"
      - "cmi exp %player_name% add %axsafk_players%*%player_level%/10+%player_level%/4"

# 区域配置目录（相对于 data/afkreward/ 文件夹）
# 每个区域为独立的 area-<id>.yml 文件
areas-directory: "areas"

# 反滥用配置（默认关闭）
anti-abuse:
  time-limit:
    enable: false
    session-seconds: 0
    daily-seconds: 0
    on-exceed: STOP
    exempt-permission: "axs.afkreward.bypass.timelimit"
  bot-detection:
    enable: false
    window-seconds: 300
    min-view-changes: 3
    action: NO_REWARD
    exempt-permission: "axs.afkreward.bypass.botcheck"
  ip-limit:
    enable: false
    exempt-permission: "axs.afkreward.bypass.iplimit"
  decay:
    enable: false
    start-seconds: 3600
    factor-per-hour: 0.2
    min-multiplier: 0.3

# 加权/定时倍率
multiplier:
  enable: false
  base: 1.0
  weekend: 1.0
  combine: MAX
  schedules:
    - days: "SAT,SUN"
      start: "20:00"
      end: "22:00"
      multiplier: 2.0

# 发奖审计日志
audit:
  enable: true
  file: "audit.log"

# 原地挂机配置
manual:
  # 挂机期间是否封锁玩家行为（移动/交互/破坏/开箱/传送/受击）
  restrict-actions: true
  # 结束挂机后是否传送回原始位置
  return-on-end: false
  # 结束挂机时是否全服广播奖励消息
  broadcast-rewards: true
  # 参与战斗后开始原地挂机前的冷却时间（秒）
  combat-cooldown-seconds: 10
  # MANUAL 模式权限及区域复查间隔（秒）
  permission-recheck-seconds: 5
  # 排行榜显示人数
  leaderboard-size: 10
  # 发奖时触发的 EventPacket 信号名（为空则不触发）
  signal-on-reward: "afk_reward"
  # 结束挂机时触发的 EventPacket 信号名
  signal-on-end: "afk_end"
  # 发奖时播放的字幕组 ID（为空则不播放）
  subtitle-on-reward: ""
  # 结束挂机时播放的字幕组 ID
  subtitle-on-end: ""
  # 结束挂机时发送的邮件预设
  end-mail-presets:
    - "afk_end_mail"

  # MANUAL 挂机期间的独立行为保护开关，默认全部开启。
  protections:
    # 禁止移动。
    movement: true
    # 禁止传送。
    teleport: true
    # 禁止交互方块或空气。
    interact: true
    # 禁止破坏方块。
    block-break: true
    # 禁止打开容器或背包界面。
    inventory: true
    # 受到伤害时无敌。
    receive-damage: true
    # 禁止对其他实体造成伤害。
    deal-damage: true
    # 禁止被怪物锁定为目标。
    entity-target: true
    # 禁止进入载具。
    vehicle-enter: true
    # 禁止右键实体。
    interact-entity: true
    # 禁止丢弃物品。
    drop-item: true
    # 禁止副手换手。
    swap-hand: true
    # 禁止拾取掉落物。
    pickup-item: true
    # 禁止获得经验。
    experience: true
    # 禁止碰撞（setCollidable(false)。）
    collidable: true

# 性能保护
performance:
  pause-on-low-tps:
    enable: false
    min-tps: 15.0

# 存储配置
storage:
  dialect: sqlite
  sqlite-file: "afkreward.db"
  host: "127.0.0.1"
  port: 3306
  database: "arcartxsuite"
  username: "root"
  password: ""
  table-prefix: "axs_afk_"
  pool-size: 3

# HUD 配置
ui:
  hud-id: "AXS:afk_reward_hud"
  register-on-enable: true
  overwrite-ui-file: false
