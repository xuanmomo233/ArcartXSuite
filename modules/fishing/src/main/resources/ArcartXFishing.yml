config-version: 2

# ─── 数据存储 ────────────────────────────────────────
# mode: sqlite 或 mysql。
storage:
  mode: sqlite
  # SQLite 数据库文件名（相对模块数据目录）。
  sqlite-file-name: fishing.db
  # 连接池大小，SQLite 建议保持 1。
  pool-size: 1
  # 以下仅在 mode: mysql 时生效。
  mysql-host: localhost
  mysql-port: 3306
  mysql-database: axs_fishing
  mysql-username: root
  mysql-password: ""

# ─── 钓鱼小游戏核心参数 ────────────────────────────────────────
fishing:
  # 是否接管原版钓鱼事件，启用后玩家甩竿会进入 AXS 钓鱼小游戏。
  replace-vanilla: true
  # 小游戏刷新间隔（ticks），20 ticks = 1 秒。值越小动画越平滑，CPU 占用越高。
  minigame-tick-interval: 1
  # 进度条重力加速度（像素/tick²），影响绿色目标条下落速度。
  bar-gravity: 0.3
  # 进度条碰撞阻尼（0-1），越接近 1 反弹越持久。
  bar-bounce-damping: 0.7
  # 鼠标点击给进度条施加的瞬时速度（负数表示向上），绝对值越大越容易把条弹起。
  bar-click-force: -0.6
  # 单次小游戏最长持续时间（ticks），超时视为失败。
  catch-duration-ticks: 600
  # 未按住鼠标时进度下降速率。
  progress-drain-rate: 0.5
  # 按住鼠标时进度上升速率。
  progress-gain-rate: 1.0
  # 绿色目标条基础高度（像素），随鱼难度变化。
  base-green-bar-height: 96
  # 鱼每提升 1 级难度，绿色条增加的高度（像素）。
  height-per-level: 4
  # 钓起宝藏（treasures/ 目录定义）的基础概率，范围 0.0 ~ 1.0，最终概率受水域、饵料加成影响。
  treasure-chance: 0.15
  # 完美收竿（进度条始终覆盖目标区域）时的经验倍率。
  perfect-bonus-multiplier: 1.5
  # 每提升 1 级钓鱼等级所需基础经验。
  base-xp-per-level: 100

# ─── 水域定义 ────────────────────────────────────────
# 指定地点: 玩家在指定坐标/区域内钓鱼
# 默认水域: 未匹配任何指定地点时使用
waters:
  # 指定地点水域列表
  specified:
    - name: "dragon_lake"
      display-name: "&b龙泉湖"
      type: circle
      world: "world"
      center: [100, 64, 200]
      radius: 50
      fish-pool: "lake"
      treasure-pool: "common"
      difficulty-modifier: 1.2
      bait-multipliers:
        worm: 1.5
        corn: 2.0
      require-permission: ""

    - name: "jade_river"
      display-name: "&a翡翠河"
      type: rectangle
      world: "world"
      min: [500, 60, 300]
      max: [700, 80, 400]
      fish-pool: "river"
      treasure-pool: "common"
      difficulty-modifier: 0.9
      bait-multipliers:
        worm: 1.0
        bread: 1.3
      require-permission: ""

  # 默认水域（兜底）
  default:
    name: "default"
    display-name: "&7普通水域"
    fish-pool: "default"
    treasure-pool: "default"
    difficulty-modifier: 1.0
    bait-multipliers:
      worm: 1.0
      bread: 1.0
      corn: 1.0

# ─── 鱼类池 ────────────────────────────────────────
# 引用 fishes/ 目录下的鱼种 ID
fish-pools:
  default:
    - "sea_bass"
    - "salmon"
  lake:
    - "sea_bass"
    - "catfish"
    - "legendary_carp"
  river:
    - "salmon"
    - "catfish"
  ocean:
    - "tuna"
    - "pufferfish"
    - "sea_bass"

# ─── 宝藏池 ────────────────────────────────────────
# 引用 treasures/ 目录下的宝藏 ID
treasure-pools:
  default:
    - "old_boot"
    - "lost_ring"
  common:
    - "old_boot"
    - "lost_ring"
    - "ancient_coin"
  rare:
    - "ancient_coin"
    - "lost_ring"

# ─── 饵料定义 ────────────────────────────────────────
# 饵料不通过本文件配置，请在 baits/ 目录下为每个饵料创建独立 YAML 文件。
# 每个饵料文件支持的字段见 fishes/worm.yml 示例：
#   id、display-name、item、default、fish-attract-modifiers、
#   treasure-chance-boost、max-durability-bonus。

# ─── UI 注册 ────────────────────────────────────────
# 这些 UI 文件位于 arcartx/ui/ 目录，由模块在启动时注册到 ArcartX。
ui:
  # 是否在插件启用时自动注册本模块的 UI。
  register-on-enable: true
  # 钓鱼小游戏 UI 的 ID。
  minigame-id: "fishing_minigame"
  # 鱼类图鉴 UI 的 ID。
  collection-id: "fishing_collection"

# ─── 命令配置 ────────────────────────────────────────
commands:
  # 是否注册 /fishing 命令。
  enabled: true
  # 使用钓鱼命令所需的基础权限节点。
  base-permission: "axs.fishing.use"
