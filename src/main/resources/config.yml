config-version: 1

# ========== 云端授权（AXS Cloud Platform）==========
# 连接 AXS 云端平台，按服主账号下发已购买/免费模块。
# 云端功能默认开启，只要填写了 qq 和 password，服务器启动时就会自动连接。
# 工作流程：
#   1. 服主先在云端仪表盘用 QQ 号 + 密码注册账号（https://cloud.021209.xyz）。
#   2. 在此处填写同一组 QQ 号与密码。
#   3. 启动服务器后，插件会用 QQ+密码向云端换取一个【服务器码】(server-code)，
#      该码与本服务器绑定，并自动回填到下方 server-code 字段。
#   4. 服主在云端仪表盘的「装备模块」页面为该服务器码勾选要启用的模块，
#      下次服务器启动 / 重载时会自动下载并加载这些模块。
# 安全说明：
#   - 每次连接云端（包括刷新令牌）都会验证 password，请勿清空。
#   - server-code 由云端生成，请勿手动修改；删除后会触发重新绑定。
cloud:
  # 服主 QQ 号（须与云端注册账号一致）。
  qq: ""
  # 服主密码（每次连接云端都会验证，切勿泄露）。
  # 【安全警告】此密码以明文形式存储在 config.yml 中。
  #   建议：1) 设置 plugins/ArcartXSuite/ 目录权限为 700（仅服务器进程可读）。
  #        2) 不要在公共仓库或聊天群中分享此配置文件。
  #        3) 定期更换云端密码。
  password: ""
  # 服务器码：留空表示尚未绑定，绑定成功后由云端自动回填，请勿手动修改。
  server-code: ""


# ========== 安全设置 ==========
# 模块数字签名公钥（Base64 编码的 Ed25519 公钥，32 字节）。
# 配置后，所有 modules/*.jar 必须包含有效的 module.yml signature 字段，否则拒绝加载。
# 留空则不启用签名验证（向后兼容）。
module-signature-public-key: ""

# 版本检查响应签名公钥（Base64 编码的 Ed25519 公钥，32 字节）。
# 配置后，版本检查响应必须携带有效签名，防止中间人伪造更新提示。
# 留空则不启用签名校验。
version-check-public-key: ""


# AXS 资源说明
# 用途: AXS 主配置，负责模块启用开关。
# 前置依赖: ArcartX。
# 启用开关: modules.<module>.enabled。
# 关联文件: config.yml、ArcartX*.yml。
# 重载命令: /axs reload all 或 /axs <module> reload。

# ========== 全局货币定义 ==========
# 所有模块共享同一组货币。provider 支持: vault / playerpoints / rondo / command / placeholder-command / custom。
# 模块配置中的 currencies 节将合并到此全局池中（不覆盖已有同名货币）。
currencies:
  money:
    enabled: true
    provider: "vault"
    display-name: "金币"
    precision: 2
  points:
    enabled: true
    provider: "playerpoints"
    display-name: "点券"
    precision: 0

# ========== 跨服传输（全模块共用）==========
# 各模块在 ArcartX*.yml 的 cross-server.enabled 开启后接入此配置。
# Redis 与 BungeeCord/Velocity Forward 可同时启用（双发 + 入站去重）。
cross-server:
  node-id: "default"
  dedupe-ttl-ms: 60000
  max-payload-chars: 524288
  redis:
    enabled: false
    host: "127.0.0.1"
    port: 6379
    password: ""
    database: 0
    channel: "AXS:CROSS"
    connect-timeout-ms: 5000
  proxy:
    enabled: false
    messenger-channel: "AXS_CROSS"
    forward-target: "ALL"
  signature:
    enabled: false
    secret: ""
    verify: true

# ========== 全局属性插件桥接 ==========
# 控制 AXS 是否初始化各属性插件桥接。
# 即使服务器安装了对应插件，若此处设为 false，AXS 也不会连接该插件，
# 所有模块（title、prop、combateffect、entitytracker 等）均无法使用其属性功能。
# 这样可在安装多个属性插件时避免属性混乱，并保证各模块使用统一的属性来源。
attribute-bridges:
  attributeplus: true
  craneattribute: true
  mythiclib: true
  symphony: true

# ========== 全局按键绑定 ==========
# 由宿主统一注册到 ArcartX 客户端，各模块共享。
# name: ArcartX 注册名（玩家可在按键设置中看到）
# default-key: 默认键位（GLFW 键名，如 F、G、H、NUMPAD_8 等）
# category: 按键分类名（显示在按键设置界面）
keybinds:
  interact:
    name: AXS_INTERACT
    default-key: F
    category: ArcartXSuite
  navigate-prev:
    name: AXS_NAVIGATE_PREV
    default-key: NUMPAD_8
    category: ArcartXSuite
  navigate-next:
    name: AXS_NAVIGATE_NEXT
    default-key: NUMPAD_2
    category: ArcartXSuite

# ========== Tacz 模组伤害兼容 ==========
# Timeless and Classics Guns（永恒枪械工坊）模组伤害事件兼容。
# 启用后，AXS 能正确识别 Tacz 枪械造成的伤害来源，使 combateffect（伤害飘字 / 击杀特效）、
# entitytracker（Boss 追踪）等模块的受伤/死亡事件统计正常工作。
# 若服务器未安装 Tacz 模组，保持开启也无副作用。
tacz-compat:
  enabled: true
  # 是否在控制台输出 Tacz 伤害调试信息（仅排错时使用）。
  debug: false

# ========== 聊天签名绕过（Paper 1.21+ 混合登录兼容）==========
# Paper 1.21+ 引入了安全聊天验证（secure-chat validation），
# LittleSkin / 离线玩家的聊天消息没有 Mojang 签名，会被 Paper 拒绝并提示
# "Chat message validation failure"。
# 启用后，AXS 会在玩家加入时自动移除 Paper 对该玩家的签名验证路径，
# 让混合登录玩家与离线玩家正常发送聊天消息。
# 若服务器仅使用微软正版账号（无 LittleSkin / 离线），可关闭此选项。
chat-sign-bypass:
  enabled: true
  # 智能模式：仅对非正版玩家（LittleSkin / 离线）绕过签名验证。
  # 微软正版玩家保留 Mojang 签名验证，确保其聊天消息仍能被其他正版客户端正确验证。
  # 若设为 false，则对所有玩家统一绕过（旧行为，纯离线服可用）。
  only-for-non-premium: true

# ========== 账号识别（统一服务）==========
# 微软正版 / LittleSkin / 离线账号判定，由本体统一提供，供 loginview、qqbot、eventpacket 共享。
# 该服务在玩家预登录（AsyncPlayerPreLogin）阶段于异步线程预热缓存，避免主线程阻塞网络请求。
# 【重要前提】若同时使用 LittleSkin + 微软正版（混合登录 Mixed Auth Mode）：
#   1. 必须用 AXS 生成的 start-mixed-auth 脚本启动服务器（执行 /axs auth setup 生成）。
#      该脚本会先独立启动 AXS 本地混合代理，再启动服务器，authlib-injector 指向本地代理。
#      （authlib-injector 原生不支持单端正版+外置混合，?mixed 也不是其有效参数）
#   2. server.properties 必须设置 online-mode=true
#      否则 LittleSkin 账号会被分配 v3 UUID，无法与离线玩家区分
#   3. 离线玩家需在 qqbot/loginview 白名单登录配置中设置 deny-offline: false
#      注意：启用 online-mode=true 后，离线玩家无法直接连接服务器
#
# 判定规则：
#   - 查 Mojang API，玩家名在正版数据库存在：
#     - 当前 UUID 与 Mojang 官方 UUID 一致          -> 微软正版
#     - 当前 UUID 与 Mojang 官方 UUID 不同          -> LittleSkin（名字恰好与正版相同）
#   - 玩家名不在 Mojang：
#     - UUID 为 v4                                  -> LittleSkin
#     - UUID 为 v3                                  -> 离线
account-type:
  # 是否查询 Mojang API 识别微软正版账号。
  # 关闭后仅按 UUID 版本判定（v4=LittleSkin，v3=离线），将无法识别微软正版账号。
  enable-mojang-lookup: false
  # Mojang API 请求超时（毫秒）。
  mojang-timeout-ms: 10000
  # Mojang API 代理配置（中国大陆网络环境建议配置）。
  # 例如：mojang-proxy-host: "127.0.0.1"  mojang-proxy-port: 10809
  mojang-proxy-host: ""
  mojang-proxy-port: 0
  # 是否输出账号判定调试日志。
  debug: false

# ========== 多方认证（authlib-injector 管理）==========
# 仅在单端服务器有效。群组服请使用 ArcartXSuite-Proxy 插件。
# 本配置控制 /axs auth setup 命令生成启动脚本时的行为，
# 以及 authlib-injector 版本检测。
auth:
  # 是否启用 authlib-injector 相关功能（混合登录 / 外置登录）。默认禁用。
  # 需要 LittleSkin / 微软正版混合登录时设为 true。
  enabled: false
  # 启动时自动检测 authlib-injector 版本并提示更新
  auto-check-version: false
  # Yggdrasil 认证源（用于 /axs auth setup 生成启动脚本）
  # 【混合登录】若 URL 包含 ?mixed，AXS 会：
  #   1. 生成的 start-mixed-auth 脚本会【先独立启动】本地 Yggdrasil 混合代理（见下方 mixed-proxy-port），
  #      再启动服务器，authlib-injector 指向该本地代理。
  #      这样才能解决 authlib-injector premain 时序问题（代理必须先于服务器存在）。
  #   2. 代理行为：hasJoined 先查 LittleSkin，未命中再 fallback 到 Mojang 官方，
  #      让 LittleSkin 玩家与微软正版玩家都能进服。
  # 注意：?mixed 并非 authlib-injector/LittleSkin 的有效参数，仅是 AXS 的“启用混合代理”开关。
  # 若只需外置登录，改为纯 LittleSkin："https://littleskin.cn/api/yggdrasil"
  yggdrasil-source: "https://littleskin.cn/api/yggdrasil?mixed"
  # 本地混合代理监听端口（固定）。start-mixed-auth 脚本与服务器都使用此端口，
  # authlib-injector 在服务器启动时会连接 http://127.0.0.1:<此端口>。必须是未被占用的端口（1-65535）。
  mixed-proxy-port: 25599

# ========== 客户端数据包防护（防连点 / 防刷）==========
# 针对 ArcartX UI 各模块的客户端回包进行速率限制，防止玩家通过连点器 / 宏脚本刷取资源。
# 以「滑动窗口 + 令牌桶」方式计数：在 window-ms 毫秒内，同一动作最多允许 max-hits 次，
# 超出后根据 mode 进行拦截或惩罚。
#   mode 可选值:
#     silent  — 静默丢弃超出的数据包，玩家无感知（推荐常规操作）。
#     notify  — 丢弃并发送提示消息（notify-message），受 notify-cooldown-ms 冷却限制。
#     punish  — 丢弃并自动执行 punish-command（如 kick / ban 等控制台指令）。
# 各模块可独立覆盖 defaults；actions 下可按动作名进一步细化（如 title 的 equip/unequip 等）。
client-packet-guard:
  enabled: true
  # 清理过期计数器的周期（ticks，20 ticks = 1 秒）。
  # 减小此值可降低内存占用，但会增加清理开销；增大则节省 CPU，但计数器会滞留更久。
  cleanup-interval-ticks: 200
  defaults:
    # 默认时间窗口（毫秒）。
    window-ms: 1000
    # 默认窗口内允许的最大操作次数。
    max-hits: 20
    # 默认拦截模式：silent / notify / punish。
    mode: "silent"
    # 当 mode 为 notify 时发送给玩家的提示消息（支持 & 颜色码）。
    notify-message: "&c操作过快，请稍后再试。"
    # 提示消息的冷却时间（毫秒），防止消息刷屏。
    notify-cooldown-ms: 3000
    # 当 mode 为 punish 时执行的控制台命令。
    # 可用占位符: {player}（玩家名）, {uuid}（玩家 UUID）, {action}（动作名）, {module}（模块名）。
    punish-command: ""
  modules:
    title:
      window-ms: 1000
      max-hits: 4
      mode: "silent"
      actions:
        equip:
          window-ms: 1500
          max-hits: 1
          mode: "notify"
        unequip:
          window-ms: 1500
          max-hits: 1
          mode: "notify"
        unequip_group:
          window-ms: 1500
          max-hits: 1
          mode: "notify"
        unequip_all:
          window-ms: 1500
          max-hits: 1
          mode: "notify"
        hide:
          window-ms: 1500
          max-hits: 1
          mode: "notify"
        unhide:
          window-ms: 1500
          max-hits: 1
          mode: "notify"
    mail:
      window-ms: 1000
      max-hits: 4
      mode: "silent"
      actions:
        compose-send:
          window-ms: 5000
          max-hits: 1
          mode: "notify"
        claimall:
          window-ms: 5000
          max-hits: 1
          mode: "notify"
        deleteall:
          window-ms: 5000
          max-hits: 1
          mode: "notify"
        cdk:
          window-ms: 3000
          max-hits: 1
          mode: "notify"
    questgps:
      window-ms: 500
      max-hits: 4
      mode: "silent"
      actions:
        accept_quest:
          window-ms: 2000
          max-hits: 1
          mode: "notify"
        abandon_quest:
          window-ms: 2000
          max-hits: 1
          mode: "notify"
    map:
      window-ms: 500
      max-hits: 4
      mode: "silent"
      actions:
        unlock_anchor:
          window-ms: 3000
          max-hits: 1
          mode: "notify"
        teleport_anchor:
          window-ms: 3000
          max-hits: 1
          mode: "notify"
        create_waypoint:
          window-ms: 2000
          max-hits: 1
          mode: "notify"
        delete_waypoint:
          window-ms: 2000
          max-hits: 1
          mode: "notify"
    announcer:
      actions:
        click:
          window-ms: 3000
          max-hits: 2
          mode: "notify"
    eventpacket:
      actions:
        client-packet:
          window-ms: 3000
          max-hits: 2
          mode: "notify"
    pickup:
      window-ms: 500
      max-hits: 8
      mode: "silent"
      actions:
        pick:
          window-ms: 1000
          max-hits: 4
          mode: "notify"
        scroll_up:
          window-ms: 500
          max-hits: 8
          mode: "silent"
        scroll_down:
          window-ms: 500
          max-hits: 8
          mode: "silent"
        open_menu:
          window-ms: 1000
          max-hits: 4
          mode: "silent"
        close_menu:
          window-ms: 1000
          max-hits: 4
          mode: "silent"
    loginview:
      actions:
        login:
          window-ms: 3000
          max-hits: 3
          mode: "notify"
        register:
          window-ms: 5000
          max-hits: 2
          mode: "notify"
        change_password:
          window-ms: 5000
          max-hits: 2
          mode: "notify"
    tab:
      actions:
        refresh:
          window-ms: 1500
          max-hits: 1
          mode: "silent"
    essentials:
      window-ms: 1000
      max-hits: 6
      mode: "silent"
      actions:
        menu:
          window-ms: 1000
          max-hits: 4
          mode: "silent"
        admin:
          window-ms: 1000
          max-hits: 4
          mode: "silent"
    regions:
      window-ms: 1000
      max-hits: 6
      mode: "silent"
      actions:
        menu:
          window-ms: 1000
          max-hits: 4
          mode: "silent"
        admin:
          window-ms: 1000
          max-hits: 4
          mode: "silent"
    menu:
      window-ms: 500
      max-hits: 8
      mode: "silent"
      actions:
        click:
          window-ms: 300
          max-hits: 6
          mode: "notify"
        footer:
          window-ms: 500
          max-hits: 4
          mode: "notify"
        esc_open:
          window-ms: 1000
          max-hits: 2
          mode: "silent"
    market:
      window-ms: 500
      max-hits: 6
      mode: "silent"
      actions:
        sell:
          window-ms: 3000
          max-hits: 1
          mode: "notify"
        buy:
          window-ms: 2000
          max-hits: 2
          mode: "notify"
        bid:
          window-ms: 2000
          max-hits: 2
          mode: "notify"
        cancel:
          window-ms: 3000
          max-hits: 1
          mode: "notify"
        recycle:
          window-ms: 1000
          max-hits: 3
          mode: "notify"

modules:
  entitytracker:
    enabled: false
    # EntityTracker 实体追踪
    # 功能：Boss 血条追踪、攻击目标 HUD、伤害统计、掉落预览、奖励发放。
    # 依赖：需安装 MythicMobs（Boss 追踪来源）。
    # 配置文件：modules/entitytracker/src/main/resources/arcartx/ui/ 下的 UI YAML。

  combateffect:
    enabled: false
    # CombatEffect 战斗特效
    # 功能：击杀特效粒子 / 音效、伤害飘字（自定义字体 / 颜色 / 暴击标记）。
    # 关联模块：与 MythicLib / AttributePlus 等属性桥接联动，可读取暴击率等属性。
    # 配置文件：modules/combateffect/ 下的 display 配置。

  eventpacket:
    enabled: false
    # EventPacket 事件引擎
    # 功能：将服务器事件（击杀、登录、完成任务等）封装为结构化数据包，通过 ArcartX 通道推送到客户端，
    #      供 title（称号授予）、chat（聊天卡片）、mail（邮件派发）、questgps（任务导航）等模块消费。
    # 关键配置：监听事件列表与字段映射在模块内部 ArcartXEventPacket.yml 中定义。

  tab:
    enabled: false
    # Tab 在线列表
    # 功能：自定义玩家列表（TAB）显示内容，支持 PlaceholderAPI 变量、分组排序、页脚信息。
    # 注意：需与 ArcartX 客户端配合使用；纯服务端不会生效。

  title:
    enabled: false
    # Title 称号系统
    # 功能：多槽位称号装备、称号属性加成、称号显示与隐藏、称号授予（通过 EventPacket 触发）。
    # 配置文件：ArcartXTitle.yml（称号定义与属性），修改后执行 /axs title reload。

  conversation:
    enabled: false
    # Conversation 对话系统
    # 功能：NPC 对话树、分支选项、对话内执行命令 / 给予物品、条件分支（PlaceholderAPI 条件）。
    # 配置文件：ArcartXConversation.yml（对话定义与桥接），修改后执行 /axs conversation reload。

  announcer:
    enabled: false
    # Announcer 播报系统
    # 功能：定时全服 HUD 公告（顶部横幅）、打字机式逐字字幕、点击执行指令、条件显示（PAPI 条件）。

  pickup:
    enabled: false
    # Pickup 拾取提示
    # 功能：玩家拾取物品时在屏幕中央显示物品图标与名称（类似 RPG 拾取反馈），支持稀有度颜色区分。

  prop:
    enabled: false
    # Prop 快捷道具
    # 功能：将物品绑定为快捷技能道具，右键 / 按键触发，支持冷却、消耗、PlaceholderAPI 条件判断。
    # 依赖：需 MythicMobs（技能来源）或 AttributePlus / MythicLib（属性道具）。

  rgb:
    enabled: false
    # RGB 渐变文本
    # 功能：动态彩虹 / 自定义渐变色文本，支持聊天、称号、公告等场景。
    # 配置文件：ArcartXRGB.yml（渐变模板与速度），修改后执行 /axs rgb reload。

  onlinerewards:
    enabled: false
    # OnlineRewards 在线奖励
    # 功能：累计在线时长奖励、每日签到、连续签到加成、奖励预览与一键领取。

  loginview:
    enabled: false
    # LoginView 登录界面
    # 功能：自定义登录 / 注册 / 改密 UI，支持密码强度验证、验证码、皮肤头像显示。
