# =============================================================================
# QuestGPS 主线 overlay 示例
# -----------------------------------------------------------------------------
# 根键 = Chemdah Template.getId()（裸 ID，不要路径式 main/xxx）
#
# 进任务视图（当 config.yml 的 discovery.mode: overlay 时）：
#   1. 本文件 enabled: true
#   2. Chemdah 存在同名任务id
#   3. Chemdah meta.type 在 config.yml 的 categories 里已注册
#
# 本示例对应分类 Tab「主线」：Chemdah 里应写 meta.type: mainline
#
# UI 文字（名称/描述/目标/奖励预览）：
#   由 config.yml 的 presentation.source 决定（默认 chemdah = 读 Chemdah）
#   若要让本任务改读 overlay 字段，写 presentation: { source: overlay }
#
# 更多字段说明见 side.yml / encounter.yml / custom_example.yml
# =============================================================================

example_mainline_quest:
  enabled: true                         # false = 不进任务菜单（overlay 白名单模式）
  sort-order: 0                         # 菜单排序，越小越靠前
  allow-abandon: false                  # 是否显示「放弃」按钮（主线建议 false）
  # category 仅 category.source=overlay 时必填；chemdah 模式由 meta.type 决定
  # category: mainline
  required-mainline: []                 # 接取前须完成的主线 ID 列表
  hooks:                                # 各阶段 EventPacket command-signal
    triggered:                          # 任务出现在菜单 / 被 offer
      - "questgps_main_triggered"
    accepted:                           # Chemdah 接取成功
      - "questgps_main_accepted"
    completed:                          # 任务完成
      - "questgps_main_completed"
    track-changed:                      # 开始/取消导航追踪
      - "questgps_track_changed"
  navigation:                           # hybrid 时 Chemdah tracker 优先，此处作回退坐标
    enabled: true
    point:
      world: "world"
      x: 0
      y: 80
      z: 0
      title: "初入岛屿"
      style-id: "default"               # ArcartX waypoint 样式
      map-label: "主线目标"             # 同步到 Map 模块的标签
  tasks:                                # key = Chemdah 子目标 ID（常为 "0"、"1"…）
    "0":
      sort-order: 10
      navigation:                       # 该子目标独立导航点（覆盖任务级 navigation）
        world: "world"
        x: 12
        y: 80
        z: -8
        title: "与长老对话"
        style-id: "default"
        map-label: "任务目标"
