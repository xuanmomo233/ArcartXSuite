# AXS 资源说明
# 用途: OnlineRewards 模块默认菜单，用于签到、查看在线阶段奖励和签到奖励。
# 前置依赖: ArcartX；OnlineRewards 模块启用后会自动注册或导出。
# 启用开关: config.yml -> modules.onlinerewards.enabled + modules.onlinerewards.password
# 关联文件: ArcartXOnlineRewards.yml
# 重载命令: /axs onlinereward reload
ui:
  isHud: false
  background: true
  closeDied: true
  escClose: true
  through: false
  screenScale: true
  show: true
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.dailyTimeText = packet['dailyTimeText']
      var.weeklyTimeText = packet['weeklyTimeText']
      var.monthlyTimeText = packet['monthlyTimeText']
      var.totalTimeText = packet['totalTimeText']
      var.progress = packet['progress']
      var.progressPercent = packet['progressPercent']
      var.progressPercentText = packet['progressPercentText']
      var.progressTitle = packet['progressTitle']
      var.completed = packet['completed']
      var.rewardStage = packet['rewardStage']
      var.rewardCount = packet['rewardCount']
      var.rewardStageText = packet['rewardStageText']
      var.signedToday = packet['signedToday']
      var.signInStatusText = packet['signInStatusText']
      var.signInButtonText = packet['signInButtonText']
      var.signInStreak = packet['signInStreak']
      var.signInTotal = packet['signInTotal']
      var.makeupCardCount = packet['makeupCardCount']
      var.calendarMonthText = packet['calendarMonthText']
      var.calendarCount = packet['calendarCount']
      var.calendarMonthOffset = packet['calendarMonthOffset']
      var.selectedDateText = packet['selectedDateText']
      var.selectedCanMakeup = packet['selectedCanMakeup']
      var.selectedAction = packet['selectedAction']
      var.selectedActionText = packet['selectedActionText']
      var.selectedActionEnabled = packet['selectedActionEnabled']
      var.rewardRows = packet['rewardRows']
      var.signInRewardRows = packet['signInRewardRows']
      var.calendarRows = packet['calendarRows']
      var.selectedRewardRows = packet['selectedRewardRows']
    update: |-
      var.packetId = packet['packetId']
      var.dailyTimeText = packet['dailyTimeText']
      var.weeklyTimeText = packet['weeklyTimeText']
      var.monthlyTimeText = packet['monthlyTimeText']
      var.totalTimeText = packet['totalTimeText']
      var.progress = packet['progress']
      var.progressPercent = packet['progressPercent']
      var.progressPercentText = packet['progressPercentText']
      var.progressTitle = packet['progressTitle']
      var.completed = packet['completed']
      var.rewardStage = packet['rewardStage']
      var.rewardCount = packet['rewardCount']
      var.rewardStageText = packet['rewardStageText']
      var.signedToday = packet['signedToday']
      var.signInStatusText = packet['signInStatusText']
      var.signInButtonText = packet['signInButtonText']
      var.signInStreak = packet['signInStreak']
      var.signInTotal = packet['signInTotal']
      var.makeupCardCount = packet['makeupCardCount']
      var.calendarMonthText = packet['calendarMonthText']
      var.calendarCount = packet['calendarCount']
      var.calendarMonthOffset = packet['calendarMonthOffset']
      var.selectedDateText = packet['selectedDateText']
      var.selectedCanMakeup = packet['selectedCanMakeup']
      var.selectedAction = packet['selectedAction']
      var.selectedActionText = packet['selectedActionText']
      var.selectedActionEnabled = packet['selectedActionEnabled']
      var.rewardRows = packet['rewardRows']
      var.signInRewardRows = packet['signInRewardRows']
      var.calendarRows = packet['calendarRows']
      var.selectedRewardRows = packet['selectedRewardRows']
  action:
    load: |-
      var.maxRewardCount = 32
      var.maxSelectedRewardCount = 32
      var.calendarCount = 31
    open: |-
      var.packetId = 'AXS_ONLINE_REWARDS'
      var.dailyTimeText = '0分钟'
      var.weeklyTimeText = '0分钟'
      var.monthlyTimeText = '0分钟'
      var.totalTimeText = '0分钟'
      var.progress = 0
      var.progressPercent = 0
      var.progressPercentText = '0'
      var.progressTitle = '等待同步'
      var.completed = false
      var.rewardStage = 0
      var.rewardCount = 0
      var.rewardStageText = '0/0'
      var.signedToday = false
      var.signInStatusText = '今日未签到'
      var.signInButtonText = '立即签到'
      var.signInStreak = 0
      var.signInTotal = 0
      var.makeupCardCount = 0
      var.calendarMonthText = ''
      var.calendarMonthOffset = 0
      var.selectedDateText = ''
      var.selectedCanMakeup = false
      var.selectedAction = 'none'
      var.selectedActionText = '等待同步'
      var.selectedActionEnabled = false
      var.rewardRows = {}
      var.signInRewardRows = {}
      var.calendarRows = {}
      var.selectedRewardRows = {}
controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      panel:
        type: Canvas
        attribute:
          point: ~middle_center
          width: 1400
          height: 820
        children:
          bg:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: ~95,95,95,220
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 3
                color: ~255,255,255,255
              shadow:
                xOffset: 2
                yOffset: 2
                blur: 5
                color: ~255,255,255,75
              ripple:
                duration: 1200
                color: ~255,255,255,110
                width: 0.05
          title:
            type: Text
            attribute:
              x: 36
              y: 28
              texts: "~&f在线奖励"
              fontSize: 64
          subtitle:
            type: Text
            attribute:
              x: 36
              y: 70
              texts: "'&f今日阶段 ' + var.rewardStageText + '   &8签到 ' + var.signInStatusText"
              fontSize: 49
          refresh:
            type: Texture
            attribute:
              x: 1238
              y: 30
              width: 120
              height: 42
              normal: ~255,255,255,150
              shape: ~round_rect
              radius: 12
              texts: "~&0刷新"
              center: true
              fontSize: 49
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'refresh')
          progress_box:
            type: Texture
            attribute:
              x: 36
              y: 112
              width: 640
              height: 186
              normal: ~255,255,255,130
              shape: ~round_rect
              radius: 18
            effect:
              stroke:
                width: 2
                color: ~0,0,0,120
          progress_title:
            type: Text
            attribute:
              x: 62
              y: 136
              texts: "'&0' + var.progressTitle + ' &8/ &7' + var.progressPercentText + '%'"
              fontSize: 49
          progress_track:
            type: Texture
            attribute:
              x: 62
              y: 182
              width: 520
              height: 24
              normal: ~60,64,72,185
              shape: ~round_rect
              radius: 12
          progress_fill:
            type: Texture
            attribute:
              x: 62
              y: 182
              width: "var.progress * 520"
              height: 24
              normal: ~75,175,120,255
              shape: ~round_rect
              radius: 12
          time_daily_weekly:
            type: Text
            attribute:
              x: 62
              y: 232
              texts: "'&7今日 &0' + var.dailyTimeText + '  &7本周 &0' + var.weeklyTimeText"
              fontSize: 49
          time_monthly_total:
            type: Text
            attribute:
              x: 62
              y: 262
              texts: "'&7本月 &0' + var.monthlyTimeText + '  &7总计 &0' + var.totalTimeText"
              fontSize: 49
          signin_box:
            type: Texture
            attribute:
              x: 706
              y: 112
              width: 652
              height: 186
              normal: ~255,255,255,130
              shape: ~round_rect
              radius: 18
            effect:
              stroke:
                width: 2
                color: ~0,0,0,120
          signin_title:
            type: Text
            attribute:
              x: 732
              y: 136
              texts: "~&0每日签到"
              fontSize: 49
          signin_state:
            type: Text
            attribute:
              x: 732
              y: 178
              texts: "'&7状态 &0' + var.signInStatusText + '   &7连续 &0' + var.signInStreak.round(0) + '天   &7累计 &0' + var.signInTotal.round(0) + '天   &7补签卡数量 &0' + var.makeupCardCount.round(0)"
              fontSize: 49
          signin_button:
            type: Texture
            attribute:
              x: 732
              y: 232
              width: 190
              height: 46
              normal: "var.selectedActionEnabled ? '75,175,120,255' : '185,188,195,255'"
              shape: ~round_rect
              radius: 14
              texts: "'&0' + var.selectedActionText"
              center: true
              fontSize: 49
            action:
              clickLeft: |-
                if(var.selectedAction == 'signin'){
                  Packet.send(var.packetId, 'signin')
                }elif(var.selectedAction == 'makeup'){
                  Packet.send(var.packetId, 'makeup', var.selectedDateText)
                }
          reward_box:
            type: Texture
            attribute:
              x: 36
              y: 326
              width: 640
              height: 458
              normal: ~255,255,255,130
              shape: ~round_rect
              radius: 18
            effect:
              stroke:
                width: 2
                color: ~0,0,0,120
          reward_title:
            type: Text
            attribute:
              x: 62
              y: 350
              texts: "~&0在线阶段奖励"
              fontSize: 49
          奖励滑块:
            type: Texture
            val: 奖励滑块
            attribute:
              x: 644
              y: 392
              width: 6
              height: 50
              normal: ~120,120,120,200
              maxDragY: 310
          reward_scroll:
            type: Scroll
            attribute:
              x: 62
              y: 392
              width: 588
              height: 360
              moveY: "self.parent['奖励滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['奖励滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['奖励滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              reward_stack:
                val: reward_stack
                type: VStack
                attribute:
                  width: 588
                  spaceBetween: 10
                action:
                  create: |-
                    for(i in range(0, var.maxRewardCount)){
                      key = i.round
                      ri = self['item'].copy('item' + key)
                      ri.entryKey = key
                    }
                children:
                  item:
                    type: Texture
                    attribute:
                      entryKey: 0
                      entry: var.rewardRows[self.entryKey]
                      width: 588
                      height: 74
                      normal: "self.entry != null && self.entry['current'] ? '110,170,230,255' : '120,120,125,255'"
                      shape: ~round_rect
                      radius: 14
                      visible: self.entry != null
                    children:
                      title:
                        type: Text
                        attribute:
                          x: 18
                          y: 12
                          texts: "self.parent.entry != null ? '&0' + self.parent.entry['name'] : ''"
                          fontSize: 36
                      meta:
                        type: Text
                        attribute:
                          x: 18
                          y: 42
                          texts: "self.parent.entry != null ? '&7' + self.parent.entry['thresholdText'] + '   &8' + self.parent.entry['rewardText'] : ''"
                          fontSize: 36
                      state:
                        type: Text
                        attribute:
                          x: 476
                          y: 25
                          texts: "self.parent.entry != null ? (self.parent.entry['claimed'] ? '&a已领取' : (self.parent.entry['current'] ? '&e进行中' : '&7未达成')) : ''"
                          fontSize: 36
          signin_reward_box:
            type: Texture
            attribute:
              x: 706
              y: 326
              width: 652
              height: 458
              normal: ~255,255,255,130
              shape: ~round_rect
              radius: 18
            effect:
              stroke:
                width: 2
                color: ~0,0,0,120
          signin_reward_title:
            type: Text
            attribute:
              x: 732
              y: 350
              texts: "'&0签到日历 &8/ &7' + var.calendarMonthText"
              fontSize: 49
          calendar_prev:
            type: Texture
            attribute:
              x: 1090
              y: 350
              width: 58
              height: 34
              normal: ~255,255,255,150
              shape: ~round_rect
              radius: 10
              texts: "~&0<"
              center: true
              fontSize: 36
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'calendar_prev')
          calendar_today:
            type: Texture
            attribute:
              x: 1158
              y: 350
              width: 80
              height: 34
              normal: ~255,255,255,150
              shape: ~round_rect
              radius: 10
              texts: "~&0本月"
              center: true
              fontSize: 36
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'calendar_today')
          calendar_next:
            type: Texture
            attribute:
              x: 1248
              y: 350
              width: 58
              height: 34
              normal: ~255,255,255,150
              shape: ~round_rect
              radius: 10
              texts: "~&0>"
              center: true
              fontSize: 36
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'calendar_next')
          calendar_grid:
            type: HGrid
            attribute:
              x: 732
              y: 396
              width: 600
              height: 230
              column: 7
              spaceBetweenX: 8
              spaceBetweenY: 8
            action:
              create: |-
                for(i in range(0, var.calendarCount)){
                  key = i.round
                  di = self['日历模板'].copy('day_' + key)
                  di.entryKey = key
                }
            children:
              日历模板:
                type: Texture
                attribute:
                  entryKey: 0
                  entry: var.calendarRows[self.entryKey]
                  width: 78
                  height: 42
                  normal: "self.entry == null ? '255,255,255,0' : (self.entry['status'] == 'signed' ? '75,175,120,255' : (self.entry['status'] == 'expired' ? '210,90,90,255' : '95,95,95,255'))"
                  shape: ~round_rect
                  radius: 10
                  texts: "self.entry == null ? '' : ('&0' + self.entry['label'])"
                  center: true
                  fontSize: 49
                  visible: self.entry != null
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'preview_day', self.entry['date'])
                children:
                  selected:
                    type: Texture
                    attribute:
                      through: true
                      width: 78
                      height: 42
                      normal: "self.parent.entry == null ? '255,255,255,0' : (self.parent.entry['status'] == 'signed' ? '75,175,120,255' : (self.parent.entry['status'] == 'expired' ? '210,90,90,255' : '95,95,95,255'))"
                      shape: ~round_rect
                      radius: 10
                      texts: "self.parent.entry == null ? '' : ('&0' + self.parent.entry['label'])"
                      center: true
                      fontSize: 49
                      visible: self.parent.entry != null && self.parent.entry['date'] == var.selectedDateText
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                  today:
                    type: Text
                    attribute:
                      through: true
                      x: 54
                      y: 20
                      visible: self.parent.entry != null && self.parent.entry['today']
                      texts: "~&6今"
                      fontSize: 36
          selected_date_title:
            type: Text
            attribute:
              x: 732
              y: 642
              texts: "'&0' + var.selectedDateText + ' &7可能奖励'"
              fontSize: 36
          日期奖励滑块:
            type: Texture
            val: 日期奖励滑块
            attribute:
              x: 1156
              y: 674
              width: 6
              height: 20
              normal: ~120,120,120,200
              maxDragY: 66
          selected_reward_scroll:
            type: Scroll
            attribute:
              x: 732
              y: 674
              width: 430
              height: 86
              moveY: "self.parent['日期奖励滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['日期奖励滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['日期奖励滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              selected_reward_stack:
                val: selected_reward_stack
                type: VStack
                attribute:
                  width: 430
                  spaceBetween: 6
                action:
                  create: |-
                    for(i in range(0, var.maxSelectedRewardCount)){
                      key = i.round
                      sri = self['item'].copy('item' + key)
                      sri.entryKey = key
                    }
                children:
                  item:
                    type: Texture
                    attribute:
                      entryKey: 0
                      entry: var.selectedRewardRows[self.entryKey]
                      width: 430
                      height: 52
                      normal: ~255,255,255,120
                      shape: ~round_rect
                      radius: 10
                      visible: self.entry != null
                    children:
                      title:
                        type: Text
                        attribute:
                          x: 12
                          y: 6
                          texts: "self.parent.entry != null ? self.parent.entry['title'] : ''"
                          fontSize: 28
                      trigger:
                        type: Text
                        attribute:
                          x: 12
                          y: 28
                          texts: "self.parent.entry != null ? '&7' + self.parent.entry['trigger'] + '   &8' + self.parent.entry['rewardText'] : ''"
                          fontSize: 24
