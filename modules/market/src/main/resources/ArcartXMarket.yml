config-version: 1
# AXS Market 全球市场
# 作用: 系统商店、玩家拍卖行、回收商店三合一市场系统。
# 重载: /axs market reload
# 玩家入口: /market 打开主菜单。
# PAPI: %AXSmarket_auction_count%、%AXSmarket_my_listings% 等。

settings:
  debug: false
  # 定时任务间隔（tick），用于到期检查、竞价结算
  scheduler-interval-ticks: 200

ui:
  shop-id: "AXS:market_shop"
  shop-file: "arcartx/ui/market_shop.yml"
  auction-id: "AXS:market_auction"
  auction-file: "arcartx/ui/market_auction.yml"
  recycle-id: "AXS:market_recycle"
  recycle-file: "arcartx/ui/market_recycle.yml"
  history-id: "AXS:market_history"
  history-file: "arcartx/ui/market_history.yml"
  packet-id: "AXS_MARKET"
  register-ui-on-enable: true
  overwrite-ui-files: false

storage:
  # 存储模式: sqlite（默认，零依赖） 或 mysql（需自行搭建）
  mode: "sqlite"
  sqlite:
    file: "market.db"
  mysql:
    host: "127.0.0.1"
    port: 3306
    database: "arcartxsuite"
    username: "root"
    password: ""
    table-prefix: "axs_market_"
  pool-size: 8

redis:
  enabled: false
  host: "127.0.0.1"
  port: 6379
  password: ""
  database: 0
  channel: "axs:market:sync"
  # 拍卖行列表缓存过期时间（秒）
  cache-ttl-seconds: 60

# ─── 拍卖行 ─────────────────────────────────────────────
auction:
  enabled: true
  # 上架时长范围（秒）
  min-duration-seconds: 3600
  max-duration-seconds: 604800
  # 默认上架时长（秒）= 24小时
  default-duration-seconds: 86400
  # 最大同时上架数量
  max-listings-per-player: 10
  # 竞价最低加价比例（0.05 = 5%）
  min-bid-increment-ratio: 0.05
  # 竞价最低加价绝对值（与比例取较大值）
  min-bid-increment-absolute: 10
  # 上架手续费（固定）
  listing-fee: 0
  # 上架手续费货币
  listing-fee-currency: "money"
  # 成交税率（0.05 = 5%）
  transaction-tax-rate: 0.05
  # 税费货币（从卖家收入中扣除）
  transaction-tax-currency: "money"
  # VIP 税率减免
  tax-discount:
    "axsmarket.vip": 0.02
    "axsmarket.mvp": 0.01
  # 到期未售物品退回方式: mail / inventory
  expired-return-method: "mail"
  # 竞价被超越时通知方式: chat / actionbar / title
  outbid-notify: "chat"
  # 物品黑名单
  blacklist:
    material-ids: []
    mythic-item-ids: []
    neige-item-ids: []
    name-contains:
      - "绑定"
    lore-contains:
      - "不可交易"
    name-regex: []
    lore-regex: []
  # 分类定义
  categories:
    weapon:
      display-name: "&c武器"
      priority: 10
      nbt:
        path: "pdc:arcartx:item_category"
        values: ["weapon"]
    armor:
      display-name: "&9防具"
      priority: 20
      nbt:
        path: "pdc:arcartx:item_category"
        values: ["armor", "equipment"]
    material:
      display-name: "&a材料"
      priority: 30
      nbt:
        path: "pdc:arcartx:item_category"
        values: ["material"]
    consumable:
      display-name: "&e消耗品"
      priority: 40
      nbt:
        path: "pdc:arcartx:item_category"
        values: ["consumable", "food", "potion"]
    other:
      display-name: "&7其他"
      priority: 9999
      default: true

# ─── 系统商店 ────────────────────────────────────────────
shop:
  enabled: true
  # 商店定义目录（相对模块数据目录）
  shops-directory: "shops"
  # 全局刷新间隔（tick），用于限时商品刷新
  refresh-interval-ticks: 6000
  # 默认货币
  default-currency: "money"

# ─── 回收商店 ────────────────────────────────────────────
recycle:
  enabled: true
  # 回收表定义目录（相对模块数据目录）
  recycle-directory: "recycle"
  # 默认回收货币
  default-currency: "money"
  # 是否允许自动回收（拾取时）
  allow-auto-recycle: true
  # 批量回收确认（避免误操作）
  batch-confirm: true
  # 回收价格倍率（权限组）
  price-multiplier:
    "axsmarket.recycle.vip": 1.2
    "axsmarket.recycle.mvp": 1.5

messages:
  prefix: "&8[&6AXS市场&8] &7"
  auction-listed: "&a物品已成功上架！"
  auction-bought: "&a购买成功！"
  auction-bid-placed: "&a出价成功！当前最高出价: &e%amount%"
  auction-outbid: "&c您对 &e%item% &c的出价已被超越！新最高价: &e%amount%"
  auction-expired: "&7您上架的 &e%item% &7已到期，已退回。"
  auction-sold: "&a您上架的 &e%item% &a已售出！收入: &e%amount%"
  auction-cancelled: "&7已取消上架。"
  shop-bought: "&a购买成功！花费: &e%amount%"
  shop-limit-reached: "&c该商品已达购买上限。"
  recycle-success: "&a回收成功！获得: &e%amount%"
  recycle-nothing: "&7背包中没有可回收的物品。"
  insufficient-funds: "&c余额不足。"
  item-blacklisted: "&c该物品不允许上架。"
