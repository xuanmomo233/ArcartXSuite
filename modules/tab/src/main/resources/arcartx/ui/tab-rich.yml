ui:
  isHud: true
  hide:
  - player_list
  escClose: false
  defaultOpen: true
  action:
    load: |-
      var.RichTAB刷新轮次 = 0
      var.RichTAB显示 = false
    keyPress: |-
      if(self.currentKeyPress() == "TAB"){
        Packet.send("TAB","update")
        var.RichTAB单列数量 = math.ceil(server.server_online / val.RichTAB遍历.row)
        var.RichTAB第一列人数 = math.min(server.server_online, 15)
        var.RichTAB显示 = true
      }
    keyRelease: |-
      if(self.currentKeyReleased() == "TAB"){
        var.RichTAB显示 = false
      }
  packetHandler:
    # 完整版示例：消费 map 形态 pack（uuid / name / ping / health 等字段）。
    # 服务端配置参考 ArcartXTab.yml 中的 tabs.demo，pack 写法为：
    #   pack:
    #     uuid: "{player_uuid}"
    #     name: "%axstab_pvp_color%%axstab_vanish_color%%player_name%"
    #     ping: "%axstab_ping_icon%"
    #     health: "%player_health%"
    tab: |-
      i = 0
      var.RichTAB刷新轮次 = var.RichTAB刷新轮次 + 1
      while(val.RichTAB遍历2.childrenCount() > 1){
        val.RichTAB遍历2.get(1).remove()
      }
      //与 tab.yml 同样使用伪判断绕过 ax 控件复制 BUG
      while(i <= packet.size()){
        if(val.player_row.width == 320){
          ROW = val.player_row.copy('rich_player_' + var.RichTAB刷新轮次 + '_' + i)
          ROW['头部'].normal = 'PlayerSkin:' + packet.get(i).uuid
          ROW['名称文字'].texts = packet.get(i).name
          ROW['ping_text'].texts = packet.get(i).ping
          ROW.visible = true
          i++
        }
      }
      var.RichTAB单列数量 = math.ceil(server.server_online / val.RichTAB遍历.row)
      var.RichTAB第一列人数 = math.min(server.server_online, 15)
controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~top_center
      width: 1920
      height: 1080
    children:
      RichTAB背景:
        type: Texture
        attribute:
          point: ~top_center
          width: 50 + 322 * var.RichTAB单列数量
          height: 70 + 32 * var.RichTAB第一列人数
          y: 40
          normal: ~Frosted:30;0,0,0,255
          visible: var.RichTAB显示
          shape: ~round_rect
          radius: 20
        effect:
          stroke:
            width: 3
            color: ~0,0,0,255
        children:
          标题:
            type: Text
            attribute:
              y: 23
              x: 26
              fontSize: 33
              texts: "'&a在线玩家（完整版）：'"
              lineSpace: 8
          RichTAB遍历:
            type: VGrid
            val: RichTAB遍历
            attribute:
              spaceBetweenY: 2
              spaceBetweenX: 2
              row: 15
              y: 60
              x: 26
            action:
              create: |-
                for(i in range(1, 119)){
                  ROW = self['ROW'].copy('ROW' + i)
                  ROW.ID = i
                }
            children:
              ROW:
                type: Texture
                val: ROW
                attribute:
                  point: ~top_center
                  width: 320
                  height: 30
                  shape: ~round_rect
                  radius: 8
                  ID: 0
                  normal: ~95,95,95,200
                  visible: var.RichTAB显示 && self.ID < server.server_online
          RichTAB遍历2:
            type: VGrid
            val: RichTAB遍历2
            attribute:
              spaceBetweenY: 2
              spaceBetweenX: 2
              row: 15
              y: 60
              x: 26
            children:
              player_row:
                type: Canvas
                val: player_row
                attribute:
                  width: 320
                  height: 30
                  x: 4
                  y: 4
                  visible: false
                children:
                  头部:
                    type: Texture
                    attribute:
                      width: 28
                      height: 28
                      x: 0
                      y: 0
                      shape: ~round_rect
                      radius: 4
                      normal: "~120,120,120,255"
                  名称文字:
                    type: Text
                    attribute:
                      x: 36
                      y: 0
                      fontSize: 28
                      texts: "~none"
                      lineSpace: 4
                  ping_text:
                    type: Text
                    attribute:
                      x: 250
                      y: 0
                      fontSize: 28
                      texts: "~none"
                      lineSpace: 4
