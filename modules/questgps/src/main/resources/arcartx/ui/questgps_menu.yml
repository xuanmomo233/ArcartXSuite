ui:
  background: true
  escClose: true
  closeDied: true
  through: false
  screenScale: true
  show: true
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.categories = packet['categories']
      var.pages = packet['pages']
      var.quests = packet['quests']
      var.tasks = packet['tasks']
      var.rewards = packet['rewards']
      var.categoryId = packet['categoryId']
      var.pageId = packet['pageId']
      var.categoryName = packet['categoryName']
      var.pageName = packet['pageName']
      var.availableCount = packet['availableCount']
      var.activeCount = packet['activeCount']
      var.completedCount = packet['completedCount']
      var.questCount = packet['questCount']
      var.navigationReady = packet['navigationReady']
      var.selectedQuestId = packet['selectedQuestId']
      var.selectedQuestName = packet['selectedQuestName']
      var.selectedQuestState = packet['selectedQuestState']
      var.selectedQuestPath = packet['selectedQuestPath']
      var.selectedQuestDescriptionText = packet['selectedQuestDescriptionText']
      var.trackSummary = packet['trackSummary']
      var.canAccept = packet['canAccept']
      var.canAbandon = packet['canAbandon']
      var.canTrackQuest = packet['canTrackQuest']
      var.canTrackTask = packet['canTrackTask']
      var.canClearTrack = packet['canClearTrack']
      var.questTracked = packet['questTracked']
      var.taskCount = packet['taskCount']
      var.rewardCount = packet['rewardCount']
      var.catKeys = var.categories.keys()
      var.catIndex = 0
      for(key in var.catKeys){
        item = val.cat_list['分类项' + var.catIndex.round()]
        if(item != none){ item.entryKey = key }
        var.catIndex = var.catIndex + 1
      }
      while(var.catIndex < 8){
        item = val.cat_list['分类项' + var.catIndex.round()]
        if(item != none){ item.entryKey = none }
        var.catIndex = var.catIndex + 1
      }
      var.qKeys = var.quests.keys()
      var.qIndex = 0
      for(key in var.qKeys){
        item = val.quest_list['任务项' + var.qIndex.round()]
        if(item != none){
          item.entryKey = key
        }
        var.qIndex = var.qIndex + 1
      }
      while(var.qIndex < 16){
        item = val.quest_list['任务项' + var.qIndex.round()]
        if(item != none){
          item.entryKey = none
        }
        var.qIndex = var.qIndex + 1
      }
      var.tKeys = var.tasks.keys()
      var.tIndex = 0
      for(key in var.tKeys){
        item = val.task_list['目标项' + var.tIndex.round()]
        if(item != none){
          item.entryKey = key
        }
        var.tIndex = var.tIndex + 1
      }
      while(var.tIndex < 8){
        item = val.task_list['目标项' + var.tIndex.round()]
        if(item != none){ item.entryKey = none }
        var.tIndex = var.tIndex + 1
      }
      var.rKeys = var.rewards.keys()
      var.rIndex = 0
      for(key in var.rKeys){
        item = val.reward_list['奖励项' + var.rIndex.round()]
        if(item != none){
          item.entryKey = key; if(item['奖励图标'] != none){ item['奖励图标'].seticon() }
        }
        var.rIndex = var.rIndex + 1
      }
      while(var.rIndex < 8){
        item = val.reward_list['奖励项' + var.rIndex.round()]
        if(item != none){
          item.entryKey = none
        }
        var.rIndex = var.rIndex + 1
      }
    update: |-
      var.packetId = packet['packetId']
      var.categories = packet['categories']
      var.pages = packet['pages']
      var.quests = packet['quests']
      var.tasks = packet['tasks']
      var.rewards = packet['rewards']
      var.categoryId = packet['categoryId']
      var.pageId = packet['pageId']
      var.categoryName = packet['categoryName']
      var.pageName = packet['pageName']
      var.availableCount = packet['availableCount']
      var.activeCount = packet['activeCount']
      var.completedCount = packet['completedCount']
      var.questCount = packet['questCount']
      var.navigationReady = packet['navigationReady']
      var.selectedQuestId = packet['selectedQuestId']
      var.selectedQuestName = packet['selectedQuestName']
      var.selectedQuestState = packet['selectedQuestState']
      var.selectedQuestPath = packet['selectedQuestPath']
      var.selectedQuestDescriptionText = packet['selectedQuestDescriptionText']
      var.trackSummary = packet['trackSummary']
      var.canAccept = packet['canAccept']
      var.canAbandon = packet['canAbandon']
      var.canTrackQuest = packet['canTrackQuest']
      var.canTrackTask = packet['canTrackTask']
      var.canClearTrack = packet['canClearTrack']
      var.questTracked = packet['questTracked']
      var.taskCount = packet['taskCount']
      var.rewardCount = packet['rewardCount']
      var.catKeys = var.categories.keys()
      var.catIndex = 0
      for(key in var.catKeys){
        item = val.cat_list['分类项' + var.catIndex.round()]
        if(item != none){
          item.entryKey = key
        }
        var.catIndex = var.catIndex + 1
      }
      while(var.catIndex < 8){
        item = val.cat_list['分类项' + var.catIndex.round()]
        if(item != none){
          item.entryKey = none
        }
        var.catIndex = var.catIndex + 1
      }
      var.qKeys = var.quests.keys()
      var.qIndex = 0
      for(key in var.qKeys){
        item = val.quest_list['任务项' + var.qIndex.round()]
        if(item != none){
          item.entryKey = key
        }
        var.qIndex = var.qIndex + 1
      }
      while(var.qIndex < 16){
        item = val.quest_list['任务项' + var.qIndex.round()]
        if(item != none){
          item.entryKey = none
        }
        var.qIndex = var.qIndex + 1
      }
      var.tKeys = var.tasks.keys()
      var.tIndex = 0
      for(key in var.tKeys){
        item = val.task_list['目标项' + var.tIndex.round()]
        if(item != none){
          item.entryKey = key
        }
        var.tIndex = var.tIndex + 1
      }
      while(var.tIndex < 8){
        item = val.task_list['目标项' + var.tIndex.round()]
        if(item != none){
          item.entryKey = none
        }
        var.tIndex = var.tIndex + 1
      }
      var.rKeys = var.rewards.keys()
      var.rIndex = 0
      for(key in var.rKeys){
        item = val.reward_list['奖励项' + var.rIndex.round()]
        if(item != none){
          item.entryKey = key
          if(item['奖励图标'] != none){
            item['奖励图标'].seticon()
          }
        }
        var.rIndex = var.rIndex + 1
      }
      while(var.rIndex < 8){
        item = val.reward_list['奖励项' + var.rIndex.round()]
        if(item != none){
          item.entryKey = none
        }
        var.rIndex = var.rIndex + 1
      }
  action:
    load: |-
      var.packetId = 'AXS_QUESTGPS'
      var.categories = {}
      var.pages = {}
      var.quests = {}
      var.tasks = {}
      var.rewards = {}
      var.categoryId = none
      var.pageId = none
      var.categoryName = none
      var.pageName = '可接取'
      var.availableCount = 0
      var.activeCount = 0
      var.completedCount = 0
      var.questCount = 0
      var.navigationReady = false
      var.selectedQuestId = none
      var.selectedQuestName = '暂无任务'
      var.selectedQuestState = none
      var.selectedQuestPath = none
      var.selectedQuestDescriptionText = '当前分类下没有可展示的任务。'
      var.trackSummary = '当前未设置导航'
      var.canAccept = false
      var.canAbandon = false
      var.canTrackQuest = false
      var.canTrackTask = false
      var.canClearTrack = false
      var.questTracked = false
      var.taskCount = 0
      var.rewardCount = 0

controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      面板:
        type: Canvas
        attribute:
          point: ~middle_center
          width: 1400
          height: 820
        children:
          背景:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: ~95,95,95,220
              shape: ~round_rect
              radius: 28
            effect:
              stroke:
                width: 2
                color: ~80,180,255,180
              shadow:
                xOffset: 2
                yOffset: 2
                blur: 5
                color: ~255,255,255,75
          标题:
            type: Text
            attribute:
              x: 40
              y: 30
              fontSize: 64
              texts: "'&f&l任务总览  &r&7' + var.categoryName + ' · ' + var.pageName"
          关闭:
            type: Texture
            attribute:
              x: 1304
              y: 24
              width: 56
              height: 56
              normal: ~180,60,60,200
              hover: ~Frosted:0;220,80,80,230
              shape: ~round_rect
              radius: 14
            action:
              clickLeft: |-
                Screen.close()
            effect:
              stroke:
                width: 2
                color: ~255,120,120,120
            children:
              关闭字:
                type: Text
                attribute:
                  x: 28
                  y: 14
                  through: true
                  center: true
                  fontSize: 36
                  texts: '&fX'
          左板:
            type: Texture
            attribute:
              x: 40
              y: 100
              width: 380
              height: 680
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          分类标签:
            type: Text
            attribute:
              x: 56
              y: 116
              fontSize: 36
              texts: '&0分类筛选'
          分类滑块:
            type: Texture
            val: 分类滑块
            attribute:
              x: 56
              y: 190
              width: 40
              height: 4
              normal: ~120,120,120,200
              maxDragX: 316
          分类滚动:
            type: Scroll
            attribute:
              x: 56
              y: 148
              width: 348
              height: 40
              moveX: "self.parent['分类滑块'].getDragXRatio()"
            action:
              wheel: |-
                if(self.moveX >= 0 && self.wheelValue > 0){
                  self.parent['分类滑块'].setDragXRatio((self.moveX - self.wheelValue * 0.1).round(1))
                }
                if(self.moveX <= 1 && self.wheelValue < 0){
                  self.parent['分类滑块'].setDragXRatio((self.moveX - self.wheelValue * 0.1).round(1))
                }
            children:
              分类列表:
                val: cat_list
                type: HStack
                attribute:
                  height: 40
                  spaceBetween: 10
                action:
                  create: |-
                    for(i in range(0, 8)){
                      item = self['分类模板'].copy('分类项' + i.round())
                      item.entryKey = none
                    }
                children:
                  分类模板:
                    type: Texture
                    attribute:
                      entryKey: none
                      entry: var.categories[self.entryKey]
                      visible: self.entryKey != none && self.entry != none
                      width: 100
                      height: 40
                      normal: "self.entry != none && self.entry['selected'] ? '120,190,255,230' : '145,145,145,255'"
                      shape: ~round_rect
                      radius: 12
                      texts: "self.entry != none ? self.entry['name'] : none"
                      center: true
                      fontSize: 36
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    action:
                      clickLeft: |-
                        Packet.send(var.packetId, 'switch_category', self.entry['id'])
          可接取:
            type: Texture
            attribute:
              x: 56
              y: 204
              width: 108
              height: 40
              normal: "var.pageId == 'available' ? '120,190,255,230' : '100,100,100,200'"
              shape: ~round_rect
              radius: 12
              texts: "'&0可接取 ' + var.availableCount.round()"
              center: true
              fontSize: 30
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'switch_page', 'available')
          进行中:
            type: Texture
            attribute:
              x: 172
              y: 204
              width: 108
              height: 40
              normal: "var.pageId == 'active' ? '100,200,130,230' : '100,100,100,200'"
              shape: ~round_rect
              radius: 12
              texts: "'&0进行中 ' + var.activeCount.round()"
              center: true
              fontSize: 30
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'switch_page', 'active')
          已完成:
            type: Texture
            attribute:
              x: 288
              y: 204
              width: 108
              height: 40
              normal: "var.pageId == 'completed' ? '200,150,80,230' : '100,100,100,200'"
              shape: ~round_rect
              radius: 12
              texts: "'&0已完成 ' + var.completedCount.round()"
              center: true
              fontSize: 30
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'switch_page', 'completed')
          列表标题:
            type: Text
            attribute:
              x: 56
              y: 258
              fontSize: 36
              texts: "'&0任务列表 (' + var.questCount.round() + ')'"
          任务滑块:
            type: Texture
            val: 任务滑块
            attribute:
              x: 414
              y: 300
              width: 6
              height: 50
              normal: ~120,120,120,200
              maxDragY: 440
          任务滚动:
            type: Scroll
            attribute:
              x: 56
              y: 300
              width: 348
              height: 460
              moveY: "self.parent['任务滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['任务滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['任务滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              任务列表:
                val: quest_list
                type: VStack
                attribute:
                  width: 348
                  spaceBetween: 8
                action:
                  create: |-
                    for(i in range(0, 16)){
                      item = self['任务模板'].copy('任务项' + i.round())
                      item.entryKey = none
                    }
                children:
                  任务模板:
                    type: Texture
                    attribute:
                      entryKey: none
                      entry: var.quests[self.entryKey]
                      visible: self.entryKey != none && self.entry != none
                      width: 348
                      height: 80
                      normal: "self.entry != none && self.entry['selected'] ? '120,190,255,230' : '145,145,145,255'"
                      shape: ~round_rect
                      radius: 14
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    action:
                      clickLeft: |-
                        Packet.send(var.packetId, 'select_quest', self.entry['id'])
                    children:
                      任务名:
                        type: Text
                        attribute:
                          x: 14
                          y: 10
                          width: 220
                          fontSize: 36
                          texts: "self.parent.entry != none ? '&0' + self.parent.entry['name'] : none"
                          through: true
                      任务状态:
                        type: Text
                        attribute:
                          x: 240
                          y: 12
                          fontSize: 30
                          texts: "self.parent.entry != none ? '&7' + self.parent.entry['state'] : none"
                          through: true
                      任务摘要:
                        type: Text
                        attribute:
                          x: 14
                          y: 42
                          width: 260
                          fontSize: 30
                          texts: "self.parent.entry != none ? '&7' + self.parent.entry['summary'] : none"
                          through: true
                      可导航:
                        type: Text
                        attribute:
                          x: 290
                          y: 42
                          fontSize: 28
                          texts: "self.parent.entry != none && self.parent.entry['trackable'] ? '&a可导航' : none"
                          through: true
          右板:
            type: Texture
            attribute:
              x: 440
              y: 100
              width: 920
              height: 680
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          详情标题:
            type: Text
            attribute:
              x: 464
              y: 116
              fontSize: 56
              texts: "var.selectedQuestName == none ? '&0未选择任务' : '&0' + var.selectedQuestName"
          详情状态:
            type: Text
            attribute:
              x: 1240
              y: 122
              fontSize: 36
              texts: "'&7' + var.selectedQuestState"
          详情路径:
            type: Text
            attribute:
              x: 464
              y: 158
              width: 520
              fontSize: 36
              texts: "'&8' + var.selectedQuestPath"
          详情描述:
            type: Text
            attribute:
              x: 464
              y: 196
              width: 520
              fontSize: 42
              texts: var.selectedQuestDescriptionText
          追踪摘要:
            type: Text
            attribute:
              x: 1020
              y: 116
              width: 320
              fontSize: 36
              texts: "'&7' + var.trackSummary"
          目标标题:
            type: Text
            attribute:
              x: 464
              y: 260
              fontSize: 36
              texts: "'&0任务目标 (' + var.taskCount.round() + ')'"
          目标滑块:
            type: Texture
            val: 目标滑块
            attribute:
              x: 1346
              y: 300
              width: 6
              height: 50
              normal: ~120,120,120,200
              maxDragY: 130
          目标滚动:
            type: Scroll
            attribute:
              x: 464
              y: 300
              width: 868
              height: 180
              moveY: "self.parent['目标滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['目标滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['目标滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              目标列表:
                val: task_list
                type: VStack
                attribute:
                  width: 868
                  spaceBetween: 8
                action:
                  create: |-
                    for(i in range(0, 8)){
                      item = self['目标模板'].copy('目标项' + i.round())
                      item.entryKey = none
                    }
                children:
                  目标模板:
                    type: Texture
                    attribute:
                      entryKey: none
                      entry: var.tasks[self.entryKey]
                      visible: self.entryKey != none && self.entry != none
                      width: 868
                      height: 50
                      normal: "self.entry != none && self.entry['tracked'] ? '110,170,230,255' : '145,145,145,255'"
                      shape: ~round_rect
                      radius: 12
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    action:
                      clickLeft: |-
                        Packet.send(var.packetId, 'track_task', var.selectedQuestId, self.entry['id'])
                    children:
                      目标文字:
                        type: Text
                        attribute:
                          x: 14
                          y: 10
                          width: 680
                          fontSize: 36
                          texts: "self.parent.entry != none ? (self.parent.entry['completed'] ? '&7&m' + self.parent.entry['text'] : '&0' + self.parent.entry['text']) : none"
                          through: true
                      目标状态:
                        type: Text
                        attribute:
                          x: 700
                          y: 10
                          width: 150
                          fontSize: 36
                          texts: "self.parent.entry != none ? '&7' + self.parent.entry['status'] : none"
                          through: true
          奖励标题:
            type: Text
            attribute:
              x: 464
              y: 490
              fontSize: 36
              texts: "'&0任务奖励 (' + var.rewardCount.round() + ')'"
          奖励滑块:
            type: Texture
            val: 奖励滑块
            attribute:
              x: 1346
              y: 530
              width: 6
              height: 50
              normal: ~120,120,120,200
              maxDragY: 80
          奖励滚动:
            type: Scroll
            attribute:
              x: 464
              y: 530
              width: 868
              height: 130
              moveY: "self.parent['奖励滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['奖励滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['奖励滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              奖励列表:
                val: reward_list
                type: VStack
                attribute:
                  width: 868
                  spaceBetween: 8
                action:
                  create: |-
                    for(i in range(0, 8)){
                      item = self['奖励模板'].copy('奖励项' + i.round())
                      item.entryKey = none
                    }
                children:
                  奖励模板:
                    type: Texture
                    attribute:
                      entryKey: none
                      entry: var.rewards[self.entryKey]
                      visible: self.entryKey != none && self.entry != none
                      width: 868
                      height: 50
                      normal: ~145,145,145,255
                      shape: ~round_rect
                      radius: 12
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    children:
                      奖励图标:
                        type: Slot
                        attribute:
                          slotType: ~Icon
                          visible: "self.parent.entry != none && self.parent.entry['itemJson'] != none && self.parent.entry['itemJson'] != none"
                          itemScale: 0.72
                          x: 4
                          y: 1
                          width: 48
                          height: 48
                          normal: ~95,95,95,180
                          shape: ~round_rect
                          radius: 8
                          through: true
                          seticon: "self.parent.entry != none && self.parent.entry['itemJson'] != none ? self.setItemIcon(self.parent.entry['itemJson']) : none"
                      奖励名:
                        type: Text
                        attribute:
                          x: 60
                          y: 10
                          fontSize: 36
                          texts: "self.parent.entry != none ? '&0' + self.parent.entry['title'] : none"
                          through: true
                      奖励描述:
                        type: Text
                        attribute:
                          x: 430
                          y: 10
                          width: 420
                          fontSize: 36
                          texts: "self.parent.entry != none ? '&7' + self.parent.entry['description'] : none"
                          through: true
          操作区:
            type: HStack
            attribute:
              x: 464
              y: 680
              spaceBetween: 20
            children:
              接取:
                type: Texture
                attribute:
                  width: 160
                  height: 44
                  visible: var.canAccept
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0接取任务"
                  center: true
                  fontSize: 36
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'accept_quest', var.selectedQuestId)
              放弃:
                type: Texture
                attribute:
                  width: 160
                  height: 44
                  visible: var.canAbandon
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0放弃任务"
                  center: true
                  fontSize: 36
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'abandon_quest', var.selectedQuestId)
              追踪:
                type: Texture
                attribute:
                  width: 190
                  height: 44
                  visible: var.canTrackQuest && !var.questTracked
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0追踪任务"
                  center: true
                  fontSize: 36
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'track_quest', var.selectedQuestId)
              取消:
                type: Texture
                attribute:
                  width: 160
                  height: 44
                  visible: var.questTracked
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0取消导航"
                  center: true
                  fontSize: 36
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'clear_track')
              地图:
                type: Texture
                attribute:
                  width: 160
                  height: 44
                  visible: var.navigationReady
                  normal: ~120,190,255,230
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0打开地图"
                  center: true
                  fontSize: 36
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'open_map')

