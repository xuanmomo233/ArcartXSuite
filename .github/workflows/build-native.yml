name: Build Native Library

# 目标①：仅手动触发，产出【明文 / 不混淆 / 不加密】的本体 + 模块，不上传云端。
#
#   - 取消 push / pull_request 自动触发，只保留 workflow_dispatch（手动）。
#   - 本体走 :axs-core:shadowJar（未混淆、未字符串加密、未逐类加密）。
#   - 模块走 :modules:<name>:jar（原始 Jar，未混淆、未加密、未封装 .axb）。
#   - 不做任何 .axb 封装、不上传 cloud、不发 Release。
#   - 通过根任务 `buildDev` 一次性产出全部明文 Jar。
#
# 加密 / 混淆 / 上传云端的管线见 build-encrypted.yml（push 触发）。

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev zlib1g-dev default-jdk-headless

      - name: Build native library
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Move artifact to root
        run: cp src/main/resources/native/libaxs-native.so libaxs-native.so

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: native-linux
          path: libaxs-native.so

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup MSYS2 MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-make
            make
            file

      - name: Build native library
        shell: msys2 {0}
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release -G "MinGW Makefiles" -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++
          cmake --build build --verbose

      - name: Debug build output
        shell: msys2 {0}
        run: |
          echo "=== native/build contents ==="
          find native/build -type f | head -30
          echo "=== Any .dll files ==="
          find . -name "*.dll" -type f
          echo "=== CMake cache output dirs ==="
          grep -E "OUTPUT_DIRECTORY|CMAKE_.*_OUTPUT" native/build/CMakeCache.txt || true

      - name: Locate and copy DLL
        shell: msys2 {0}
        run: |
          echo "CMake output directory: src/main/resources/native"
          ls -la src/main/resources/native || true
          DLL_PATH=$(find src/main/resources/native -maxdepth 1 -type f \( -name "axs-native.dll" -o -name "libaxs-native.dll" \) | head -1)
          if [ -z "$DLL_PATH" ]; then
            echo "ERROR: No axs-native DLL found in src/main/resources/native!"
            exit 1
          fi
          echo "Found DLL at: $DLL_PATH"
          # MinGW 生成 libaxs-native.dll，统一重命名为 axs-native.dll
          if [ "$(basename "$DLL_PATH")" != "axs-native.dll" ]; then
            cp "$DLL_PATH" src/main/resources/native/axs-native.dll
            echo "Renamed and copied to src/main/resources/native/axs-native.dll"
          else
            echo "DLL already named axs-native.dll"
          fi
          ls -la src/main/resources/native/axs-native.dll

      - name: Verify architecture
        shell: msys2 {0}
        run: |
          if [ ! -f src/main/resources/native/axs-native.dll ]; then
            echo "ERROR: DLL not found at src/main/resources/native/axs-native.dll"
            exit 1
          fi
          file src/main/resources/native/axs-native.dll
          if ! file src/main/resources/native/axs-native.dll | grep -q "x86-64"; then
            echo "ERROR: DLL is NOT x86-64 architecture!"
            file src/main/resources/native/axs-native.dll
            exit 1
          fi
          echo "OK: DLL is x86-64"

      - name: Check DLL dependencies
        shell: msys2 {0}
        run: |
          echo "=== DLL dependencies (ldd) ==="
          ldd src/main/resources/native/axs-native.dll || true
          echo "=== DLL dependencies (objdump) ==="
          objdump -p src/main/resources/native/axs-native.dll | grep -E "DLL Name|needed" || true
          # 正向检测 MinGW 运行时 DLL 依赖
          MINGW_DEPS=$(ldd src/main/resources/native/axs-native.dll 2>/dev/null | grep -E "libgcc|libstdc\+\+|libwinpthread" || true)
          if [ -n "$MINGW_DEPS" ]; then
            echo "ERROR: DLL depends on MinGW runtime libraries (must be statically linked):"
            echo "$MINGW_DEPS"
            exit 1
          else
            echo "OK: No MinGW runtime dependencies"
          fi

      - name: Move artifact to root
        run: |
          copy src\main\resources\native\axs-native.dll axs-native.dll
        shell: cmd

      - name: Compute MD5 before upload
        run: |
          certutil -hashfile axs-native.dll MD5
          dir axs-native.dll
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: native-windows
          path: axs-native.dll
          if-no-files-found: error

  build-gradle:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - uses: actions/checkout@v5

      - name: Scan for hardcoded secrets
        run: |
          ERR=0
          # 1. 扫描硬编码 QQ 号（已发现的模式）
          if grep -Er 'QQ1451759359|QQ[ :]*[1-9][0-9]{4,11}' src/ --include='*.java' --include='*.kt' --include='*.yml' | grep -v 'example\|test\|placeholder\|\.example'; then
            echo "::error::Hardcoded QQ number detected"
            ERR=1
          fi
          # 2. 扫描硬编码密码（排除空字符串和明显占位符）
          if grep -Er 'password\s*[=:]\s*"[^"]{6,}"' src/ --include='*.java' --include='*.kt' --include='*.yml' | grep -vi 'example\|test\|placeholder\|changeme\|empty\|default'; then
            echo "::error::Potential hardcoded password detected"
            ERR=1
          fi
          # 3. 扫描硬编码 JWT / API 密钥
          if grep -Eri 'secret\s*[=:]\s*["'\''][a-z0-9]{16,}["'\'']' src/ --include='*.java' --include='*.kt' | grep -vi 'example\|test\|placeholder'; then
            echo "::error::Potential hardcoded secret detected"
            ERR=1
          fi
          if [ $ERR -ne 0 ]; then
            echo "::error::Secret scan failed. Remove hardcoded credentials before pushing."
            exit 1
          fi
          echo "Secret scan passed"

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Linux native artifact
        uses: actions/download-artifact@v5
        with:
          name: native-linux
          path: src/main/resources/native/

      - name: Download Windows native artifact
        uses: actions/download-artifact@v5
        with:
          name: native-windows
          path: src/main/resources/native/

      - name: List native artifacts
        run: |
          echo "=== Files in src/main/resources/native/ ==="
          ls -la src/main/resources/native/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.10.2'
          cache-read-only: true

      - name: Build plaintext JARs (no obfuscation / no encryption)
        run: |
          # buildDev：本体 shadowJar（明文未混淆）+ 各模块原始 jar（明文）+ proxy shadowJar
          gradle clean buildDev --no-build-cache

      - name: Fix DLL in plaintext core JAR
        run: |
          # shadowJar 重压缩可能损坏 DLL，直接用 jar 命令替换为正确版本
          JAR_PATH=$(find "$PWD/axs-core/build/libs" -maxdepth 1 -name "ArcartX-Suite-*-unobf.jar" | sort | tail -1)
          if [ -z "$JAR_PATH" ]; then
            echo "ERROR: 明文本体 JAR (unobf) 未找到"
            ls -la axs-core/build/libs || true
            exit 1
          fi
          echo "Fixing DLL in: $JAR_PATH"
          md5sum "$PWD/src/main/resources/native/axs-native.dll"
          cd "$PWD/src/main/resources"
          jar uf "$JAR_PATH" native/axs-native.dll
          cd - > /dev/null
          echo "DLL replaced."

      - name: List plaintext artifacts
        run: |
          echo "=== 明文本体 ==="
          ls -la axs-core/build/libs/ || true
          echo "=== 明文模块 ==="
          ls -la modules/*/build/libs/*.jar || true

      - name: Upload plaintext JARs
        uses: actions/upload-artifact@v5
        with:
          name: axs-plaintext-jars
          path: |
            axs-core/build/libs/ArcartX-Suite-*-unobf.jar
            axs-api/build/libs/*.jar
            modules/*/build/libs/*.jar
            proxy/*/build/libs/*.jar
          if-no-files-found: warn
