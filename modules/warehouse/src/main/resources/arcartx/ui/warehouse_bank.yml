# AXS Warehouse Bank
# 纯色块风格独立银行和定期界面。

ui:
  isHud: false
  defaultOpen: false
  hide:
    - HUD
    - online
    - 聊天栏
    - 纯色块HUD
    - 纯色块HUD二改
  through: false
  background: false
  escClose: true
  closeDied: true
  show: true
  jei: false
  level: 8
  itemSize: 16
  screenScale: true
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.warehouseName = packet['warehouseName']
      var.balances = packet['balances']
      var.balanceTexts = packet['balanceTexts']
      var.products = packet['products']
      var.productTexts = packet['productTexts']
      var.fixedDeposits = packet['fixedDeposits']
      var.fixedDepositTexts = packet['fixedDepositTexts']
      var.unlocked = packet['unlocked']
      var.hasPassword = packet['hasPassword']
      var.maxBalanceCount = packet['maxBalanceCount']
      var.maxProductCount = packet['maxProductCount']
      var.maxFixedCount = packet['maxFixedCount']

      while(val.余额列表.childrenCount() > 1){
        val.余额列表.get(1).remove()
      }
      while(val.产品列表.childrenCount() > 1){
        val.产品列表.get(1).remove()
      }
      while(val.定期列表.childrenCount() > 1){
        val.定期列表.get(1).remove()
      }

      for(i in range(0, var.maxBalanceCount)){
        key = i.round()
        bal = val.余额列表['项'].copy('项' + key)
        bal.entryKey = key
      }
      for(i in range(0, var.maxProductCount)){
        key = i.round()
        prod = val.产品列表['项'].copy('项' + key)
        prod.entryKey = key
      }
      for(i in range(0, var.maxFixedCount)){
        key = i.round()
        fd = val.定期列表['项'].copy('项' + key)
        fd.entryKey = key
      }
    update: |-
      var.packetId = packet['packetId']
      var.warehouseName = packet['warehouseName']
      var.balances = packet['balances']
      var.balanceTexts = packet['balanceTexts']
      var.products = packet['products']
      var.productTexts = packet['productTexts']
      var.fixedDeposits = packet['fixedDeposits']
      var.fixedDepositTexts = packet['fixedDepositTexts']
      var.unlocked = packet['unlocked']
      var.hasPassword = packet['hasPassword']
      var.maxBalanceCount = packet['maxBalanceCount']
      var.maxProductCount = packet['maxProductCount']
      var.maxFixedCount = packet['maxFixedCount']

      while(val.余额列表.childrenCount() > 1){
        val.余额列表.get(1).remove()
      }
      while(val.产品列表.childrenCount() > 1){
        val.产品列表.get(1).remove()
      }
      while(val.定期列表.childrenCount() > 1){
        val.定期列表.get(1).remove()
      }
      
      for(i in range(0, var.maxBalanceCount)){
        key = i.round()
        bal = val.余额列表['项'].copy('项' + key)
        bal.entryKey = key
      }
      for(i in range(0, var.maxProductCount)){
        key = i.round()
        prod = val.产品列表['项'].copy('项' + key)
        prod.entryKey = key
      }
      for(i in range(0, var.maxFixedCount)){
        key = i.round()
        fd = val.定期列表['项'].copy('项' + key)
        fd.entryKey = key
      }
  action:
    load: |-
      var.packetId = 'AXS_WAREHOUSE'
      var.warehouseName = 'AXS 仓库'
      var.balances = {}
      var.balanceTexts = {}
      var.products = {}
      var.productTexts = {}
      var.fixedDeposits = {}
      var.fixedDepositTexts = {}
      var.unlocked = false
      var.hasPassword = false
      var.passwordText = ''
      var.selectedCurrency = 'money'
      var.selectedProduct = ''
      var.bankAmount = ''
      var.maxBalanceCount = 0
      var.maxProductCount = 0
      var.maxFixedCount = 0
    open: |-
      Packet.send(var.packetId, 'refresh')

controls:
  根:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Canvas
        attribute:
          point: ~middle_center
          width: 1660
          height: 1030
        children:
          背景:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: "~95,95,95,220"
              shape: ~round_rect
              radius: 28
            effect:
              stroke:
                width: 3
                color: ~255,255,255,255
              shadow:
                xOffset: 2
                yOffset: 2
                blur: 5
                color: ~255,255,255,75
              ripple:
                duration: 1200
                color: ~255,255,255,110
                width: 0.05
          标题:
            type: Text
            attribute:
              x: 42
              y: 30
              texts: "~&f银行和定期"
              fontSize: 64
          状态:
            type: Text
            attribute:
              x: 42
              y: 90
              width: 720
              texts: "var.unlocked ? '&a二级密码已解锁' : '&c提现和领取需要先解锁二级密码'"
              fontSize: 38
          返回仓库:
            type: Texture
            attribute:
              x: 1335
              y: 42
              width: 80
              height: 50
              normal: ~255,255,255,150
              hover: ~Frosted:0;255,255,255,240
              shape: ~round_rect
              radius: 14
              texts: "~&0仓库"
              center: true
              fontSize: 42
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'storage')
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          管理:
            type: Texture
            attribute:
              x: 1435
              y: 42
              width: 80
              height: 50
              normal: ~255,255,255,150
              hover: ~Frosted:0;255,255,255,240
              shape: ~round_rect
              radius: 14
              texts: "~&0管理"
              center: true
              fontSize: 42
            action:
              clickLeft: |-
                Packet.send(var.packetId, 'manage')
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255

          银行卡片:
            type: Texture
            attribute:
              x: 42
              y: 210
              width: 500
              height: 770
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            children:
              银行标题:
                type: Text
                attribute:
                  x: 24
                  y: 22
                  texts: "~&f账户余额"
                  fontSize: 44
              金额:
                type: TextBox
                attribute:
                  x: 24
                  y: 82
                  width: 220
                  height: 50
                  length: 18
                  emptyText: ~金额
                  fontSize: 36
                  background: ~90,90,90,220
                  shape: ~round_rect
                  radius: 12
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  textChange: |-
                    var.bankAmount = self.getContent()
              存入:
                type: Texture
                attribute:
                  x: 260
                  y: 82
                  width: 90
                  height: 50
                  normal: ~255,255,255,150
                  hover: ~Frosted:0;255,255,255,240
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0存入"
                  center: true
                  fontSize: 34
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'bank_deposit', var.selectedCurrency, var.bankAmount)
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              提现:
                type: Texture
                attribute:
                  x: 366
                  y: 82
                  width: 90
                  height: 50
                  normal: ~255,255,255,150
                  hover: ~Frosted:0;255,255,255,240
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0提现"
                  center: true
                  fontSize: 34
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'bank_withdraw', var.selectedCurrency, var.bankAmount)
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              密码输入:
                type: TextBox
                attribute:
                  x: 24
                  y: 150
                  width: 220
                  height: 40
                  length: 32
                  emptyText: ~二级密码
                  fontSize: 36
                  background: ~90,90,90,220
                  shape: ~round_rect
                  radius: 12
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  textChange: |-
                    var.passwordText = self.getContent()
              解锁:
                type: Texture
                attribute:
                  x: 260
                  y: 150
                  width: 90
                  height: 40
                  normal: ~255,255,255,150
                  hover: ~Frosted:0;255,255,255,240
                  shape: ~round_rect
                  radius: 14
                  texts: "var.hasPassword ? '&0解锁' : '&0设置'"
                  center: true
                  fontSize: 34
                action:
                  clickLeft: |-
                    if(var.hasPassword){
                      Packet.send(var.packetId, 'password_unlock', var.passwordText)
                    }else{
                      Packet.send(var.packetId, 'password_set', var.passwordText)
                    }
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              余额纵向滑块:
                type: Texture
                val: 余额纵向滑块
                attribute:
                  x: 494
                  y: 210
                  width: 6
                  height: 50
                  normal: ~120,120,120,200
                  maxDragY: 470
              余额滚动:
                type: Scroll
                attribute:
                  x: 24
                  y: 210
                  width: 460
                  height: 520
                  moveY: "self.parent['余额纵向滑块'].getDragYRatio()"
                action:
                  wheel: |-
                    if(self.moveY >= 0 && self.wheelValue > 0){
                      self.parent['余额纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                    if(self.moveY <= 1 && self.wheelValue < 0){
                      self.parent['余额纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                children:
                  余额列表:
                    val: 余额列表
                    type: VStack
                    attribute:
                      width: 450
                      spaceBetween: 10
                    children:
                      项:
                        type: Texture
                        attribute:
                          entryKey: 0
                          entry: var.balances[self.entryKey]
                          visible: self.entry != null
                          width: 450
                          height: 56
                          normal: "self.entry != null && self.entry['id'] == var.selectedCurrency ? '110,170,230,255' : '255,255,255,150'"
                          hover: ~Frosted:0;255,255,255,240
                          shape: ~round_rect
                          radius: 14
                          texts: "var.balanceTexts[self.entryKey]"
                          center: true
                          fontSize: 34
                        effect:
                          stroke:
                            width: 2
                            color: ~0,0,0,255
                        action:
                          clickLeft: |-
                            var.selectedCurrency = self.entry['id']

          产品卡片:
            type: Texture
            attribute:
              x: 580
              y: 210
              width: 500
              height: 770
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            children:
              产品标题:
                type: Text
                attribute:
                  x: 24
                  y: 22
                  texts: "~&f定期产品"
                  fontSize: 44
              购买:
                type: Texture
                attribute:
                  x: 300
                  y: 22
                  width: 160
                  height: 50
                  normal: ~255,255,255,150
                  hover: ~Frosted:0;255,255,255,240
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0购买"
                  center: true
                  fontSize: 34
                action:
                  clickLeft: |-
                    Packet.send(var.packetId, 'fixed_create', var.selectedProduct, var.bankAmount)
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              产品纵向滑块:
                type: Texture
                val: 产品纵向滑块
                attribute:
                  x: 494
                  y: 96
                  width: 6
                  height: 50
                  normal: ~120,120,120,200
                  maxDragY: 580
              产品滚动:
                type: Scroll
                attribute:
                  x: 24
                  y: 96
                  width: 465
                  height: 630
                  moveY: "self.parent['产品纵向滑块'].getDragYRatio()"
                action:
                  wheel: |-
                    if(self.moveY >= 0 && self.wheelValue > 0){
                      self.parent['产品纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                    if(self.moveY <= 1 && self.wheelValue < 0){
                      self.parent['产品纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                children:
                  产品列表:
                    val: 产品列表
                    type: VStack
                    attribute:
                      width: 450
                      spaceBetween: 10
                    children:
                      项:
                        type: Texture
                        attribute:
                          entryKey: 0
                          entry: var.products[self.entryKey]
                          visible: self.entry != null
                          width: 450
                          height: 78
                          normal: "self.entry != null && self.entry['id'] == var.selectedProduct ? '110,170,230,255' : '255,255,255,150'"
                          hover: ~Frosted:0;255,255,255,240
                          shape: ~round_rect
                          radius: 14
                          texts: "var.productTexts[self.entryKey]"
                          fontSize: 30
                        effect:
                          stroke:
                            width: 2
                            color: ~0,0,0,255
                        action:
                          clickLeft: |-
                            var.selectedProduct = self.entry['id']

          定期卡片:
            type: Texture
            attribute:
              x: 1118
              y: 210
              width: 500
              height: 770
              normal: ~255,255,255,120
              shape: ~round_rect
              radius: 24
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
            children:
              定期标题:
                type: Text
                attribute:
                  x: 24
                  y: 22
                  texts: "~&f我的定期"
                  fontSize: 44
              定期纵向滑块:
                type: Texture
                val: 定期纵向滑块
                attribute:
                  x: 494
                  y: 96
                  width: 6
                  height: 50
                  normal: ~120,120,120,200
                  maxDragY: 580
              定期滚动:
                type: Scroll
                attribute:
                  x: 24
                  y: 96
                  width: 465
                  height: 630
                  moveY: "self.parent['定期纵向滑块'].getDragYRatio()"
                action:
                  wheel: |-
                    if(self.moveY >= 0 && self.wheelValue > 0){
                      self.parent['定期纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                    if(self.moveY <= 1 && self.wheelValue < 0){
                      self.parent['定期纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                    }
                children:
                  定期列表:
                    val: 定期列表
                    type: VStack
                    attribute:
                      width: 450
                      spaceBetween: 10
                    children:
                      项:
                        type: Texture
                        attribute:
                          entryKey: 0
                          entry: var.fixedDeposits[self.entryKey]
                          visible: self.entry != null
                          width: 450
                          height: 70
                          normal: ~255,255,255,150
                          hover: ~Frosted:0;255,255,255,240
                          shape: ~round_rect
                          radius: 14
                          texts: "var.fixedDepositTexts[self.entryKey]"
                          fontSize: 30
                        effect:
                          stroke:
                            width: 2
                            color: ~0,0,0,255
                        action:
                          clickLeft: |-
                            Packet.send(var.packetId, 'fixed_claim', self.entry['id'])

