config-version: 1
# AXS Prop
# 作用: 管理快捷道具定义、玩家绑定、按键触发、冷却、消耗、提示文案和临时属性效果。
# 依赖: ArcartX；AttributePlus、MythicLib、MMOItems 按功能选用。
# 重载: /axs prop reload
# PAPI 输出: 无独立 PlaceholderAPI 输出。
# 可解析的 PAPI: 无；道具效果主要通过权限、物品、命令、属性和内部上下文执行。
# 关联资源: prop/key.yml、prop/language.yml、prop/props/*.yml

settings:
  # 是否输出调试日志
  debug: false

mythiclib:
  # 是否允许道具里的 ml|... / mythiclib|... 效果附加 MythicLib 临时属性。
  # 未安装 MythicLib、未启用或挂钩失败时，Prop 模块仍会正常运行。
  enabled: false

  # 临时属性 modifier 前缀。
  # 最终会生成:
  #   <前缀>_<PROP_ID>_<STAT>
  source-prefix: "AXS_PROP"
