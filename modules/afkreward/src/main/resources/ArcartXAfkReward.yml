config-version: 4
# ArcartXSuite AfkReward - 区域挂机奖励模块
# 重载: /axs afkreward reload

debug: false

# 奖励周期（分钟/次）
reward:
  round: 15
  # 每日最大奖励次数限制
  max:
    enable: true
    limit: 32
    # 无视限制权限: axs.afkreward.not.reward.limit
  # 区域最大同时挂机人数
  player:
    enable: true
    limit: 30
    # 无视限制权限: axs.afkreward.not.player.limit

# 奖励类型配置
# 玩家需要有 axs.afkreward.start.<类型名> 权限才能进入该区域挂机
types:
  泡澡池:
    describe: "泡澡的人越多，获取的铜币和经验越多"
    # 发奖时同时发送的邮件预设（对应 Mail 模块预设模板）
    mail-presets:
      - "afk_reward_mail"
    # 权限等级从高到低检测，取玩家拥有的最高等级
    vip3:
      - "addbalance %player_name% 铜币 %axsafk_players%*35+%player_level%/4+250"
      - "cmi give %player_name% cobblestone 54"
      - "cmi exp %player_name% add %axsafk_players%*%player_level%/4+%player_level%"
    vip2:
      - "addbalance %player_name% 铜币 %axsafk_players%*30+%player_level%/6+200"
      - "cmi give %player_name% cobblestone 54"
      - "cmi exp %player_name% add %axsafk_players%*%player_level%/6+%player_level%/2"
    vip1:
      - "addbalance %player_name% 铜币 %axsafk_players%*25+%player_level%/8+150"
      - "cmi exp %player_name% add %axsafk_players%*%player_level%/8+%player_level%/4"
    common:
      - "addbalance %player_name% 铜币 %axsafk_players%*20+%player_level%/10+100"
      - "cmi exp %player_name% add %axsafk_players%*%player_level%/10+%player_level%/4"

# 区域配置目录（相对于 data/afkreward/ 文件夹）
# 每个区域为独立的 area-<id>.yml 文件
areas-directory: "areas"

# 原地挂机配置
manual:
  # 挂机期间是否封锁玩家行为（移动/交互/破坏/开箱/传送/受击）
  restrict-actions: true
  # 结束挂机后是否传送回原始位置
  return-on-end: false
  # 结束挂机时是否全服广播奖励消息
  broadcast-rewards: true
  # 排行榜显示人数
  leaderboard-size: 10
  # 发奖时触发的 EventPacket 信号名（为空则不触发）
  signal-on-reward: "afk_reward"
  # 结束挂机时触发的 EventPacket 信号名
  signal-on-end: "afk_end"
  # 发奖时播放的字幕组 ID（为空则不播放）
  subtitle-on-reward: ""
  # 结束挂机时播放的字幕组 ID
  subtitle-on-end: ""
  # 结束挂机时发送的邮件预设
  end-mail-presets:
    - "afk_end_mail"

# 存储配置
storage:
  dialect: sqlite
  sqlite-file: "afkreward.db"
  host: "127.0.0.1"
  port: 3306
  database: "arcartxsuite"
  username: "root"
  password: ""
  table-prefix: "axs_afk_"
  pool-size: 3

# HUD 配置
ui:
  hud-id: "AXS:afk_reward_hud"
  register-on-enable: true
  overwrite-ui-file: false
