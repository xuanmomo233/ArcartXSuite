name: Build Native Library

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'native/**'
      - 'libs/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    paths:
      - 'native/**'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev zlib1g-dev default-jdk-headless

      - name: Build native library
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-linux
          path: src/main/resources/native/libaxs-native.so

  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
      CMAKE_PREFIX_PATH: C:\vcpkg\installed\x64-windows-static
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install vcpkg & dependencies
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg.exe integrate install
          C:\vcpkg\vcpkg.exe install openssl
        shell: cmd

      - name: Build native library
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static
          cmake --build build --config Release
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-windows
          path: src/main/resources/native/Release/axs-native.dll
          if-no-files-found: error

  build-gradle:
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Linux native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-linux
          path: src/main/resources/native/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.2'

      - name: Build Gradle project
        run: gradle build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: axs-jar
          path: '*/build/libs/*.jar'

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-gradle]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mkdir -p release
          find artifacts/native-linux -name "libaxs-native.so" -exec cp {} release/ \;
          find artifacts/native-windows -name "axs-native.dll" -exec cp {} release/ \;
          find artifacts/axs-jar -name "*.jar" -exec cp {} release/ \;
          ls -la release/

      - name: Generate Release Notes
        id: notes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y-%m-%d\ %H:%M:%S)

          # 从 commit message 提取版本号
          # 支持的格式: release: v1.2.0 / [release] v1.2.0 / release v1.2.0
          VERSION=$(echo "$COMMIT_MSG" | grep -oP '(?i)(?:release[:\s]+)?v\d+\.\d+(?:\.\d+)?(?:-[\w.]+)?' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="v${{ github.run_number }}"
            echo "未检测到版本号，使用默认: $VERSION"
          else
            echo "从 commit message 提取到版本号: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          cat << EOF > release_notes.md
          ## ArcartXSuite $VERSION

          - **构建时间**: $DATE
          - **提交**: \`$COMMIT_SHA\`
          - **提交信息**: $COMMIT_MSG

          ### 构建产物

          | 文件 | 说明 |
          |------|------|
          | \`ArcartXSuite-1.2.0-beta.jar\` | **服务端插件**（服主下载此文件放 plugins/） |
          | \`libaxs-native.so\` | Linux 原生解密库（已内置在 jar 中） |
          | \`axs-native.dll\` | Windows 原生解密库（已内置在 jar 中） |

          ### 快速安装

          1. 下载 \`ArcartXSuite-1.2.0-beta.jar\`（或其他 \`ArcartXSuite-*.jar\`）
          2. 放入 Minecraft 服务器的 \`plugins/\` 目录
          3. 启动服务器，编辑 \`plugins/ArcartXSuite/config.yml\`
          4. 配置 \`cloud.qq\` 和 \`cloud.password\`
          5. 重启服务器，自动连接云端加载模块

          ### 注意

          - 本构建为自动 CI 产物，标记为 Pre-release
          - 如需稳定版本请关注正式 Release
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.version }}
          name: Build ${{ steps.notes.outputs.version }}
          body_path: release_notes.md
          files: release/*
          draft: false
          prerelease: true
