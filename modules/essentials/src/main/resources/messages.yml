  teleport: "  &f/{0} {1} spawn/setspawn/tpa/tpahere/tp/top/tppos/back&7 - 传送"
  world-header: "&7── 世界 ──"
  time: "  &f/{0} {1} time <day|night|noon|midnight>&7 - 时间"
  weather: "  &f/{0} {1} weather <clear|rain|thunder>&7 - 天气"
  security-header: "&7── 管理 ──"
  ban: "  &f/{0} {1} ban/tempban/unban/mute/tempmute/unmute&7 - 封禁/禁言"
