name: Build Native Library

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev zlib1g-dev default-jdk-headless

      - name: Build native library
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Move artifact to root
        run: cp src/main/resources/native/libaxs-native.so libaxs-native.so

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-linux
          path: libaxs-native.so

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup MSYS2 MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-make
            make
            file

      - name: Build native library
        shell: msys2 {0}
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release -G "MinGW Makefiles" -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++
          cmake --build build --verbose

      - name: Debug build output
        shell: msys2 {0}
        run: |
          echo "=== native/build contents ==="
          find native/build -type f | head -30
          echo "=== Any .dll files ==="
          find . -name "*.dll" -type f
          echo "=== CMake cache output dirs ==="
          grep -E "OUTPUT_DIRECTORY|CMAKE_.*_OUTPUT" native/build/CMakeCache.txt || true

      - name: Locate and copy DLL
        shell: msys2 {0}
        run: |
          echo "Searching for built DLL..."
          find . -name "*.dll" -type f
          DLL_PATH=$(find . -name "*.dll" -type f | grep -E "(axs-native|libaxs-native)" | head -1)
          if [ -z "$DLL_PATH" ]; then
            echo "ERROR: No DLL found anywhere!"
            exit 1
          fi
          echo "Found DLL at: $DLL_PATH"
          mkdir -p src/main/resources/native
          # MinGW 会生成 libaxs-native.dll，需要重命名为 axs-native.dll
          cp "$DLL_PATH" src/main/resources/native/axs-native.dll
          echo "Copied to src/main/resources/native/axs-native.dll"
          ls -la src/main/resources/native/axs-native.dll

      - name: Verify architecture
        shell: msys2 {0}
        run: |
          if [ ! -f src/main/resources/native/axs-native.dll ]; then
            echo "ERROR: DLL not found at src/main/resources/native/axs-native.dll"
            exit 1
          fi
          file src/main/resources/native/axs-native.dll
          if ! file src/main/resources/native/axs-native.dll | grep -q "x86-64"; then
            echo "ERROR: DLL is NOT x86-64 architecture!"
            file src/main/resources/native/axs-native.dll
            exit 1
          fi
          echo "OK: DLL is x86-64"

      - name: Move artifact to root
        run: |
          copy src\main\resources\native\axs-native.dll axs-native.dll
        shell: cmd

      - name: Compute MD5 before upload
        run: |
          certutil -hashfile axs-native.dll MD5
          dir axs-native.dll
        shell: cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-windows
          path: axs-native.dll
          if-no-files-found: error

  build-gradle:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Linux native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-linux
          path: src/main/resources/native/

      - name: Download Windows native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-windows
          path: src/main/resources/native/

      - name: List native artifacts
        run: |
          echo "=== Files in src/main/resources/native/ ==="
          ls -la src/main/resources/native/
          for f in src/main/resources/native/*; do
            echo "--- $f ---"
            md5sum "$f" || true
            file "$f" || true
            hexdump -C "$f" | head -4 || true
          done
          echo "=== Windows DLL MD5 for comparison ==="
          md5sum src/main/resources/native/axs-native.dll || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.2'

      - name: Build Gradle project
        run: gradle build

      - name: Verify DLL in JAR
        run: |
          # 查找构建产物中的 JAR（使用绝对路径）
          JAR_PATH=$(find "$PWD" -name "ArcartXSuite-[0-9]*.jar" -not -name "*plain*" -not -name "*unobf*" -not -name "*step*" | head -1)
          if [ -z "$JAR_PATH" ]; then
            echo "ERROR: Final JAR not found"
            exit 1
          fi
          echo "Found JAR: $JAR_PATH"
          # 提取 DLL
          mkdir -p /tmp/jar-verify
          cd /tmp/jar-verify
          jar xf "$JAR_PATH" native/axs-native.dll || true
          if [ -f native/axs-native.dll ]; then
            file native/axs-native.dll
            if ! file native/axs-native.dll | grep -q "x86-64"; then
              echo "ERROR: JAR 里的 DLL 不是 x86-64 架构!"
              file native/axs-native.dll
              exit 1
            fi
            echo "OK: JAR 里的 DLL 是 x86-64"
          else
            echo "WARN: JAR 里没有找到 axs-native.dll"
          fi

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: axs-jar
          path: '*/build/libs/*.jar'

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-gradle]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mkdir -p release
          # 只保留最终混淆产物 ArcartXSuite-<version>.jar，排除 plain/unobf/step 等中间产物
          find artifacts/axs-jar -name "ArcartXSuite-[0-9]*.jar" -exec cp {} release/ \;
          # 同时包含 axs-api jar（供外部模块编译依赖）
          find artifacts/axs-jar -name "axs-api-*.jar" -exec cp {} release/ \;
          ls -la release/

      - name: Generate Release Notes
        id: notes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y-%m-%d\ %H:%M:%S)

          # 从 commit message 提取版本号
          # 支持的格式: release: v1.2.0 / [release] v1.2.0 / release v1.2.0
          VERSION=$(echo "$COMMIT_MSG" | grep -oP '(?i)(?:release[:\s]+)?v\d+\.\d+(?:\.\d+)?(?:-[\w.]+)?' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="v${{ github.run_number }}"
            echo "未检测到版本号，使用默认: $VERSION"
          else
            echo "从 commit message 提取到版本号: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          cat << EOF > release_notes.md
          ## ArcartXSuite $VERSION

          - **构建时间**: $DATE
          - **提交**: \`$COMMIT_SHA\`
          - **提交信息**: $COMMIT_MSG

          ### 构建产物

          | 文件 | 说明 |
          |------|------|
          | \`ArcartXSuite-${VERSION}.jar\` | **服务端插件**（已内置 Linux / Windows 双平台 native 库） |
          | \`axs-api-${VERSION}.jar\` | **API 库**（供外部模块编译依赖） |

          ### 快速安装

          1. 下载 \`ArcartXSuite-${VERSION}.jar\`
          2. 放入 Minecraft 服务器的 \`plugins/\` 目录
          3. 启动服务器，编辑 \`plugins/ArcartXSuite/config.yml\`
          4. 配置 \`cloud.qq\` 和 \`cloud.password\`
          5. 重启服务器，自动连接云端加载模块

          ### 注意

          - 本构建为自动 CI 产物，标记为 Pre-release
          - 如需稳定版本请关注正式 Release
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.version }}
          name: Build ${{ steps.notes.outputs.version }}
          body_path: release_notes.md
          files: release/*
          draft: false
          prerelease: true
