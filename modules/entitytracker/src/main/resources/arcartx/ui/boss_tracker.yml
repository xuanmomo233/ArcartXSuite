# ArcartXEntityTracker Boss Tracker HUD
# AXS 资源说明
# 用途: EntityTracker 模块默认 HUD 模板，负责展示 Boss 血条、目标信息与伤害排行。
# 前置依赖: ArcartX、MythicMobs / MythicBukkit；EntityTracker 模块启用后会自动导出到 plugins/ArcartXSuite/ui。
# 启用开关: config.yml -> modules.entitytracker.enabled + modules.entitytracker.password
# 关联文件: ArcartXEntityTracker.yml
# 重载命令: /axs entitytracker reload
# 最小使用路径: ui + controls
# 结构提示: packetHandler 负责接收 Boss 快照；controls 定义每个槽位的血条与排行展示。

ui:
  isHud: true
  through: false
  background: false
  closeDied: true
  show: true
  level: 2
  screenScale: true
  defaultOpen: false
  hide:
    - boss_event_progress
  packetHandler:
    init: |-
      var.isVisible = true
      var.bossCount = packet['bossCount']
      var.totalBossCount = packet['totalBossCount']
      var.maxVisibleBars = packet['maxVisibleBars']
      var.bosses = packet['bosses']
    update: |-
      var.isVisible = true
      var.bossCount = packet['bossCount']
      var.totalBossCount = packet['totalBossCount']
      var.maxVisibleBars = packet['maxVisibleBars']
      var.bosses = packet['bosses']
    close: |-
      var.isVisible = false
      var.bossCount = 0
      var.totalBossCount = 0
  action:
    load: |-
      var.isVisible = false
      var.bossCount = 0
      var.totalBossCount = 0
      var.maxVisibleBars = 5
      var.bosses = {}
    children:
      首领追踪标题文字:
        type: text
        attribute:
          point: ~top_center
          x: 0
          y: 32
          texts: "'&f首领追踪 &8' + var.bossCount.round() + '/' + var.totalBossCount.round()"
          fontSize: 36
          visible: var.isVisible
      血条排列布局:
        type: Vstack
        attribute:
          point: ~top_center
          x: -240
          y: 58
          spaceBetween: 8
          visible: var.isVisible
        children:
          Boss血条卡片:
            type: canvas
            attribute:
              entry: var.bosses[self.key]
              visible: self.entry != null && self.entry['visible']
              width: 480
              height: 58
            children:
              Boss标题文字:
                type: text
                attribute:
                  point: ~top_left
                  x: 0
                  y: 0
                  texts: "self.parent.entry['title']"
                  fontSize: 36
              数值说明文字:
                type: text
                attribute:
                  point: ~top_right
                  x: 0
                  y: 4
                  texts: "'&8' + self.parent.entry['distanceText'] + '  R' + self.parent.entry['viewerRankText'] + '  ' + self.parent.entry['viewerDamageText']"
                  fontSize: 24
              血条底框:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: 480
                  height: 22
                  normal: ~30,30,30,220
                  shape: ~round_rect
                  radius: 11
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              血条层a:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: "480 * self.parent.entry['progress']"
                  height: 22
                  normal: ~140,60,60,255
                  shape: ~round_rect
                  radius: 11
                  visible: "self.parent.entry['progress'] > 0"
              血条层b:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: "480 * self.parent.entry['progress']"
                  height: 22
                  normal: ~180,50,50,255
                  shape: ~round_rect
                  radius: 11
                  visible: "self.parent.entry['progress'] > 0.2"
              血条层c:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: "480 * self.parent.entry['progress']"
                  height: 22
                  normal: ~200,40,40,255
                  shape: ~round_rect
                  radius: 11
                  visible: "self.parent.entry['progress'] > 0.4"
              血条层d:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: "480 * self.parent.entry['progress']"
                  height: 22
                  normal: ~220,35,35,255
                  shape: ~round_rect
                  radius: 11
                  visible: "self.parent.entry['progress'] > 0.6"
              血条层e:
                type: texture
                attribute:
                  point: ~top_left
                  x: 0
                  y: 26
                  width: "480 * self.parent.entry['progress']"
                  height: 22
                  normal: ~240,30,30,255
                  shape: ~round_rect
                  radius: 11
                  visible: "self.parent.entry['progress'] > 0.8"
              血条文字:
                type: text
                attribute:
                  point: ~top_center
                  x: 0
                  y: 27
                  texts: "'&f' + self.parent.entry['healthText'] + '/' + self.parent.entry['maxHealthText']"
                  fontSize: 36
      boss_observer:
        type: Observer
        attribute:
          target: val.血条排列布局['Boss血条卡片']
          subscribe: var.bosses
          maxSize: 5
