# ============================================================
#  Chat 模块消息文件
# ------------------------------------------------------------
#  支持 & 颜色码（如 &c 红色）和 {0} {1} 占位符。
#  修改后执行 /axs reload chat 即可生效。
# ============================================================

prefix: "&3◆ &6ArcartXSuite &7| &r"

# ── 通用 ──────────────────────────────────────────────
common:
  service-down: "&c服务未启动。"
  module-down: "&c聊天模块当前未启用。"
  reload-hint: "&e请使用 /{0} reload chat"
  unknown: "&e未知命令，使用 /{0} chat help"
  only-player: "&c该命令只能由玩家执行。"
  no-permission: "&c你没有权限执行这个命令。"

# ── help ──────────────────────────────────────────────
help:
  title: "&6Chat 管理命令"
  status: "&7{0} status&f - 查看模块状态"
  mute: "&7{0} mute <玩家> <时长> [原因]&f - 禁言"
  unmute: "&7{0} unmute <玩家>&f - 解除禁言"
  spy: "&7{0} spy <玩家> <on|off>&f - 私聊监听"

# ── status ────────────────────────────────────────────
status:
  title: "&6Chat 状态"
  channels: "&7频道数: &f{0}"
  cache-state: "&7缓存状态: &f{0}"
  cache-mute: "&7缓存禁言: &f{0}"
  transport: "&7传输层: &f{0} ({1})"

# ── mute / unmute / spy ───────────────────────────────
mute:
  usage: "&e用法: /axs chat mute <玩家> <时长> [原因]"
unmute:
  usage: "&e用法: /axs chat unmute <玩家>"
spy:
  usage: "&e用法: /axs chat spy <玩家> <on|off>"

# ── player ────────────────────────────────────────────
player:
  no-permission-msg: "&c你没有权限使用私聊。"
  current-channel: "&7当前频道: &f{0}"
  toggle-status: "&7私聊接收 / 提及接收 / 社交监听: &f{0} &7/ &f{1} &7/ &f{2}"
  reply-status: "&7最近私聊对象 / 忽略数: &f{0} &7/ &f{1}"
  channel-usage: "&e用法: /{0} channel <id>"
  toggle-usage: "&e用法: /{0} toggle <private|mentions> [on|off]"
  toggle-invalid: "&c状态只能是 on 或 off。"
  ignore-usage: "&e用法: /{0} ignore <player>"
  unignore-usage: "&e用法: /{0} unignore <player>"
  chat-usage: "&e用法: /{0} channel|toggle|ignore|unignore|socialspy"
  msg-usage: "&e用法: /{0} <player> <message>"
  reply-usage: "&e用法: /{0} <message>"
