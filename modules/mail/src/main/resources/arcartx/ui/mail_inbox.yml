# AXS 资源说明
# 用途: Mail 模块默认收件箱菜单，用于浏览、领取和删除邮件。
# 前置依赖: ArcartX；Mail 模块启用后会自动注册或导出。
# 启用开关: config.yml -> modules.mail.enabled + modules.mail.password
# 关联文件: ArcartXMail.yml、ui/mail_compose.yml、ui/mail_logs.yml
# 重载命令: /axs mail reload
# 最小使用路径: ui + controls
# 结构提示: 顶层 ui 节点定义窗口行为；packetHandler 负责接收邮件列表；controls 定义邮件卡片、分页和操作按钮。

ui:
  background: true
  escClose: true
  closeDied: true
  show: true
  through: false
  screenScale: true
  action:
    open: |-
      var.messages = {}
      var.filterMode = 'all'
      var.totalCount = 0
      var.unreadCount = 0
      var.claimableCount = 0
      var.selectedId = none
      var.selectedSubject = none
      var.selectedSenderName = none
      var.selectedSourceText = none
      var.selectedStatusText = none
      var.selectedCreatedAt = none
      var.selectedExpiresAt = none
      var.selectedBody = ['&8暂无正文']
      var.selectedAttachmentSummary = '无附件'
      var.selectedClaimable = false
      var.cdkCode = none
      var.maxMailCount = 0
  # packetHandler 负责接收服务端下发的数据包并刷新本地变量。
  packetHandler:
    init: |-
      var.messages = packet['messages']
      var.filterMode = 'all'
      var.totalCount = packet['total_count']
      var.unreadCount = packet['unread_count']
      var.claimableCount = packet['claimable_count']
      var.selectedId = packet['selected_id']
      var.selectedSubject = packet['已选主题']
      var.selectedSenderName = packet['selected_sender_name']
      var.selectedSourceText = packet['selected_source_text']
      var.selectedStatusText = packet['selected_status_text']
      var.selectedCreatedAt = packet['selected_created_at']
      var.selectedExpiresAt = packet['selected_expires_at']
      var.selectedBody = packet['已选正文']
      var.selectedAttachmentSummary = packet['selected_attachment_summary']
      var.selectedClaimable = packet['selected_claimable']
      var.maxMailCount = packet['maxMailCount']
      while(val.mail_list.childrenCount() > 1){
        val.mail_list.get(1).remove()
      }
      for(i in range(0, var.maxMailCount)){
        key = i.round()
        e = val.mail_list['邮件项目'].copy('邮件项目' + key)
        e.entryKey = key
      }
    update: |-
      var.messages = packet['messages']
      var.totalCount = packet['total_count']
      var.unreadCount = packet['unread_count']
      var.claimableCount = packet['claimable_count']
      var.selectedId = packet['selected_id']
      var.selectedSubject = packet['已选主题']
      var.selectedSenderName = packet['selected_sender_name']
      var.selectedSourceText = packet['selected_source_text']
      var.selectedStatusText = packet['selected_status_text']
      var.selectedCreatedAt = packet['selected_created_at']
      var.selectedExpiresAt = packet['selected_expires_at']
      var.selectedBody = packet['已选正文']
      var.selectedAttachmentSummary = packet['selected_attachment_summary']
      var.selectedClaimable = packet['selected_claimable']
      var.maxMailCount = packet['maxMailCount']
      while(val.mail_list.childrenCount() > 1){
        val.mail_list.get(1).remove()
      }
      for(i in range(0, var.maxMailCount)){
        key = i.round()
        e = val.mail_list['邮件项目'].copy('邮件项目' + key)
        e.entryKey = key
      }

# controls 为主要可视控件区块，可在此调整布局、材质与文本绑定。

controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      主面板:
        type: Texture
        attribute:
          point: ~middle_center
          width: 1540
          height: 920
          normal: ~95,95,95,220
          shape: ~round_rect
          radius: 26
        effect:
          stroke:
            width: 3
            color: ~255,255,255,255
          shadow:
            xOffset: 2
            yOffset: 2
            blur: 5
            color: ~255,255,255,75
          ripple:
            duration: 1200
            color: ~255,255,255,110
            width: 0.05
        children:
          邮件标题:
            type: Text
            attribute:
              x: 42
              y: 30
              fontSize: 42
              texts: "~&fAXS 邮箱"
          摘要:
            type: Text
            attribute:
              x: 42
              y: 82
              fontSize: 49
              texts: "'&f总数: ' + var.totalCount.round(0) + '   &f未读: ' + var.unreadCount.round(0) + '   &f可领取: ' + var.claimableCount.round(0)"
          筛选栏:
            type: HStack
            attribute:
              x: 42
              y: 124
              spaceBetween: 10
            children:
              全部筛选按钮:
                type: Texture
                attribute:
                  width: 104
                  height: 40
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 12
                  texts: "~&0全部"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    var.filterMode = 'all'
              未读筛选按钮:
                type: Texture
                attribute:
                  width: 104
                  height: 40
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 12
                  texts: "~&0未读"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    var.filterMode = 'unread'
              可领取筛选按钮:
                type: Texture
                attribute:
                  width: 104
                  height: 40
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 12
                  texts: "~&0可领"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    var.filterMode = 'claimable'
              系统筛选按钮:
                type: Texture
                attribute:
                  width: 104
                  height: 40
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 12
                  texts: "~&0系统"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    var.filterMode = 'system'
              玩家筛选按钮:
                type: Texture
                attribute:
                  width: 104
                  height: 40
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 12
                  texts: "~&0玩家"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    var.filterMode = 'player'
              预设筛选按钮:
                type: Texture
                attribute:
                  width: 104
                  height: 40
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 12
                  texts: "~&0预设"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    var.filterMode = 'preset'
              兑换码筛选按钮:
                type: Texture
                attribute:
                  width: 104
                  height: 40
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 12
                  texts: "~&0CDK"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    var.filterMode = 'cdk'
          左侧面板:
            type: Texture
            attribute:
              x: 42
              y: 184
              width: 660
              height: 690
              normal: ~90,90,90,255
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,120
          邮件滑块:
            type: Texture
            val: 邮件滑块
            attribute:
              x: 692
              y: 198
              width: 6
              height: 50
              normal: ~120,120,120,200
              maxDragY: 612
          左侧滚动栏:
            type: Scroll
            attribute:
              x: 56
              y: 198
              width: 642
              height: 662
              moveY: "self.parent['邮件滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['邮件滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['邮件滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              mail_stack:
                val: mail_list
                type: VStack
                attribute:
                  width: 632
                  spaceBetween: 10
                children:
                  邮件项目:
                    type: Texture
                    attribute:
                      entryKey: 0
                      entry: var.messages[self.entryKey]
                      width: 632
                      height: 96
                      normal: ~120,120,120,255
                      shape: ~round_rect
                      radius: 16
                      visible: "self.entry != none && var.filterMode == 'all' || (var.filterMode == 'unread' && self.entry['unread']) || (var.filterMode == 'claimable' && self.entry['claimable']) || (var.filterMode == 'system' && self.entry['source_type'] == 'system') || (var.filterMode == 'player' && self.entry['source_type'] == 'player') || (var.filterMode == 'preset' && self.entry['source_type'] == 'preset') || (var.filterMode == 'cdk' && self.entry['source_type'] == 'cdk')"
                    effect:
                      stroke:
                        width: 2
                        color: ~0,0,0,255
                    action:
                      clickLeft: |-
                        Packet.send('AXS_MAIL', 'select', self.entry['id'])
                    children:
                      主题:
                        type: Text
                        attribute:
                          x: 18
                          y: 12
                          fontSize: 49
                          texts: "self.parent.entry['unread'] ? '&0' + self.parent.entry['主题'] : '&0' + self.parent.entry['主题']"
                      元信息:
                        type: Text
                        attribute:
                          x: 18
                          y: 42
                          fontSize: 36
                          texts: "'&7' + self.parent.entry['sender_name'] + ' / ' + self.parent.entry['source_text'] + ' / ' + self.parent.entry['status_text']"
                      预览:
                        type: Text
                        attribute:
                          x: 18
                          y: 66
                          fontSize: 36
                          texts: "'&8' + self.parent.entry['预览']"
          右侧面板:
            type: Texture
            attribute:
              x: 736
              y: 184
              width: 762
              height: 690
              normal: ~90,90,90,255
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
          已选主题:
            type: Text
            attribute:
              x: 766
              y: 214
              fontSize: 49
              texts: "var.selectedSubject == none ? '&7未选择邮件' : '&0' + var.selectedSubject"
          已选元信息:
            type: Text
            attribute:
              x: 766
              y: 260
              fontSize: 49
              texts: "'&7发件人: &0' + var.selectedSenderName + '    &7来源: &0' + var.selectedSourceText + '    &7状态: &0' + var.selectedStatusText"
          已选时间:
            type: Text
            attribute:
              x: 766
              y: 294
              fontSize: 36
              texts: 
                - "'&7创建: &0' + var.selectedCreatedAt"
                - "'&7到期: &0' + var.selectedExpiresAt"
          已选附件:
            type: Text
            attribute:
              x: 766
              y: 346
              fontSize: 36
              texts: "'&7附件: &0' + var.selectedAttachmentSummary"
          已选正文:
            type: Text
            attribute:
              x: 766
              y: 392
              fontSize: 49
              width: 700
              texts: "var.selectedBody"
          顶部按钮区:
            type: HStack
            attribute:
              x: 766
              y: 690
              spaceBetween: 14
            children:
              日志按钮:
                type: Texture
                attribute:
                  width: 124
                  height: 40
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0日志"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    Packet.send('AXS_MAIL', 'logs')
          操作按钮区:
            type: HStack
            attribute:
              x: 766
              y: 748
              spaceBetween: 14
            children:
              撰写按钮:
                type: Texture
                attribute:
                  width: 124
                  height: 44
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0写信"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    Packet.send('AXS_MAIL', 'compose')
              领取按钮:
                type: Texture
                attribute:
                  width: 124
                  height: 44
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0领取"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    if(var.selectedId != none){
                      Packet.send('AXS_MAIL', 'claim', var.selectedId)
                    }
              删除按钮:
                type: Texture
                attribute:
                  width: 124
                  height: 44
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0删除"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    if(var.selectedId != none){
                      Packet.send('AXS_MAIL', 'delete', var.selectedId)
                    }
              领取全部按钮:
                type: Texture
                attribute:
                  width: 124
                  height: 44
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0全部领取"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    Packet.send('AXS_MAIL', 'claimall')
              删除全部按钮:
                type: Texture
                attribute:
                  width: 124
                  height: 44
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0全部删除"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    Packet.send('AXS_MAIL', 'deleteall')
          兑换码行:
            type: HStack
            attribute:
              x: 780
              y: 806
              spaceBetween: 14
            children:
              兑换码输入框:
                type: TextBox
                attribute:
                  width: 385
                  height: 44
                  length: 18
                  emptyText: ~输入 CDK 后点兑换
                  fontSize: 42
                  background: ~95,95,95,255
                  shape: ~round_rect
                  radius: 14
                action:
                  textChange: |-
                    var.cdkCode = self.getContent()
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
              兑换码按钮:
                type: Texture
                attribute:
                  width: 124
                  height: 44
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0兑换"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    if(var.cdkCode != none){
                      Packet.send('AXS_MAIL', 'cdk', var.cdkCode)
                    }
              刷新按钮:
                type: Texture
                attribute:
                  width: 124
                  height: 44
                  normal: ~255,255,255,150
                  shape: ~round_rect
                  radius: 14
                  texts: "~&0刷新"
                  center: true
                  fontSize: 49
                effect:
                  stroke:
                    width: 2
                    color: ~0,0,0,255
                action:
                  clickLeft: |-
                    Packet.send('AXS_MAIL', 'refresh')
