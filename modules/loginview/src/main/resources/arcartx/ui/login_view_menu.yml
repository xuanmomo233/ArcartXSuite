                    attribute:
                      point: ~top_right
                      width: 15
                      height: 40
                      normal: ~120,130,140,255
                      maxDragY: 140
                    effect:
                      stroke:
                        width: 2
                        color: ~255,255,255,120
                  服规滚动栏:
                    type: Scroll
                    attribute:
                      width: 545
                      height: 180
                      moveY: self.parent['纵向滑块'].getDragYRatio()
                    action:
                      wheel: |-
                        if(self.moveY >= 0){
                          if(self.wheelValue > 0){
                            self.parent['纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                          }
                        }
                        if(self.moveY <= 1){
                          if(self.wheelValue < 0){
                            self.parent['纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                          }
                        }
                    children:
                      服规内容区:
                        type: Canvas
                        attribute:
