              x: 1120
              y: 726
              width: 510
              height: 190
              moveY: "self.parent['签到滑块'].getDragYRatio()"
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['签到滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['签到滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
