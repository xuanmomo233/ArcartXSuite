# AXS Menu ESC UI — 替换暂停界面，参考纯色块 ESC 菜单布局
ui:
  isHud: false
  match:
    - 暂停界面
  hide:
    - HUD
    - online
    - 聊天栏
  itemSize: 16
  through: true
  escClose: false
  background: false
  closeDied: false
  show: true
  jei: false
  level: 0
  screenScale: true
  defaultOpen: true
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.menuId = packet['menuId']
      var.title = packet['title']
      var.pageTitle = packet['pageTitle']
      var.pageIndex = packet['pageIndex']
      var.pageCount = packet['pageCount']
      var.buttonRows = packet['buttonRows']
      var.buttonCount = packet['buttonCount']
      var.footerRows = packet['footerRows']
      var.footerCount = packet['footerCount']
      var.maxButtonCount = packet['maxButtonCount']
      var.maxFooterCount = packet['maxFooterCount']
      while(val.button_rows.childrenCount() > 1){
        val.button_rows.get(1).remove()
      }
      while(val.footer_rows.childrenCount() > 1){
        val.footer_rows.get(1).remove()
      }
      for(i in range(0, var.buttonCount)){
        key = i.round()
        mb = val.button_rows['菜单按钮'].copy('菜单按钮' + key)
        mb.entryKey = key
      }
      for(i in range(0, var.maxFooterCount)){
        key = i.round()
        fb = val.footer_rows['页脚按钮'].copy('页脚按钮' + key)
        fb.entryKey = key
      }
    update: |-
      var.packetId = packet['packetId']
      var.menuId = packet['menuId']
      var.title = packet['title']
      var.pageTitle = packet['pageTitle']
      var.pageIndex = packet['pageIndex']
      var.pageCount = packet['pageCount']
      var.buttonRows = packet['buttonRows']
      var.buttonCount = packet['buttonCount']
      var.footerRows = packet['footerRows']
      var.footerCount = packet['footerCount']
      var.maxButtonCount = packet['maxButtonCount']
      var.maxFooterCount = packet['maxFooterCount']
      while(val.button_rows.childrenCount() > 1){
        val.button_rows.get(1).remove()
      }
      while(val.footer_rows.childrenCount() > 1){
        val.footer_rows.get(1).remove()
      }
      for(i in range(0, var.buttonCount)){
        key = i.round()
        mb = val.button_rows['菜单按钮'].copy('菜单按钮' + key)
        mb.entryKey = key
      }
      for(i in range(0, var.maxFooterCount)){
        key = i.round()
        fb = val.footer_rows['页脚按钮'].copy('页脚按钮' + key)
        fb.entryKey = key
      }
    close: |-
      var.buttonRows = {}
      var.footerRows = {}
  action:
    open: |-
      var.animation = TwoLerp(1, 1, 0, 300, 300)
      Packet.send('AXS_MENU', 'esc_open')
    tick: |-
      if(server.player_yaw != var.yaw){
        var.yaw = server.player_yaw
        Camera.setState(1.2, -0.5, 2.5, 150, 0.0, 600)
        Camera.setThirdPerson(true)
      }
    close: |-
      async {
        Camera.setThirdPerson(false)
        Camera.clearState()
      }
    keyPress: |-
      if(self.currentKeyPress() == "ESCAPE"){
        Camera.clearState()
        var.animation = Lerp(0, 1, 300)
        async {
          Thread.sleep(600)
          Camera.setThirdPerson(false)
          Screen.close()
        }
      }
    load: |-
      var.packetId = 'AXS_MENU'
      var.animation = 1
      var.yaw = 0
      var.title = '菜单'
      var.pageTitle = '菜单'
      var.pageIndex = 0
      var.pageCount = 1
      var.buttonRows = {}
      var.buttonCount = 0
      var.footerRows = {}
      var.footerCount = 0
      var.maxButtonCount = 0
      var.maxFooterCount = 0
controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      width: 1920
      point: ~stretch_all
      height: 1080
    children:
      左侧面板:
        type: Canvas
        attribute:
          width: 620
          x: "-20 - 600 * var.animation"
          point: ~vertical_stretch_left
        children:
          背景:
            type: Texture
            attribute:
              normal: ~Frosted:30;255,255,255,100
              point: ~stretch_all
              shape: ~round_rect
              radius: 20
            effect:
              stroke:
                width: 2
                color: ~0,0,0,255
              ripple:
                duration: 1200
                color: ~255,255,255,100
                width: 0.05
          菜单贴图:
            type: HGrid
            attribute:
              visible: true
              spaceBetweenX: 5
              spaceBetweenY: 5
              column: 3
              x: 50
              y: 35
            action:
              create: |-
                for(i in range(2,9)){
                  A = self['装饰贴图'].copy('装饰贴图' + i)
                }
            children:
              装饰贴图:
                type: Texture
                attribute:
                  normal: ~255,255,255,255
                  shape: ~round_rect
                  radius: 2
                  width: 10
                  height: 10
          标题:
            type: Text
            attribute:
              texts:
                - "var.title"
              alpha: 1
              x: 120
              y: 40
              fontSize: 64
          下划线:
            type: Texture
            attribute:
              normal: ~255,255,255
              alpha: 1
              width: 618
              y: 110
              point: ~top_left
              height: 5
              shape: ~round_rect
              radius: 2
          滚动区:
            type: Scroll
            attribute:
              width: 560
              x: 67
              y: -15
              height: 960 - 200
              point: ~horizontal_stretch_middle
              moveY: self.parent['纵向滑块'].getDragYRatio()
            action:
              wheel: |-
                if(self.moveY >= 0 && self.wheelValue > 0){
                  self.parent['纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
                if(self.moveY <= 1 && self.wheelValue < 0){
                  self.parent['纵向滑块'].setDragYRatio((self.moveY - self.wheelValue * 0.1).round(1))
                }
            children:
              按钮网格:
                type: HGrid
                val: button_rows
                attribute:
                  spaceBetweenX: 50
                  spaceBetweenY: 50
                  x: 0
                  column: 2
                  y: 0
                children:
                  菜单按钮:
                    type: Texture
                    attribute:
                      entryKey: 0
                      entry: var.buttonRows[self.entryKey]
                      visible: self.entry != none
                      width: 218
                      height: 60
                      normal: "self.entry != none && self.entry['enabled'] ? '95,95,95,255' : '55,55,55,200'"
                      hover: "self.entry != none && self.entry['enabled'] ? '120,120,120,255' : '55,55,55,200'"
                      shape: ~round_rect
                      radius: 10
                    effect:
                      stroke:
                        width: 2
                        color: "self.entry != none && self.entry['enabled'] ? '255,255,255,255' : '120,120,120,255'"
                    action:
                      clickLeft: |-
                        if(self.entry != none && self.entry['enabled']){
                          Packet.send(var.packetId, 'click', self.entry['id'])
                        }
                    children:
                      图标:
                        type: Slot
                        attribute:
                          slotType: ~Icon
                          visible: "self.parent.entry != none && self.parent.entry['hasIcon']"
                          itemScale: 0.72
                          x: 8
                          y: 6
                          width: 48
                          height: 48
                          normal: ~45,45,55,180
                          shape: ~round_rect
                          radius: 8
                          through: true
                          seticon: "self.parent.entry != none ? self.setItemIcon(self.parent.entry['itemJson']) : none"
                        action:
                          create: |-
                            self.seticon()
                      标签:
                        type: Text
                        attribute:
                          through: true
                          x: "self.parent.entry != none && self.parent.entry['hasIcon'] ? 138 : 109"
                          y: 18
                          texts: "self.parent.entry != none ? self.parent.entry['text'] : none"
                          center: true
                          fontSize: 48
          纵向滑块:
            type: Texture
            val: drag_bar
            attribute:
              point: ~middle_left
              width: 7
              height: 50
              normal: ~0,0,0,100
              x: 613
              y: -365
              maxDragY: 960 - 200 - 50
          页脚网格:
            type: HGrid
            val: footer_rows
            attribute:
              spaceBetweenX: 50
              spaceBetweenY: 50
              column: 2
              x: 67
              y: 460
              point: ~horizontal_stretch_middle
            children:
              页脚按钮:
                type: Texture
                attribute:
                  entryKey: 0
                  entry: var.footerRows[self.entryKey]
                  visible: self.entry != none
                  width: 218
                  height: 60
                  normal: "self.entry != none && self.entry['enabled'] ? '95,95,95,255' : '55,55,55,200'"
                  hover: "self.entry != none && self.entry['enabled'] ? '255,255,255,255' : '55,55,55,200'"
                  shape: ~round_rect
                  radius: 10
                effect:
                  stroke:
                    width: 2
                    color: "self.entry != none && self.entry['enabled'] ? '255,255,255,255' : '120,120,120,255'"
                action:
                  clickLeft: |-
                    if(self.entry != none && self.entry['enabled']){
                      if(self.entry['clientAction'] == 'options'){
                        Game.options()
                      }elif(self.entry['clientAction'] == 'quit'){
                        Game.quit()
                      } else {
                        Packet.send(var.packetId, 'footer', self.entry['id'])
                      }
                    }
                children:
                  页脚文字:
                    type: Text
                    attribute:
                      through: true
                      x: 109
                      y: 18
                      texts: "self.parent.entry != none ? self.parent.entry['text'] : none"
                      center: true
                      fontSize: 48
