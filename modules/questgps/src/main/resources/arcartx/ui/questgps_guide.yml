# AXS 资源说明
# 用途: QuestGPS 任务指引清单 HUD — 左侧竖排信息流/RPG 风格。
# 前置依赖: ArcartX；QuestGPS 模块启用后会自动注册或导出。
# 关联文件: ArcartXQuestGPS.yml、ui/questgps_menu.yml

ui:
  isHud: true
  defaultOpen: false
  background: false
  closeDied: true
  through: true
  screenScale: true
  show: true
  level: 3
  packetHandler:
    init: |-
      var.packetId = packet['packetId']
      var.active = packet['active']
      var.questName = packet['questName']
      var.completedCount = packet['completedCount']
      var.totalCount = packet['totalCount']
      var.progressText = packet['progressText']
      var.tasks = packet['tasks']
      var.taskCount = packet['taskCount']
      var.navWorld = packet['navWorld']
      var.navX = packet['navX']
      var.navY = packet['navY']
      var.navZ = packet['navZ']
      var.hasNav = packet['hasNav']
      var.taskKeys = var.tasks.keys()
      var.taskIndex = 0
      for(key in var.taskKeys){
        item = val.guide_task_list['引导项' + var.taskIndex.round()]
        if(item != none){
          item.entryKey = key
        }
        var.taskIndex = var.taskIndex + 1
      }
      while(var.taskIndex < 3){
        item = val.guide_task_list['引导项' + var.taskIndex.round()]
        if(item != none){
          item.entryKey = none
        }
        var.taskIndex = var.taskIndex + 1
      }
    update: |-
      var.packetId = packet['packetId']
      var.active = packet['active']
      var.questName = packet['questName']
      var.completedCount = packet['completedCount']
      var.totalCount = packet['totalCount']
      var.progressText = packet['progressText']
      var.tasks = packet['tasks']
      var.taskCount = packet['taskCount']
      var.navWorld = packet['navWorld']
      var.navX = packet['navX']
      var.navY = packet['navY']
      var.navZ = packet['navZ']
      var.hasNav = packet['hasNav']
      var.taskKeys = var.tasks.keys()
      var.taskIndex = 0
      for(key in var.taskKeys){
        item = val.guide_task_list['引导项' + var.taskIndex.round()]
        if(item != none){
          item.entryKey = key
        }
        var.taskIndex = var.taskIndex + 1
      }
      while(var.taskIndex < 3){
        item = val.guide_task_list['引导项' + var.taskIndex.round()]
        if(item != none){
          item.entryKey = none
        }
        var.taskIndex = var.taskIndex + 1
      }
  action:
    load: |-
      var.packetId = 'AXS_QUESTGPS'
      var.active = false
      var.questName = none
      var.completedCount = 0
      var.totalCount = 0
      var.progressText = '0/0'
      var.tasks = {}
      var.taskCount = 0
      var.navWorld = none
      var.navX = 0
      var.navY = 0
      var.navZ = 0
      var.hasNav = false

controls:
  自适应全局布局:
    type: Adaptive
    attribute:
      point: ~stretch_all
      width: 1920
      height: 1080
    children:
      任务面板:
        type: Canvas
        attribute:
          point: ~top_left
          x: 16
          y: 220
          width: 420
          height: 340
          visible: var.active
        effect:
          offsetAnimate:
            duration: 300
            interpolator: decelerate
            x: -440
            y: 0
        children:
          背景:
            type: Texture
            attribute:
              point: ~stretch_all
              normal: ~12,12,18,210
              shape: ~round_rect
              radius: 16
          强调条:
            type: Texture
            attribute:
              point: ~top_left
              x: 0
              y: 0
              width: 5
              height: 340
              normal: ~248,202,83,255
              shape: ~round_rect
              radius: 4
          任务图标:
            type: Text
            attribute:
              point: ~top_left
              x: 20
              y: 14
              texts: "~&6⬡"
              fontSize: 20
              shadow: false
          任务名称:
            type: Text
            attribute:
              point: ~top_left
              x: 44
              y: 14
              width: 260
              texts: "'&e&l' + var.questName"
              fontSize: 18
              shadow: false
          进度条背景:
            type: Texture
            attribute:
              point: ~top_left
              x: 310
              y: 16
              width: 96
              height: 18
              normal: ~40,40,50,200
              shape: ~round_rect
              radius: 8
          进度条填充:
            type: Texture
            attribute:
              point: ~top_left
              x: 310
              y: 16
              width: "var.totalCount > 0 ? math.max(12, 96 * var.completedCount / var.totalCount) : 12"
              height: 18
              normal: ~120,220,80,230
              shape: ~round_rect
              radius: 8
          进度文字:
            type: Text
            attribute:
              point: ~top_left
              x: 310
              y: 17
              width: 96
              texts: "'&f' + var.progressText"
              fontSize: 12
              shadow: false
              center: true
          上分隔线:
            type: Texture
            attribute:
              point: ~top_left
              x: 16
              y: 42
              width: 388
              height: 1
              normal: ~255,255,255,40
          任务列表:
            val: guide_task_list
            type: VStack
            attribute:
              point: ~top_left
              x: 16
              y: 50
              width: 388
              spaceBetween: 4
            children:
              引导项0:
                type: Canvas
                attribute:
                  point: ~top_left
                  width: 388
                  height: 66
                  entryKey: none
                  visible: self.entryKey != none && var.tasks[self.entryKey] != none
                  entry: var.tasks[self.entryKey]
                children:
                  状态图标:
                    type: Text
                    attribute:
                      point: ~top_left
                      x: 8
                      y: 10
                      texts: "self.parent.entry != none ? (self.parent.entry['completed'] ? '&a✓' : '&f◈') : none"
                      fontSize: 16
                      shadow: false
                  任务文字:
                    type: Text
                    attribute:
                      point: ~top_left
                      x: 30
                      y: 10
                      width: 280
                      texts: "self.parent.entry != none ? (self.parent.entry['completed'] ? '&7&m' + self.parent.entry['text'] : '&f' + self.parent.entry['text']) : none"
                      fontSize: 14
                      shadow: false
                  任务状态:
                    type: Text
                    attribute:
                      point: ~top_right
                      x: -8
                      y: 10
                      texts: "self.parent.entry != none ? (self.parent.entry['completed'] ? '&a已完成' : '&e进行中') : none"
                      fontSize: 12
                      shadow: false
                  行分隔线:
                    type: Texture
