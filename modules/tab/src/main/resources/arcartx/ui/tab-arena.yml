ui:
  isHud: true
  hide:
  - player_list
  escClose: false
  defaultOpen: true
  action:
    load: |-
      var.ArenaTAB详细 = false
    keyPress: |-
      if(self.currentKeyPress() == "TAB"){
        Packet.send("TAB","update")
        var.ArenaTAB详细 = true
      }
    keyRelease: |-
      if(self.currentKeyReleased() == "TAB"){
        var.ArenaTAB详细 = false
      }
  packetHandler:
    tab: |-
      var.entries = packet['entries']
      var.redEntries = {}
      var.blueEntries = {}
      for(key in var.entries.keys()){
        entry = var.entries[key]
        if(entry['team'] == 'red'){
          var.redEntries[key] = entry
        } else if(entry['team'] == 'blue'){
          var.blueEntries[key] = entry
        }
      }
      var.ArenaTAB红队人数 = var.redEntries.size()
      var.ArenaTAB蓝队人数 = var.blueEntries.size()
controls:
  adaptive:
    type: adaptive
    attribute:
      point: ~top_center
      width: 1920
      height: 1080
    children:
      ArenaTAB背景:
        type: texture
        attribute:
          point: ~top_center
          width: 720
          height: 80 + 32 * Math.max(var.ArenaTAB红队人数, var.ArenaTAB蓝队人数)
          y: 30
          normal: ~Frosted:30;0,0,0,200
          shape: ~round_rect
          radius: 18
        effect:
          stroke:
            width: 3
            color: ~0,0,0,255
        children:
          标题:
            type: text
            attribute:
              point: ~top_center
              y: 18
              fontSize: 32
              texts: "'&c&lRED  &fvs  &9&lBLUE'"
              lineSpace: 6
          中线:
            type: texture
            attribute:
              point: ~top_center
              x: 0
              y: 60
              width: 2
              height: 28 * Math.max(var.ArenaTAB红队人数, var.ArenaTAB蓝队人数)
              normal: ~255,255,255,80
          RedGrid:
            type: VGrid
            attribute:
              spaceBetweenY: 2
              row: 16
              y: 60
              x: 20
            children:
              red_player_row:
                type: Canvas
                attribute:
                  entry: var.redEntries[self.key]
                  width: 320
                  height: 30
                  visible: self.entry != null
                children:
                  head:
                    type: texture
                    attribute:
                      width: 28
                      height: 28
                      x: 0
                      y: 0
                      shape: ~round_rect
                      radius: 4
                      normal: "self.parent.entry != null ? 'PlayerSkin:' + self.parent.entry['uuid'] : '~120,120,120,255'"
                  name_text:
                    type: text
                    attribute:
                      x: 36
                      y: 0
                      fontSize: 26
                      texts: "self.parent.entry != null ? self.parent.entry['name'] : '~null'"
                      lineSpace: 4
                  status_text:
                    type: text
                    attribute:
                      x: 220
                      y: 0
                      fontSize: 26
                      texts: "self.parent.entry != null ? (self.parent.entry['status'] == '1' ? '&c⚔' : '&7•') : '~&7•'"
                      lineSpace: 4
                  health_text:
                    type: text
                    attribute:
                      x: 250
                      y: 0
                      fontSize: 26
                      texts: "self.parent.entry != null ? '&c❤ ' + self.parent.entry['health'] : '~null'"
                      lineSpace: 4
                      visible: var.ArenaTAB详细
          red_observer:
            type: Observer
            attribute:
              target: val.RedGrid['red_player_row']
              subscribe: var.redEntries
              maxSize: 16
          BlueGrid:
            type: VGrid
            attribute:
              spaceBetweenY: 2
              row: 16
              y: 60
              x: 380
            children:
              blue_player_row:
                type: Canvas
                attribute:
                  entry: var.blueEntries[self.key]
                  width: 320
                  height: 30
                  visible: self.entry != null
                children:
                  head:
                    type: texture
                    attribute:
                      width: 28
                      height: 28
                      x: 0
                      y: 0
                      shape: ~round_rect
                      radius: 4
                      normal: "self.parent.entry != null ? 'PlayerSkin:' + self.parent.entry['uuid'] : '~120,120,120,255'"
                  name_text:
                    type: text
                    attribute:
                      x: 36
                      y: 0
                      fontSize: 26
                      texts: "self.parent.entry != null ? self.parent.entry['name'] : '~null'"
                      lineSpace: 4
                  status_text:
                    type: text
                    attribute:
                      x: 220
                      y: 0
                      fontSize: 26
                      texts: "self.parent.entry != null ? (self.parent.entry['status'] == '1' ? '&9⚔' : '&7•') : '~&7•'"
                      lineSpace: 4
                  health_text:
                    type: text
                    attribute:
                      x: 250
                      y: 0
                      fontSize: 26
                      texts: "self.parent.entry != null ? '&c❤ ' + self.parent.entry['health'] : '~null'"
                      lineSpace: 4
                      visible: var.ArenaTAB详细
          blue_observer:
            type: Observer
            attribute:
              target: val.BlueGrid['blue_player_row']
              subscribe: var.blueEntries
              maxSize: 16
