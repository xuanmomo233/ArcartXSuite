# ============================================================
#  Mail 模块消息文件
# ------------------------------------------------------------
#  支持 & 颜色码（如 &c 红色）和 {0} {1} 占位符。
#  修改后执行 /axs reload mail 即可生效。
# ============================================================

prefix: "&3◆ &6ArcartXSuite &7| &r"

# ── 通用 ──────────────────────────────────────────────
common:
  service-down: "&c服务未启动。"
  reload-hint: "&e请使用 /{0} reload mail"
  unknown: "&e未知命令，使用 /{0} mail help"
  only-player: "&c该命令只能由玩家执行。"
  no-permission: "&c你没有权限执行这个命令。"

# ── help ──────────────────────────────────────────────
help:
  title: "&6Mail 管理命令"
  status: "&7{0} status&f - 查看模块状态"
  open: "&7{0} open <玩家>&f - 为玩家打开邮箱"
  preset:
    list: "&7{0} preset list&f - 列出所有预设"
    send: "&7{0} preset send <预设ID> <目标>&f - 派发预设邮件"
    info: "&7{0} preset info <预设ID>&f - 查看预设详情"
    delete: "&7{0} preset delete <预设ID>&f - 删除预设"
    reload: "&7{0} preset reload&f - 重新加载预设"
  admin: "&7{0} admin&f - 打开管理 UI（预设编辑器）"
  cdk:
    create: "&7{0} cdk create <预设ID> <code|auto> <最大领取数> <有效期>&f - 创建 CDK"
    info: "&7{0} cdk info <兑换码>&f - 查看 CDK"
    list: "&7{0} cdk list [页码]&f - 列出 CDK"
    delete: "&7{0} cdk delete <兑换码>&f - 删除 CDK"

# ── status ────────────────────────────────────────────
status:
  title: "&6Mail 状态"
