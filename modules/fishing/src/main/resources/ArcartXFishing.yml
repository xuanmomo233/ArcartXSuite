config-version: 1

storage:
  mode: sqlite
  sqlite-file-name: fishing.db
  pool-size: 1
  mysql-host: localhost
  mysql-port: 3306
  mysql-database: axs_fishing
  mysql-username: root
  mysql-password: ""

fishing:
  replace-vanilla: true
  minigame-tick-interval: 1
  bar-gravity: 0.3
  bar-bounce-damping: 0.7
  bar-click-force: -0.6
  catch-duration-ticks: 600
  progress-drain-rate: 0.5
  progress-gain-rate: 1.0
  base-green-bar-height: 96
  height-per-level: 4
  perfect-bonus-multiplier: 1.5
  base-xp-per-level: 100

# ─── 水域定义 ────────────────────────────────────────
# 指定地点: 玩家在指定坐标/区域内钓鱼
# 默认水域: 未匹配任何指定地点时使用
waters:
  # 指定地点水域列表
  specified:
    - name: "dragon_lake"
      display-name: "&b龙泉湖"
      type: circle
      world: "world"
      center: [100, 64, 200]
      radius: 50
      fish-pool: "lake"
      treasure-pool: "common"
      difficulty-modifier: 1.2
      bait-multipliers:
        worm: 1.5
        corn: 2.0
      require-permission: ""

    - name: "jade_river"
      display-name: "&a翡翠河"
      type: rectangle
      world: "world"
      min: [500, 60, 300]
      max: [700, 80, 400]
      fish-pool: "river"
      treasure-pool: "common"
      difficulty-modifier: 0.9
      bait-multipliers:
        worm: 1.0
        bread: 1.3
      require-permission: ""

  # 默认水域（兜底）
  default:
    name: "default"
    display-name: "&7普通水域"
    fish-pool: "default"
    treasure-pool: "default"
    difficulty-modifier: 1.0
    bait-multipliers:
      worm: 1.0
      bread: 1.0
      corn: 1.0

# ─── 鱼类池 ────────────────────────────────────────
# 引用 fishes/ 目录下的鱼种 ID
fish-pools:
  default:
    - "sea_bass"
    - "salmon"
  lake:
    - "sea_bass"
    - "catfish"
    - "legendary_carp"
  river:
    - "salmon"
    - "catfish"
  ocean:
    - "tuna"
    - "pufferfish"
    - "sea_bass"

# ─── 宝藏池 ────────────────────────────────────────
# 引用 treasures/ 目录下的宝藏 ID
treasure-pools:
  default:
    - "old_boot"
    - "lost_ring"
  common:
    - "old_boot"
    - "lost_ring"
    - "ancient_coin"
  rare:
    - "ancient_coin"
    - "lost_ring"

# ─── 饵料定义 ────────────────────────────────────────
# 详细定义在 baits/ 目录下，此处仅声明可用饵料列表
baits:
  enabled: true
  default-bait: "worm"
  # 玩家钓鱼时检测鱼竿的 NBT 或 lore 来识别饵料
  # 示例: 鱼竿 lore 包含 "&7饵料: 蚯蚓" 则使用 worm
  lore-pattern: "&7饵料: {bait_name}"
  # 或使用 NBT 标签 (如 axs:bait)
  nbt-tag: "axs_bait"

ui:
  register-on-enable: true
  minigame-id: "fishing_minigame"
  collection-id: "fishing_collection"

commands:
  enabled: true
  base-permission: "axs.fishing.use"
